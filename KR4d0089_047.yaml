body:
  text: 柯山集卷四十七宋張耒撰啓答林學士啓伏審光膺宸綍進直蘭臺榮命始行儒林增重竊惟館閣之選蓋待儒學之臣既非典領之權幾于冗散又無議論之責少補絲毫宜非仕者之願居而為一世之所尚蓋學問為君子之事職卑而待之不輕詩書非俗士所知祿薄而意則甚厚雖厭居寂寞夸者至謂之病坊而脫略等夷赤尉均稱于宰相名既如此人猶貴之而况將相之選踵武相尋祖宗以來掄擇為重故本朝之寵儒者雖他官必假此名伏惟某官文麗而用長才周而學富父子濟美兄弟有聲行實著于家庭强濟冠于朝右冠豸彈擊風霜凛然攬轡按行疑竇立解巳登進于卿棘復入直于道山豈專是正之功實示超騰之漸某淮楚晚進場屋後來辱登門墻嘗備官屬當趨風于末坐乃首贄于長箋為禮則勤循分而懼孔鸞同列忘魯鈍之卑飛珠玉藏家驚輝光于貧屋永為好也何日忘之代人謝及第啓困瑕疵于指玉獻已過三收奔敗以誓師戰猶借一僅能無辱豈足言勞伏念某受才樗疏趨世迂濶拙無他技幼刻意于藝文家有遺風世知名于科級童子習雕蟲之技巳屢試于鄉邦專門尚經術之科嘗再遊于禮部一行作吏終日坐曹几硯巳積于埃塵詩書錯陳于朱墨人耳人耳頗羞請鑄之金時哉時哉思樂無求之雉屬大明之繼統仰衆正之來同恥窮有道之邦願列思皇之士隨衆碌碌僅乃有成半世遑遑所得如此惟其無似已合知榮兹蓋伏遇某官左右太平設張治具收才能于無間本選舉于至公刈楚旁及于艾蕭濬川下通于溝澮羞愧平津之策絶意上游庶幾毛遂之竒收功下客潤州謝執政啓此者伏奉告命除直龍圖閣知潤州軍事巳于閏四月二十九日到任交割訖伏以文章為學者餘事故先王不以經世富貴非人力所制故君子以為在天而况修詞蹇淺未涉作者之流趨世濶迂每在衆人之後則其投閒置散疐後跋前在所當然夫復何恨伏念某羈旅一介憔悴餘生困箠楚者十年逭饑寒於斗祿仕巳成于漫浪意何有于功名始誤置于成均復進升于儒館佐東觀之論著頗見舊聞紀先帝之事功遂遊藏室擢升右史密侍清光雖學儒之至榮豈草茅之素望而疾病侵耗心力衰疲分敢自安義當引去駑馬自竭驥厯塊而巳超神山在前風引舟而忽逺尚叨便郡獲養殘軀靜循此恩蓋有所自兹蓋伏遇某官曲成萬類器使庶工直鎛䝉鏐疾者未嘗遽廢大杗小桷施之各以其宜致此枵虛未即捐棄獄訟希簡職事不廢乎詩書山林幽深形骸頗為之清快庶餘齡之可養幸沉痼之有瘳仰報至恩將必有在賀錢內翰啓伏承內翰侍讀四丈罷直內閣升華禁林解天府之浩繁侍經帷之清燕雖衆望所屬理固當然而成命既行士以相賀伏以學士號為職親地要實儒者之至榮訓辭欲其言近指深必文人為充運設官雖專于書詔儲才常用于鈞衡被選益艱因人增重雖從容入侍獨髙太白樂天之詞華而論議經邦復重德裕敬輿之術業苟擅一長于此皆為稱職之才洪惟本朝繼有碩望方當聖主之圗任果見異人之來儀伏惟某官學總百家才髙一世經守韋平之學世登朝董之科無施不長所治皆最批竇蹈窽在庖丁如無牛越國過都于騏驥為厯塊隱然公輔之望久矣中外所期俄聞異恩大慰衆論謀謨黼座何慙天子私人顧瞻玉堂應歎吾家舊物即膺大拜用究逺圖某每愧庸虛素承知奬其為欣快實倍等倫嘆白髮之侵陵望青雲于寥廓嵗事巳晏德履多祥更冀保頤下副祝願宣州謝兩府啓比者法當易地恩使造庭方奔命于半途遽分符于便郡地未殊于南北舟楫相通憂方切于困窮廩祿有繼雖徼幸出聖朝之厚而曲成皆髙位之仁巳見吏民粗知風俗兹蓋伏遇某官受天間氣為國元臣道德致君議論垂世器衆材而無棄慮一物之遐遺遂令罔功每輒得所退觀所領自昔有聲道德在人有顔真卿之政事登髙舊賦稱謝𤣥暉之文章某素乏詞華不通吏道一無稱可全有便安民消愁歎之聲自緣聖治家受飽暖之福徒費君恩尺寸無施冒昧而巳嵗事云晏幾政多閒伏乞俯為華夷精調寢味賀錢都尉啓伏承光膺綸綍雄領節旌逺俗知榮侯藩增重其為僚屬益倍歡愈伏以懿親建邦粵古令典惟盛朝尚王姬之貴在一時皆妙選之才既內奉朝請而為國華亦外假風聲而持將鉞屈天姻之華貴尉南服之荒遐民社有光江山增氣恭惟某官朝推令德世有美名夙以才猷膺兹選擢忠孝著甲昔受大賚之王封簮笏滿門今為五世之卿族聞望卓爾寵祿從之雖仰青雲之絶塵亦受靈河之餘潤優游美望素欽武子之才豪留務不煩久服征南之恩信嵗事已宴賢履有休更冀保調以綏戬穀謝鮑承務啓伏審光臨民社審布教條德庇所臨愚陋知免竊惟漢唐之盛惟以守令為難或由郎而出宰邱民或厯縣而入官華省謂將責之經世莫若試之臨人恭惟聖朝亦重兹選凡膺民社之寄莫非慈惠之師伏惟某官炳蔚多文淵源博學行巳信于鄉里名久播于搢紳素懷製錦之良能方展割雞之利用略攄素業均惠逺民牒訴雖繁敦本可使無訟鰥寡未乂有政為善養人雖君子之徽猷蓋髙才之餘事况復江山清逺民物阜安獄訟多餘樽爼可樂莫陪談笑徒切傾馳過此以還未知所措賀廣德知軍啓伏以星回于天既發春而獻嵗帝出乎震方去故而就新天時于是更端賢者受其介福伏惟某官風猷强敏道義深純度越衆人獨立一世烏臺彈擊彀千鈞之弩而發機山郡剸裁持屠牛之刀而破蝨惟其道用煥然日新俯同世人仰受天福謝建平知縣啓兹者過沐殊私特貽盛禮一日之長託末契之光華通家之歡傷前人之零落俯跪之際感喜交并伏惟某官文學承家吏能絶俗一見許論于家世並遊遂列于弟兄昔日桑弧交慶兩家之生子相逢樽酒共驚五十之幾年敢不傳義好于子孫謹銘藏于肺腑過此以往未知所裁賀太平知州啓伏承輟講經帷剖符江國餘光所芘弱植知安伏惟某官奧學造微髙行絶衆赫奕家世照臨逺方清淨道心消鎮浮俗遙想公餘之多暇未妨禪觀之無為出入起居輕利安穩某夙懷問道幸託為鄰惟仁人志常在民自今日請學為政雖相聞雞犬實一葦可航之川而坐困簡書有其人甚逺之歎顧兹傾素曷罄敷陳上黃州郡守楊懷寶啓某愚暗觸禁懵不自知仁聖至明罰惟當罪雖從黜責尚得依歸平生京洛之遊交情有素千里江山之别老境已侵豈知投竄之餘忽有笑談之便淋漓醉舞坐沉痼而少衰慷慨悲歌撫壯心而猶在靜言思咎亦既戒行忽忘跋履之勤喜遂瞻依之素伏惟某官天資拔俗國器冠時利刃吹毛長劒耿介倚天外髙標絶衆野鶴昻藏在雞羣擅風流獨步之名有雍容甚都之觀左挽繁弱邁越石之竒一割牛心兼武子之逸蓋嘗奉使諸部固巳著迹本朝賦吳郡之溪山醉金陵之風月遺愛猶在陳迹可尋屈臨方州實幸逺俗某去國流浪多病變衰流水髙山知者益寡附輿執轡今也則亡雖無聊逺竄之可憐得相逢一笑而何恨私用自賀夫復何言春序正暄更祈保衛賀潘奉議致仕啓伏審親家致政奉議上還印綬退即里閭已私知止之安將受永年之福凡居親舊實助欣愈竊以人之多難在于儒者尤甚壯年講學謂富貴利祿之可期小試多違信功名遇合之有命加以嵗月荏苒時不待人顧瞻簮裳義則當止彼貪冒無恥者率皆優佚而老惟進退顧義者不免饑寒之憂未餘漢庭之賜金復休故社之喬木進計宦遊之廪祿何有一毫復與平生之簞瓢相從三徑莫非命也謂之何哉伏惟某官奧學淵源懿行金玉久栖遲于末路遂髙退于明時清譽益隆多祥有在某自憐罪戾久困泥塗延企髙風但懷景仰答揚州司法謝薦啓式懋才猷顯膺褒薦過敦謙德躬贄髙文兢懼靡遑珍藏為好竊以長吏薦士蓋遵著令之文小官求知將應有司之格然在下者常艱于際可居上者亦歎于才難苟䝉特達之知亦謂非常之㑹伏惟某官溫恭飭已道德承家老成之典刑具存正始之風流猶在青衫手版共歎棘棲之鸞命衮貂冠兹為鴻漸之翼既深感愧又切頌祈疏三天洞求雨疏伏以宣城之境春末以來雨施不時稻未得種父子熟視而無告官吏不知其所為凡曰有神靡不致禱豈德薄莫能感格抑民災未易祓除莽大澤與髙原赫炎風兮畏日恭惟禪師具千乘眼得一佛乘無有親疏等加悲憫護衆生如赤子觀此世如掌中則夫鬱興大雲普降甘雨宜翹足可待實伸臂之勞其在神通蓋甚容易眷兹千里之澤請以三日為期時或有愆事且無及三天洞謝雨疏維清淨心雖于三界無所著以慈悲故常憫一切諸有情頃以旱災輒伸誠禱即時感達應念雨來變饑饉為豐穰易煩惱為歡喜顧兹恩施曷有報償哀民生之多艱願真乘之卒相俾無失望是謂大慈柯山集卷四十七
