body:
  text: 柯山集卷三十宋張耒撰同文唱和詩初入試院忠臣東門驄馬止行行被詔秋闈閲俊英三島隔雲天北極萬燈明路國西城人間聊假詩書樂地逺還聞市井聲一夜涼風起閶闔月中應有桂枝生孔武仲十載江湖萬里行偶來西館閲豪英雲龍九闕晨書詔燈火千門夜出城瀟灑庭除當月色稠重幕帟斷人聲年家兄弟今同舍曽見河南起賈生原注慎思被薦廣西先人為轉運判官有詩餞行補之官局悠悠共此行來時庭菊未含英五更脫葉驚書几一夜寒砧滿禁城詩似涼風凄有興酒如清露浥無聲何時驄馬催歸去更看林端魄一生耒莫歎匆匆襆被行賴逢數子美如英已看明月同為客應犯初寒復入城白日有書追睡思青燈無夢聽秋聲直無剔甲逍遙地幾日疑公太瘦生子文跫然誰復喜斯行開豁拘懷賴俊英上國擢材初改轍衆心督戰亦乘城何時奏籍瞻霜簡且復安眠聽雨聲異日儻容休沐會未慙相約太癯生公麟敕使書囊間隊行聚星深館粲諸英雲隨襟袖來蓬島香散房櫳宿化城振鷺充庭天有幕珊瑚入網海無聲範模一世尊先覺況此題評慰後生倚承詔掄材敢倦行廣庭深鎖待羣英分埸自敵三千客決勝誰降七十城夜案尚聞塗卷筆曉星方聽讀書聲原注每早常聞無咎諸公讀書歸時還有黃花否已覺秋風滿袖生幹江南嘗應檄書行多向西風拂露英薄暮解裝融祖寺原注去年八月檢潦嘗宿牛頭山祖堂寺法融禪師坐禪處也侵晨揮䇿楚王城原注在宣州東前年歙州考試時曽過明蟾又見中秋色哀鴈仍聞半夜聲懷舊感新搔短髮歸時應有二毛生南仲昭回雲漢九天橫冠帶祁祁盡俊英梁國有珠光照乘趙人懷璧價連城道山邃處分羣彥文律持來考正聲秋晚定知誰入彀叔通還進魯諸生肇千門鑰入斷人行禁漏稀微出邇英齊拜敕書期老伏並驅騶馬出西城喧譁燈火看如夢關鎖官曹祗寄聲聊付能詩破羈旅詩成冉冉又還生試院即事呈諸公幹去家䇿馬上長河逆旅光隂忽忽過陳迹不堪追放浪新才仍復委搜羅雅談幸有青雲士佳句寧無白雪歌此興非憑吟笑遣未應能奈客愁何武仲衡門咫尺限關河此地平時匹馬過欲把塵埃補山嶽寧辭羽翮置罝羅華堂翠帟供間燕明月清風伴嘯歌擬寫秋容須筆力新詩句句似隂何補之天街初月映天河拜敕東華走馬過解榻暫如龜遇木閉簾還似雉嬰羅倦依書册工催睡悶倚詩篇足當歌可待紛紛壓朱墨晝間惟有飲亡何耒天街落日馬鳴珂咫尺衡門不許過催去據鞍猶鶴望爭觀夾道已雲羅奏篇定有凌雲賦招隱今無扣角歌最苦清秋孤美睡通宵三問夜如何子文高談初喜聽懸河未厭鄰房日夕過蝴蝶乍回塵外夢蜘蛛看結雨中羅銀袍校藝觀勍敵玉帳收功聽凱歌共是當年廷試客鎖闈今日合如何公麟盍簪聞善若江河簾幕疏間笑語過月照飛箋穿戶綺風生揮麈動衣羅己張英彀收三俊更賦離騷續九歌涼夜沈沈清不寐空庭無奈葉聲何忠臣俊遊常恨邈山河邂逅文闈得屢過朱簿分明俱鼎立墨圖伻位看星羅人間戶牖還相近朝得英材信可歌雙鑰重關非不密只應無奈夢魂何南仲重門鍵鑰阻山河顧有良朋不厭過唾落如珠傾巨斛袂揮成幕散輕羅慙分處士吹竽俸漫學東人掩鼻歌笑語哄堂俄又夜愁還奈我曹何倚風生簾幕撼層波況值清秋一半過堂上簪裾方鷺集案間圖史已星羅東籬採菊朝嘗酒北里吹竽夜聽歌早晚奏名聞黼座望中無奈白雲何再呈慎思諸公兼以言懷倚南忩寂若隱山阿時枉金門步見過談笑且看揮麈玉篇早寧惜灑箋羅已羞軒冕嬰身住更問功名撫劒歌賖得涼秋好風月不成吟醉奈愁何忠臣秋闈深鎖覺愁多賴有英遊玉趾過日望高樓吟楚澤夢隨明月到湘羅原注湘羅豫家所在南宫曽看揮華藻西館還來共笑歌六稔飛光如過隙人生誰奈老催何原注君平宣義登科六年矣試場未動文書靜宫舍相聫步履過千丈蒼波爭倚薄十圍便腹有森羅登臨已結騷人恨填委終翻勞者歌後夜中庭佳月色惟豫不飲奈如何重九考罷試卷書呈同院諸公忠臣題遍朱籤棟宇充燈忩長聽景陽鐘昏眵直要金篦刮黎瘦都如飯顆逢文律自隨星斗變月評應合士人從了無一事猶深鎖辜負東籬菊品濃補之周行櫛比未應充薦廟方求古鼎鐘經眼乍愁千紙積解頤聊喜一言逢黃花庭檻時雖過白酒鄰槽願可從更促寄衣真似旅曉堂初怯露寒濃南仲貢珍已選茂良充猶被拘縻類縳鍾渌酒強陪高館飲黃花不似故園逢棊枰苦戰挑燈坐蘚壁間題捧硯從風葉滿庭秋索寞更籌向盡睡方濃幹庭實方期國士充知音須辨鐸符鐘孔融愛客樽常滿摩詰思親節又逢烏養任真終自適雉媒傷性竟誰從開門預計無多日猶起清愁暮靄濃忠臣屢見高文試澤官長年參校愧龍鍾懸黎待價由來久緑綺知音不易逢吉語乍聞隨鵲喜歸期專欲問龜從到家莫負如泥約光祿供醪味正濃原注豫有詩與同舍云相期放朝後連日醉如泥肇清秋官舍酒瓶空滿袖黃花情所鍾忽聽數篇吟可老絶如開口笑難逢浮舟有底不歸去戲馬猶能限莫從江上鱸魚三尺許西風敲枕夢魂濃耒回首登高行復冬後時只合歎龍鍾愁須白酒來酣戰詩為黃花弔不逢十日飛騰過眼疾萬籖甲乙定誰從共應淨掃氍毹榻深炷爐香午睡濃原注時去開院十日子文侵尋節物過秋風何處鈞天燕鼓鐘九日菊花聊一醉五湖佳士偶相逢挑燈欵語時供笑借紙聨詩且漫從待得出闈應放意百杯追逐興方濃原注慎思有如泥之約公麟籲俊天畿合辟雍愧將瓦釜綴黃鍾聽窮一一竽無濫撥遍磷磷玉似逢龜列春庭先壤奠龍飛天路得雲從吾曹莫念拘縈久求稱公朝慶賞濃鞅掌棲遲一畝宫慣聽更柝及晨鐘黃花慰眼祗爾許緑蟻于人亦漫逢幾日囊篇賡不逮一時庭步笑相從近來尋郤家山夢投枕和衣睡更濃夜聽無咎文潛對榻誦詩響應達旦欽服雄俊輒用九日詩韻奉貽忠臣連牀交語響舂容激楚評騷徹曉鐘繞宅金絲神共應滿潭雷雨劒初逢信知自有江山助便欲長操几杖從俱是年家情不淺依蘭應許丐香濃原注先子與張丈職方朝丈都官同年忠臣與應之同年兩家俱有事契依韻奉酬慎思兄夜聽誦詩見詠之作耒昔遇朝公淮水東士衡已聽語如鐘五車講學知無敵十載論文喜再逢古匣劒光疑鬼泣夜天虎嘯有風從許侯破的由來事原注三皆屬朝子杜老裁詩曉墨濃與文潛誦詩達旦慎思有作次韻呈二公補之神交千古聖賢中尚想銅山應洛鐘傾蓋十年惟子舊知音一世更誰逢天如蟻磨駸駸旦談似繅車亹亹從鄰榻秋燈那不共擁衾􅔣首興方濃次韻重九之作倚英豪獻䇿廣庭中問辨紛紛似叩鐘名奏九重書密上士欣千載運親逢鶯鳴定獲喬林樂鳯舉應容衆羽從盛世文章由此變坐看風俗反醇濃昔年此日故園東爛醉牛山到暮鐘原注牛山在臨淄城東二十餘里已往光隂那再得如今羈旅又重逢淵明把菊情雖厚子美登臺願莫從原注杜甫九日詩云抱病起登江上臺且看羣書攲枕臥病多仍負酒杯濃次韻慎思貽二公誦詩肇臥聽高齋落葉風清詩交詠想晨鐘故人厚意論千載正始遺音僅一逢膠膝初期在俄頃雲龍莫恨不相從藝房深鎖秋香冷鬱鬱蔥蔥佳氣濃耒西城永夜靈鼉鼓北寺五更青石鐘九牧何時官事了三英聊喜故人逢原注屬同舍鄧朝蔡三公甲庚定處君無讓蹀躞歸時我請從欲郤睡魔通夕語明忩茗粥不辭濃八弟預薦慎思兄以詩為慶復次韻并寄八弟補之吾弟平生辛苦同匹雛志舉百鈞鐘自慙操瑟向不斥勸使力田終有逢青眼故人欣捷報白頭老母喜占從書林儻預西城集釂子酣酣杏正濃九日考試罷聞無咎天啓二弟薦名因用前韻以抒同慶之懷忠臣朱黑沈迷萬卷中斗筲那得變千鍾風流不似臺南戲牢落正如江上逢閣筆文書聊撥棄到家車馬數過從阿連已預甘泉奏歸拜萱堂喜更濃慎思兄别墅在長沙白鶴山晉陶淡舊居事見本傳今其居有大杉可十數圍蕃茂特異世傳淡藏丹其中用前韻謹賦耒千年騎鶴老仙翁固是山川秀氣鍾桃洞自宜無客到吳門應合有人逢巖前舊隱孤杉老壺裏真遊白鹿從近有蓬萊讀書客卜居偶占翠嵐濃家弟别試預薦特蒙慎思學士贈詩致慶感荷不已次韻酬謝肇我家書册代耕農尚祝甌窶畝一鍾再築金臺端不昧高懸水鏡亦難逢親闈動喜欣欣色士論推公躍躍從好在黃花歸薦壽秋堂歡笑變春濃同舍問及故山景物用鍾字韻賦詩以答忠臣吾廬高對玉池峯日聽諸天奏鼓鐘海外鶴歸青嶂覺洞中花落碧溪逢翻經夜對高禪講採藥晨邀老圃從説與羣仙如畫出紛然歸思亂雲濃肇白鹿真人欻御風青杉手種大如鐘還丹未化神應護道骨相期子合逢萬里且看騰踏去一樽聊喜笑言從攢峯列壑休南望曉榻秋隂分外濃補之玉泉飛落白雲峯散入山田畝十鍾鄧子結盧真世外陶公脫屣更誰逢鶯啼春竹風煙近龍起秋堂雨雹從誰使山人空蕙帳蓬萊金殿興方濃輔洞庭湖外白雲峯醉臥虛堂聽曉鐘澗草巖花無日歇仙人玉女有時逢脂車石路君能去蠟屐秋風我願從欲藉神方變華髮黃精苗盛菊香濃幹煙霞曽是踏諸峯翻作清歌笑玉鐘幾代孫經桃塢隔千年壇憶華山逢美才方赴鳴騶召逸興何由稅駕從我亦江鄉成阻闊西風歸意浩然濃倚先生家住翠微峯萬卷詩書酒一鍾壁挂葛巾無客到雲藏古洞有仙逢溪邊晚釣呼鷗伴花底春吟引鶴從只恐舊山歸未得帝恩朝夕露濃濃南仲草廬高臥對千峯白眼誰能顧萬鍾側席不因天子詔藏詩未許世人逢他年社稷勳如立歸老煙霞志會從五柳一松應好在月明空自結隂濃感興復用鐘字韻呈同舍忠臣五年湘水聽霜楓長樂初聞此夜鐘遼鶴亦知華表在仙棊猶許爛柯逢蓬山道藏聊為戲石室真遊久欲從便擬作歌招隱去人間得意不須濃慎思屢以佳篇見貽且俾屬和而衰老困于強敵輒為詩以謝之兼簡無咎文潛天啓輔鄧侯清骨如冰瘦少日文章苦用心賦罷吹噓因狗監詩成傳誦到雞林陽春白雪無凡曲流水高山有至音更唱自存三益友老來衰病廢長吟漫興成章屢蒙子方寵和更辱贈句輒用奉酬忠臣聲名詞藻競駸駸不負平生許與心鳴鳯自須諧玉磬野麋祗合戀雲林清新每喜羊何和冥默初聞雅頌音不是南冠厭拘縶楚人元愛楚風吟肇曹公長劒一杯酒鄧子孤雲萬里心神駿莫辭觀馬廏深沈久合寄書林禮闈聨事幾三月詞客悲秋共一音獨有何郎詩思苦空階點滴伴清吟奉報子方佳句補之曹子金門等陸沈壯年裘馬四方心檄傳白羽從沙井詩寫紅巾遍武林兵甲胸中無敵國原注崔浩不能彎弓持矛胸中所懷踰于甲兵絲桐世外有知音相逢不飲何為者祗作寒廳擁鼻吟寄次張弟忠臣貓頭竹葉細檀欒新筍如椽日滿盤寄語兒童莫多取來春從上萬餘竿肇南山千畝龍蛇窟半夜春雷起屈盤欲釣六鰲滄海去為留春筍作長竿嘲無咎夜起明燈聽慎思誦詩耒翠屏香暖秋眠穩霜冷寶奩金錯刀誰信苦吟無睡客挑燈起聽楚人騷和文潛嘲無咎夜起明燈聽豫誦詩忠臣參橫月轉與天高歸士飛心憶大刀故作楚吟排滯思吟成風葉更蕭騷輔秋風落盡千林葉恰似并州快翦刀香冷洞房歸未得一忩明月讀離騷奉答文潛戲贈補之倦遊年少憶安巢歸夢嘗慙斷織刀原注引樂羊子妻何氏斷織事老去周顒雖有婦黃經對几夜騷騷肇鄧子詞鋒魯孟勞刜鐘剸玉盡鉛刀風流陶謝枝梧困擊節期君僕命騷忠臣拚老攻詩恨不高苦心錯玉與礱刀正如天祿秋風夜剔盡寒燈著廣騷再謝周顒之句耒煙飛小玉吳王國柳暗朱樓鐵甕城見説周顒經案外亦聞荀粲并牀聲忠眼看秋鴈歌汾水心到陽關唱渭城郤被維摩居士笑海潮音作斷腸聲補之秋月照歌淮上舫春花引醉福昌城何如閶闔門西北臥聽秋風枕畔聲小詩戲無咎肇吳山楚水未忘懷暮雨朝雲恨已乖縱免摩伽能毁戒未妨澤室會于齋補之文書盈几法筵埋香火秋來願稍乖得似鹿門攜手去定隨繡佛鎮長齋己未春與伯時校試南宫同年被命者六人今兹西館惟同伯時一人而已因書奉呈忠臣十載京師五校文並遊多已據通津再來更鎖城西館點檢同年只一人公麟憶鎖南宫會友文天梯相躡看雲津白頭笑我成今日青眼逢君尚昔人中秋月忠臣寂寥無聲月停午蟾蜍通津墮清露明星爛爛今何稀美人熒熒隔煙霧補之秋風吹空鴈旁午長天無雲月呈露為須清曉照清樽莫遣中宵生薄霧輔空谷秋寒同子午白月紛紛洗清露遙想燈花結夜愁鬱金斗帳香如霧與文潛無咎對榻夜話達旦忠臣書忩燈火夜深明忩外蕭蕭雨葉聲對榻不眠談往事紞如五鼓過嚴城耒燈花昨夜已分明更聽朝簷喜鵲聲明日朱門閉空館秋風駿馬大梁城補之疏林小雨月籠明商頌琅琅夜半聲鄧子弓強殊未發欲馳桑本犯堅城肇窮秋天氣少晴明雨葉風忩夜夜聲應為幽人聽未足不教驄馬出重城原注時已奏號而御史不至遂留一夕柯山集卷三十
