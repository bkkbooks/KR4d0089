body:
  text: 柯山集巻三十三宋張耒撰論禮論一禮之道仁義而已矣夫仁主于親親長幼之際而義主于貴貴君臣之間知親親而貴貴之義廢則蕩而不嚴知貴貴而親親之仁亡則嚴而不和是故聖人為禮以兼統之使之兩立而兼善並行而互用而後仁義之道行焉是故有鄉飲酒以見其仁而又制燕禮以見其義故鄉飲之禮主人拜迎賔于庠門之外至于燕則賔入中庭君揖降一等而已鄉飲之禮主人尊賔故介猶坐于西南而主人親酬之初不敢酬賔示尊也至于燕主人獨升立席上西面特立而公卿以嫌而不得為賔君舉旅于賔凡所賜爵則自賔以降再拜而後受夫庠門之外已逺矣而加拜焉賔至中庭已近矣而降止于一等主人之于賔至于不敢酬而酬介則主人之禮已卑君舉旅賜爵而賔拜而後受則主人之禮已重是何也葢鄉飲之禮所以正長幼之序故賔者衆之所尊而以齒命其衆者也而主人者鄉之大夫與夫黨正之屬故方其率衆以明長幼之序則使民尚齒而知貴賤有所不行故一以盡仁而燕禮所以明君臣之分君為主人而大夫為之賔故將辨尊卑之分則使民尊尊而知長幼之齒有所不序故一以盡義故禮者節文仁義而行之者也夫仁義之道本于心待禮而後見于外而君子之于仁義其行之或過而衆人之于仁義往往不及非禮不足以取中焉故鄉飲燕禮節文仁義而裁之于中者也故禮也仁義也吾未見亡一而可行也夫鄉飲酒之禮主人坐于東南而坐賔于西北主人處仁而賔處義何也葢黨正屬民飲酒于序則其主人之所與為賔者衆之所尊而賢有徳者也夫將明長幼之道則衆之所尊而賢有徳者其于衆也有教誨之義焉故五十者立侍以聴政役則幼之于長有奉令承教之義也夫惟長有教誨之義則其道主嚴而以齊衆出令為主夫齊衆出令而其道主教者義之事也此賔之所以坐于西北也故父道主義為其尊也古者諸侯之射必先行燕禮卿大夫士之射必先行鄉飲酒之禮何也夫先王之為禮其升降之數俯仰之節為已詳矣然至于宗廟之中習之安而用之便者何也為其有漸也故魯人將有事于上帝必先有事于頖宫晉人將有事于河必先有事于惡池齊人將有事于㤗山必先有事于配林將重其大必習其小將為其難必為其易故其心佚而不亂其體安而不愕矣諸侯之射以貍首為節貍首者樂會時也夫會時者謹朝覲修㑹盟勤燕享不敢失時者也故其將射也必先習燕禮以明尊卑之序而會時者明尊之之序也卿大夫以采蘋為節而主于循法度士以采蘩為節而主于不失職夫循法度不失職則其道近在于一身而鄉飲之禮主于明長幼而未及夫大者焉故必先習鄉飲者其道當然也諸侯之道君道也君道尊故其射也主于正尊卑而已卿大夫士之道臣道也臣道衆故其射也有鄉人長幼之序焉此其諸侯所以先燕禮而卿大夫士所以先鄉飲歟禮論二昔者孔子以為知禘之説則其于治天下也如指掌葢嘗求其説以為禘者祭之一名而籩豆之事則有司存而不能通之于治國葢嘗思之以為天下之所以不治者何也毋乃起于貴賤之不明歟親愛之不篤歟器用之無制歟衣服之無别歟賢不肖之失序歟五者不至而其國欲治者未之有也今夫郊社之于上帝也宗廟之于先君也則夫向之尊卑親愛器用衣服賢不肖之序葢已並立而修飭矣上自王公大人而下逹于里閭之際貴者親其事而行之于身賤者承其風而被之于政則治天下之能事畢矣此君子所以重禘之説而又以為明乎郊社之禮禘嘗之義則治國其如示諸掌者也夫百神之祀自郊丘而逹于七祀均為禮也而莫重于郊社宗廟之祭自禘祫而逹于時薦均為祭也而莫隆于禘嘗故舉郊社禘嘗則小者兼之矣夫天子之于天下其禮無所降矣而于享帝也有君臣之義焉故曰尊天而親地夫宗廟之享水陸之産茍可薦者莫不咸在而為之宫室之美車服之盛而至于享帝則三獻爓一獻熟因地以為之丘陶匏以象其性𤣥酒以享大輅以載大裘以服此疑于畧矣此其説何也夫郊之享帝臣之于君非禮不敢見故時至然後㑹非法不敢責也故合禮然後獻俯仰進退于朝廷之間者莫非禮也故尊而不敢䙝簡而不敢瀆此享帝之所以疑于略歟宗廟之祭則子之于父也孫之于祖也夫事親之道其見也無時其獻也無節志于和而無事于簡主于悦而不嫌于瀆此宗廟之祭所以雖降于上帝反疑于重歟葢尊尊之道以簡而親親之禮以豐故享帝于郊而貴賤之位别矣雖然别貴賤者非獨如此而已也宗廟之中以爵為位而宗人受事以官尸之餘君與卿餕之卿之餘大夫餕之大夫之餘士餕之而後煇庖翟閽無不沾澤夫餕祭之末也而尊卑之别如此此貴賤之所以别也夫追逺之禮至于七廟而祭祀之典行于四時以事死如事生事亡如事存割牲賤事也行之于君執盎末役也而從於夫人冕而總干率其羣臣以樂皇尸而不嫌于卑葢其始也齋戒謹潔而庶幾見其聲音笑語之容而其祭之也與尸酬酢而求象其平日飲食之事此親愛之所由篤也事帝之器不陳于廟事死之禮不行于郊尊之用犧象也罍之用山也鬱尊之用黄目也灌之用玉瓚大圭也薦之用玉豆也歌者在上舞者在下先代之樂陳于廷而四夷之樂陳于門此器用之别也大裘以祀上帝龍衮以祀宗廟元端以朝日皮弁以視朝自天子至于士一衣之不修不敢用于祭一器之不法不敢行于廟此衣服之别也古者天子將祭則必射田擇士其容體中于禮其節中于樂而中多者乃得預于祭而否者不預焉夫射者君子之所以觀徳也夫徳先形也必有待以見于外射者君子之所見其徳者也故射中多之預于祭也非射也所以辨徳也此賢不肖之别也貴賤明親愛厚器用設衣服修賢不肖别而國不治者未之有也道載于禮而禮藏于器不知禮不足與言道不知器不足與言禮禮者自器而辨道者先禮而明辨乎器逹乎禮通乎道而不通乎治國者吾未之聞也故古之君佩玉束帶趣朔旋揖于宗廟之中而盡天下之能事者如是而已矣禮論三先王之制祭祀自郊丘以逮夫七祀莫非祭也而尤重于禘嘗其説何也葢其道有三焉曰政事之節也曰品物之盛也曰隂陽之消長也夫禘夏祭也而夏者萬物之始蕃而于時則陽用事之時也故先王之政凡所以順陽之氣者禘而後頒焉故曰古者于禘也發爵賜服順陽義也嘗秋祭也而秋者萬物之既成而于時則隂之始也故政之所以順隂者嘗而後行焉故曰于嘗也出田邑發秋政順隂義也葢先王之政一本于隂陽而禘嘗者謹隂陽之節而不敢違候時辨物以别天地之氣者如此所以重歟然則春之礿也冬之烝也而政不預焉何也葢春者物之始生勾者始奮萌者始達而平秩東作之時也夫物始生則陽氣未盛而品物未備而民方趨于東作之際則趨功造事而未可以聴政役故陽之政待夏而後行葢夏者物盛而厥民因之時也冬則物之生窮實者已斂而成者既收塞向墐户而民率其婦子以入室備寒之時也夫物生已窮則非所以備財用而民既息則非所以聴政役故凡政之所以順隂氣者方秋而行之矣而秋者萬物始成而厥民夷之時也葢古者嘗祭未行則未發秋政未發政則民勿敢艾其謹之如此此所謂政事之節也夫物之于春也始生而于夏也始盛成于秋而窮于冬既盛則備于初生而巳窮則闕于始成故禘也嘗也萬物盛多之際也萬物盛多則品物備故禘嘗之祭備物之享也此禘嘗之所以為重也夫先王之于祭也誠而已何貴于品物之盛也祭之儉也非先王之欲也夫玉瓚而大圭玉豆而雕爼齋明以臨之盛服以行之水陸之品茍可薦者無不咸在此先王之所以事宗廟也故天子之特礿也而廢祫也為夫物之未成而禮不備故也禮不備則不敢用祫則品物之重也久矣葢物者誠之表誠者物之主物備而誠不至者有之矣未有誠至而物不備者也夫祀上帝之簡也非先王之圖也以為無物可稱而不敢近于䙝是亦誠之盡于已矣所謂烝嘗者品物之盛也夫先王之于隂陽也陽慶其成而隂惡其盛禘夏也于時則陽之成嘗秋也于時則隂未至于盛礿之于春也則陽方作而未成烝之于冬也則隂已窮而既盛故禘嘗之祭陽之成也而隂之㣲也是以先王重之此所謂隂陽之消長也有是三者則先王之所以重慎而不敢易之于常祭也不亦宜乎夫天子祫禘祫嘗祫烝諸侯嘗祫烝祫何也夫祫喪畢之祭也而礿禘烝嘗者四時之祭也天子先祫而後時祭諸侯先時祭而後祫喪畢之祭無常時而四時之祭有定法無常時者近私有定制者近公天子制法者也故先所私而後法則無嫌也諸侯從上者也故先定法而後行其私此所謂君臣之道也禮論四古之養世子而教之學與夫凡學于國之學何其有序而不亂也葢其學有常位其習有常時其教有常職其禮有常法四者立而後學之道備葢所謂其學有常位者其别有四曰東序也曰瞽宗也曰上庠也曰成均也所謂東序者夏后氏之學而其事有九一曰學干戈二曰學羽籥三曰養老四曰合語五曰授數六曰論説七曰儐賔八曰釋奠于先老九曰養老幼所謂瞽宗者商之學也其事止于學禮而已所謂上庠者有虞氏之學也其事止于讀書而已所謂成均五帝學也其事則郊人取爵于上尊而已夫備三代之學而夏后氏之學其事獨衆于有虞商人之學何也葢凡學于東序者樂舞養老之事也夫樂舞養老之事聖人之所貴而其道主仁東序在王宫之左而其位則位之方也此其比于二代之學其事為衆歟夫書者觀言以取訓而習禮者勤事以正容夫觀言以取訓逺道也而三代之學莫逺于虞故讀書于上庠勤事以正容近道也而商人于周為最近故習禮于瞽宗葢成均者意有虞氏之前也夫時逺則制畧制畧則事卑葢所謂郊人者既逺之而在郊矣故不得與于上庠瞽宗東序之事然獨至于天子飲酒于成均然後始得酌于上尊此不亦時逺而制畧制畧而事卑乎此所謂其學有常位也其習有常時者其别有九一曰干二曰戈三曰羽四曰籥五曰南六曰誦七曰絃八曰禮九曰書所謂學干者小樂正主之而大胥贊之而大樂正授數焉至于學戈也籥師主之而籥師丞贊之至于羽籥則其主之無官其贊之無助何也葢舞羽近于學干則知舞羽之官亦樂正與大胥而學戈之官固已能吹籥則知學籥之官是亦籥師籥師丞而已矣夫南夷之樂也而陳于學何也葢四夷之俗皆有安居和味宜服利用備器陳之于學者學之所知博而不厭也凡學之時施于春夏者四有通而習之者干戈是也有别而習之者春誦夏絃是也施于秋冬者四有通而習之者羽籥是也有别而習之者秋學禮冬讀書是也春夏者物盛而形顯之時也而干戈之舞形之盛也故春夏習之誦與絃均為聲也而誦者人聲而絃資于器人聲者先王之所貴故先誦而器次之焉秋冬者萬物數窮形斂而體伏之時也羽舞者主于振作而吹籥者羽聲而已故于秋冬習之秋習禮而冬讀書均為事也而習禮者俯仰折旋勞于外而後能習于冬則寒而大苦故于秋冬者人入室以居而無事之時也故使之讀書焉安于身合乎時中乎義習焉而不困久焉而不堕者用此道也葢所謂其習有常時者此也其教有常職者其官有十三曰太傅曰少傅曰保曰師曰大司成曰大樂正曰小樂正曰大胥曰胥曰執禮者曰典書者曰籥師曰籥師丞所謂太傅少傅與夫師與保四者以道徳為職者也而太傅之職無所繫不以教率不以言喻故曰審父子君臣之道以示之而已少傅則教以率之言以告之故曰審喻之師也則教之以事而喻諸徳保也則慎其身以輔翼之而歸諸道則二者其職巳勞矣其徳有小大故官有勞佚以心治者其官逸而以事詔者其任勞此其理然也至所謂大司成者論説在東序又曰凡侍坐于大司成者逺近間三席可以問則大司成者主學之教者也所謂大樂正者舞干戚語説命乞言皆大樂正授數于大司成之教而喻諸其下者也所謂小樂正者凡祭與養老乞言合語之禮而詔之于東序則小樂正者授數于大樂正而喻諸其下者也所謂大胥者小樂正學干則大胥贊之葢輔小樂正之事而為佐者也所謂胥者大胥之佐也故鼓南葢其職已卑矣主節夷樂而已所謂執禮者典書者籥師與其丞其職雖不備見然攷其事則皆供職効役以承其上者也此治學之常職也所謂其禮有常法者其别有十所謂立學而釋奠于先師一也春夏秋冬而釋奠于先師二也天子視學而祭先師三也釋奠先老于東序四也釋菜五也大合樂六也養老七也合語八也論説九也乞言十也立學而奠示有祖也時而祭之示不敢忘也天子視學而親祭示尊也釋奠于先老示巳所有事也大合樂而後飬老始立學既具噐而後釋菜告成而不敢専也習而後行禮也小樂正合語為未足故大司成論説之以論説為未足故乞言于老者此所謂其禮有常法凡此者先王教學之道也柯山集巻三十三
