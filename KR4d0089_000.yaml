body:
  text: 柯山集别集類二宋提要臣等謹案柯山集五十卷宋張耒撰耒有詩說已著録蘇軾嘗稱其文汪洋沖淡有一唱三嘆之音晚嵗詩務平淡效白居易樂府效張籍故瀛奎律髓載楊萬里之言謂肥仙詩自然肥仙南宋人稱耒之詞也文獻通考作柯山集一百卷兹集卷數半之案查慎行注蘇軾詩云嘗見耒詩二首而今本無之考周紫芝太倉稊米集有書譙郡先生文集後曰余頃得柯山集十卷於大梁羅仲洪家己而又得張龍閣集三十卷於內相汪彥章家己而又得張右史集七十卷於浙西漕臺而先生之製作於是備矣今又得譙郡先生集一百卷於四川轉運副使南陽井公之子晦之然後知先生之詩文為最多當猶有網羅之所未盡者余將盡取數集削其重復一其有無以歸於所謂一百卷以為先生之全書云云然則耒之文集在南宋已非一本其多寡亦復相懸此本卷數與紫芝所記四本皆不合又不知何時何人托拾殘剩所編宜其闕佚者頗夥然考胡應麟筆叢有曰張文潛柯山集一百卷余所得卷僅十三蓋鈔合類書以刻非其舊也余嘗於臨安僻巷中見鈔本書一十六帙閲之乃文潛集卷數正同明旦訪之則夜來鄰火延燒此書倐煨燼矣余大悵惋彌月云云此本雖不及百卷之完備然較應麟所云十三卷者則多得已不啻數倍亦足見耒著作之大略矣乾隆四十九年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
