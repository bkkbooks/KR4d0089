body:
  text: 柯山集卷四宋張耒撰古樂府歌詞年年歌年年西風白露天爛醉村釀秋池原今年杜門不復出為愛我庭風日寬東西相望兩叢竹正色森森立青玉朝煙暮雨恣陵奪翠鳯文章終郁郁石榴新栽果不實下有蕭條冒霜菊人情雖欲薦我酒物意豈願贏君菊東欄黃葵色貴麗氣壓滿欄香撲蓛月桂凄涼何足數蛛網挂蟲窘如束安能卒嵗不改芳正自榮枯隨衆木陶陶吾意方有在瑣瑣眼前安足録朝來默坐有佳思病去身輕如脫梏從來北客望江南何用登樓傷逺目鵯鵊詞樹頭玄衣郎神爽聲復清睡先萬目覺起對殘月星憫世耽睡昏體穢神不靈招使離袵席啼呼每丁寧幽人最憐汝未旦起坐聼荒山多嘉樹春盡故園情圍棊歌戲江瞻道兼呈蔡祕校蔡子圍棊非我敵我謹事之如大國主盟召會不敢辭近忽慿陵有驕色鄒人戰魯固非宜于越入吳誰可測願君勿以大自驕知小深謀戰須克區區江子似邾婁我如強魯端能役凌兢螳臂屢見拒我但憐子心難得近來措置尤小獰何異穿窬時有獲可憐癡將不知兵請視吾旗豈𡨕北飢魚貪餌不知鈎口雖暫美身遭食雖然吾亦守疆埸防患猶須謹蟊賊上攀蔡子雖已遼晉楚周旋終有日下觀江子行逾逺我進駸駸未知極嗟豫自謂敢忘謙事有真誠難掩抑為君聊發一笑端欲問吾棊視斯檄周氏行亭亭美人舟上立周氏女兒年二十少時嫁得刺船郎郎身如墨妾如霜嫁後妍媸誰復比淚痕不及人前洗天寒守舵雨中立風順張帆夜深起百般辛苦心不惜妾意私悲鑑中色不如江上兩鷺鷥飛去飛來一雙白長淮杳杳接天浮八月搗衣南國秋謾説鯉魚能託信祗應明月見人愁淮邊少年知妾名船頭致酒邀妾傾賊兒惡少謾調笑妾意視爾鴻毛輕白衫烏帽誰家子妾一見之心欲死人間會合亦偶然灘下求船忽相值郎情何似似春風靄靄吹人心自融河中逢單還成阻潮到蓬山信不通百里同船不同枕妾夢郎時郎正寢山頭月落郎起歸沙邉潮滿妾船移郎似飛鴻不可留妾如斜日水東流鴻飛水去兩不顧千古萬古情悠悠情悠悠兮何處問倒瀉長淮洗難盡只應化成淮上雲往來供作淮邉恨啄木詞紅錦長絛當背垂紫檀槽穩橫朱絲美人亭亭面如雪纎手當絃金桿撥彈成丁丁啄木聲春林蔽日春畫晴徘徊深枝穿翠葉玉喙勞時還暫歇深園斷嶺人不知中有槎丫風雨枝蠧多蟲老飽可樂山靜花深終日啄雄雌相求飛且鳴高枝礪嘴枝有聲無功忍使飢腸飽有意却教枯樹青疾彈如歌細如語曲欲終時情更駐一聲穿樹忽驚飛葉動枝搖不知處瓦器易石鼓文歌周綱既季宣王作提劍揮呵天地廓朝來吉日差我馬夜視雲漢憂民瘼桓桓方召執弓鉞藹藹申韓賜圭爵北驅獫狁走豺狼南伐淮夷斬鯨鱷明堂車馬走爭先清廟笙鏞尸載樂岐陽大獵紀功伐石鼓巗巗萬夫鑿千年兵火變朝市後世紙筆傳𡨕漠迹荒事逺貴者寡歎惜風霜日摧剝君誠嗜古更過我易以瓦器尤竒卓滿盤蒼玉列我前制古形竒異雕琢羲黃已亡巧偽起采椽土木消純朴何為獲此上古器經厯萬古遭搜掠寥寥墨翟骨已朽尚有遺風傳隱約又疑晏子矯齊俗陶土摶泥從儉薄或云古者宗廟器斥棄金玉先誠確是時此物參鼎爼蕢桴土鼓誠為樂嗚呼二物信竒絶賴有吾徒與提握不然烏瓦與荒碑坐見塵埃就零落片雪歌瑶池一片孤飛雪風急身輕飛不歇誰將翠袖遮得歸十斛明珠換與誰金龜貴客迎將去玉作輜軿載塵霧人間不解桃李心獨與琵琶自相語主人白頭情不親朱樓夜鎖梨花春願同花落寄流水飄出朱門隨路塵長恐此生空已矣從此失身輕薄子人生但樂兩知心誰是瓊瑶孰泥滓鶯驚中彈花辭樹蝶散蜂驚春日暮風光不斷流水長不知片雪今何處梁父吟豪俊昔未遇白日無光輝隆中卧龍客長嘯視羣兒九州英雄爭著鞭黃星午夜照中原君看慷慨有心者乃是山東高帝孫老瞞赤壁抱馬走紫髯江左空回首世上男兒能幾人眼看袁吕真何有永安受詔堪垂涕手挈庸兒是天意渭上空張復漢旗蜀民已哭歸師至堂堂八陳竟何為長安不見漢官儀鄧艾老翁誇至計譙周鼠子辨興衰梁父吟君聼取擊節高歌為君舞躬耕貧賤志功名功名入手亡中路逢時兒女各稱雄運去英雄非厯數梁父吟悲復悲古今人事半如此所以逹士觀如遺龎公可是無心者何事鹿門招不歸度關山度關山意悠哉秦關路險行車摧秋雲沉沉天未曉關吏正眠關未開孟嘗逃秦畏秦逐一日歸齊未為速重扉當道可奈何搔首蒼茫空駐轂主君無言客無計仰看天星俯相視風鳴木響心自驚咄嗟謾飬三千士下客趨前敢獻誠為君試效晨雞鳴引聲未絶羣雞應軋軋重門俄徹扄馬嘶人語車輪轉斗柄斜橫夜初半奔風捷足欲何追虎口脫身非素願孟嘗好士竟何為才得雞鳴狗盜兒可憐當日殷勤意輟食分衣竟為誰天馬歌風霆冥冥日月蔽帝遣真龍下人世降精神馬育天駒足躡奔風動千里蕭條寄産大宛城我非爾乘徒爾生小羌雜種漫羈絏櫪上秋風時一鳴萬里名聞漢天子內府鑄金求騄駬將軍受詔玉關開靈旗西指宛王死天馬出城天駟驚塞沙颯颯邊風生執驅校尉再拜馭護羌使者清途迎騏驎殿下瞻天表天質龍姿自相照翠蕤黃屋兩邐迤玉鐙金鞍相炫耀東遊封祀被和鑾甲子北來巡朔邉展才自覺逢時樂致逺不知行路難物生從類如有神地無逺近終相親君不見莘野磻溪耕釣叟一朝吐氣佐明君江南曲平湖碧玉煙波濶芰荷風起秋香發採蓮女兒紅粉新舟中笑語隔煙聞高繫紅裙袖雙卷不惜浮萍沾皓腕爭先採得隱船篷多少相欺互相問吳兒蕩槳來何事手指荷花示深意郎指蓮房妾折絲蓮不到頭絲不止月上潮平四散歸舟輕楫短去如飛斷腸脈脈兩無語寄情流水傳相思籠鷹詞八月穫黍霜野空蒼鷹羽齊初出籠劍翎鈎爪目如電利吻新淬龍泉鋒少年臂爾平郊去草動人呼躍寒竦身下擊霹靂忙毛逐奔風血濡距爾能搏兔不能食未飽中腸行復擊主人厭爾尚飢一生不快為人役蒿間黃雀鳴啾啾飢啄野粟心無求賦形雖小技能薄不受羈縻得自由拳毛駒歌北窗掃壁陳圖書殺氣凜凛生坐隅誰將尺素畫駿馬云是文皇昔日拳毛駒龍顱虎脊視天地若滅若沒三萬里皇天産此誰得之虯鬚十八真天子擒王滅竇如塵埃英氣貫日天為開黃金甲光照天地大白羽箭馳風雷原注唐文皇與單雄信挑戰雄信運鐵槊文皇以大白羽射之中其槊出火數尺雄信遁去真龍在廄萬馬疾下視四海皆駑駘榛棘昭陵一抔土柏城六馬莓苔古嗚呼駿馬已埃塵雖有燕昭難再覩寒鴉詞寒鴉來時九月天黃粱蕭蕭人刈田啼聲清哀晚紛泊迭和羣音和且樂朋飛聚噪動百千頸腹如霜雙翅玄風高日落田中至部隊崩騰鉦鼓沸高林古道榆桞郊落葉晴霜荆棘地志士朝聞感嵗華田家候爾知寒事壠頭雪消牛挽犁蕩漾春風吹爾歸投寒避暖竟何事長伴燕鴻南北飛我滯窮城未知返為爾年年悲嵗晚扁舟東下會有期明年見爾長淮岸寒食歌東風芳草長寒食春茫茫人家掩門去雞犬自相將原頭簇簇桞與花行人往來長歎嗟舊墳新冢纍纍是裂錢澆酒何人家桑上鳴鳩喚山雨雨腳蕭蕭山日暮歸來門巷正春寒花底殘紅落無數北里悲啼夜未休清絃脆管起南樓古今歌笑何時盡芳草白楊春復秋去年巧笑鞦韆女今年嫁作東家婦綵繩畫柱似當年只有朱顔不如故百人學仙無一成麻姑不見但聞名萬斛春醪須痛飲江邉漁殳笑人醒飛螢詞碧梧含風夏夜清林塘五月初飛螢翠屏玉簟起涼思一點秋心從此生方池水深溪雨積上下輝輝亂凝碧幸因簾捲到華堂不畏人驚照瑶席漢宫千門連萬户夜夜熒煌暗中度光流太液池上波影落金盤月中露銀闕蒼蒼玉漏遲年年為爾足愁思長門怨妾不成寐團扇美人還賦詩避暑風廊人語笑欄下撲來羅扇小已投幽室自分明更伴殘星碧天曉君不見連昌宫殿洛陽西破瓦頽垣今古悲荒榛腐草無人迹只有秋來熠耀飛齊安行黃州楚國分三户葛蔓為城當樓櫓江邉市井數十家城中平田無一步土岡瘦竹青復黃引水種稻官街旁客檣朝集暮四散夷言啁唽來湖湘使君麗譙塗堊赭門狹不能行兩馬滿城蛙噪亂更聲谷風榖榖黃鴉鳴最愁三伏熱如甑北客十人八九病百年生死向中州千金莫作齊安逰一百五歌山民嵗時事莽鹵猶知拜掃一百五平明士女出城闉黃土岡前列尊爼篛包粉餌蒸野蔬富家烹羊貧薦魚日暮肩輿踏風雨江鄉人家無犢車插花飲酒山邉市醉後歌聲動鄰里南人聞歌笑相尋北人聞歌淚滿襟秋風謡秋風起秋雲高連山草木如波濤大江蕩潏魚龍逃羲和奔忙日車逸八柱傾側恐不牢柯山老人掩蓬茅畏寒理我舊緼𫀆粗餐在盤有濁醪醉飽高卧從呼號東臯行秋雲捲盡秋天清東臯蕭條雞犬聲黃葉吟風聲不平芙蕖半落更有情歸來僮飢羸馬疲城頭樹暗烏欲栖誰家朱樓人夜宿微紅一點簾間燭正月詞紅梢一夜櫻桃雨簾捲曉晴鴝鵒語簾旌細浪滚東風迎得春歸與為主玉手嬌慵添繡線欄下菖蒲近相見雲屏曉睡翠翹橫樓上寒時正五更二月詞滚風畫幕長廊靜簾下人眠初日永嚶嚶不動採花蜂夜來露重薔薇冷芳草長時寒食天紅墻低處見鞦韆人家無事雞犬間日暮芳郊留醉眠飢烏詞北風夜雨烏翅濕低飛野畦啄遺粒啄食不飽還畏人鳴呼隔壠自求羣我行陳宋經大澤田荒生茅不種麥空腸待飽明年禾鴉鴉爾飢獨奈何苦寒行二首淮南苦寒不可度積雪連山風倒樹長淮凍絶魚龍愁哀鴻傍人飛不去雪中寒日無暖光六龍瑟縮不肯驤老憊孤舟且復止堅冰三尺厚于牆茫茫楚鄉仲冬月白屋無煙飛走絶空林號風冰斷枝長淮無人冰照雪凍埋釣艇不復漁南羔未嚼淮中魚要須下擘澄湫水剸取寒蛟烹腹腴春詞寶刀裁花碎羅縠帶臘圓紅黃染粟枝頭幾日即花開世上人情何太速東風未轉北風嚴返挂銅鈎不上簾莫怪蛾眉呵素指層簷冰碧玉纎纎宫詞效王建五首夜來霜重著欄干玉殿無塵玉甃寒日日君王罷朝早禁廷無事一冬間簾外微明燭下妝殿門放鑰待君王玉階地冷羅鞋薄衆裏偷身倚御牀昨夜新霜滿玉階初冬處處火爐開中官逐院傳宣賜南國諸侯進橘來玉墀夜色晝昏昏催放朝班散侍臣隨駕上樓同看雪萬重宫殿一時新蓮燭千枝夜宴遲君王索筆寫新詩宫人和得爭先進偏愛宋家兄弟詞旱謡七月不雨井水渾孤城烈日風揚塵楚天萬里無纎雲旱氣塞空日晝昏土龍蜥蜴竟無神田中水車聲相聞努力踏車莫厭勤但憂水勢傷禾根道傍執送者何人稻塍爭水殺厥鄰五湖七澤水不貧正賴老龍一屈伸貽潘邠老有序豫居柯山西潘邠老居東九月十一日往過之徑蔬圃坐修誠堂竹間歸飲于龜蟬之間殊有佳興作雜言貽之有屋可以讀書有竹可以忘憂採庭之菊香有餘烹園之蔬甘且柔賢哉二子又復何求鬼不爾責人不爾仇沽酒可飲江魚可羞又安用列鼎食珍佩印封侯我居柯西相隔一里可以杖履朝往而夕逰必未厭我乞醯與借馬但只恐勤君赤腳與露頭不然將吾顔子簞食瓢飲屢空之樂又欲翻董生清明玉杯繁露之春秋醉中雜言老人攀花復藉草春力著人如醉倒未容作計試留春東風已與人俱老東君惜春不惜花千紅萬紫委泥沙已教白日張錦繡更欲平地興雲霞我欲呼客無酒肉摘花插頭悲髮秃安得釀酒萬甕屠千羊花間醉飽踏春陽柯山集卷四
