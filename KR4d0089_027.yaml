body:
  text: 柯山集卷二十七宋張耒撰同文唱和詩欲知歸期近呈天啓耒欲知歸期近屈指不滿手豈無兒女心惜此良邂逅蔡郎吾未見心已想雄秀那知風雨夜聽此龍劒吼八荒一驥了萬馬空在廏鍾山淨名老為子不惜口頗聞國士薦固自君所有惟應功名地他日容老醜蔡肇欲知歸期近朱墨復在手出門豈無時官事少邂逅張公晚定交千仞仰森秀華堂耿青燈夜半獅子吼真龍服內間爽氣凛羣廏新詩陳五鼎斟酌皆可口光華委行色于我亦何有緘藏不知報刻畫無鹽醜鄧忠臣欲知歸期近行行重攜手掖垣隔華省明日難邂逅作者六七人崢嶸竦神秀藏蟄龍虎姿風雲即騰吼嗟豫自遲暮老驥伏間廄奪珠不量力攬臂犯牙口平生辛苦行何足為巳有正似逄毛嬙歸憎孟光醜朝補之睂山見張侯心許出一手臨川得蔡子千載慰邂逅鄧君起南國磊磊看三秀譬如黃鍾陳我尚瓦釜吼欲知歸期近喚馬牽出廏官醪持餉婦傾瀉僅漬口千章輸明堂勿問草澤有羣公自凛凛冰鏡照姸醜初伏大雨戲呈無咎耒初伏炎炎坐湯釜長安行人汗沾土誰傾江海作清凉𤣥雲駕風橫白雨普陀真人甘露手能使渴乏厭膏乳且欲當風展簟眠敢辭避漏移牀苦清貧學士卧陶齊壁上墨君淡無語翰林但解嘲苜蓿彭宣不得窺歌舞聨詩得句笑出看策馬涉泥歸閉户牀頭餘榼定何嫌窗外石榴堪薦爼補之蓬山西鄰九軌路三月街晴葉吹土直廬鑿牖面宫垣青壁嶄嶄看垂雨殿角風斜碧瓦寒翅濕蒼鳶不能乳郤思窮巷亦可憐一掃蚊虻通夕苦鬱蒸書課未須忙午漏客休聽天語平生豪氣對樽酒山雞見鏡猶能舞城南寺近曉堪行笙歌涼月聞千户但憂伏日細君須割肉無緣俟歸俎曹輔火焚真金融作暑南風無聲蒸厚土省門下馬不讀書急掃藤牀卧聽雨朝涼巳覺飯有味紫碗新茶如潑乳天工未費一杯水已變炎涼異甘苦朝侯笑顧北忩竹知君吟詩得佳語忽驚秋近梧桐落未厭野潤商羊舞快洗晚空作晴碧三更月華清萬户不泊泥深滑馬蹄更自無金謀燕俎忠臣大明放朝官避暑長廊翛翛絶塵土漢家宫殿敞千門紫閣拖雲灑甘雨雷欣電笑洗蒸鬱蕩蕩青天滑流乳憶作三年田舍中六月正服農家苦豈望生還直舊廬得見張朝說新語初聽鈞天驟竊忭正似聲聞躩起舞喜乘初涼與晤歌不憂庭潦蟄垣户徑攜斗酒相就醉更置雙鯉充君俎汗流龜跌如炊釜蜉蝣飛空蟻運土眼看纖雲上太清曾不崇朝八荒雨金柔火老旱太甚咀嚼冰雪如餳乳豐隆列缺及時來蒼生解除焦焚苦張侯不辭茅屋漏倚柱長吟可人語愛君豪猛為君和初撫劒歌終起舞城南酒壚酩新撥不獨黃公當門户滿沽鴟夷極歡酌抽摘園蔬供鼎俎突冷塵魚生甑釡十年都城困風土不辭揮汗過三伏敗屋怯聽滂沱雨張侯作詩召清風渴讀如飲雪山乳笑我形容太瘦生我亦悔前用心苦朝子迭唱亦起豫兩人終日同堂語奈何拘學技藝窮跛鱉欲趁驌驦舞魁然圍腹貯文史朝來氣爽寬酒户為君急置槎頭鯿縷翠霏紅落雕俎神龜不識烹魚釜生潛深淵長黃土誰令誤落魚網中白晝冥冥作雷雨嗟豫幡然别舊隱空巖無人滴鍾乳松菊滿山胡不歸顧同妻子忍攻苦長歌漫漫何時旦起坐中夜私自語茅茨十九漏如澠誰知華堂醉歌舞山中吾廬歸去來峯插翠玉朝髙户注目操刀必割時尸祝何煩越樽俎肇城中鼎食排翠釜羊胛駝峯賤如土青衫學士家故貧斗米束薪炊濕雨縱橫圖史照屋壁呫囁詩騷從稚乳省中無事騎馬歸雨聲一洗茅簷苦急呼南巷同舍郎聽我臨風有清語且貪青簡事文章未有金資買歌舞往來詩卷牛腰許太羮𤣥酒竝在户吾詩老澀邀使前正坐可口收艱俎贈文潛輔都城薄祿才三釡白髮朱衫汙黃土九人同日鎖重闈一夜濤聲卷秋雨投身雖喜豪俊窟刺手如逢虎方乳鄧侯相逢十載後清骨巉巖詩思苦張朝自是天下才黃卷聊同聖賢語蔡子彎弓欲射虎拔劒酒酣時起舞何當連袂上霄垠速致時康門外户病夫行矣老江湖尸祝安能越庖俎余幹可畏日輪如赤釜賴有羣仙司下土稍從寥廓踊濃雲旋向塵埃灑甘雨松蘿既女更施澤山木欲童俄得乳馬牛暫息要途勞魚鱉頓舒炎海苦野鶴那虛屋上鳴穴貍不繆山中語清風豈假白羽搖輕汗寧沾翠綃舞己憐爽氣滿襟袖更喜餘霞照庭户後朝便是閲英才為指帡幪設千俎次韻呈文潛學士同年栁子文肇張侯胸中包覆釡百里奔流無寸土𤣥蛟白鼉有時作一洗乾坤三日雨詩雄變怪有如此震動猶能止啼乳已傾太白酒船空更壓少陵飯山苦昨朝東門同拜敇玉齒猶殘道中語閉門十日無一事坐對空庭秋葉舞何時御史出霜臺便假前騶辭棘户城南邀我倒餘樽紫栗黃橙已登俎答天啓耒黃鍾無聲登瓦釜蔡子青衫在塵土通人爽氣百步寒知子胸中有風雨三年河東走鐡馬絶口魚蝦便酪乳歸來萬卷付一讀不覺兒曹用心苦周瑜陸遜久寂寞千年北客嘲吳語莫徒彩筆雲錦張要是寶劒蛟龍舞天兵萬百老西北快馬如飛不出户看公大纛出麒麟走取單于置刀俎和天啓贈文潛補之蔡侯飽學困千釜濯足青江起南土放談頗似燕客雄快奪范雎如墜雨東城擒羽未足論柏直何為口方乳蔣侯山中伴香火三年不厭長齊苦平生豪偉有誰同要得張侯三日語晝間那自運甓忙時清不用聞雞舞桓榮歡喜見車馬書冊辛勤立門户要當食肉似班超猛虎何嘗窺案俎再答肇羌兵昔出臯蘭路欲鏟新城無聚土烟烽照夜氣如霞鐵馬連羣噴成雨東西兩關同日破股掌嬰兒絶哺乳鼓聲十日拔帳歸至今猶說防城苦當時諸將無奇功不敢彎弓向敵語橐駝西來金帛去孽狐小鼠猶跳舞王師八月盡防秋惴惴軍興恐編户腐儒不用輒憂邊廟堂有人制樽俎呈鄧張朝蔡才堪斗量君獨釡年少登瀛脫塵土重闈幾日鎖清秋酬唱新篇亂如雨讀書相逢十載前君家酥酪和腐乳案此下原闕苦字韻二句晚將衰颯奉英遊漫記雪忩邀夜語平生意氣杯酒間我醉狂歌君起舞即今頭白老青衫但期教子應門户燕頷從來骨相殊看君鼎食羅五俎用俎字韻呈樗年肇墮竈一言能破釡魔界掃空成佛土鍾山道場天所開萬壑千巖散華雨白衣居士演真諦江海滔滔流法乳自從玉髻飛上天妙緣誰救諸有苦我昔南行入定林水鳥松風能妙語六時天樂彩雲飛百丈寒江翠綃舞此地知君㑹著力雷作彈指開蟄户空山蕙帳盍思歸秋末晚菘行可俎次韻天啓戲為禪句之作幹一片木柴投向釡不是知音色如土道途漫用運三車恨性終然資一雨相逢儻獲箇中人涓滴何辭比驢乳善才童子天質奇􅀈官逺遁修行苦果向北山曽遇人便解捐書尋一語而今脫卻七斤衫相見山山惟作舞秋闈何幸相握手未厭夜深來叩户莫愁客至將何待卧有眠牀飢有俎上呈子方鄉丈肇西方殘寇魚游釡往嵗天兵收境土軍行旱海口生烟沙井無泉天不雨將軍意氣吞八荒欲入涼州傾馬乳堅城不下河未冰幕中稍覺從軍苦曹侯獻計取東關帳下選鋒同此語歸來塞色侵鬢毛聨翩始閲交衢舞不學行間妄校尉盡斬孫歆封萬户人生富貴有危機彘肩不願加雕俎次韻答天啓輔天兵連營十萬釡烈烈威聲震西土崑崙月窟掃欲空豈止斯民被時雨賀蘭狡􅊵遁三穴黃口嬌雛未離乳臨機一失挫銛鋒誰願忠言如藥苦吾鄉蔡子喜談兵早嵗曽過阿戎語逸才自擅鸚鵡賦髙韻仍為鸚鵒舞方略應須敵萬夫徒擊韓嫣笑當户正冝弱冠請長纓繫取單于置髙俎曹子方用釡俎字韻賦詩見遺豫洎張文潛朝無咎蔡天啓因以奉酬並示四友忠臣長愛陳思詠萁釡幾年不見徂南土朅來相逢翰墨埸夜忩共聽空階雨躍馬蔡卿能齧肥好書張侯期飲乳朝令知從博士遷智囊不厭傳經苦于兹邂逅如夙契眷我劬勞勤晤語詩成乍變龍虎文筆落更驚鸞鳯舞我將隱遁山林姿公等整頓乾坤户分同尺鷃搶榆枋難使犧牛登鼎俎柯山集卷二十七
