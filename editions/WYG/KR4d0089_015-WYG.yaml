body:
  text: 柯山集巻十五宋張耒撰五言律詩同七兄及崧上人自墳莊還寺和風快人意岸幘晩襟涼日落野痕碧月生淮際光論詩得靈運静語屬支郎不是躭閒散從來懶性長蔡河漲二首長河秋雨漲極目漫難分潢潦雖無自龜魚恐有神天寛垂鑒影風細起龍鱗老去扁舟興臨流欲問津渾渾雖未巳浩浩竟東歸濶處長天近澄邉一鳥飛西風踈葦亂斜日逺村㣲淹泊從吾道扁舟伴釣磯初秋對雨閉户理殘編䟱慵得自便朝凉清病思秋雨對髙眠屋冷深藏燕槐疎混抱蟬所欣堂下菊芳意已鮮鮮泊長平晩望川隱夷猶棹春歸杳靄天翠深交㟁樹緑野望川田漁酒數家市船墻何䖏船登臨一囘首無限意茫然發長平歸牛川上渡去翼望中迷野水侵官道春蕪沒斷堤川平䨇槳上天濶一帆西無酒消羇恨詩成獨自題離建雄塗中逺水悠悠静孤檣裊裊遲草深春巳後麥秀日長時聚語條桑婦行歌拾穂兒年豐隨處樂飄泊我何為夏日十二首過雨芰荷亂繁隂竹樹多雛聲知鳥哺萍動見魚過細逕饒苔蘚隂墻引薜蘿角巾從倒側踈懶欲如何蚓壌排晴圃蝸涎印雨堦花鬚嬌帯粉樹角老封苔問字病多忘過隣慵却囘晩凉還盥櫛對竹引清杯山雨晴來暑溪雲暗復興林塘隂不解巾幘潤還蒸書帙慵披蠧盤餐厭撲蠅老來疲薾甚多病日侵陵朝雨來還宻村墟一望間逺聲惟野竹潤色但青山書史供髙卧莓苔只閉闗蕭蕭覺秋興飄颯近衰顔細逕依原僻蓬蒿四五家山田來雉􅇠溪雨熟桑麻竹籠晨收果茅庵夜守𤓰頗知農事樂彼此問生涯飬拙貧無事深幽樂更真簷巢偷哺子樹啄巧藏身竊果鶯知主移居蟻過隣老夫朝食美薦爼有溪鱗謝守常搜句陶潛亦効官傍溪分水細過巘得天寛布種隨蔬隴尋香到藥欄野装兒稚笑繩屨鹿衣冠乆與山川約那無風月情經營原濶畧疎放自平生山友招相見鄉書向逺征殷勤語歸計貧苦病難成種藥幽人事還披本草經出山抛舊翠過雨有新青術受壺中秘方傳肘後靈不辭勤服餌爲變髪星星陶令抛官易龎公去隐深由來浮世事可見昔人心卜築閒多思奔馳病不禁簷楹來燕雀鸞鶴自山林蛩怨青莎老螢飛秋水深庭除延夜色砧杵發秋心雄劍鳴初匣寒衣補硬針老來詞賦懶從使二毛侵夜色川原合秋聲草木催星辰随地濶河漢冩山來栖鶴凉先警饑烏夕未囬髙樓對斜月鳴笛正清哀宿故濟陽城案此題一本作宿濟陽道中夜色蕭條寺天寒老病身空村惟有雪逺道更無人不寐依爐煖多愁頼酒醇遥思䨇鳳闕雨露巳先春早秋感懷永日付悠悠年華逝不留風聲送殘暑雲色淡新秋吾道倘有待窮通寕遽憂朝來望清潁一雁下汀洲庚辰臘八日大雪二首平生臘八日借鉢受齋糜客路歳将晩旅庖晨不炊持杯從破律遣興自吟詩何日依襌宿鐘魚自有時東州逢臘雪却憶竟陵梅客路人方逺天涯雁欲回遥憐簷外白還㸃砌邉苔乆是無人過誰知照酒杯䝉恩除奉常有感平生秉周禮投老奉龍旗斥逐偶不死歸來敢恨遲門闌走賓客行李飭妻兒又踏長安道多慚鬢有絲建平途次野橋田徑滑官路栁條新流水伴麗日野花留晩春㸃空知去翼衝緑有歸人自笑諳岐路無勞更問津白沙阻風春江風易惡故作客行難晴日開野色朝寒醒醉顔歸人出斷岸去翼復前山淹泊無誰語村翁亦徃還冬日雜興六首小園晴自掃曝日坐前軒野䑕穿山葉寒烏啄草根短籬藩隙地别逕入孤村幽趣供岑寂淹畱不復論水落橋痕在沙乾岸草枯霜餘槐老壯風際竹清䟱啄木髙逾響鶺鴒飛且呼二年親友絶惟有對禽魚池館畱餘雪西山照夕曛臘催梅蕋迸春向鳥聲新愁思供多病風光欲近人年年桃李樹相對只傷神空山身欲老徂歲臘還來愁怯年年栁傷心處處梅緑蔬挑甲短紅蠟㸃花開氷雪知何有東風日夜回南壁蒼崖壯窮冬井落閒風聲先老樹日色避諸山落雁饑相向啼烏夕自還㣲㣲寒月影蓬户已深闗擊柝山城閉踈燈野店扄疾風鳴夜谷晴水動浮星霜翼歸何晩鄰機織未停短歌時自和愁絶更誰聼哲宗皇帝挽詞四首端拱循堯道無為十六年偏師擒頡利上將勒燕然夢損周王夀丹催黄帝仙凄凉舊載筆慟哭抱殘編秦地蟠螭紐細陽玉象光升歌陳備樂信史記多祥奪邑公無怨開邉義侮亡威靈對三后常在白雲鄉萬世興王業千年極治辰澤丘還北祭玉檢議東廵汗竹人間事因山地下春雲天不可望髯斷泣遺臣七月宫車駕西陵觀闕新風雲悲厚夜羽衛異時廵落月低金爵秋蕪暗石麟威靈凛如在善繼有天倫故僕射司馬文正公挽詞四首黼座方恭㸃邦家付老臣頌歌民一口形勢國千鈞富庻新田里忠臣舊搢紳裴公恨不早丘禱歎無神辭爵浮雲外安民反手中山林獨往意衮繡太平功布被終身儉貂冠一命崇他年兩行涙碑下泣羊公經濟心猶壯清羸疾易傷那知兩楹奠遽失萬夫望家有詩書積墳無金玉藏誰知幅巾歛曾佩上公章伊洛平生興園林獨樂居曾過鄭公里得御李膺車華屋當年客名山異代書定知傳不朽埋玉自沾裾欽慈皇后挽詞二首疇昔熙寕盛逺同麟趾時内敦勤儉徳隂輔太平基餘烈光彤史追榮備母儀遺民懐永裕簫鼓不勝悲淑徳承明舊徽音固有來據龍符聖嗣合劔㑹軒臺玉冷衣銷馥鸞昏鏡集埃傷心國西道寂寞送車回挽黄幾道異政潁川鳳遺風叔度陂聞哀苦朋友歸葬束書詩百歳鄉人社他年故吏碑知公萬金産故在阿戎兒范參軍挽詞力學志不就多才宦可嗟生平叔知巳原注參軍叔文正公也公少竒之身後婦成家原注參軍卒子㓜朱夫人守義教子皆有立溫洛新阡茂東吳慶系賒功名付兒子文史舊生涯任左藏挽詞人也隱君子一官聊自閒誰能學管庫竟爾死茅菅良璞不易剖大弨終不彎惟應太史録他日出名山張夫人挽詞原注榮子邕母世徳簪纓貴家風孝友傳承夫知不忌愛子故親賢飄忽人間夢生平物外縁諸天清淨報可但閲重泉原注夫人皈依佛果吕郡君挽詞原注錢穆父妻表海東侯長分吳異姓王世家端作合華裔逺相望龍去孤神劔雛成九鳳凰多情潘散騎悼逝足文章太府李萃卿挽詞妙譽馳埸屋家風在搢紳使華推厚徳卿月上通津齒徳時方重山丘迹巳陳長年先友淚懷感獨沾巾太皇太后挽詞共政艱難際臨朝保佑初經綸付耆老利澤到樵漁禮盛謙常抑功成委不居聖君深致孝盡守典刑餘李處道都曹丈挽詞凄凉正始後尚復有斯人慟哭亦云已傷心難重陳傳家䨇令器懷徳萬遺民尚想典刑在蕭然老鶴身欒提舉妻石氏挽詞和敬承夫順勤劬教子賢平生積淨業倉卒歎無年孤劔畱耿介九雛誰撫憐塵埃舊脂澤春草掩新阡鄧學士慎思挽詞清苦吟詩客癯羸嗜學身詩書不得力鬼物定欺人類物傳遺學經書植妙因九原誰與友千載葬魚臣潘鯁奉議挽詞亷退辭榮早清貧卜吉遲買山新兆域從窆舊書詩松菊留三徑簞瓢遺兩兒升堂舊賓客執紼涕交頤哭蔡彥規二首青衫未白首已歎掩新阡哭别自今日書來纔去年功因鐘鼎記名頼友朋傳平昔圍棊笑臨枰更泫然文章不用世淪落掩山阿命也人無奈悲哉天謂何至交嗟我少䨇淚為君多遥想山陽墓秋風吹薜蘿李少卿挽詞青雲舊馳譽白髪早辭榮談笑惟詩酒交逰盡老成支離病中見瀟洒舊時情已矣不可問九原松柏聲五言長律詩歲暮即事寄子由先生歲暮淮陽客貧閒兩有餘朝昏面壁坐風雪閉門居老去深依佛年衰更嗜書未能忘素業聊用慰窮途下里皆平屋開門即古墟雞䐁來近舍㫪汲頼隣夫雪壓移來竹霜萎自種蔬烏皮䝉燕几褐㡌裹僧顱肉似聞韶客齋如持律徒女寒愁粉黛男窘補衣裾已病藥三暴辭貧飯一盂長瓶卧牆角短褐倒天吳宵寐衾鋪鐡晨炊米數珠木鑱隨杜脛葛製煖韓軀時命今如此功名巳矣乎談愁風射馬拙待兎逄株乆慕香城樂深諳夢境虛誰憐九頓首正有一長吁瞻望身空老蒼茫歲欲除何當聞妙誨黥刖待完膚用歐陽文忠韻雪詩宻雪當殘臘衝風到蓽門洒忩驚紙濕入竹覺聲繁天濶飄無界城髙積有痕氣和歸麥隴水味到茶軒廣陌無逰騎空郵有滯轅炎爐聊自煖濁酒僅能温野迥征鞍設邉寒塞甲屯振竒歌歴歴廻袖舞蹲蹲客至須駝褐相逄賴酒樽晴明占草木春意到閒園題譙東魏武帝廟草昧羣龍鬬英雄接上㳺吳卑青葢伏蜀陋葆車畱挟漢臨諸夏中原半九州人驚吕布縳誰信本初憂天作西南限時方割據秋力終囘赤壁功止霸諸侯歴數知歸禹乾坤正造周事商完夙志傳子豈人謀銅雀佳人恨西陵拱木秋千年故鄉廟歌舞薦牢羞過衛眞太清宫追懷章聖皇帝遊幸之盛小臣斐然成韻鳳歴開三葉中原正偃兵端居思道妙順動展精神函谷傳經後渦陽舊宅新龍蟠泉不竭丹養檜長生鸞鶴迎黄屋煙霞避翠旌琳瑯千佩玉貔虎萬屯營邃殿仙容儼靈庭盛禮行書畱河上語碑勒大夫名歌罷秋風晩弓遺藥鼎成句陳嚴舊寢輦道接新耕日落重樓影天寒暮鳥聲異時懷往事千古有餘情天慶觀三色檜原注一本而具松栢檜三物聚處歲寒物生為千歲身柯條雖自異臭味本相親商季諸公子茅家賢弟昆分驅衆彭惡各共一清眞竽籟風中合鱗鰭雨後伸髙枝如借便輕舉豈無人原注太清宫有升天檜傳記諸眞輕舉者多升樹八月三日舟行自蔡河赴臨淮曠野天垂地川晴水見沙河囘迷向背岸斷忽桑麻水濶時浮鷺陂寒乍集鵶年饑田濩落歲晚客悲嗟新月排雲水西風送日斜孤舟何處宿故國已天涯舟行即事二首古岸生㣲靄空林挂夕陽霞輝明野色天影戰波光集鳥村墟暗鳴蟲禾黍荒秋髙月静静天末巧雲長沙晩横歸艇川晴列去檣登臨自多感何必寄他鄕去去路日逺行行歲向深晩田荒更闊秋野曉多隂岸蓼飛寒蝶汀沙戲水禽迎風蘆顫葉眩日棗裝林早蟹肥堪薦村醪濁可斟不勞頻悵望處處有鳴砧發崔橋野麥平蕪隴官榆卧古津眠鷗沙上曉幽草水邉春暖葉生浮緑風漪起細鱗青新桑媪筥茜淨浣娘裙有客悲芳芷無人採白蘋可憐千里目愁殺未歸人和栁郎中山谷寺翠光亭長韻山深疑路斷古寺忽開門喬木風霜急荒崖雲雨痕朝霞明翠靄秋雨濯嵐昬幽鳥不避客閒雲時入軒重蘿深更緑碧澗淺無渾寳地黄金布飛泉白玉噴庭閒臥馴鹿果熟引王孫禪静石為室客迷桃滿園毎悲塵世幻方信梵王尊野實飢堪薦陽崖冬自温便當安寂寞何事走歊煩清梵晨齋啟高松夜枕喧逄人休問道得意巳忘言直指曹溪路勞將貝葉翻功名嘆不偶歲月去如奔乆分踈軒冕寜辭友玃猿從容巖客話粗糲野僧飱即是平生樂心期何日論訪曇上人有感上人稀出入黄葉閉門深繫馬長林下逄僧古殿隂相逄成底事乗興偶來尋静境亦何有無言知祖心生平避浮俗與物苦差參脱去猶未得塵埃嗟滯淫長廊秋日薄古木野霜侵徙倚誰晤語獨歸還獨吟夜吟簾捲凉侵户牕虚月過帷髙桐清露濕深栁夜蟬嘶斷續銀河轉欹斜斗柄移風來高葉報伏近候蟲知陶令尊無酒潘生鬢有絲將何慰愁寂倚杖獨題詩斜日二首斜日歸殘暑秋容淡太虚閒雲工變易片月自清孤淹泊年華老凄凉歲事餘時違自樸拙興懶日蕭踈阮籍慵耽酒文園病著書簪纓非草野江海得樵漁伏盡金纔壯天高水欲流病悰抛酷暑詩興得高秋晝静塵埃少宵凉河漢浮青傷桐葉膩爽奪蕙蘭柔晚歲寒將屆羣芳葉不收幽人多感慨啼鴂助騷愁病懶非高臥疎迂卻自由功名與世事擺落醉鄕逰歲暮獨酌書事奉懷晁永寜天涯催晩歲殘律去如奔入夜北風惡多隂寒日昬野吹餘燒燼溪落舊沙痕霜重飢鷹疾田空宿雁喧山明千筍直雲積萬營屯足雨耕犂早豐年杮栗繁地平秦接席土斷洛開門白首三年客黄桑數畝村懶梳悲髪短不寐守爐温折骨披殘枿蒼龍臥老根晚篁猶竚思幽蕋助消魂慷慨䨇龍劔飄零一酒樽琳琅思秀色環佩想清言獨語㸔明燭空庭月出軒柯山集巻十五
