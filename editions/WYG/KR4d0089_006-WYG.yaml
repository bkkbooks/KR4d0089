body:
  text: 柯山集巻六宋張耒撰五言古詩休日同宋遐叔詣法雲遇李公擇黄魯直公擇烹賜茗出高麗盤龍墨魯直出近作數詩皆竒絶坐中懷无咎有作呈魯直遐叔休日不造請出逰賢友同城南上人者宴坐花雨中金猊散香霧寳鐸韻天風鳥語演寳相飯香悟真空尚書三二客浄社繼雷宗黄子發錦囊句有造物功握中一寸煤海外千年松誰降午睡魔賜茗屠團龍晁子卧城西咫尺不可逢豈無坐中客終覺少此公歸㡌見新月撲衫暮塵紅困眠有餘想郤聴寺樓鐘掛虎圖于寢壁示秸秠畫工出幻事縞素發原藪蕭蕭白茅低凛凛北風走耽然老於菟舉步安不驟目光炯雙射怒吻呀欲受彼彪擲其旁文彩淡初就雖然竊形似已足走百獸煩君衛吾寢振此蓬蓽陋坐令盗肉䑕不敢窺白晝神運殿望香爐天池等峰晚宿官㕔明日早發逺公不出山坐受天龍供地祗敢愛寳木石親輸送巗巗千年屋山立屹不動風雲宿脩梁星斗近華棟亭亭碧香爐薝蔔時自涌五雲嚴擁衛天樂下鸞鳯神池閟寳象光怪發巗洞誰能陟其巔手攬湖龍鞚東堂黄金藏龍像儼環拱蕭條亡國輦拙樸昔誰用掃堂為一睡清極乃無夢思歸戒晨發結束勤僕從鴻鐘振林莽月落朝嵐重再往墮𣺌茫猿鶴應嘲諷贈張公賁我昔為諸生奉書諫議公後來辱稱奬禮數賔客同决科甫弱冠年少氣如虹歸來陪後乘不責醉後恭孤舟梁宋郊旅態萃百窮拜公睢陽府笑語若春風人事不可期俯仰異吉凶平生丹竈術馬鬛哭新封十年得吾弟懷舊涕沾胸清平守家法眉宇肖徳容交臂是非外為僚兄弟中東軒語長夏葵竹羅青紅西舍雪夜懽玉顔醉瑤鍾欲飲徑相就三更叱閽翁鯨吸絶遺滴山頽信傾峰搜抉盡醬茹楂梨倒筐籠通宵兩沈醉午起頭如蓬人生定當爾事去挽驚鴻河梁繫君馬一笑喜相逢憐君碧紗幌夜淚哭葦叢我方困虀鹽酸寒官辟雝同尋舊㳺地塵壁罥絲蟲啼鳥古寺間夏隂小園空酒市逢好好琵琶失􅌑瓏歌舞一分散賔僚亦西東忘情猶一歎齊物論非通官冷隠朝市端能信予慵人生當富貴子盍自磨礲便當隠五車一一貯心胸功就螘作垤叢成蛇化龍北郊分袂歸作惡驚兒童長謠代晤語發子一笑哄離黄州扁舟發孤城揮手謝送者山回地勢巻天豁江靣瀉中流望赤壁石脚挿水下昏昏烟霧嶺厯厯漁樵舍居夷實三載隣里通假借别之豈無情老淚為一洒篙工起鳴鼓輕艣健于馬聊為過江宿寂寂樊山夜宿樊溪黄州望樊山秀色如可攬扁舟横江來山腳繫吾纜大川失洶涌淺水澄可鑒北風吹疎雨夜枕舟屢撼齊安不可望㓕沒孤城暗奔流畧溪口龍蜃屢窺瞰平生千金質戒懼敢忘暫兹逰定何名耿耿有餘念道士磯匡廬奠九江苖裔遍南服横江蔽原野内外實一族危磯挿江生石色擘青玉蛟龍穴亂石猱玃在喬木我行季冬月江蹟在山腹扁舟如鏡靣清浄不可觸躋攀既不可千古長幽獨􅃡想䆳古初巢居戒樵牧離樊口宿巴河逰馬祈寺扁舟下樊溪江南正清㵼曉登巴河岸極目望春野步尋修竹寺古木争偃亞云昔孫仲謀刑牲致師禡雄圖邈已矣英槩足悲咤石梯造雲霧丹白開廣厦山僧安寂寞畏冷不出舍勞生遇閒境頓使我心寫晚江平若席風勢欲相借龜陵灣阻風三日遥禱孤山而風止積水多疾風三日阻我舟天寒波濤惡岸窟騰龍虬五更船篷鳴冷風入衾裯平明諸山雪爛漫鋪琳球篙工笑相顧拍拍我船頭水魄小孤神霧鬢横星眸倉卒禱即應知我厭滯畱稍晴景物好柳色含新柔春風我故舊迎我入東州自離富池凡三禱順濟龍求便風皆獲應又風日清霽舟行安稳委曲如所欲感而成詩旗尾指船頭篙工告風便張帆弛雙艣去勢如脱箭船傍兩高山過目若流電波平船稳馳客寢兀未變吾聞西江龍神力回㝢縣往來萬夫禱正直乃獲願嗟予何所恃誠確無所薦神豈哀我窮有賜不待獻乃知人窮我本不坐神譴人間事若異未易以言辯坐令千里逺近若在几研慙非謝宣城攫筆賦浄練出山青山如君子悦我非姿媚相逢一開顔便有論交意今晨決然去惨若執我袂謂山無見畱此事寧乆置道邊青髪翁下有白玉髓斸之龍蛇窟自足飽吾世平生耽幽獨乃若忘朝市一官等塵垢安得敗成計草堂醉老子虎溪大開士寄語二主人為畱三畝地朝雨幽居感節物僧舍值朝涼空簷落寒雨滴滴響秋堂低飛林間翮濕雨不能翔危葉别故枝幽花泫晩芳悠悠清夜眠促織催朝光日月愴已徂吾行獨迷方采采幽圃蘭嵗晚日馨香君子健明徳勿為兒女傷離陽翟驅車發潁川囘望失嵩少霜氣塞層空黯澹寒日曉原田際天平百里見飛鳥累累道傍丘石獸卧衰草不知誰氏碑剥裂偶未倒支離見𨽻字書帶漢筆妙遺墳不可問文彩竟何效永年恃金石此計久可笑昔逰巳三嵗存歿傷懐抱飽諳人世憂安得身不老次潁川許昌古名都氣象良未替客子逺道來塵埃滿襟袂黄昏造孤驛買飯嚙枯胾庭寛蟾蜍高霜氣徹寒被頼擕朱提杯可具一飯費無人勸我酌孤獨伴客醉笙簫誰家樓語笑月中市何人不行樂而我獨涕淚夜長更漏稀風急鼓鼙駛天明巻席去行止隨所值昭陵六馬唐文皇戰馬也琢石象之立昭陵前客持石木示予為賦此天將剗隋亂帝逢六龍來森然風雲姿颯爽毛骨開颷馳不及視山立儼莫回長鳴馳八表擾擾萬駑駘秦王龍鳯姿魚鳥不足摧腰間大白羽中物如風雷區區數豎子縳取如提孩手持掃天箒六合無塵埃艱難濟大業一一非常材惟時六驥足績與英衛陪功成鏘八鸞玉輅行天街荒涼昭陵闕古石埋蒼苔同楊十二緱氏寺宿草酌張正民秀才見訪契濶千里别惻愴難具言殷勤一宵語願子未即眠空堂燈火青旅褐借僧氊勞勞一杯酒不解道路寒經年相從樂既别亦茫然人間事盡爾聚散亦何歎但悲多難身尚獲朋友歡間闗百憂中一笑有萬錢張子年未冠已雄羣少年巉巉坐我側紫眸秀雙顴壯志激衰懦清談破愁煎天明即分散奈此情悁悁初到都下供職寄黄九千里不相見勞勞復何辭不逺一城中耿耿令我思僦舍酒家樓推壚巻其旗䑕壤敗晨炊守翁噪羣兒馬傍挾雨羸雙踵待刻移五日長安塵故山夢中歸何以洗我心望君青松姿懐情久不吐古屋絃悲詩次韻魯直夏日齋中文章慙骯髒談舌罷雋永年來屏百事但願兩耳靜黄公安禪室不覺在市井客來飽清風可是徒造請犧尊與社樗妄計幸不幸願君妙觀察金門等雲嶺晚歸寄无咎二首雨氣入古屋薄帷生夜清想君擁鼻坐端學苦吟生泥深欺我馬歸卧日半楹浩然有奇想非子定誰評屋東雲移山屋西日半壁餘天一劍清逺雨萬絲白官事癡可了未遭官長責惟應晁夫子不可别頃刻送吕際秀才南歸咽咽幽谷泉蕭蕭秋竹風豈不愛孤潔但傷愁且窮吕子南國秀滄溟貯其胸出試輙不偶低頭避兒童離家五千里客飯苦不豐冷落卧寒齋苦吟和秋蟲昨者投我詩九嘆閲未終欲知作者心但視讀者容文章出貧賤此事今古同但願子富貴不願文日工今日告我别出門若驚鴻各在天一方何當復相逢西山寒溪兹行頗間暇聊此山水間幸有所携人臭味同一源杉松鳴古刹始覺此溪寒孤亭出屋背石磴相牽攀釋子具粗糲雖貧有餘歡午登西山去路作九曲彎山禽慣不驚夏木秀且繁􅃡懐紫髯公奠玉祠天壇豪强有遺韻興廢無畱觀空嵓一泓泉引予掬清甘案此二句一本作眼明嵓間泉引手掬清甘至人悲熱惱遺此消昏煩我茶非世間天上蒼月團為爾惜不得烹瀹澆晨餐深谷晚易隂快雨時斑斑但見夾道松龍髯濕蒼顔念我亦閒人屏居閉柴闗不使倒珠玉濟我胸中慳之官亦漫浪遇勝卻盤桓平生據頑鈍信命傲憂患言歸徒旅疲就䕃休征鞍卻視來時舟一葉繫荒灣送張天覺使河東席上分題得將字張侯蜀都秀玉立身堂堂手持明光節六月登太行三晉雄中夏朔方臨大荒傳聲賢使者父老相扶將控弦百萬戸十年廢耕桑但使把鋤犂自然息桁楊主人延閣老别酒泛蘭觴寄聲梁諫議欲試紫參方原注梁欲寄上黨参久未至也答仲車先生居山陽時事不挂齒讀書逾五車不肯著一字今朝苦歎嗟告我將老矣我意與子殊欲去依禪子和仲車元夜戲述華燈耀廣陌皎月臨重城惟我二三子柴門通夜扃展書對明燭濁酒徐徐傾崢嶸千萬慮一醉皆能平和魯直濟物非僕僕功名愧無心倚市安能美汲泉不厭深老人夙有尚缾缽好叢林安能紅塵裏徒使老駸駸書館直舍紫禁斷人聲蓬山轉春日樓外晚鼓傳城隂衛畨出循除擷新秀紅紫間疎密倚天黄金闕龍虎氣鬰律明時賦鉛槧寓直守編帙疎閒謝禆補嵗月感飄忽謝公山林賞不為軒冕屈體道無朝野達情慙利物宣城至日謁天慶觀行香呈郡僚溪山惨殘嵗况乃值深冬清晨率其屬肆禮凝琳宫漠漠冐原露凄凄隔水風南方異氣候霜葉未全紅忽憶簮史筆早趨闢蒼龍拜舞東閣上佳氣鬰葱葱談笑出右掖交㳺盡英雄老大心已矣依然魂夢中秋日獨酌懐榮子邕新秋一盃酒風雨早凉天眷言西鄰友咫尺莫能前豈無病羸馬泥滑不勝鞭端居何為者落莫掩書眠高柳颯已疎碧草畱餘鮮衰懷感徂節客舍悲流年孤吟誰與和獨酌還醒然新晴野路乾期子南山邊夜初涼庭木舞風雨清秋來我堂衾裯偃宵寐燈火照新凉昔我來清潁庭花有晚芳坐㸔桐葉暗已近菊枝黄嵗月忽流駛形骸變老蒼淹畱應有命通塞詎能量寂厯年華晩優㳺永日長憂時非我事黄巻有虞唐題陸羽祠堂兼寄李援援有詩殊佳二首陸子不可招寥寥風月魂空堂掩遺像幸此配老禪舉世人澆薄云誰知子賢竟陵樵牧地陳迹豈復存我欲歌子詩三歎撫無絃瓦豋薦秋菊酌此石井泉清詩弔陸子味若堂下泉陸子骨已朽青松代之言松亦安能言風至時蕭然至談非牙舌陸子意已傳萬松亭有感㣲雨濕青松松間多好風翠光濃欲滴對舞千蛟龍可惜青玉釵道邊委蒿蓬幽人不汝棄應有綠毛翁今旦今旦寒氣至晨坐進一杯一杯未能已三酌竟空罍我有胷臆事欲言誰使陪往往中夜歎鬱結無由開頼此樽中君破悶有後來時時從之逰報我以歡咍古國多寒肴老妻治炮煨誰云一日富此價萬瓊瑰摘梅花数枝挿小瓶中輙数日不謝吟玩不足形為小詩疎梅挿書瓶潔白滋媚好㣲香悠然起鼻觀黙自了秀色定可憐仙姿寕觧老禅翁心土木對此成魔惱霜後步西園濃霜失暄妍短日淡無色回風振中園摇落聲䇿䇿草根飢鳥啄飛舞時嘖嘖野荒無遺粒卒嵗將何食鮮鮮西墻下幽草弄寒碧四時不吾欺聊假汝頃刻冬懐三首悲笳奏已罷落月在西壁卧聞中林鳥先曉鳴嘖嘖爾求亦易供固合事安息夜歸陵旦起何爾更勞役乾坤擾萬物不使輕有獲無求良獨難何以休吾力揚雄老不遇寂寞玩文史厠身虎狼間乃卒脱其死中恬遺外慕獨樂異衆喜但有載酒人何用求知已年來百事懶惟樂静中趣天寒無來客終日常閉户進取乏時才窮通有天數委身付造物已矣隨所遇感春三首東風吹桃李花落已滿地搖搖新柳枝薄䕃纔可芘誰云同一時榮謝兩異意由來何足較要之歸一致黙坐不復出浮雲作朝隂離離簷間花隨雨下故林物色一如此朱顔坐凋侵自歌陽春曲吾不待知音午日步西園繁花亂相照夭夭海棠枝顧我如欲笑殷紅㸃輕素含吐皆窈窕持贈東隣子願言論乆要春日雜詩六首啼鳥喚我覺簷日行且午纍纍出葉鶯庭雀鳴欲乳妻兒病酒睡雞犬樂其侣風光不我違舍醉何有度東風入我園落落如急霰感之復攜酒撫樹為三歎離離牆間草滿地不可踐隂陽本無情榮謝欲誰怨春晏百草秀野花無復名悲哉桃李闌念此聊掇英翩翩雙飛蝶天静午日晴悲憂浪自苦有酒但知傾堂南老榆柳清隂漸交映飄飄風花乾渥渥雨葉盛鳥鳴日方遲客去門逾静自無濟世畧耿耿欲誰省三月行復至青春坐侵尋飛花去寂寂新葉來駸駸白日照芳草荒園亂鳴禽朱顔任自老安事累吾心東風忽無情吹我園中花繁紅與艷紫零落委泥沙鳴鳥亦何事啾啾竟諠譁須知盛已極委棄欲誰嗟官閒官閒吏歸早嵗晏寒欲盛槐稀庭日多鳥下人語静幽花破寒色過雁驚秋聴酒賤莫厭沽北風行欲勁秋池平生落寞意况此秋池側寒水靜無波衰荷委餘碧蕭蕭動風鬢照影感新白來往雙浴鳬爾生真自得雜咏三首隆中卧龍公平昔事耕釣無言顧同儕高視獨長嘯彼寧惜開口顧爾非同調何事逢𤣥徳曹孫一言料六槐當我庭春葉宻如幄朝來南風起已見萎葉落盛衰同時來豈必待蕭索鄙哉兒女癡倩倩情所樂鳥鳴高屋上飢顧朝求食擾擾市井人日夜衣食迫豈伊理當然或者養未得我歌南風詩歸坐還歎息飛雲時雨乆不施飛雲作朝隂芃芃中原麥頼此三日霖朝陽忽清霽披露南山岑雖無濟物跡膏澤在民心和應之燈蛾萬物皆畏死爾生何獨愚由來附炎熱鮮不喪其軀淺淺權利客蹮蹮輕薄夫高門甚烈火相勸以奔趨自黄州至巴河逰靈巗寺觀孫仲謀刑馬壇相傳權于此刑馬祀江神遂提師伐壽春云喬木隔塵埃華堂敞深僻人静好鳥鳴睡餘疎雨滴悲愁感蕭瑟弔古披荒寂尚溯紫髯翁誓師沉馬璧雜詩獨居無與往况此隂雨天起來復何有詩書散我前偃卧一榻上讀書疲復眠經綸負夙志跌蕩窮吾年搗藥指可握而足臂可攘無他何為勤藥物杵臼日諠譁指臂何與人正欲使其佳念此慙吝生達人其我嗟烏臼烏臼强知曉譊譊鳴暗天我事不須早援衾且復眠朝暉方瞶瞶慘凜蔽清妍且復待午景負此簷間暄春林春林露如雨蕭蕭曉花寒引手攀高紅微香來鼻端何以比芳潔置之青玉盤持歸供像佛相對淡無言華月華月流春宵散我高林影披衣步其下受此掃地静吾心方浩然萬境一澄瑩徙倚玉繩低寂寥沈逺聴離楚夜泊高麗館寄楊克一甥四首去城未五里夜纜繫衰柳水亭暗風雨人散聞吠狗平生足羈旅况此還往久有感不自知悽然獨回首水天夕雲重不雨衣自濕夜寒更士語雞唱舟子急青黄數宿莽蒼茫暗原隰高城亦何有倚檣成獨立客去水闗閉疎燈亦復收川鳴半夜雨卧冷五更秋扁舟已寒暑冉冉真乘桴一燈照客睡短夢良悠悠士師我自出爽邁凌清秋年少不飲酒昏燈夜問囚爾家外大父聴獄代其憂備飢朝煮飯驅蚊夜張幬獄成上府時稽顙呼張侯原注先子治獄䘏囚最有恩事載墓刻恕心臨縲紲相盜以戈矛無令市死厲請帝號重幽柯山集巻六
