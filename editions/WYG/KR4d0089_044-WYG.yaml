body:
  text: 柯山集巻四十四宋張耒撰題䟦書五代郭崇韜巻後自古大臣權勢巳隆極富貴巳亢滿前無所希則必退為身慮自非大姦雄包異志與夫甚屬駑昏闒茸鮮有不然者然其為慮也實難不憂思之不深計之不工然異日釁之所起往往自夫至深至工是故莫若以正夫正者操術簡而周知者為多緒而拙夫正者無所事計也行所當然雖怨仇不敢議之况繼之者賢乎郭崇韜于五代亦聰明才智之士也佐莊宗決䇿滅梁遂一天下自見功高權重姦人議巳而莊宗之昏為不足頼也乃為自安之計時劉氏有寵莊宗嬖之固請立為后而中莊宗之欲又結劉氏之援此子劉氏為莫大之恩而莊宗日以昏湎内聴婦言其為計宜無如是之良者然卒之殺崇韜者劉氏也使崇韜繆計不過劉氏不能有所助而已豈知身死其手哉好謀之士敗于謀好辯之士窮于辯惟道徳之士為無所窮而禍福之變豈思慮所能䆒也哉書宋齊邱化書齊邱偽唐謀臣其智特犬䑕之雄耳何足道哉其為化書雖皆淺機小數亦微有見于道徳其能成功有以也吾嘗論黄老之道徳本于清淨無為遣去情累而其末多流為智術刑名何哉夫惟静者見物之情而無為者知事之要據其要而中其情者智術之所從出也仁義生于恩恩生于人情聖人節情而不遣無情之至至于無親人而無親則忍矣此刑名之所以用也齊邱之道既陋而其文章頗亦髙簡有可喜者其言曰君有竒智天下不親雖聖人出斯言不廢雜書于自金陵月堂謁蔣帝祠初出北門始辨色行平野中時暮春人家桃李未謝西望城壁壕水或絶或流多鵁鶻白鷺迤邐近山風物夭秀如行錦繡圖畫中舊讀􅍮公詩多稱蔣山景物信不誣也白公少客杭州自言欲得守杭卒如其言予亦云䟦徳仁書斯人也夢㓜一世芻狗萬物而獨嗜于酒行年八十餘以死予為誌其墓而平生事為之詳多得之熙老也題呉徳仁詩卷陶元亮雖嗜酒家貧不能常飲而况必飲美酒乎其所與飲多田野樵漁之人班坐林間所以奉身而悦口腹者葢畧矣白樂天亦嗜酒其家醸黄醅者葢善酒也又毎飲必有絲竹童妓之奉洛陽山水風物甲天下其所與逰如裴度劉禹錫之徒皆一時名士也夫欲為元亮則窘陋而難安欲為樂天則偹足而難成徳仁居二人之間真率僅似陶而奉養略如白至其放逹則並有之豈非賢哉題陳文惠公松江詩陳文惠有題松江詩落句云西風斜日鱸魚香言惟松江有鱸魚耳當用此鄉字而數處見皆作香字魚未為羮胾雖嘉魚直腥耳安得香哉䟦杜子師字説車之所以能載者以其有輿也人之所以從君子者以其有徳也從之衆矣此名輿字子師之説也耒以丙戌嵗仲冬自黄之潁過盱眙少留子思出子瞻文始獲見焉于是蘇公之亡五年矣相與太息出涕而讀之至前二日書䟦唐太宗畫目唐太宗躬擐甲胄出入行陣親與羣雄博戰而勝之計其勇健虓武豈復翰墨間人也官法帖帝王部中有太宗書真行千載字觀其用筆精工法度粹美雜之二王帖中不能辨也而其雄邁秀傑之氣則冠諸書者嗚呼盛哉宜其偹文武之大美兼聖賢之能事除隋之亂比跡湯武致治之美庻㡬成康雖數十年慨然可想也此書畫目是其真蹟前數行亦自有法度可愛䟦龎安常傷寒論古之良醫皆不預為方何也病之來無窮而方不能盡使不工者惑其疑似而用之則害大矣惟仲景傷寒論論病處方纎悉必具又為之増損進退之法以豫告人嗟夫仁人之用心其非通神進妙者不能為也龎安常又竊憂其有病證而無方者續著為論數巻其用心為術非儷古人何以及兹淮南人謂龎安常能與傷寒説話豈不信然哉予將去黄欒仲實以黄别駕後序求予書而仲實之父為醫得龎君之妙謂予言何如也題道孚墨竹文與可自言吾墨竹一𣲖在彭城葢屬眉山公也而子瞻自言吾為竹盡得與可之法獨生意自然逺不逮也吾甥楊克一本不學畫竹一旦頓觧便有作者風氣揮洒奮迅初不經意森然㔾成愜可人意意其法有未具而生意超然矣書贈賈生予嘗病世士少而學荒于遨嬉壯而立蠱于嗜欲老而成累于利祿所以徳業功名愧于古人者以此晁子莫言賈氏子醇静篤實少無他嗜惟喜學問予聞而悦之望具壯立老成必有大過人也記外祖李公詩卷後晏元獻鎮亳外祖李公以著作佐郎實為譙令元獻雖以故相守藩位貎尊貴而與外祖友賦詩飲酒朝夕不舍忘其位之有尊卑也方是時太平積年内外無事公卿大臣皆一時文章豪傑之士優游宴息往往喜與詩人文士談笑述作觀具指物摭事皆慨然自托于不朽之意而至于今世之君子皆喜道之可謂盛矣方是時外祖以文章有名而詩尤傳于人一時名臣多致㳟願交而嘗賦詩稱少日知巳惟晏范故元獻及文正往來詩居多焉書曽子固集後元豐二年夏曽公自四明守亳道楚予時自楚將赴河南夀安尉始獲以書拜公於行次公得予書甚喜也謂予曰我與子皆泝汴而西能從我行乎時子舟無挽兵為予求之甚力公又曰我行駛非子能及也子至永城當纜舟陸走一日至亳為旬日㑹也公遂行後子病六十日至永城病未愈不能騎因永城令寓書于公六年予罷夀安尉居洛而文公卒為文一篇將祭公于河南而成都范祖禹夢得自言嘗為公舉亦欲為文以祭謂予有往江南者約同祭之而是嵗予家多事自洛來陳明年又走淮南未克祭也八年四月公弟翰林公自建昌起京師予謁見于咸平知公已𦵏南豐或客可寓以祭者當書所為文一吊公之墓焉其意之所欲則具之文矣書小山中峯承天石左峯天鼓石右峯天冠石雲幢雨葢後隊三石由山下升山左而上天鼓石上有石如人俛而白事曰先報石承天石天冠石之間有一峯如人冠而拱若受左峯之報曰恭受石予泛大江三千餘里江山之奇偉峭㧞如匡廬九華者不可勝數山水之觀無以加矣而曽此山之足云乎應之曰遇大于細者得其意而遺其形觀拳石而山之意具矣此山亦足多哉客曰山無情之物也安得意耶意之曰有情之意有窮無情之意無盡王宫侯第疊石為山亦多矣經構裨補盡人之巧然攬之無可翫去之無可思其于糞壌一間山水之態雖瓌奇偉麗而縱横曲直未必盡當于人意而見則愛之去則思之無情之意也書小山書韓退之傳後有問于張子曰操賞罸滎辱以勢臨天下者莫不欲天下勸沮于其賞罰取舍于其榮辱而其勢常有所不行葢有益羞而人益羞愈沮而人愈慕若韓退之于唐殆若此矣退之所自負與世之所推者于徳莫如好直于藝莫如文章然以直取禍則逐山陽貶湖陽以文章招累則其文辭一世莫尚乃試于有司屢試而屢黜平生所述國家大事獨有平淮西碑耳乃刋者未畢而磨者至矣是宜沮䘮湮滅與時俱亡泯然無所見于世矣然毎斥而名益彰毎沮而事益顯抑者之力不勝譽者之舌雖退之亦自謂動而得謗名亦隨之是誠何説也張子曰是何足怪者昔先王之賞罰榮辱所以天下奔走而從之者惟其取天下之所欲勸者而賞且榮之取天下之所欲沮者而罰且辱之故賞一人而人勉惟恐其不若也罰一人而人懼惟恐其似之也且先王安能以巳之所好惡而力驅天下以從我哉直取天下之榮辱而制天下之向背耳彼唐之汙政其昏惑瞀亂無所取𠂻制好惡可否于一巳之私智而濟之以蔽欺之以姦何怪夫所沮者人慕所進者人恥歟且彼惟不可抑也是以愈抑而聲愈振子獨不見夫千仞之水決而注之川乎大木梗之大石捍之排以峽迫以髙麓而後怒號哮吼聲振百里抑之者愈大則其聲也愈暴故小遏之則小鳴大塞之則大震何則彼其勢惟不可止故也何也夫身益困名益聞也書家語後昔夫子弟子其高弟所聞微妙之言則已共記為論語矣而門人之下者又雜記聖人之言或陳其所學于聖人者又著為家語孔氏之子孫論其家之所傳則為孔叢子然皆得聖人之緒餘可推以考孔子之意不可誣也書司馬槱事司馬槱陜人太師文正之姪也制舉中第調關中一幕官行次里中一日晝􅄰恍惚間見一美婦人衣冠甚古入幌中執版歌曰家在錢塘江上住花落花開不管年華度燕子又將春色去紗窗一陣黄昏雨歌闋而去槱因續成一曲斜挿犀梳雲半吐檀板清歌唱徹黄金縷望斷雲行無去處夢回明月春生浦後易杭州幕官或云其官舍下乃蘇小墓而槱竟卒于官書鄒陽傳後鄒陽傳稱梁孝王用公孫詭之説殺袁盎事覺孝王懼誅使陽入關内來解陽見齊人王先生用其計説竇長君長君入言之及韓安國亦見長公主事果得不治此則陽與安國同救孝王殺盎事也及韓安國傳所稱見長公主事是以孝王僭天子游戲天子聞之心不喜太后亦怒弗見梁使者案責梁王安國為梁使見大長公主而泣長公主曲請于太后事乃解其後安國坐法乆之復用為梁内史乃有勝詭説王殺袁盎等事安國諌王王乃殺勝詭漢使還報梁事解無安國見長公主事此則安國見長公至是以游戲事在前非勝詭事也則鄒陽傳中所載誤記安國所解前事為今事耳柯山集巻四十四
