body:
  text: 柯山集巻三十五宋張耒撰論秦論賈生論秦曰仁義不施而攻守之勢異也世以為確論予獨謂之不然夫攻守殊而事相闗異施設而同利害其守之安危觀其攻之善惡其報應如表影聲響之不差也譬如人之殖産也耕我之田盡力以事之嵗收千石封之倉廩而食之賈百金之貨干鄰國而贏千金焉鄰里不我怨有司不我罪如是乃安坐享其福而貽之子孫則安樂而無後患今有人侵人之田奪人之産又殺人于道而奪之金如是乃欲封之倉廪藏之廐庫而守之以君子長者之事怨仇百作而披攘之矣故如是而取之必如是而失之安有以盜賊所以取之而能以君子之道守之歟秦王始滅韓齊大率十年間耳皆滅人之國虜人之君其毒至惨也夫此六國諸侯者其上世皆有功于民又皆據國數百年其本根深結于人心者固一旦芟夷蕩覆之其勢必不帖然而遂已如塞大水伐大木其漸漬之末流播散之餘種將且復漲而暴興不得其寂寥氣盡則不止秦雖欲反其所以取之道守之而其機必成其勢必復矣故秦之事不可為也嗚呼秦滅六國不十餘年而六國並立秦以不祀其效豈不然歟故賈生之論戲論也樂毅賢將一戰勝齊下城七十齊不能支曽未三年七十城者翻然為齊乃無一城為毅守者以是失之豈不然哉毅賢尚然況于暴秦魏晉論嗚呼魏晉之亂亡其可悲也國中之人皆恐懼服從大盜招之而無不應舉國以與人而猶恐其不受也其所循致而至此者何也葢其國輕久矣夫國重者存國輕者亡何謂重其人可以禦侮旁觀者有所忌則重矣鱓鱣王鮪之在江湖非不大也然漁者徒手取之鱠之俎上而無難曽不如蛇虺之據穴國之輕亦猶是矣人主非不尊公卿大臣非不畏百司庶府非不懼然皆庸怯和易説之如發䝉舉之如挈虚朝之慮不至夕今日之智不及明日夫如是國之存大盗拱手舉之矣是謂國輕凡人臣之能為國重者非有服天下之名節則必有過天下之才智成湯既没太甲失道伊尹放之可謂亂矣而諸侯不争商卒以安者伊尹之節天下之所不敢議也晏子之在齊叔向之在晉宫之竒之在虞諸侯不敢議其後管仲之智未易與為敵也郭子儀存而吐蕃罷兵李徳裕草檄而澤潞亟滅此以才智為重也夫天下之人其好争未嘗一日忘也非有大愧恥于其心而不忍為則必有大恐懼于其身而不敢為夫名節者所以愧恥天下之不義而才略者所以恐懼天下之好亂舍是二者雖聖賢無他道矣魏之亡也司馬師殺其君如屠犬馬而大臣震悸莫敢太息王祥鄭冲舉國而與之夫是數人者亦知是為不義也而不敢不聽者彼惟素無以動其國人而又取諸其胸中而無有也晉之臣才者先叛王敦桓温才過一時卒皆不臣劉裕才過數人者而遂取之何則國中之人莫與之敵故也夫挾好亂之資而顧其國莫與之敵則取之之心生矣故為國之患莫大于不崇名節而銷天下之精鋭彼晉之公卿朝夕從事者非毁名節則尚無心方此時雖有有志之士亦且去之矣此蔡謨之所以不為司徒而曰吾恐後世之笑也天下之事有名實不可以不辨也輕名節者曰吾惡天下之矯激也黜才能者曰吾尚徳也夫矯激者安能真為名節也利至則變矣世葢有利至不回害至不避而可以矯激億之哉夫如是而未免于矯激則庸庸者而後可矣且東漢之亂而曹操之雄至死不敢取惟畏天下之清議故也黨錮雖弊猶能存國古之所謂徳也非無才之云也才不足以言矣傳曰仁者必有勇勇者不必有仁有徳者必有言有言者不必有徳夫言與勇才之類也而仁與徳必能兼之則世有無勇之仁不能言之徳乎子産恵人也謂之衆人之母可謂徳勝矣然其抗晉楚何其勇且辯也夫以無所用之質而冐之以仁義之容文之以禮樂之言治國而不能靖民臨難而不能却敵而謂之有徳此固天下英雄之所侮也嗚呼為國者盍察諸此矣晉論天下有大分君臣是也夫以天下之衆而事一人攷其勢較其力則多寡異矣然天下之人不間于賢不肖俯首聽從莫敢或較一有不順則有起而誅之夫非獨君臣之分為然也自是而下之至于一鄉一邑之際茍有尊卑大小之分者莫不皆然夫天下之分惟其出于父子兄弟之際者此其天屬宜無足怪下至于一鄉一邑而上至于君臣是乃設為尊卑而不敢犯何為而然也葢嘗求之以為天下之分起于天下之理夫理者本于天地而莫知其所從始者也惟其理設而不可易故分立而不可犯夫生民之初未有君臣以相臨官師以相治也紛紛藉藉以力相勝于是民始大病之而後有能服其黨者焉夫能服一鄉則一鄉尊之能服天下則天下尊之是故君臣之分遂立而不可變夫民之于君乃其自立以自治也夫惟其仰之以自治是故順命受教俛首聽從而無足怪自是而推之至于一鄉一邑亦猶是也予嘗悲夫晉之事也自三代以來其國之多故者莫如晉外有劉石之强内有大臣之變泯絶荒亂有不忍觀者然後裂為東晉至于東晉而晉亦微矣然猶相與維持至十餘世力盡勢窮凌遲百端而劉裕乃得之自劉元海以來天下分為十六國若苻堅石勒之徒皆有過人之才闢地數千里據有甲兵士民之衆又有忠智効死之臣其所建立亦有足觀者然皆不過一再傳而遂亡方其興也宜若可以久安至其一敗遂滅不振葢嘗觀苻堅之敗于夀春此其力猶足以善其後然提其餘衆困窮而無所歸葢思之主于君臣之分而後近得其説夫晉之有天下積久而天下之所服也夫惟人安于所服故天下遂守其君臣之分而不敢犯人人惟恐其失之是以播遷流徙甚弱而難滅忠臣義士力以救其敗若苻石之强雖兵甚强勢甚盛然天下之情不愛其徳而惡其亂不幸不能制而後使得倔强于須臾幸其敗也則起而共亡之矣或以為君臣之分其始出于相制茍為君臣焉斯有分矣晉與苻石何擇也夫天下之情固有所習也習而安者衆之所歸也嬰兒愛其乳之者鄰人之母乳之則不愛也均為乳也而愛惡存焉習與不習故也然則晉之初天下固習乎魏也而晉之不亡何也十六國之顛沛此敗于分之不正者惜哉唐論上昔者天下之事常患于不得巳而為之夫事至于不得巳而為者非其心之所樂而勢有所廹故也勉强而為之既立而不可變則将拱手而待患是故古之聖人其深謀逺見所以憂慮天下之故者莫不備其害先為之防曲為之備使天下不幸有不測之變而吾常從容制之而不能亂無鹵莾茍且之計以為後世之患嗚呼此先王之制後世之所以不可及歟竊嘗譬之世之淺人有居于河瀕而幸水之不至也則安然而不為之備一旦水至則徬徨四顧莫知所為于是毁室徙薪而塞之而後免于没溺之患然是人也能解目前之患而退有失所之憂既已失于其初而後将復之則薪與木者既已習于水而不可動夫彼其初豈不愛室與薪哉勢有所廹故也故天下之事亦何以異于此聖人者惟先見其害而預為之備而已然豈有他術哉是亦築防以憂溺貯水以救焚者之智也昔節度之制起于景雲開元之間然其所治者不過于邊方控制之邦而已天寳之亂安史横行于中原而莫之禁天子兵弱而不能制則其勢不得不倚節度之兵而節度既巳有功則雖欲變之而不可大抵至徳之後天下之兵無慮皆屬于節度之府是以天下之兵仰食于度支賞罰于天子而權歸于將軍天子養之于上而將軍實收其權于下故驅之以不義之名寘之于可畏之地則俛首盡力而不敢辭及天下既平前日之亂已去而節度之患固已不勝其深矣嗚呼天下之情不可使茍有所安也使安于義耶則吾固無求乎其他使其不義而安之則吾将欲改而不可得彼天下之兵其勢既巳如此則人人有當然之心雖欲改之其道無由葢肅宗之時大盜既平而天子之威不足以大屈天下則其所不能變節度之弊宜無足怪然以憲宗之英明鋤蕩剗革而卒亦不能一之嗚呼勢之所習不亦甚固哉葢嘗謂唐之末年其君非有可亡之實也夫文武宣之三君其才可與有為而一時之臣又非大不可用而其紀綱法度不須臾而壊葢其大勢已去雖有絶巧無所施之矣故唐之患不起于河北之繼襲而起于節度之有功嗚呼使天寳之際不為茍且急廹之制則僖昭之患何自而起而使吾初不倚節度之功則河北之區區雖欲傳襲其可得哉唐論中天寳承平兵不知戰大盗􅊳起四海震動禦之無策君播國殘哥舒之敗固無足道者明皇欲下詔親征而姦臣嬖妾沮撓其事意當是時天子臨戎其有濟乎愚嘗論之天寳盜起雖上有昏徳聰明杜塞抑當時朝廷無人矣故為是猖狂不審之謀夫天子臨戎其利有二天下莫能當而明皇皆不得行之幸而不行使果行之其狼狽有甚于此者何謂之利一者壓之以尊名重勢敵人雖强不忍冐犯順之危而起侮上之怒二者天子所統必天下之重兵選卒天下不能抗也明皇之時天下之勢其重在西北而京師輕也久矣大獄屢興縉紳切齒用兵無度百姓怨苦内扇淫泆荒亂失度尊名之不競也甚矣禄山教戰久矣其將卒皆蕃戎勁卒非復唐人也彼惟恐犯順之不深侮上之不快則明皇之于尊名重勢所不得行之一也天下勁兵皆在西北藩臣握之府兵既壊天子侍衛長征彍騎而已有急而募不過得長安市人子而以之抗燕代之勁騎此驅羊戰狼則明皇于重兵選卒所不得行之二也親征不可則無策乎曰知兵者必知敵人所恃與所惡使之行所惡而違所恃如是者百戰不殆禄山之利速戰也所恃范陽也十年教其民千里而用之其鋒不可當雖太公穰苴必姑避之故賊必乘其鋒而用之彼惟恐戰之不速敵人之不我拒也然禄山勢雖强渡河而南則覊客也故心不固而易摇其恃范陽如豹之在山林急則必投下以自藏方禄山之南也厚集潼闗之師深溝高壘勿與之戰委河南而與之是時李光弼郭子儀皆在河北遣一將𢷬范陽之虛往必得志彼進則不得入闗退則已失范陽獨守空虛之東都不過半年其勢潰矣此至計也其後禄山既死慶緒北走而史思明已有范陽慶緒卒困死河朔以此知禄山失范陽則必弊于河朔諸師也其後史思明陷東都李光弼牽之于河陽而思明不能西以此知厚集潼闗之師不戰以老之而禄山無能為也禄山傾國逺鬬委其所恃而不顧固已犯天下之至危而唐之君臣不知出此唐為無人也夫唐論下昔者先王之兵愛其君而後死其將以為凡吾所以致力不顧以衛其將者無他焉謂吾兵之勝負者非吾將之利害而所繫者吾之君耳是故功成事立而其君安然享之而無虞其不善用者則不然其兵死其將而忘其君方此之時三軍之士惟其將之為聽故不患將之不足以立功而患乎功成而上不享其利夫惟欲兵之愛其君而死其將則莫若兵出于府而將出于衛使將之于兵得以用而不得以有之方其有事也厲兵秣馬以問有罪將軍之恩恵雖足以取信于下而士卒之顧其將非我終身之所仰則雖愛而不私夫惟愛而不私是故驅之以義則有功而不可使為不義之行彼死其将而忘其君者是節度之兵也方是時天子能使其將而不能用其兵可使征可使戰而不能得其私天子常斂士卒之怨而將軍者實尸養士之恩嗚呼此豈非天下之大患歟葢自天寳以來藩鎮之禍迭起而不可制而河北之鎮天下指為僣亂不臣之邦棄之而不問以為是誠不可得而為也嗚呼盍亦深思其術哉夫以漢之時而七國連衡以叛其上而諸侯擅地天子無有以制之此其為患豈特唐之方鎮也哉其後主父偃為之一言使得自封其子弟而漢之君臣無一鏃之費而坐享太山之安彼唐之節鎮何以異此歟彼桀黠而不顧肆傲以慢上者是誠何恃而敢為爾哉葢其股肱肘臂有為之出死力以為之者使其孑然而自為則吾一将之敵耳故李愬之平蔡一得李祐則呉元濟束手而無能為矣然一節度之所領不下數郡之地而我何不遣一介之乘假賞功之令抜其臣屬之尤才者使帥其屬城而為之使如是而隂離之使其兵分地坼則昔之豪黠而難制者不過一二耳提一空城而守之雖欲不臣其可得哉或曰彼臣屬将佐安能叛其素所愛耶名為裂地而謀相通則安在其為利哉是大不然夫人惟貧也而後肯役于富惟賤也故肯役于貴故兩貴不能相使兩富不能相下彼其臣屬將佐之愛其帥者豈有他哉惟其有功能賞之有才能用之是故恃之以自固使其位有節度之勢則将反顧其上而疾之何則勢均位等則必有相疑之心嗚呼使彼誠相亂而生疑則吾之計行矣或曰我一日盡斥其臣佐則彼安肯安然而遣之者耶使彼遏吾命而不行則無乃益召天下之亂乎是又大不然也夫使彼受命而遣之耶則吾固何求使彼敢遏吾命而不行則反手而内禍及之何者使人有可以得富貴之門而有蔽于其前則必羣撃而競排之彼一日于行伍之間而有一節度之權我則顧其私而止之夫如是而能安者世之所未嘗有也昔者烏重𦙍為滄景節度凡屬城之刺史各還于朝廷使得自𨽻其州兵嘗曰使二千石各有鎮兵雖有安史無如之何而河北之所以能拒命正以能奪刺史縣令之權耳當是時惟重𦙍之鎮獨禀命受代然則分其地而離其兵者真弱節度之術也讀唐書二首古之人主自中庸以上為理所屈皆能行之而誠未必加也若漢文帝之于務農唐太宗之于從諫㡬于誠矣或問二君之誠孰愈予謂文帝之言不足而意有餘未嘗為外貎觀美繁于詞令而形于制度不過詔令丁寧而已而身之所履則可信不誣矣知稼穡者必尚儉彼身衣弋綈足履革舄集書􅌩為殿帷罷露臺郤走馬此其意可見也太宗每見賢臣則求諫援引古今出入經傳玩慨古昔語必成文此雖無害于聞過而有好名之心焉此于誠有所不及也意有餘者忘言實已修者忘名理之必然也文皇嘗恨不撲殺此獠文徳皇后問誰帝曰魏徴夫太宗之信用徴如此而猶有殺心焉則其平日之厚敬而深信之或未必誠也且好諫者不諱其過而魏徴以諫草與史臣帝聞而怒遂有仆碑罷婚之事何怒之深也如此二事或疑其不信予謂或有之高宗之淫昏孱暗又内為悍妻所制外聚羣小逞于朝而禍不及其身者有以也非幸也其智葢有以自衛者彗見東方言者以為高麗将亡之祥帝曰高麗小夷且亦吾民也夫是言能出其口則有不可欺者以廢子賢之故怒其人嘗與賢交通令其父訓其子父殺之帝聞而不喜也更貶其父夫刑政能如是則希其意必相戒而天下聞之必有父子之義焉夫能約理而不盡欺叅以義而其諂有所不受使其應物之際十五出此足以完其身矣又讀唐書二首李徳裕制變應事之分裴度有所愧然度之制變務出于中和故事出而人不驚事巳而身安徳裕矜才而快意者也故其所發竦動人之觀聽而後多悔宦者劉承偕監劉悟軍悟不堪其侮而言朝憲宗以其有寵于母后問計于度請斬之又曰不能斬則流之夫斬之則風采足以震動而于事也徤然茍求下足以厭悟意上不傷太后心流之亦足矣何必求動人之視聽哉此度過人者也劉稹之叛計策出于郭誼為多稹勢巳窮蹙誼斬稹以降此在稹為可賞徳裕以為劉稹小子安知反誼始教之而終賣稹以求生卒斬之徳裕之出此不過欲明大義立風聲以竦動視聽耳若誼者置而不問斯可矣何必求名而殺之耶是時强藩叛鎮力足以拒王命而所深忌者左右之竊發也誅郭誼而叛臣始安心于其下其為慮葢已踈矣徳裕惡牛僧孺其傾僧孺也曰僧孺聞劉從諫滅而慷慨又搆成其往來之迹夫傾大臣惟有交友者之罪為無以加人主之所不恕僧孺由此遂竄徳裕于復怨則快矣而君子豈忍為是哉故一失勢羣起而擠之身没南荒非偶然也人主當務好要而不當務無為夫無為之言為妙矣此羲農堯舜得道者之事也而庸君昏主聞其説而樂之深居奥處蔽塞耳目是非過前而不察姦臣愚弄而不悟視人之利害國之存亡若越人問秦人之疾痛者曰我無為也耽樂飲酒便嬖女色晏朝早罷逰蕩無度亦曰無為也是故莫若好要吾不治事付人以事而觀其成吾不吝權分人以權而觀其趨事成而利則可成而害則必治其故而賞罰行焉分吾之權而志于公則任之盗吾之權而行其私則棄之而用舍分焉此之謂要知好要則進乎無為矣唐明皇用李林甫十餘年盡失賢者之助太宗之法度廢革略盡貞觀之風俗變壊無遺林甫朝夕所從事者非聚斂奢侈以蕩移人主之心意則羅織刑獄以破滅人之家族也閨門之内干戈碪鉞未嘗絶而間為神仙鬼神之説以動其心而明皇恬不為慮漫不知察利器去手而不覺一敗塗地没世不復凡此者其皆好無為之説者也後之人主可不戒哉五代論春秋時季梁在隨宫之竒在虞皆明安危曉利害强國憚之而不敢易予竊怪五代之君雖起武夫悍卒未嘗學問不足以得士而一時将相謀臣當其敗亡之際皆足蹈坎井頭抵株木安受禍患而無策事成則相與苟且富貴事敗則拱手受戮豈紛亂之極而人才亦從而不振歟予深考之而得四人焉皆智士也或用或不用也則係時君之昏明安重誨在明宗世常恨不為國家去潞王時潞王葢一罷鎮節度也而重誨獨知禍之原在此其後卒覆國者潞王也清泰帝時石敬瑭在太原欲叛有狀時廷臣有吕琦者言于朝曰敬瑭必結契丹為援可先以重幣結契丹以分敬瑭之援卒之立晉者契丹也使明宗與清泰信其言而先為之所可以紓禍也必矣契丹大舉入晉志吞南夏而其母述律乃獨非之曰譬之吾國以一漢人為主可乎耶律徳光果不能安于南狼狽客死于路大勞甚費而于契丹初無大利也徳光䘮歸其母不哭曰待國中人馬如故然後葬汝嗚呼若此媪亦智矣李榖韓熈載少以功名相期熈載将仕江南與糓别熈載曰江南如用我當長驅以定中原糓曰中原見用取江南如探嚢中物耳已而糓相周世宗遂臣江南兵不勞而國不費信乎其如探囊也何者自古秦滅楚晉滅呉隋滅陳長江複山不能為固天下有定勢非智力可强諸葛孔明且不能用蜀取魏江南豈有長驅中原之理乎糓于審天下之勢亦明矣此四人者三見忽而一用嗚呼天下何嘗無士哉柯山集巻三十五
