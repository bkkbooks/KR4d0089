body:
  text: 柯山集卷二十八宋張耒撰同文唱和詩考校同文館戲贈子方兼呈文潛補之二十年來曹子方新詩曾見未能忘多才善謔稱物芳吳娃席上呼作郎瞥然何許嵗月長只今未老毛髮蒼自言逢掖非昔狂傳經華隂夫子堂何曾騎馬身挾槍詔隨上將西擊羌董蒲跗注謂我臧夜行馬頓飢無糧鼓鼙驚谷騎卷岡吏呼馬微醉在牀前鋒奄至靈武旁中堅不後無敢驤城門三日牧蔽隍百駝載笴千槖裝旌旗立壘烏鳥揚還軍不省一矢亡坐師無獲勞不償鐃歌入奏虛錦囊秋風鱸魚思故鄉鋭頭宜董鸛鵝行得官猶領萬驌驦王城對巷如參商那知連月居兹房稱多量少非我長羣公古鏡懸秋光閉門飯飽庭葉黃秋盤登兔官酎香吳音訛變雜秦凉令壺老柏笑覆觴淹留平日夢欲翔得君可樂殊未央人生傾蓋何所望結交松柏要冰霜中天號出玉璽章青驄御史騰康莊歸期屈指未可忙聞君況有夢虺祥生女不惡嫁鄰墻掃軒留客具酒漿與君更約城南張忠臣五年坎壈哀南方江湖魏闕兩相忘洞蘿巖桂搴孤芳月潭風渚儔漁郎單閼孟夏草木長望都樓觀鬱蒼蒼原注忠臣癸亥六月以家艱去國丁卯四月還省誰令焚芰辭楚狂復來上君白玉堂黃門㦸曜羽林槍未央引籍班氐羌雲屯錦簇馬斯臧大官日膳瓊為糧追隨威鳳鳴高岡豈敢偃息復在牀投鉛歸休下殿旁衛士傳詔來如驤館閶闔外西城隍書槖迫遽不及裝籲俊士集要言揚得弓勿問何人亡趙璧既入秦城償頴脫喜見錐出囊同人于野不擇鄉峩峩羽翮整顔行天間玉勒皆驌驦伯喈懷贖望金商原注天啓魁梧竒偉值子房原注文潜家令數術應帝王原注無咎三英粲粲日爭光我輒與之較雌黃芳菲滿室蘭生香坐堂月久秋氣涼將軍思歸歌撫觴原注子方倚梧目送鴈南翔想見葭菼水中央洞庭河漢遙相望香楓葉老赤染霜感慨少日七步章長安城西約鄭莊原注豫與子方無咎文潛天啓嘗有此約牽率不往有底忙人生可意皆吉祥快馬劃過小苑牆入門爛醉銀瓶漿秦筝趙瑟喜高張次韻無咎戲贈兼呈同舍諸公輔少年落魄走四方看山聽水興難忘深林誰復知孤芳十載江湖稱漫郎紫溪風月幽思長緑水如鏡烟蒼蒼追隨豪雋多清狂春風爛醉胥山堂下瞰羣峯聳如槍吳儂棹歌笛弄羌攀蘿捫薜疲獲臧經旬選勝行齎糧客見經臺倚高岡共卧明月吟胡牀投身忽落崑崙旁征西萬馬隨騰驤官軍夜半填賊隍食盡師老催歸裝將軍數奇謾鷹揚斬捕不能酬失亡曲突徙薪語莫償幕中病客非智囊扁舟夷猶憶吳鄉朝侯平日丈人行生駒今始見驌驦伯樂一盻過老商恐是稟質蒼龍房久工吳語放降王叔敖扺掌對燭光秋英落盡金鈿黃玉甕浮春醅發香九天廣樂來新涼笑談聊此共一觴天衢六翮將翺翔正值羿彀游中央我老委翅無復望洞庭橘熟千林霜行當拂衣解銀章買取百花洲畔莊世外日月何曾忙翛然一室生吉祥車馬還能過我牆夜具茗飲與蔗漿更看君詩雲錦張敬用無咎學士年兄長韻上呈子方太僕鄉丈肇兩河郡縣淪西方西人思漢今未忘果園蕪沒白草芳原注靈州乃赫連勃勃果園旃裘戲馬誰家郎車箱峽口澗谷長旄頭倒挂回穹蒼王師西出討獝狂六花簇疊來堂堂前鋒鋭頭臂兩槍伏姦謹索收生羌天聲隱轔搖姑臧奇兵繚背斷饋糧決河有聲如壞岡城頭擊鐘聲殷牀萬甲幾欲漂無旁雖有伉健誰騰驤一夫不敢陵彼隍馬首欲東促歸裝緘胸有策鬚睂揚歸來恍恍若有亡劬勞有日何由償戰鞍挂屋尋書囊日隨飛鴻思帝鄉彭城老將官橫行幕中市駿收驌驦射堂兩部奏清商應弦破鏑如蜂房原注劉渭州射為天下第一笑談斥土羈名王畫圗遣奏朝明光詔書留典真乘黃錦韉玉勒春風香平池老桞高雲涼神駿在目豪吟觴跨下蹀躞驚鳬翔皇居九衢天中央我時項背聊相望西城九月天隕霜夜談關塞評文章微言竊比惠與莊和詩脫筆覺我忙視君韜養壽且長功名有來成堵牆勿憂寒暑敗玉漿韔弓箙矢用此張無咎兄贈子方寺丞見約出院奉謁復用原韻上呈子方兼答無咎見及語耒曹侯驥骨雙瞳方流沙萬里志不忘讀書故山蘭蕙芳咳唾不顧尚書郎參軍朔方試所長奮鬚決策服老蒼願得一索縛狡狂凱歌揉馘獻明堂黃河東峙萬旗槍義渠竟失先零羌坐師失律無否臧但恨不取東關糧黃君詩力回魁岡十客未得一登牀攜君秀句展我旁草書紙上蛟龍驤謂我君舍城東隍年來長嘯棄軍裝載酒欲訪執㦸揚休日出門如瞰亡坐令耿耿願莫償紫衣宣詔襆被囊獻書貢士學與鄉羅庭充屋書萬行風鬃霧鬛簡驌驦考評唐虞論夏商相過近如蜂隔房君家八斗陳思王千年門户有輝光任城健將獰鬚黃猗蘭之苖不敢香家人寄衣秋晚涼滯留華館付杯觴天髙月明新鴈翔明燈高談夜未央屈指計日引領望來時汗流今雨霜重門事嚴御史章賴君諧捷解色莊還家有日未用忙眉間黃色是何祥朝侯約我走門牆但無閉關休饋漿莫以獸微弓弗張復用方字韻奉贈同舍慎思文潛同年天啓補之平生數子天一方今夕何夕情難忘荷衣攬蕙氣芬芳册府兩公同舍郎崑崙方軌萬里長西城却望天蒼蒼秋庭風雨翻幕狂夜語蔡侯同一堂張侯老筆森牙槍文詞楚些遺蹇羌胸中水鏡誰否臧學三百囷羞裹糧思如决瀆萬仞岡大編小軸山壓牀城南買屋君舍旁疲驂日附驥尾驤我慚昧道由四隍人如燕宋初束裝聽君雄辨神揚揚却思得一愁十亡鄧侯韞櫝價不償有方未試聊貯囊起家牛斗玉笥鄉鴻騫早入鵷鷺行和鸞采齊要驌驦一鐸便足諧宮商知君雲壑有松房南陽耒耜心霸王玉池復說夜有光仙人藏丹金鼎黃願分神瀵浴骨香非我其人慙德涼蔡侯發跡江濫觴閉籠祗欲擘海翔此公事業未渠央六奇他日我所望烏號張月刀瑩霜列五單于加印章穰苴何但虛斬莊遭時立志未可忙白犢得瞽寧非祥嗟豫企踵不及牆逢君如渴御蔗漿怯雖如鼠猶膽張敬次無咎來韻抒寫素懷兼呈文潛天啓伯時仲達忠臣梁宋吳楚各異方交情一契不相忘况乃顔色瓊枝芳石渠金馬從諸郎我徒瀟湘烟水長江湖飫見山色蒼扣舷弄月浩歌狂朅來濫吹崇賢堂儲胥乍駭緑沉槍擊鼓震讋庸蜀羌爰居受享謀非臧悔辭卑飛斑竹岡終日獺祭書繞牀故山秋菊英可糧西風夢掛南斗旁翠蚪綘螭交首驤坐看樓闕照天隍壯心鬱律軍騰裝韜弓卧甲氣不揚揮斤欲斫人亡劍價倚待風胡償雲間邂逅得智囊洞庭鈞天奏帝鄉慷慨奮擊萬夫行天路滅沒飛驌驦張侯同聲羽應商蓬萊方丈屋連房海口瀾翻議百王太一下照青藜光要我挾槧弄鉛黃四庫顛倒翻藝香蔡鄉來自安西涼慨慕玉關歸獻觴同官李桞並翺翔鸞和節奏聲央央誰其力薦慰所望九閽白日無雪霜垂光虹霓急草章沉冥清逺兩蜀莊人間勢利本不忙麒麟鸑鷟國珍祥每恨官隔西掖牆可使簸揚挹酒漿不似箕斗名虛張謹次原韻奉酬慎思學士年友李公麟君家祝融水一方平生書闈食可忘雲河潄潤搴瑶芳天帝壁府讐書郎馳騁千載凌子長神清骨秀顔色蒼書淫傳癖笑輿狂十年此會同都堂上樓吟春碾旗槍詩筒吳歈賡楚羌一律校文公否臧日飽太官沆瀣糧朱鸞入網空南岡賢書奏牘紛滿牀朝出粉闈暮帝旁駸駸天路羣龍驤病鴟跕跕乃汙隍白雪隴望因俶裝放歌長林聲激揚佩蘭思馨雖朋亡雲出鳥還聊自償羽扇麈尾隨經囊龍眠乃是無何鄉朝遊不亂麋鹿行歸卧展圗觀驌驦憲貧頌古時歌商徜徉興罷住雲房焚柏翻經䆒法王冉冉暗度嵗月光山頭草青還葉黃洞明已死閒骨香此志未就嗟涼涼親顛向白每稱觴㫖甘鞭後難翺翔朅來竊食天中央古人千載空相望同文鎖密御史霜得公再集評文章亦說種松輞口莊使我夢蝶栩栩忙便欲負郭占農祥開門倘容倚孔牆想挽北斗下挹漿箜篌更對高秋張次韻呈慎思學士子文咸韶濩武來何方鏗鏘入耳安能忘陽春蘭芷秋菊芳金門詞客青袍郎昭回下燭光熖長深山大澤龍蛇蒼浩歌激烈元非狂正逢聖主開明堂風煙關塞收旗槍舞干兩階臣戎羌喋血拓境謀非臧邉城夜行休齎糧采詩不復嘲青岡蛜蝛戢羽戍婦牀移文北山猿鶴旁渥窪朱龍兩服驤胥靡版築罷浚隍白環楛矢貢篚裝航海萬里風帆揚旃裘種落嗟脣亡諸蕃入學願可償槐花舉子促書囊成均貢士賢登鄉東門宣詔札十行我慚駑駘追驌驦何敢望回不及商毛遂末至宗連房賴有墨妙江都王傳模共分此日光驊騮緑驃兩耳黃想見蹙踏披天香坐覺暑退秋堂涼拘牽齷齪漫引觴門外烏兔雙飛翔悠悠逝川東未央故山魚鳥空相望鄧侯意氣摩秋霜朝吟百篇暮千章駢羅經史貫列莊落紙但見書史忙孔鸞羽儀各效祥鄙夫不學空面牆先饋不用驚五漿烏號要須賁育張次韻奉酬無咎兼呈慎思天啓耒平生結交圓納方過眼十人八九忘畹蘭畝蕙幽谷芳懶隨家奴諛五郎苦飢方朔身漫長顛毛種種顔欲蒼誰謂勝癡端坐狂清淮之隂一草堂列筆作陳茶森槍絶口平戎與破羌百年如此計亦臧何用竊食官倉糧𤣥黃病足畏高岡但願縮頸老支牀煌煌東壁日月旁神仙鸞鳯爭騰驤萬書落架城覆隍牙籖如雲丹碧裝朝侯再作班與揚正始故在何曾亡江湖十年願飽償夜成七發光出囊蘇公後出長卿鄉為君吳都無一行原注蘇翰林欲作杭州賦見無咎杭州七術乃止世有伯樂生驌驦肯使弭耳隨鹽商鄧侯楚山深閨房名走上國交侯王朝隨日景夜燈光包攬今古窮炎黃吐詞分葩有國香近君如雪六月涼又似心醉醍醐觴東南蔡子名飛翔同隨天書拜未央瑰竒宏傑萬夫望頰牙凛凛有風霜文如神鼎爛龍章鍾山長齊讀老莊論兵說佛兩俱忙不夸得硯文字祥但願破敵如頺牆我窮乞酒更得漿仰看三虎爭雄張贈天啓友弟耒桑弧蓬矢射四方嬰孩立志長可忘莫學兒女漫弄芳豪氣當視交河郎邉城入望千里長臂韝時架角鷹蒼搏捷仍放韓盧狂麕鶉日暮隨登堂往來絶藝精飛槍餘勇猶足吞頑羌讀書誰謂榖勝臧盛時萬鍾逺餽糧水輸長川陸登岡垂弓在槖弩在牀蔽扞入陳牌居旁天馬馴工披甲驤受降濬築修城隍刀頭不惜千金裝三十六將皆鷹揚故境可容尺地亡子頗自負當夙償況復武庫踰書囊惟我與子舊同鄉友生固自騰㕍行更欲揚鞭向驌驦豈但傳經如卜商不見漢時張子房身才六尺佐時王功業能依日月光素書一卷初逢黃異時破賊玉書香當使相繼來西涼時臣稱賀持壽觴鴻鵠一舉橫飛翔光隂應須及未央案此句下原本闕望字韻詩一句不侯可忍㸃鬢霜少年天子坐建章寵待穰苴不顧莊嚴兵待時雖未忙黠酋授首先有祥王師會看傅城牆郊迎父老擕壺漿去病當時凱樂張次韻上呈樗年主簿鄉兄肇君家晋陵我朱方君家易知復難忘十年不見蘭畹芳青山翩翩黃綬郎我遊東南嵗月長江流洶湧山鬱蒼燭龍東來尾鬛狂鳥爪真人坐高堂山中幡剎森戈槍道場法嗣通衡羌大道甚夷車御臧獨不進步誰資糧脫身簿傾行澗岡青崖結茅雲繞牀飄颻西墮梁宋旁至今夢想猶高驤矧復約子西城隍瓦爐梵夾隨行裝形骸土木神逺揚少狂豪氣今則亡劇談軟語志頗償模寫物象揮錦囊樽前坐我烟靄鄉憐君駮踠未著行側身六合悲驌驦即今文學科卜商赤刀大訓在西房詔書興賢利賔王重闈共此燭燈光肥羊細肋蟹著黃茭蒲生白晚菘香落月動影簾帷涼夜如何其未卷觴座間詩陳鵝鸛翔卧旗蓄鋭豈遽央我堅孤壘何敢望降幡欲掛月似霜獨君一掃可得章滔滔筆力抵卞莊兩虎未捽終不忙蜘蛛拂靣歸有祥便看大榜挂北牆南城西寺載殽漿背城借一猶能張次韻贈無咎學士幹毗陵城如金斗方往事厯厯那能忘相逢童子佩蘭芳秀發人指誰家郎未幾重見突而長即今不覺秋蓬蒼嬉笑豈復為兒狂追昔宓子初登堂辭鋒峭拔森刀槍器識沉逺包夷羌陽秋寧肯露否臧有子逰學先聚糧相將百里陟岵岡邂逅一揖坐僧牀大辨傾注如無旁天馬方謂先騫驤觀魚誰復駐濠隍瓜期受代垂趨裝當路奏牘交稱揚行將超擢奄云亡坐令志氣不得償傳家豈託錢一囊諸兒經行名州鄉挾書繼踵諸父行旋見天衢飛驌驦論治直要超周商術卑效淺笑杜房况是亨運遭興王致君紹祖邦家光何止追考歸焚黃邃庭朝露明藝香異書滿閣秋氣涼詠歌間成隨豆觴讀之如欲凌雲翔暫迂大手離未央案此句下原本闕望字韻詩一句挈篋來寄深閨霜賔興賢能視文章尊尚周孔摩韓莊搜竒殆有通夕忙英逰疑動聚星祥我歸復翳環堵牆世味已能如飲漿羲皇上人琴一張次韻樗年見貽補之平生車軌周四方結交童齔老相忘異哉余子久彌芳吳人猶記稱周郎河豚入網荻芽長宜興罨畫烟水蒼風雩春服真少狂不愧戴崇升後堂原注時王平父方教授毗陵樗年所最厚橫戈筆陳倒千槍升鸞獨步禹幽羌原注樗年奏藝開封第一世儒膠擾何足臧說食不救飢求糧瞥思振衣千仞岡空林無人一繩牀五車純束不在旁欲徹梯凳排空驤鍾山春水繞城隍從師不憚白笈裝矢鋒相觸塵不揚驪黃牝牡若滅亡子嚴主簿志不償厭見朱墨紛傖囊西風雲日思帝鄉東華拜敕鳬綴行黃昏閶闔飛驌驦虛堂節候變金商間門蟋蟀鳴我房吾君仁聖周成王屏驅虎豹開明光山龍粉米誰青黃多儒可贊至治香園檀山石豈荒涼潢汙蕰藻須豆觴願君與借羽翮翔賢書蚤列升未央案此句下原本闕望字韻詩一句君如病鶻待秋霜牛衣未可悲王章公朝道闢五逹莊服襄按節緩勿忙夢松生腹渠不祥莫車上儛應循墻功成歸飲沆瀣漿發機要若黃間張柯山集卷二十八
