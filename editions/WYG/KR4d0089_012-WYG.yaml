body:
  text: 柯山集巻十二宋張耒撰七言古詩東海有大松土人相傳三代時物其狀偉異詩不能盡因讀徐仲車五花栁枝之作作此詩以激之詩翁爱花復愛栁長歌髙吟半酣酒自言二物天下竒爱之不厭形于詩嗟予所愛翁未見我昔東遊窮海甸波濤四絶大島中上有太古不死之長松千人袢延坐其下仰見翠葉迷蒼穹巨鰲竭力負不起鵬栖僅借卑枝容人言海若此其圉鱗甲百萬屯蛟龍又云海怪乆不死守䕶山麓蟠其躬天空海濶風力壯敲戞簸蕩聲無窮軒轅張樂奏未己筍􅙇百萬喧笙鏞鬼神不欲人屢見䕶以萬疊青山峰爱之未免困寂寞坐見雨露霑蒿蓬東臯吟翁天下才海岳秀氣天所鍾豈惟文章繼騷雅胸中術業窺䕫龍如何案此下脫五字失所因與兹松同詩翁勿愛花與栁軟弱但觧争纎穠春英零落化為土夏葉狼藉工巢蟲嬌兒姹婦最入眼丈夫所志當英雄何當與君渉海去結茅松下甘長終讀蘇子瞻韓幹馬圖詩我雖不見韓幹馬一讀公詩如見者韓生畫馬常苦肥肉中藏骨以為竒開元有臣善司牧四十萬匹屯山谷養之罕用食之豐力不曽施空長肉韓生圖像無乃然我謂韓生巧未全君不見昔時騏驥人未得飢守鹽車惟有骨昂藏不受塵土侵伯樂未來空佇立騏驥乏食肉常臞韓生不寫瘦馬駒誰能為驥傳之圖不如凡馬飽青芻再和馬圖我年十五遊闗西當時惟揀惡馬騎華州城西鐡驄馬勇士十人不可羈牽來當庭立不定兩足人立迎風嘶我心壯此寜復畏撫鞍躡鐙乘以馳長衢大呼人四走腰稳如植身如飛撟邉争道挽不止側身逼墜壕中泥懸空十丈纔一擲我手失轡猶攢蹄回頭一躍已在岸但見滿道人嗟咨闗中地平草木短盡日散漫遊㤀歸驅馳寜復受鞭策進止自與人心齊爾來十年我南走此馬嗟嗟入誰手楚鄉水國地卑汙人盡乘船馬如狗我心未老身已衰夢寐時時猶見之想圖思畫忽有感况復慷慨吟公詩逹人遇境貴不惑世有尤物常難得寜能使我即無情搔首長歌還歎息宿龜山寺下贈旻師淮流赴海何時窮我生飄泊西復東山中老僧舊相識驚我非復當時容三年厯遍百憂患遷就汲汲如飛鴻人生易老古所歎如我安得顔長紅塵埃漫滅舊題壁枝葉已拱當時松我方奔走師巳老更念别此何時逢眼㸔故舊懐抱好宴坐不覺聴山鐘長淮日高人語絶惟有塔鈴鳴夜風寄子由先生先生四十猶不遇獨坐南都誰與語青衫弟子天下窮飢走京城困覊旅高門得飯暫見肉敝筐無實惟巢鼠樓頭酒貴不敢沽三百青銅輸杜甫强顔講學昧時宜漫自吟詩愁肺腑平生不解謁貴人况乃令嚴門者拒此生自料應常爾但願流年醉中度又思人世樂乃已此外紛紛何足數豫期歸日在凉秋想見西風蕩煩暑區區懐抱冀披豁一尊願駐東歸艣再寄宛丘之别今五年汴上留連纔一日殘生飄泊客東南憂患侵陵心若失先生神貎獨宛然但覺巖巖瘦而實有如霜露入秋山掃除繁蔚峯巒出自言近讀養生書頗學仙人餌芝术披尋圖訣得茯苓云是松間千嵗物屑而為食可不飢功成在久非倉卒上侔金石免毒裂下比草木為强崛涓涓潄納白玉津鍊以真元納之骨神仙自是人不知豈為難求廢其術我聞公說心獨嗟欲問太虛窮恍惚奈何不使被金朱乃俾枯槁思巖窟又觀世事不可常倚伏誰能定于一終身軒冕亦何頼况有朝升而暮黜何如端坐養形骸夀考康寜無天屈乃知豈即非良圖郤笑兒曹嗜糠籺青衫弟子昔受經賦分羈窮少倫匹自知無命作公卿頗亦有心窮老佛但思飽煖願即已妄意功名心實不終期策杖從公逰更乞靈丸救衰疾寄楊應之應之蹉跎三十九猶着青衫困塵垢髙才逸氣老益竒我每事之安敢友逢時則駕子何患有才未用誰之醜暴得從來失常速徐驅未用鞭其後掃除萬事付之命收拾至樂歸之酒聞公頗以飲自名我亦抗衡能至斗京師常恨酒不足貧旅僅得餬其口乃知一飲尚間闗功垂萬古知難偶百年痛飲乃良圖安用金朱裹枯朽我生自斷計已决君亦我徒能爾否揚眉鼠子事輕肥貶眼小兒夸謹厚須防仰嚇忌鵷雛更慮致魘逢芻狗獨醒不若餔其糟羣犬猶須避而走遭刑每笑嵇叔夜得計須師彭澤叟我官古邑洛之陽間有山川亦竒秀行當釀秫從子逰更以新詩相獻侑招潘郎飲老人夜短睡不足勃公牕外强知時五更未明語千萬更憎林間鵯鵊兒吹紅洗白雨三日吾園花在已離披一年春事坐如此白首窮謫歸無期念此徑須沽酒飲買魚烹肉勤妻兒更呼東隣好酒伴為我醉倒堦前泥郭圃送蕪菁感成長句蕪菁至南皆變菘菘美在上根不食瑶簪玉筍不可見使我每食思故國西鄰老翁知我意盈筐走送如雪白蒸烹氣味元不改今晨一日如還北孔明用蜀最艱窘百計掇拾無遺策當時此物助軍行渭上襃中有遣植英雄臨事䆒瑣屑終服竒才屈强敵想見躬耕自灌畦當時有意誰能測讀守道詩仁宗之初公有聲一世懦者聞之驚日行古義不顧俗師事孫子傳其經掃堂捧杖供賤役侍師之坐隨師行質疑問道無敢變當世始知師與生作為文章不徒發譏切時事排公卿俗儒毁譽無所出乃取過行為譏評過于仁義罪固小矯弊自合違中行人皆不及子獨過過者之罪誰為輕開編偶誦子詩句辭氣磊落嚴以清吟哦令我不能舎想見眉宇寒崢嶸高風一冺不可見安得壯士能經營惜哉朽骨不可作徂徠廢土知誰耕對雪呈仲車學堂嵗暮無來客殘雪漫漫風獵獵當庭古栁三四枝老翁㩦帚収殘葉二年閒散百事慵飢寒不自勤鉏鍤嚢空甑倒誰復救典衣買酒將空篋人間萬事苦難齊以醉驅愁最竒㨗大夫未死誰能測幽憂何自同兒妾飲酣耳熱詩興豪直上虛空恣凌躡飢喉凍噤誰與解正藉醺酣得嚅囁少年舉白未嘗辭漸老深杯見還怯何當共有種秫田免向官壚走書帖昨者昨者飛雹㡬破屋頗説四郊妨麥熟十日霖雨一日晴泥潦漫漫不容足凄風寒凉肅肌骨五月更衣初秋服草木傷摧亦可憐造物憑陵竟何欲隂陽錯行成疫癘君子慎疾防寒懊荒凉窮巷幸無他更勸髙眠飽饘粥已未四月二十二日大雨雹夜来飛雹驚我眠大者磊落㡬如拳起聴但覺屋欲動簷瓦破墜無復全是日晩晴星斗出鏡静萬里無雲烟乾坤變化竟誰使造作詭怪須臾間鄰家老翁髪己白云昔見此今十年木衰火濫氣浮洩激此隂沴成冰堅儒生臆度知是否天事誰得窮其源屋頭雛鴉失其母足傷翅折亦可憐遊楚州天慶觀觀高道士琴棊頺垣蒼蒼鎖喬木草滿荒庭不容足壞簷破壁秋雨餘蛛網蕭蕭風滿屋黄衣道人出迎客野態生踈脫拘束圍棊盡掃一堂空烹茶旋煮新泉熟弹琴對客客卧聴悅耳泠泠三四曲離騷幽怨松風悲流水潺湲履霜哭日斜携手歩空廊鳴鳩相呼竹間宿黄昏門閉人語絶空殿幽幽掩㣲燭我生資身最淡薄每厭煩歊幸幽獨何當不踏朝市塵長伴髙人種松菊惜别贈子中昆仲二首寒雲崩騰不成雪北風吹牕燈半滅病來廢飲卧無眠一夜吟詩聲不絶南城三俊生契濶想對寒爐掉吟舌留行一日誰有情慰我與君千里别道長塵土疲馬愁嵗晩風霜敝裘裂人生何用讀書史文字末補囊中闕驅馳所幸一飽耳士而謀食愧前哲何能天獨嗇吾曹自應所學為之孽雖然此事予不悔昔學固知今日拙欲持琬琰易羊皮玩之已乆安能輟萬端畢竟有天命計較何須論瑣屑勞歌無和坐達明曉鼓鼕鼕墮殘月我年十八從先生今也相逢得三子坐思前事且十年嗟我不才老将俟子中兄弟氣清拔粲若瑶環與瓊珥逸足駿馬不受覊凌躒奔馳動千里先生聲名二十載乃得姻婭皆文士我今賀子得所遭非我先生誰辦此定交自恨相知晚漫浪一官非我志論文終日坐忘歸欲别出門還頓轡我如轅駒幸芻豆豈不自厭安敢避人生謀食亦可悲世上舎閒皆失計西來有人話吾邑頗説山川慰人意寄詩莫憚慿驛傳對酒惜哉無子醉到官便掃琴書室有客過我行當至原注子敏己許來夀安到官便治所居室疏泉養筍待子吟更采山芻秣君驥原注聞夀安官舎多脩竹流泉早作鸕鷀夜寒不得眠永夜相語髙樹顛鴉鳴最早尤喧闐啼呼相應動百千老雞睡起足攣拳側頭端如聞九天引吭一唱鳴宫懸時哉不後亦不先朦朧初日見山川吾廬晨起有炊烟自南京之陳宿柘城荒城人稀荆棘老野兔驚跳出寒草蒼蒼落日黄雲西驅馬城邉尋古道入門四顧皆桑田居民三五依道邉暮投佛寺下馬立衝眼滿屋燃萁烟老僧自言八十餘老矣不能營所居村僮依竈展敗席上有空梁懸木魚旋汲新泉濯雙手青燈照客黄昏後羣兒烟漫眠我前新月欲傾光入牖夜敲僧室借酒壷不惜青錢取次沽酒香入户推枕起剔燈吹火燃銅盂大杯一沃不留滴滿眼棼然睡來集明朝上馬倒殘壷不怕新霜敗裘濕送劉季孫守隰州君家將軍本縫掖叱咤西摧賀蘭石一時成敗何足論要使英名垂竹帛到君竒骨尚虎頭白鬚千騎守邉州挿架萬籖供記覽探嚢五子擅風流大河之東士精勇日飲不妨飛獵鞍五更吹角建牙旗萬馬合圍行酒甕朝裘風勁黒貂煖夜帷雪滿青氊重樂哉閉口莫言兵雖有頗牧誰能用北原秋風日夜吹北原秋蕪經霜不復繁縈紆一逕漸可躡歩踏落葉披榛菅蕭蕭九月草木變獨有修竹猶禁寒青紅野實不可辨晩日照射霜榴殷巉巉女几更清瘦崖壁刻削無雲烟潦收石出洛水好静夜側耳聲潺潺原西古城有㣲路禾黍離離荒野田人家嵗熟婦子樂村巷日暖牛羊閒登臨嗟我幸無事况有美酒供開顔射麋獵兔可卒嵗棄擲萬累休嗟歎感春若若堂北桃昨日花猶小暖風遲景一日功萬蕚千葩爛相照東風漾漾吹朝雨朝日滿簷春鳥語櫻桃得暖花意忙接蕚連枝間先吐蘭芽出地長可握小筍如簪堪薦箸欣欣萬木誰使然時來不肯居塵土盛衰相感但如此鏡中安得朱顔駐古來百計無可奈惟有飲者謀猶庻乃知甚急莫如酒有衣可典猶為富我今不樂欲何待薄俸自給供朝暮功名有命不可求白髪無私誰得拒從今酩酊勿復辭棄置人間千萬慮寄陳器之昨者見君纔頃刻滿馬塵埃靣黧黒自言别家春欲䦨歸意如飛留不得玉鞭揮折手成胝一日到家馳四驛今朝得書一何喜酌酒烹雞税征軛自言山城無與樂坐㸔飛花良可惜手㩦婦子口吟詩文字揮毫便千百醉歌昌谷和我吟錦囊舊句無顔色憐君潦倒誰復省塲屋十年名烜赫嗟我春來亦何事飽食髙眠度朝夕簾前相對但有山坐上清談更無客逼眼花光羅綺眩照人酒色瓊瑶白風光似此寜可忍酩酊髙歌卧花側平生結友事遨遊未省流年守山僻强歡獨飲豈所樂舍此無謀慰愁寂思君一笑何可得王事有程身有役堂南栁條争著葉繁李夭桃落如積請㸔春物能有㡬坐見清和變炎赫須期載酒對東風及此殘花尚堪摘讀李憕碑自唐中㣲北方沸鐡馬長鳴飲清渭李公守節䧟賊庭身死髑髏行萬里原注憕及盧奕並傳首百年事往誰復省一丘榛莾無人祭荒碑半折就磨滅後人空解傳其字殺身不畏真丈夫自古時危知烈士俗書小技何足道嗟我但欲揚其事寥寥獲麟數千載末學褒貶多非是髙文大筆誰復作黜臣餓夫湏有待紛紛後世競著述紙墨徒為史官費郤嗟何獨此事然搔首碑前空嘆慨和陳器之詩四首朝應天原注應天寺有五聖御容官于洛者至則首謁唐衰五季更披猖社稷反手㸔興亡山河分裂流戰血積骨被野號豺狼中原正朔不出境九州豪傑争侯王生民禍難寃痛極腥戮上達干穹蒼真人龍飛萬物覩天命自至誰能當靈旗指揮四海一氛祲殄滅和風翔降王賜第奉朝謁九服効職争梯航百年積累到今日運祚方與乾坤長佛宫原廟廣孝敬嚴致守衛勤烝嘗隂隂祕寢鎖遺像矗矗畫㦸羅蕭牆衣冠具列虚仗儼龍駕不反遺弓藏子孫億載千萬世水與清洛流湯湯過韓城周京無人弔禾黍七雄按劍分周土秦人匹馬出函闗六王割地愁為虜宜陽古堞故韓都地接强秦争戰苦謀窮運去竟亡國從長蘇秦亦何補諸侯已盡秦巍巍嬴氏己亡秦不知始皇自是呂家子宗廟薦享真何為山河百戰移陵谷宫殿成塵埋寶玉秋風壞塜長荆榛落日空城散樵牧今古悠悠共一丘争强蝸角欲何求誰似令威仙骨健千年重向故鄉遊弔連昌唐日西頺半明滅長彗掃天流戰血六龍不復入東都原注唐自安史後至昭宗東遷終不復幸連昌己有狐狸穴宫前茫茫洛陽路漢甲朔兵幾回度火焚馬蹵百戰塲盡是舊時歌舞處遊魂不歸宫樹老茂陵金玉人間寶春耕迤邐上空山夜燐青熒照秋草女几巉巉青插天東流洛水自潺湲興亡一覺繁華夢只有山川似舊年鹿仙山真人朝天去不還千年鹿跡留空山空山寂寞何所有野殿荒凉松檜寒桑田海水移今古興亡萬變誰能數五雲深處駕飛龍應笑人間換朝暮神仙不與世人期騎鹿安知不復歸朝嵐夕靄山秀潤應有靈丹相䕶持長生可求仙可致浮世腥膻何足嗜君不見漢時九江梅子真一日辭家隐呉市長安仲春二首長安仲春七日風蒼茫頓撼天地同應門縹闕岌欲動况我窮巷連蒿蓬暮寒巻雪連芳草平門萬屋青城縞無言桃李終黙黙得勢泥塗常浩浩夕暉入屋人氣活勞苦羲和間何濶斗杓東指今未行要使燭龍聊潑刺長安花繁仲春月北風倒山雨成雪窮巷下里袴􅃭盡老翁稚兒骨欲折吾人諳事不復驚以手扣額願天晴夕陽纔升已復晦積雲如山那肯退贈呉孟求承議二首我生仕宦求餬口敢憚水浮兼陸走朅來京口見花落歸去西風未吹栁山尋北固初知路水飲中泠未盈缶徒勞結束解書劍未覺塵埃生戸牖𤓰洲澄江曉如鏡照水自覺秋容瘦因公忽致舊酒壷恍如夢覺南柯守我非初平叱羊口江中浪作羣羊走金山五日厭僧粥揮榜瓜洲纜古栁晨興但怪妻孥喜故人致饋羅盤缶起傾殘榼得餘瀝洗醆再酌開蓬牖風雲惨淡秋已嚴桑榆摇落山初瘦軍厨醇味尚煩公應記踈慵窮太守秋蔬荒園秋露瘦韮葉色茂春菘甘勝蕨人言佛見為下箸原注俗言八月韮佛開口芼炙烹羮更滋滑其餘鎖屑皆可口蕪箐脆肥薹葅辣藏鞭雛筍纎王露映葉乳茄濃黛抹已殘枸杞只留枿晩種萵苣初生甲南來食肉忘肉味久思吾土牛羊茁軟炊一飽老有味痛飲百壷今不説蒲團齋罷欠伸時自覺少年心解脱𤓰洲謝李徳載寄蜂兒木𤓰筆𤓰洲蕭索秋江渚西風江岸殘紅舞津亭永夜守青燈客睡朦朧聴江雨青罇曉酌遣懐抱但恨鬰鬰將誰語敲門忽得故人書洗手開緘見眉宇蜂兒肥膩愈風痺木𤓰甘酸輕病股銛鋒皓管見還愧老去筆硯生塵土北歸飄泊亦何事篙工已束横江艣天寒應客太昊墟當遣何人具雞黍贈晁二原注走筆約旡咎同赴大尹龍圖四丈羔酒之集昔者與兄城南鄰未省一日不相親誰令僦舍得恝濶此事我每懐古人逾旬寒熱不可說遍體戢戢生赤鱗是身非有病亦幻調御未伏猶酸辛布衾䝉頭但欲睡瞥見簷雪如飛塵豈無杯杓與酬酢口舌未肯親芳醇平生相逢百不問斗酒倒盡纔逡廵﨑嶇行世得皆妄嵬峩就醉事最真殘年峥嶸欲無日晴雲浩蕩己有春栁黄梅破最佳絶京兆羔酒仍慇懃和定州端明雪浪齋中山士馬如雲屯號令惟覺將軍尊熊旂犀甲羅左右金鉦鳴鼓喧朝昏少年畎畝老為將誰能復記躬耕村東坡先生事業異道岐不得安脩門眼前富貴念不起惟有山林勞夢魂榛中竒石安至此坐䝉湔洗見本根奔流驟浪勢萬里至畫乃掃筆墨痕黄牛三峽固細事赤壁長江何足論能令萬古蛟蜃怪么麽入此玻璃盆扁舟獨往則不可平生致君言具存柯山集巻十二
