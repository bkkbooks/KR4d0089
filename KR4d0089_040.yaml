body:
  text: 柯山集卷四十宋張耒撰序送秦少章赴臨安簿序詩不云乎蒹葭蒼蒼白露為霜夫物不受變則才不成人不涉難則智不明季秋之月天地始肅寒氣欲至方是時天地之間凡植物出于春夏雨露之餘華澤充溢支節美茂及繁霜夜零旦起而視之如戰敗之軍捲旗棄鼓裹創而馳吏士無人色豈特如是而巳于是天地閉塞而成冬則摧敗拉毁之者過半其為變亦酷矣然自是弱者堅虛者實津者燥皆斂藏其英于腹心而各效其成深山之木上撓青雲下庇千人者莫不病焉況所謂蒹葭者乎然匠石操斧以遊于林一舉而盡之以充棟梁桷杙輪輿輹輻巨細強弱無一不勝其任者此之謂損之而益敗之而成虐之而樂者是也吾黨有秦少章者自豫為太學官時以其文章示豫愀然告我曰惟家貧奉命于大人而勉為科舉之文也異時率其意為詩章古文往往清麗奇偉工于舉業百倍元祐六年及第調臨安主簿舉子中第可少樂矣而秦子每見豫輒不樂豫問其故秦子曰豫世之介士也性所不樂不能為言所不合不能交飲食起居動靜百為不能勉以隨人今一為吏皆失巳而惟物之應少自偃蹇禍悔隨至異時一身資養于父母今則婦子仰食于我欲不為吏亦不可得自今以往如沐漆而求解矣豫解之曰子之前日春夏之草木也今日之病子者蒹葭之霜也凡人性惟安之求夫安者天下之大患也遷之為貴重耳不十九年于外則歸不能霸子胥不奔則不能入郢二子者方其羈窮憂患之時隂益其所短而進其所不能者非如學于口耳者之淺淺也自今吾子思前之所為其可悔者衆矣其所知益加多矣反身而安之則行于天下無可憚者矣能推食與人者嘗飢者也賜之車馬而辭者不畏徒步者也茍畏飢而惡步則將有茍得之心為害不既多乎故隕霜不殺者物之災也逸樂終身者非人之福也送李端叔赴定州序某為兒童從先人于山陽學官始見端叔為諸生某雖未有知意巳相親後幾二十年端叔罷官四明道楚某又獲見某時巳孤端叔弔我悲懷如骨肉後凡再遇于京師今其再也然端叔每别數年一見其議論益奇名譽益高今朝廷士大夫相與稱説天下士屈指不一二必曰吾端叔也元祐八年蘇先生守定武士願從行者半朝廷然皆不敢有請于先生而蘇先生一日言于朝請以端叔佐幕府蘇先生之位未能進退天下士故用子如此然其意可知也某蘇先生門人之下列也其親慕端叔不足怪庚午某卧病城南門無犬雞晝卧愔愔端叔嘗夜過我以燭視我面目見疾有間喜動詞色訪覔醫藥以至無恙我之道藝無取名譽不振端叔獨拳拳于此何也然端叔與豫外家通譜于我舅行也豈其出乎此非耶八年十月過我告以將北求豫言為贈行豫在交遊中巳號為多言其敢有愛于子為今中國患者西北二敵也狙伺我久矣西小而輕故為變易北大而重故為變遲小者疥癬大者癰疽也自北方罷兵中國直信而不問君臣不以挂于口而慮于心者數十年矣吾知其故誠知彼之不能輕棄吾之重幣也有司如故事嵗時發幣車馬出門而北顧無事矣凡為是説者謂非敵情則不可然人度量相逺未可以什百計也世固有得一金而喜者何必金帛數十萬亦有得國于人而不厭者數十萬金帛未足賴也往趙元昊未反時中國不為備禦猶今日之信北也一旦不遜中國震動視其治軍立國驕逆悍鷙豈特河隴間一羌酋也吾安能復以羈縻其父祖者制之也哉且雄傑之才未嘗絶于世不在中國必在外裔高皇帝以氣吞中原之雄而冒頓張于胸奴高帝終無以困之魏滅蜀晉滅吳大敵巳盡而苻石騖于中國祖宗芟夷僭亂天下聽順無復偃蹇而久之元昊叛于羌自是以來又數十年矣某聞今北邊要郡有城隍不修器械苦惡屯戍單寡然跬步強敵而人不懼者誠信之也梟鴟不鳴要非祥豺狼不噬要非仁也見其不鳴謂之孔鸞見其不噬待以犬馬吁亦過矣定武敵衝也其容有悔乎某頃在洛陽與劉幾者語邊事幾老將也謂某曰比見詔書禁邊吏夜飲此曹一旦有急將使輸其肝腦而平日禁其為樂為今役者不亦難乎夫椎牛釃酒豐犒而休養之非欲以醉飽為德所以增士氣也某聞定武異時從軍吏士豐樂豪盛而今燕豆蔬惡終日受享腹猶枵然官吏貧窶有愁苦無聊之心且朝廷既委所當費而不愛矣將軍將重兵臨方面天子屬以何事而與持籌小吏日夜計口腹之贏此何為者也真能遂不費一錢才得幾何哉子從辟以佐帥軍事與有責矣挾端叔之學問詞章而從蘇先生如決大川而放之海是則豫無以贊子矣送吳怡序吾友吳熙老好學樂善敏于為吏不茍于其職嘗主簿于蘄之羅田部使者才之使尉黃岡豫舊與之相聞而來黃岡也豫方坐事屏居而熙老獨喜從豫遊豫謂之曰豫棄人也又負罪于有司子與罪人遊且纍君熙老不謂然尤喜豫翰墨言語得之輒寶藏豫年老多病學問日衰落文字尤荒梗熙老所求十不能答一二而熙老意益勤不倦夫人之好惡之不可解如此居黃岡無數月又遷蘄水丞將去黃求豫言贈其行豫為之不能無言曰子盍觀于貨乎所操者愈奇則藏之也愈深知之者愈寡然一旦而得所售則萬金之直有不較而樂輸之者方其未售也閉肆而處終日寂然其鄰里莫知也而持盤賣餅兒日一操盤而出自譽其貨呶呶也十人之聚則往即之自旦至夜勞力如此得百錢之直之外則偃然有過望之喜矣夫所操者不厚則自處也薄夫自處也薄則亦無所不至矣其理然也君子進德修業夙夜強學其所操者豈萬金之貨也哉吾願熙老好學愈勤樂善愈富為吏而有賜于民多積而深藏之自愛而重出之則將名譽充于四海出入紫闥訏謨黃閣也可跂而俟也敢以是為遺行之言曹昧字昭父序大梁曹昧涕泣告豫曰我不幸蚤孤既長而族人言爾先人名爾昧字爾曰昭父豫實用之而未能言其説子盍為申言之乎豫曰昧之必昭譬之夜必有旦晦必有明也莫或使之而理未嘗不然其在人則善惡是巳為善于家而受爵于朝車服以旌之名號以表之為不善于幽而刀鋸斧鉞從之其始也人莫或知之而其著也莫之能掩詩云潛雖伏矣亦孔之昭子先人之訓子至矣豫雖欲言之何以復加子敬之哉楊克一圗書序甥楊克一夢人授圗書凡三十有一體大抵皆其姓名字變易迭出頗奇惟古人有言夢者想也形神所不接而夢者因也夫因者想之變其初皆有兆于豫心遷流失本其逺也巳甚故謂之因然其初皆想也而世不能明其故以所因者為非想而得夫使如至人之無想歟則無夢矣豈有有夢而非想者哉豫見爾之好圗書幾癖矣心思手畫惟怪之為求則其夢授于異人何足怪哉好射者夢良弓好樂者夢奇聲何則志固在是也爾以為是三十一圗書者皆非平日之所思則正昔人之所謂因者也精神遷流何怪不有古人或以考吉凶明將來三十一圗書曷足怪也哉爾以是思之將復有得矣圗書之名豫不知其所起蓋古所謂璽用以為信者克一既好之其父補之愛之尤篤能悉取古今印法盡録其變謂之圗書譜自秦漢以來變制異狀皆能言其故為人篆印璽多傳其工有自逺求之者數為豫言豫不省之獨愛其用心不侈致精于小事末務故併録焉祕丞章蒙明發集序古之論人考其人不計其功士固有其才可以有為而不幸不及施與既施而中奪者何可勝數而中才常人乘時以功名顯者世常有之孟子曰若夫成功則天也夫成敗係天者其未可以賢不肖必也司馬子長論李將軍為將其言哀痛反覆深悲其無功以為百姓知不知皆為垂涕至論霍去病無他美獨曰常有天幸不至乏絶夫子長不少假借于屢勝之去病而獨拳拳于老死之李廣何哉彼惟深痛夫庸人冒時以取名而豪傑之士制于命而不得少就其志故其與奪之際如此嗟夫豈獨人事哉凡物亦然夫夏生殖而叢棘能有所庇疾風烈寒大木百圍僵而死秋水時至溝畎有一溉之功而嵗旱淵竭江河不足活魚鱉物固繫其所遭者哉今年春豫遇友人會稽章邦老于宛邱一見豫再拜泣涕出其先人祕書君詩文三編及其行狀求豫文以為之序其文章議論甚髙而嘆其不大設施也潘大臨文集序士有聞道于達者一會其意渙然不疑師其道治其言終身守之而不變甚者或因是以取謗罵悔吝而不悔其心視世之樂無足以易之者亦可謂有志之狷士矣彼其心以為不有得于今必有知于後故甘心而不辭夫既巳盡棄世俗目前之所樂而獨待夫寂寥不可知之後世則亦可悲矣豫友潘大臨字邠老其人也邠老故閩人後家黃州崇寧中豫以罪謫黃州與邠老為鄰邠老少學為人則巳不能合其鄉人衆不悅之邠老獨與當世知名士遊往往屈輩行與之交嘗舉于有司與千百人偕進偕退無知其才而力振之于困者後豫蒙恩去黃居于淮隂聞邠老客死蘄春豫為之太息出涕政和之初邠老之子戅既免喪拜豫于宛邱出其先人之文章若干卷求豫為序豫知邠老為詳義不得辭而自視亦世之窮士也其勢力曷足振邠老于無聞未必不奪邠老之文而并棄之也而邠老生死之不遇如此送秦觀從蘇杭州為學序秦子善文章而工于詩其言清麗刻深三反九復一章乃成大抵悲愁悽婉鬱塞無聊者之言也其于物也秋蛩寒螀鵯鵊猿狖之號鳴也霜竹之風氷谷之水楚囚之絃越羈之呻吟也嘻秦子內有事親之喜外有朋友之樂冬裘而夏絺甘食而清飲其中寧有介然者而顧為是耶世之文章多出于窮人故後之為文者喜為窮人之詞秦子無憂而為憂者之詞殆出此耶吾請為子言之古之所謂儒者不主于學文而文章之工亦不可謂其能窮苦而深刻也發大議定大䇿開人之所難感內足以正君外可以訓民使于四方鄰國寢謀言于軍旅敵人聽命則古者臧文仲叔向子産晏嬰令尹子文之徒實以是為文後世取法焉其于文也雲蒸雨降雷霆之震也有生于天地之間者實賴之是故繫萬物之休戚于其舌端之語默嗟夫天地發生雷雨時行子獨不聞之而從草木之蟲危枝之翼鳴呼以相求子亦窮矣夫古之所謂儒者所用之國無敵若臧文仲叔向子産晏嬰令尹子文其望孔子亦逺矣而其功烈亦足以振顯一時故猶能以儒者之效名一世夫不足以治國而能知今古考妖祥紀事實多聞而博通則古太史氏之職而初不以是為儒者也楚左史倚相能讀三墳五典八索九邱而楚之治不責倚相由是言之古之論史與儒異事而司馬談為太史號通古今善文詞猶曰文史星厯近乎卜祝之間主上以倡優畜之其尊禮不如公孫丞相汲黯此則漢之初猶有古之遺俗在也嗚呼儒之名實不正久矣自漢以來聖賢之學廢而孔子之徒皆以其師之書自重于世聚徒而授之若是者當時皆以儒之名歸之而司馬談序九流儒者才當其一彼未嘗見其真而信當時之所指故從而論其失而班固以為出古司徒之官嗚呼何其陋也儒者之治天下九流之列皆其用也顧與淺術末數各致其一曲者同哉吾意今儒者之所學古大史之流而非世之所急也子享其全無食其餘據其源無挹其流子方從眉山公其以豫言質之而歸告豫也送張堅道人歸固始山中序豫元豐末年與至柔生會豫宛邱豫時年壯嗜酒馳騁世樂雖知至柔懷道而未暇問也爾後絶不相聞至今蓋十有八年而豫出入朝廷用舍榮辱之變厯之傋矣退視其軀亦駸駸于衰老疲病之境矣建中靖國元年出守汝陰一旦至柔惠然訪豫于郡齋視其精爽動作與宛邱見時不少異既携其平生所嘗試之方授豫以濟其病又教豫以養性之妙其言曰大道甚簡守心而已守心無他守一而已靜一之極則玄通四達而真氣應之大非意之所能測言之所能盡也得者知之矣真氣來降則百疾除而永年矣經曰無視無聽抱神以靜形將自正必靜必清無勞汝形無搖汝精乃可以長生老子曰虛其心實其腹弱其志強其骨心虛志弱則腹自實骨自強矣是道也智者得之為止觀司馬子微得之為坐妄皆一道也此皆真人修身之要而今人忽之乃苦其形骸妄想變怪吞餌金石去古道逺矣豫三復其言因盡屏其平日之所聞伏而思之若有悟焉抱朴子談道數十卷而曰若夫至道則尺素而足信謂是乎如吾至柔之論則尺素為多矣至柔隱居固始之野人莫見其面而時為人治病將歸求豫書豫書不工因志其所教以告世之好道而不得其要者賀方回樂府序文章之于人有滿心而發肆口而成不待思慮而工不待雕琢而麗者皆天理之自然而情性之道也世之言雄暴虓武者莫如劉季項籍此兩人者豈有兒女之情哉至其過故鄉而感慨别美人而涕泣情發于言流為歌詞含思凄婉聞者動心焉此兩人者豈其費心而得之哉直寄其意耳豫友賀方回博學業文而樂府之詞高絶一世携一編示豫大抵倚聲而為之詞皆可歌也或者譏方回好學能文而惟是為工何哉豫應之曰是所謂滿心而發肆口而成雖欲已焉而不得者若其粉澤之工則其才之所至亦不自知也夫其盛麗如遊金張之堂而妖冶如攬嬙施之袪幽潔如屈宋悲壯如蘇李覽者自知之蓋有不可勝言者矣許大方詩集序同塵子許君大方吏于海陵謂豫言平生仕宦四方所至輒為詩句文篇未嘗廢也亦輒集為一書求人為序取以冠于篇首今海陵之集將成矣子其為我序之乎豫曰士方其退于燕間寂寞之境而有以自樂其樂者往往英奇秀發之氣發為文字言語超然自放于塵垢之外蓋有可欣者然一行為吏此事便廢敲朴喧囂牒訴倥偬既已變易其平生矣風雲之觀溷于泥塗泉石之想變于闤闠俗慮日進道心日消嗚呼士之道藝不進者以此許君以瀟灑出塵之姿屈首徼祿于小官又吏于僻逺職事之外宜其有憔悴無聊之歎尚何暇注心于筆研文墨之間耶然既巳粲然成編矣其中非有過人者其能爾耶是豫所以喜為之序也宗禪師語録序諸聖傳心不由文字從來建化咸立門庭蓋言為道詮執之則為大病語乃聲法透得方具少分則夫言亦末矣四祖宗禪師黃龍心之嫡子臨濟玄之裔孫學最上乘悟第一義遍參尊宿法席歸住四祖道場雄啓度門明揚政令雖洪鐘巨震固嘗動地雨花然古澗寒泉飲即喪身失命至于拈槌舉唱斯辨宣揚門人記為後録若干卷已丑孟冬其門人義和携以示豫求序冠其篇首勉為書此幸無誚焉錢申醫録序豫嘗愛太史公述倉公傳為記自齊侍御史咸至齊文王病凡數十人其察脈觀色所用藥劑湯尉之法皆載之以為後法所謂黃帝扁鵲書今巳不盡見而其遺法往往見于此世醫所宜刳心而學者也尚何議焉豫頃年謫官齊安鄰郡蘄春有龎安時者高醫也其于黃帝內外甲乙諸書深矣豫嘗從之遊喜聞其説而不能盡究也居無幾何安時死豫為志其墓因求其平生所嘗治病或奇證變候有人不能曉者使具其説與所用藥欲載之墓志之後以為後法而其家不甚曉知雖有所疏陳數十條皆無倫敘勉擇十餘事載之而豫至今以為憾也近宛邱間居吳人錢申以醫録授豫得之欣然蓋申善醫而著為録其治疾之嘗效言其察脈觀色之方而往往著其藥物之劑嗚呼其用心可見矣憾豫不學醫不能與君上下其論願益勉之求世之高醫而問焉子將有得焉李德載字序表弟李成甫名公輔告豫以不安其字也求易之詩不云乎其車既載乃棄爾輔載輸爾載將伯助豫無棄爾輔員于爾輻屢顧爾僕不輸爾載夫車之所載或安焉或輸焉繫之于輔之棄與不棄而已則輔之于車功亦大矣雖然輔之于物有功于車而非車也考一車之物而輔不與焉然正六轡謹輪輻僕在前焉伏軛而輔不至則車不安登險而憂傾涉淖而憂濡視車中之載如寄物焉且天下之物固有相須不同域而相成者豈獨輔也哉千金之裘成于工人之寸針南越之箭激于飛鳥之遺羽玉藴于石而金發之兵切于膚而甲拒之故其在人則學是也夫學之于人非性之所素能也而性不得學則不明故夫子曰我非生而知之好古敏以求之夫人之于天者其道素具矣四端之于我非外鑠我者也堯舜之于塗人其本則一而巳彼為是堯舜塗人之别者學不學異也性在巳學在物自外而視之相去亦逺矣而堯跖由之物固不能無所待而獨成哉夫學有道道有序循其序而積之者行而能逺涉而能高下則鳥獸蟲魚器械服物之理無不通中則修身正家治天下之業無不立上則達性命通死生官天地府萬物獨立于萬物之上而無與為侣而學庶乎至矣雖然有患忽小而務大躐等而求至者吾惡之久矣自燕之秦者必之晉自魯之楚者必厯衛天下之所共由而不能越者也夫無見乎小而能明大與不涉乎等而能速至者其可信也哉故保信以為車力學以為輔而載爾德焉則周流天下徜徉海外以求子所欲其有不得者乎子以德載易之柯山集卷四十
