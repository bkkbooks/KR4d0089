body:
  text: 柯山集卷十宋張耒撰七言古詩有感三首郁城本自二師謀騎士拔劍猶封侯董生明經守正直白首區區相侯國參差世事足嗟歎我笑羣兒較目前可能董子之榮辱乃在封侯得失間羣兒鞭笞學官府翁憐癡兒傍笑侮翁出坐曹鞭復呵賢于羣兒能幾何兒曹相鞭以為戲翁怒鞭人血流地等為戲劇誰後先我笑謂翁兒更賢南風霏霏麥花落豆田漠漠初垂角山邉夜半一犂雨田父髙歌待收穫雨多蕭蕭蠶簇寒蠶婦低眉憂繭單人生多求復多怨天工供爾良獨難題大蘇淨居寺平生愛山如好德未嘗一飯忘泉石大蘇山下松柏林路盡重門照金碧思公得道神所相指示巖幽駐瓶錫天台妙教源欲啓來此一酌曹溪滴兩公道場守龍象兵火暫晦終輝赫撞鐘伐鼓食千指皆二大士之餘力縈紆石磴造山頂上有玉人方燕寂北軒三伏飛冰雪一日掠盡淮山色東遊塵土我實倦道遇化城聊暫息青鞋布襪舊家風此身終效名山役客過嵗窮北風卷平楚張子畏寒深閉戶叩門過我者為誰束帶出見亦良苦俯眉謂客子勿瞋我心善煩勿多語天寒酒賤曷不飲安用造謁勤如許謁客入門投刺吏翩翩我非欲見禮則然異哉賔主兩無語客起疾走如避然我巳不恭愧昔賢忍使塗炭朝衣冠人生暫聚鴻集川春風吹飛何後先迎客城門抱關皆老兵問客來早天未明我笑老翁勿嘲訕我愧古人百千萬道傍赫赫翁所見寒熱郡國欺鄉縣人之所畏敢不畏嗟我此翁安得慢局中晝睡鳥啼花開千萬思春色醉人成午睡燒香掃地一室間藜牀布枕平生事君知章華久寂寞楚夢無人憚青兕東風轉野作晴雷蕩蹙山川作紅翠白日下照七澤寬孤城樓觀失餘寒頗怪故山頻入夢年來真厭楚人餐園花盛開秬病不能觀作詩諭之東風著花花披靡花風吹人人欲醉老翁逄花如啜醨強自挹酌終無味鬬紅鬬緑態千萬長笑花工夸幻事若知空色無異觀世上何曽有桃李小孤山一峰枝水孤劍立古廟開簾雙臉紅水邊古木老龍蟄山下水色磨青銅我來扁舟望有禱萬頃春水清溶溶明神報我意加厚嗟我薦獻愧不豐重遊知復在何日俯仰天地身飄蓬初伏大雨呈無咎初伏炎炎坐湯釡長安行人汗沾土誰傾江海作清涼玄雲駕風橫白雨普陀真人甘露手能使渴乏厭膏乳且欲當風展簟眠敢辭避漏移牀苦清貧學士卧陶齋壁上墨君淡無語翰林但解嘲苜蓿彭宣不得窺歌舞聮詩得句笑出省䇿馬涉泥歸閉戶牀頭餘榼定何嫌窗外石榴堪薦爼謝黃師是惠碧瓷枕案此題一本作師是貺碧瓷枕短篇償值鞏人作枕堅且青故人贈我消炎蒸持之入室涼風生腦寒髮冷泥丸驚夢入瑶都碧玉城仙翁支頥飯未成鶴鳴月髙夜三更報秋不勞桐葉聲我老耽書睡苦輕繞牀惟有書縱橫不如華堂伴玉屏寶鈿攲斜雲髻傾到陳午憩小舍有任王二君子惠牡丹二槃皆絶品也是日風雨大寒明日作此詩呈希古初來淮陽春巳晚下里數楹聊寢飯此邦花時人若狂我初稅駕遊獨懶任王二君真解事來致兩槃紅紫爛天姝國艷照蔀屋持供佛像安敢慢江湖逄春豈無花格頑色賤皆可揀誓觀中州燕趙態一洗千里窮荒眼風波厯盡還故郡此願誰知輒先滿那知中夕忽凛烈卧擁牛衣眠失旦名園泥淖安可入坐惜殘芳風雨散東鄰夫子亦嗜酒卧聽午雞方起盥晴明猶及一寓目我老尚能揮大盞次韻答天啓黃鍾無聲登瓦釜蔡子青衫在塵土逼人爽氣百步寒知子胸中有風雨三年河東走鐵馬絶口魚蝦便酪乳歸來萬卷付一讀不學兒曹用心苦周瑜陸遜久寂寞千年北客嘲吳語莫徒彩筆雲錦張要是寶劍蛟龍舞天兵百萬老西北快馬如飛不出戶眼看六纛出麒麟走取單于置刀爼麞猿圖隂巖萬古無纎塵木石翠潤無冬春時哉兩猿挂復蹲其一抱子為屈伸下有遊貆意甚馴雄雌嬉遊循水濵沐猴遇麞愕欲奔據髙自得俯而捫懸之門堂閲疑真妙哉易生筆有神以此成名以終身謝錢穆父惠髙麗扇三韓使者文章公東裔守臣親掃宫清嚴不受槖中獻萬里歸來兩松扇六月長安汗如洗豈意落我懷袖裏中州翦就霜雪紈千年淳風古箕子聞蛩有感遙夜飛螢動秋思獨卧空山驚晚嵗可堪六月已聞蛩日暮咿咿響庭際關河多風氣蕭索碧樹先秋早搖落鳴機夜織常怨寒白紵吳衫苦輕薄年年促織誰最悲堂上美人愁翠眉清砧搗練對殘月玉筯啼紅裁逺衣唐風詩人勸其主行邁苦遲嗟嵗暮山城聽汝巳三年三年白髮多于故飄飄秋夢到江湖我欲東歸鱠碧鱸安能為爾將雙淚嵗嵗風前沾客裾赴亳州教官次韻和中書錢舍人及亳州守朝美叔見贈久知踈慵難應接勉強一官親訟牒羈窮正似鳩無巢擺去不如魚有鬛從來書史鈍蹊徑更歎詩騷窮事業幾思狐白易絮纊羞裭舊服求新夾又憐夸毗竟何得把玩區區一蚊睫久知趨向合飢寒正藉文章漫嚅囁紫微丈人椽作筆誰得羸師傳諜諜知擒敢慢武侯縱有穽前知魯侯敜荒蕪滿編求指摘望以餘光分暐煜乃蒙稱屈力褒揚不意糞壤藏諸篋獲如丘陵飽則可良御不悅猶非獵平生遇賞有君子處世雖鈍吾知捷清間得食學官祿願以詩書填吻頰牙懸喜校鄴侯籖藤織新成沈郎笈朝公聲名三十載餘事筆蹤傳法帖紫芝眉宇望不逺屈指數日無旬浹黃衫健步書見賜紫誥除官等何躐久懷薄技待後乘宣管盈囊紙來歙坐乖前計空惋悵袖裏從今雙手壓醉歸應被官長瞋來飽徒勞方朔臘暑毒不可過又每為賔客見擾午寢不安奉懷邠老之無事也桃李成塵鶯未老梧桐未落蛩巳多杜門髙卧作間計挾䇿讀書如懶何頗遭褦襶驚午夢正坐熱行官不呵柯山大隱羲皇上清風一榻無經過和立之消梅木奴度淮輒為枳后皇嗇之理應爾青梅千里江南春何時相逄車馬塵我衰病齒不能酸微香觸鼻舌生泉想見曹瞞老狡獪指林駐馬三軍前送歐陽經赴蒲圻異時堂飲洋川酒幾喚扁舟度樊口兩山泉石多故人送子南行一回首蒲圻小縣聊讀書當使里閭無呻吁結束歸來接臺省不應厭食武昌魚蘇叔黨呂知止許下見訪叔黨有詩戲贈以此奉答三年齊安有江山可當中原故人靣北來塵埃逄故人眼前卻作江山見君似江山定不疏能出吾言世亦無蘇郎下筆妙無敵呂郎與談驚未識鳯雛驥子未宜輕囊空各有千金璧贈君錦繡與瓊瑶報我琅玕金錯刀溪毛潢汙未相棄嵗暮與君甘緼袍不寐荒庭雨多秋草侵秋蛩相語秋夜深草蟲暗飛羽格磔星河影髙天淡白騷人多懷夜不眠老松微吟風颯然山川浩蕩何日還晚空漫漫白露寒對蓮花戲寄朝應之平池碧玉秋波瑩緑雲擁扇青瑶柄水宫仙女鬬新妝輕步凌波踏明鏡彩橋下有雙鴛戲曽託鴛鴦問深意半開微斂竟無言裛露微微灑秋淚朝郎神仙好風格須遣仙娥伴仙客人間萬事苦參差吹盡清香不來摘上元旦早起贈同遊者夜來人散殘更月曉陌空存舊車轍彩燈城市巳春風寒木人家猶臘雪強起相逄酒未醒殘膏宿火尚熒熒歸來更拂障泥錦重約黃昏信馬行贈李德載男兒當讀五車書輟業應須蓋棺日人生事業要強學譬彼欲耕須逮濕李郎落落竒丈夫美玉應須作圭璧請將便腹包五車汲汲講摩如故疾蒙恩守東魯不意流落之餘聖朝升之藩鎮感而成詩復用李文舉韻我詩四十心不動寵辱悠悠付春風聖朝湔洗諸老成顧我衰晚名亦共魯人詩書久寂寞間壁不歸書府送道衰洙泗忽千載後來為政誰輕重平時擇守要有補豈但坐使民供貢吾邦邑子有遊夏未肯無言受愚弄天王有意蘇疲俗何術與紓鞭箠痛應須問道東家翁必也斯民使無訟逰武昌一葉橫江凌浩渺李君見我迎門笑鵝黃初熟醅旋壓書室焚香地新掃淋漓歌笑不知夜竹榻枕藉眠諸少老人被暖覺獨晚驚起東南日如燒四明陳子定愛客生火寒廰邀我到盤殽香潔具俄頃鱠斫寒魚初出沼仲謀霸氣久寂寞元子亭基尚危峭荆榛荒梗上石磴人物清江開野廟暮投明府快一飲主意殷勤賔屢釂星河破碎歸中夜明日清淮理歸棹王家園館靜人眼挂壁於菟疑欲咬殺雞為黍辦倉卒看畫烹茶每醉飽還家閉門空寂厯勝境目前皆了了兹遊可再誰汝嗇老懶似不能輕矯西山得霜瘦如削蕭寺峥嶸出粉篠幸豫腰髀猶足使與子凌寒恣逰眺春日堂堂春日躍出山郊原草木皆清新千紅萬紫各有態正自酬酢勞精神短籬誰家小桃李雖復幽陋亦可人但知痛飲莫辭病數年幽憂難具陳送孫志康赴髙陽三觴草草豈足飲聊具數刻留君歡年來故友半零落每念及此傷肺肝淮陽窮栖幸見子胸中鬱結為少寬奈何舍我去不顧薄宦謀食何艱難陳郊窮秋苦雨霽積雨未受短日乾念君匹馬走坡坂蒙犯霜雪勤征鞍吾遭坎壈皆自取之燕何得南其轅雖然男子豈常爾且復養此凌雲翰贈李德載二首我家外翁天下士欲以文章付孫子愛君丱角巳食牛屬書筆下無停字願君飽讀大父書學到莫憂名不似重教我輩見風流更以餘波變鄉里長翁波濤萬頃陂少翁巉秀千尋麓黃郎蕭蕭日下鶴陳子峭峭霜中竹秦文蒨藻舒桃李朝論峥嶸走金玉六公文字滿人間君欲高飛附鴻鵠秋曉老人不睡秋夜長五更鼓角鳴東堂悲蛩牀下欲無語黃葉瓦清新有霜雁聲相應江南北斗杓欲下天中央老人山尊有美酒岸中先酌一杯嘗東方東方未明更五鼓星河寥寥寒雁度鐺鐺鳴鐸誰家車陌上驅牛輾霜去北風吹面足踏冰村南早飯天未明年年輸稅洛陽城慎莫後期官有刑寒蛩寒蛩振翼聲騷騷夜深月影在蓬蒿老人雖眠睫不交愁窗人寂燈無膏荒城鳴金睥睨髙北斗下挹江南濤悲笳三奏老雞號晨光出山開泬寥秋雨小酌贈賈七出門秋雨泥漫漫嗟我后土何時乾官曹事休歸舍卧破屋浙浙西風寒弱妻傾榼勸我起稚子笑語爭杯盤我生樂事但如此為爾一醉愁腸寬仕途翩翩鬬巧捷華裾鮮縠相追攀老來百事覺羞恥懶伴兒女塗鉛丹賈郎豪華獨異我粉腮玉指雙鴉鬟清眸侑酒醉百盞肯咀貧甕寒虀酸堂前菊花日以好落砌槭槭梧桐殘當謀痛飲待九日豪氣一壓龍山桓山海愚公移山寧不智精衛填海未必癡深谷為陵岸為谷海水亦有揚塵時杞人憂天固可笑而不憂者安從知聖言世界有成壞况此馬體之毫釐老人行世頭已白見盡世間惟歎息俯眉袖手飽飯行那更從人問通塞將至官坡登一土岡望復州作茫茫夢澤連禾黍斷壠橫岡散平楚登髙試望竟陵城孤煌落日知何處舊逰如夢去莫挽客愁冉冉還如故他年若問鴻軒人堂下薔薇應解語送子野大夫罷兖倅歸汶上愛君記覽老不衰日日早起先鳴雞白頭未蒙國士知佐郡秩滿寂寞歸我辭魑魅得一麾逄君話舊相嗟咨幾年東壁無光輝不知武庫實在兹上書薦君非我職臨分一醉當無辭晨起苦寒夜霜漫屋風折竹我乃與君在空谷平生一衲度嚴寒塊守深爐體生粟大潘借馬貸監河小潘無事仰屋歌妻兒號寒劇雁鵝詩書滿腹將何如舟次安州孝感縣偶感寒疾卧病舟中復大風不可解舟晚方離去船頭風聲鳴萬鼓扁舟繫纜沙邊樹船中病客晝閉篷睡起空江日亭午雞犬蕭條數家縣市聲巳變淮南語長年三老喚不醒一葉波間去如舞和大雪折木季秋木葉未全落西風卷雲飛雪作奔騰傾倒來不停頃刻山川失寥廓白頭老翁仰天歎一生未見可吁愕但悲無食飢凍死何暇更議隂陽錯樵車不來椽數盡仰徹屋茅烹莧藿坐愁窮臘安可度律管未改初冬朔我居堂前有大榆百年老幹龍鱗剝夜聲疑是神物伐參天大枝脆如斫披簷擲瓦事未測起坐明燈徹其幄命乖久遭窮鬼笑當慮壓覆崩厥角鹿山長官當此時髙樓大飲縱歡謔兩邦相鄰無百里誰謂同時異憂樂尚能怨嗟念窮苦喜君于物心不薄百里飢寒仰長官勉充此心救民瘼冬懷二首窗南積雪髙三尺二更月出連窗白爐裏石瓶鳴細泉燈前病叟搘書策家人嵗晚貯梨栗倒榼寒醪有殘滴三杯取醉萬事平兼味重裘定何益山陽賢者有徐子親沒十年哀不巳精誠感天天為悲甘露常沾墳樹枝徐子行年過五十衣不披體常苦飢天公盍使少富足甘露萬斛真何為虛恩浮惠天猶爾安得世人無巧偽和應之簷雀羣兒探雀雛雀母悲且鳴萬物雖異性愛子均一情母心于子誰不憐爾胡棄子當道邊諒非人情不如鳥使之至此必有原自廬山回過富池隔江遙禱甘公祠求便風至黃瀝酒而風轉日行二百里明日風猶未巳又風勢徐緩不奔駛可畏甘公蓋吳將甘寧云江邊古祠吳甘公往來祭禱嚴且恭我離匡山巳經宿舟挽不進篙工慵沙邊朝服遙致禱澆酒未竟天回風一帆百里至還作不徐不疾來雍容我生久巳甘困滯神亦何事特哀窮但疑神理與人異意誠詞直無不通林皇夜泊若平地疑有鬼物驅蛟龍天明旗腳向北指舟子笑語開船蓬元符庚辰某同男秬率潘仲逹同遊匡山六月望日齊安罷官步登客舟過樊口李文叔棹小舸相送遂下巴河上靈巗寺寺有何與很石記云昔孫仲謀伐壽春于此祀天祭江刑白馬故山名馬祈寺有法堂頗華敞因與潘李飲酒賦詩其中明日至蘄陽登梁昭明太子廟遂宿具禱順濟乃發候風林皇港見江中黑物類獺又有尾鬛相逐馳久之激水髙數尺風定而去過道士磯石壁色正青插水中又十里所過五兩磯遂泊富池禱甘公祠晨發富池望匡山諸峰半皆在雲中晡時至潯陽捨舟登陸晚宿太平觀冷翠亭時十八日也十九日過鄒志完晚大雨將醮雨霽中夕醮罷復雨觀人異之二十日逰東林觀神運殿禮逺公像見晉安帝輦逰達磨院遂登白公草堂讀歐陽文忠公題石上五杉閣而歸晚浴東林納涼神運之南望香爐天池化城二十一日出山此其大略其詳屬潘郎潤色風駛浪湧仲逹喜其快因作一篇人生不欲甚快意遲速到家還一致向來白浪涌如山舟中呀呷幾喪氣我師禪祖學不動頗覺蒼茫忘定慧慿河不悔聖所非君勿為笑而為戒柯山集卷十
