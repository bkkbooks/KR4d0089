body:
  text: 柯山集巻二十六宋張耒撰七言絶句初夏謁告家居值風雨偶作二絶春愁已逐鶯花盡野果垂簷緑葉稠天上幾囘飛破鏡端居未折大刀頭高堂終日雨潺潺郤著重裘尚薄寒風雨似秋君莫怪客愁天色兩相闗西忩雜咏三首翠蔓垂簷筍過籬幽禽終日傍忩啼山林勝處平生事他日何妨動我思穿籬兩竹是龍孫風葉蕭蕭便有聞郤到葛陂心未已更將甘雨灑川原稻畦新插緑雲齊雨過溝塍水接溪到舍妻兒勞勤苦白醪缸畔醉如泥别齊安税務忩竹二絶何獨王郎與爾歡一年慙媿碧琅玕葛陂一别知何處見盡人間行路難隨流泛梗雖無定别渚棲鴻亦有情為問竹忩清夜月從今誰解聴秋聲四月二十三日晝睡起幽人睡足芭蕉雨獨岸綸巾几案涼誰和薰風來殿閣不知陋巷有羲皇渡江白髪人驚老阿童横江聊借半帆風郤嗟縳得窮孫皓未似高歌醉閉篷呉王郊臺異時隨舉孝亷郎旗葢相承據一方腸繞閶門祥已定將軍畢竟是呉王題寒溪長老方丈滿坐繩牀百事貧荒溪古屋四無鄰為生易足君無笑渠是人間得計人早起二首滄江初夜雨翻盆將曉風聲戰亂雲籬下寒雞鳴曉苦老人先起自開門風鳴槁葉未辭枝雨濕疎梅欲弄姿地下一陽應蹀躞世間渾未有人知冬至贈潘郎二首荻籬茅屋柯山下賣餅歸來也作冬不見長安競時節車如流水馬如龍五更人語起江城歌笑喧喧天欲明酌酒夀君但一醉百年珍重是人情發孝感裊裊檣烏轉晩空娟娟霜月入忩櫳岸頭楊栁如憐客猶舞蕭蕭五兩風柯山雜詩四首幽人睡足戴綸巾䇿杖開門卯酒醺黄葉滿山烏鵲噪江城秋日少行人蕭蕭茅屋土山前翁媼關門去穫田朝日滿簷雞犬静荻籬深處有炊烟斷㵎横橋臥古槎晩雞嗚處有人家山頭月出疎鐘斷江上風髙落雁斜九月江城霜氣清旅人寒事略經營隔忩便是山前樹永夜葉聲如雨聲絶句九首天髙列岫出林外霜落大江流地中晩日橋邉數歸牧牛羊部分聴兒童樹頭三唱雞賓日門外斜行鴈寄書十月江城霜霰薄滿山林葉亂藍朱曉起山鴉噪作團西園霜木倚空寒風髙斷鴈呼前伴雨止歸雲赴舊山千林黄葉總飛霜寂厯疎梅未肯糚誰信輪囷臥山木心知九地有微陽空山風雨冷蓬茅晨起幽人理縕􅂁深閉衡門且無出濕雲如墨怒江號老去不禁茶力悍兩甌破盡五更眠月團三百真魔物欲乞當壚當酒錢讀書老眼苦眵昏茗飲無端遣夢魂到處相逢真可喜祗應酒是好知聞黄葉桑林赤土岡蓬茅小逕度牛羊似聞流乞之唐汝歎息何人為發倉原注黄累年旱饑流民就食唐汝歲弊寒驕風落山卧聴園木怒濤翻去年慈徳門東雪永夜宫廊喝探喧原注去年春大雪中予以禮官奉欽聖喪事入宿内東門凡數十鋪直廬宫吏逹旦不能寐讀周本紀周公七百年禮樂箕服檿弧紛破除空使遺臣經故國徘徊禾黍歎丘墟齋中列酒數壺皆齊安村醪也今旦亦强飲數杯戲成呈邠老昆仲二首曽嘗玉皇碧琳腴不醉長安市上酤原注作史官時嵗六節賜御醪飲濕先生今已矣啜醪留得與門徒原注東坡云三年黄州城飲酒但飲濕放逐江邉長苦飲壺漿尚敢較醇醨中都光禄多新釀不解隨人得一巵卧聞風聲卧聞風聲吹屋角應掃積雨隂漫漫千山月黑烏飛絶一江星斗魚龍寒臘月下旬偶作嵗暮烟霜澤國寒曉鴉鳴處是柯山地爐有火樽餘酒自起焚香深掩闗春日懐臨汝園西江送上通清汝慿仗雙魚致我詞若向池邉見鴻鴈為言春至苦相思柯山春望先教一雨浄江山便放千林春意還何事東風吹客鴈便教無意戀汀灣正月十八日四首幽人睡足聞春鳥共喜暉暉日滿籬里巷收燈人寂寞鄰家夫婦賃舂歸收燈城市接荒村翁媼耽眠日已暾何事牧童能早起緩驅白牯出柴門道旁蘭若冷于秋迎客開門一比丘夜久無人風露冷空廊飢䑕竊膏油山下書生業讀書荻籬葛蔓避人居最憐無奈窮耽酒時遣羸童致一壺二十八日憶昨秋風吹馬蹄瓦闗分袂涕交揮淮陽春物應如錦猶在柯山送鴈歸二月二日挑菜節大雨不能出久將菘芥芼南羮佳節泥深人未行想見故園蔬甲好一畦春水轆轤聲原注北方治菜畦如棊枰土極細匀汲水灌之次第相及殊可觀也二月五日折梅時經雨梅謝矣江雲霮䨴未全開東嶺微芒日色來獨犯輕寒踏春曉殷勤更折雨中梅十八日寒食清明人意閒春城士女出班班桞黄花白樓臺外紫翠江南數疊山僧允懐惠紫竹杖輕堅滑澤節仍匀上下柯山助老身他日天恩許歸去提擕同踏故園春寒食日作二首荒山野水非吾土寒食清明似去年楊栁插門人競笑荆蠻不信子推賢原注黄岡有官人效北方以麫作子推貫栁插門上者邦人笑之朝寒却覺春衣薄禪誦還將酒盞疎落盡江城千樹雪門前楊桞已藏烏牡丹天女竒姿雲錦囊故應聴法傍禪牀静中獨有維摩覺觸鼻惟聞淨戒香雨霽望樊山金碧江南數疊山雨餘秀色直堪餐仙娥倭堕青雲髻照我衰遲澤畔顔三月二十五日聞鵯鵊雲夢澤南春欲還柯山鵯鵊曉關闗幽人夢覺殷勤聼落月江風尚薄寒絶句二首翠潤園林草木長春歸積雨滿芳塘更無一㸃殷紅色葉底青梅己可甞晴江水滿長菰蒲野鴨鵁鶄欲哺雛誰為寄聲沙塞鴈春來朔野定如何新堂望樊山幽人井臼兩山間鄰里樵漁盡徃還興發登臨窮眼界江南秀色碧雲鬟東堂四首主人憐客置東堂為致炎天十步凉勝事自來非力致江南山色巧相望老翁還作小兒情手種芭蕉為雨聲便有微泉出堂下一泓清徹照軒楹原注堂下種芭蕉數本遂得一泉泓然盈尺殊清徹居止年來如傳舍構堂珍重主人情浮生行止誰能計茍合真須學子荆烏衣更士能呼旦金縷嬌娘解唱歌天與旅人供一笑不然奈此寂寥何末伏日五更小涼幽人短夢不終宵起步星河望泬寥缺月低簷雞一唱露華秋色滿芭蕉秋日二首一庭秋色清如水籬落蕭條日腳殘忽憶淮陽舊庭院出鄰髙葉翠梧寒黄簾朱户狹洞房何事易知獨難忘相思故人雲間月涼夜皎皎出東廂樊山黄葉疎林江上洲西風角怨夕陽樓晩天紫翠凌空闊只有樊山取意秋月季月季祗應天上物四時榮謝色常同可憐摇落西風裏又放寒枝數㸃紅卧病晝眠秋風作惡東堂岑寂似僧居年老身閒不讀書病卧空牀雞唱曉忩前飢雀啄寒蔬東堂初寒創意作竹屏障門屏腳偶得朽梅枝截用之完固質野可喜二首丈室新屏用此君原注如用鄫子之用碧琅玕插古槎根白雲一片當空下䕶此寒堂宴坐人簡􅁽林中老蠧魚年來窮謫尚耽書竹屏風下慿烏几畫作柯山居士圖二絶句幽忩老客寒無睡長聴城樓曉角悲萬里滄溟初浴日暗雞先向草間知歲隂慘澹不可出竹榻地爐聊自安黄葉滿山籬落晩北風吹雨濕荒寒朝寒朝寒夘飲已戰勝煑餅一甌充午飢便是衰翁一日了夜爐茗果亦隨宜臘初小雪後圃梅開二首風格孤高又國香故教小雪發新妝修行嗟我無功力卻使天魔入道塲晨起千林臘雪新數枝雲夢澤南春一塵不染香到骨姑射仙人風露身蒼浪蒼浪鬢髮一衰翁何事年來到骨窮魑魅何常居四裔自憐放逐尚無功西江拂瓦輕霜鉛粉輕東南日出竹忩明小樓下見西江水日日風光無限情二月二十一日東園桃李未開有感二首日慘東風正怒號小園寂寂閉蓬蒿可能春色如人事獨發𤣥都觀裏桃寄語𤣥都觀裏花饒君繁麗奪朝霞劉郎想到長安日葵麥風前一歎嗟自二月末苦雨寒食前一日始晴視園中花乃殊不敗春雲霮䨴弄朝暉清峭餘寒透裌衣最喜園花渾似舊十分春色一分歸微雲微雲霮䨴弄餘春清曉微寒尚著人重理裌衣温夘酒緑隂啼鳥閉衡門絶句二首風掉浮烟匝地囘雨將濃翠撲山來晩涼樓角三吹罷夕照江天萬里開荒山岑寂晩雞號獨閉衡門守一瓢風雨似秋君莫怪客愁逢處易蕭條雨歇二首雨歇山園竹引芽老禪睡起日初斜今朝卻憶香嚴老解㸃溈山一椀茶家童取酒衝泥至酒滿山瓶重莫擕老子欣然一笑起開嘗洗盞對山妻平生平生壯節終難變投老浮名信所遭要路争先寕遽福從來率野屈吾曹題南頓光武祠他日曽休羽葆車可憐宫寺已丘墟雲臺諸將鏘冠劒卻遣嚴光配坐隅發金陵折栁亭津亭折得緑楊枝更看春風向手吹建業城邉春巳老連天荒草燕雙飛呈宜君江城風雨作朝昏愁殺壚邉賣酒人祇有醉時差可喜不應醒坐過新春生日贈潘郎春雨蕭蕭江上城論花與子酒同傾恨君未到淮陽市一見姚黄慰此生謁蔣帝祠過鍾山下二首野塘春水緑迢迢上有東風弄栁條曉日已穿東嶺出輕寒猶欲戰駝毛溶溶野水戲鳬鷖壠麥初長午景遲盡日緑楊閒照水臨風自愛好腰支和李二秀才羡君年少盛遊春顧我無聊似厄陳東市車牛泥到領不勞舉袂障京塵和蘇适春雪八首春城北斗轉招摇寒御初還陣尚囂一夜雪聲欺布被定知貧舍故相撩寒陣須慿酒解圍閒官幸可典朝衣一杯冷落慿誰勸卻有飛花舞入帷白帝隂兵嚴羽衛漢皇老傅振鬚睂撒鹽飛絮渾麤俗盡撥塵言賦好詩溪上泛舟成底事庵前夜立意如何爭知萬頃青青麥絶勝黄河一尺波不死松篁勞借問未開桃李與催糚已饒艷女纖腰舞偏犯貧儒百結裳偏憎遊騎香蹄汙最稱佳人素手團方丈老翁容膝外出門四顧盡漫漫山中景物最幽竒祗欠夫君為賦詩長憶東風吹女几瓊瑶交貫碧瑠璃寒忩凍坐成何事趣喚紅糚遣暖寒卻把吟腸盛美酒更令柔指撥清彈宿盧村逆旅夜宿村南貧主人入門桃李已殘春無人折贈門前栁佇立東風獨愴神紺碧紺碧遥空秋意生深簷當午暑風清老翁睡起支頤坐初聴新蟬第一聲真陽縣書一睡縣舍素絲堂見君堂下小荷葉驚我客中春已空一覺西堂亭午睡悠悠春夢逐春風贈圓明老一粥一齋年已老千經萬論不留心菩提本自非言説黙黙知師得更深方丈小山忩外幽軒數步寛小山幽石對㠝岏説知老子婆娑意且作僧房一衲㸔秋末圭竇齋前菊盛開賦得絶句時秬出未歸幽齋誰與破窮愁蜀錦當軒爛不收白帝屬車千萬乗王輪金轂照清秋秋移宛丘牡丹植圭竇齋前作二絶示秬秸和共我辭家似旅人栽培莫怪倍殷勤明年太昊城中色來作齊安江上春千里相逢如故人故栽庭下要相親明年一笑東風裏山杏江桃不當春夢靈夀寺客居有似鴻遵渚鴻渚相㸔豈有情何事春來頻見夢老僧談笑起相迎聞鵯鵊紙忩未白燭微明鵯鵊枝頭一兩聲卻憶去年桃李後淮陽旅舍聴殘更甯子甯子陽愚飽諳事賈生慟哭漫多愁無言天道何須問畢竟人間春復秋摘芙蓉今年古寺摘芙蓉憔悴真成澤畔翁聊把一枝閒照酒明年何處對霜紅悼亡九首菊花還似去年黄一寸愁心萬事傷獨立高樓對殘日秋風吹得淚千行遥夜新霜凋碧槐三更寒月滿堂階美人化作秋風去只有清魂夢裏來千行垂淚對風烟萬事傷心兒女前曉鏡不須催白髮潘郎秋鬢久蕭然曉梳零亂髪星星病眼昏昏怯夜燈烏几素屏雙草屨百年從此學山僧新霜已重菊初殘半死梧桐泣井闌可是神傷即無淚哭多清血也應乾亦知存沒等浮雲鮮笑多悲失道真卻恐荒唐齊物叟鼓盆真是已傷神山僧老去久忘情笑我多悲白髪生為道人間具煩惱早來林下共修行嵩陽道出建春門同入西都四見春誰謂回頭隔存沒斷膓今作獨歸人欲治煩惱更無方只有頭陀理最長不待存亡始知夢故應交臂已凄涼柯山集巻二十六
