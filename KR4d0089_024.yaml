body:
  text: 柯山集卷二十四宋張耒撰七言絶句春隂驚鴻瞥過不容攀病眼淮邊楚望寒獨卧孤舟對楊栁春風終日在檣竿宫人斜青蛾皓齒作埃塵玉匣珠衾地下身一曲壞墻門不鎖林花開落墓前春奉先寺定知生不出長門禾黍蕭蕭寺後村松柏城南萬丘冡傷心最說內人園至後早赴館二首紅蠟妝梅冷未黏栁條偷暖作纎纎高樓殘白誰家雪盡日天寒不捲簾城圍殘雪寒催曉宫近晴雲暖欲春誰覺風光添一線玉壺漏水報雞人眺二家有海棠去歲花開眺二呼杜卿家小娃歌舞花下痛飲今春花開復欲招客而杜已出守戲以詩調之頗疑蜂蝶過鄰家知是東墻去歲花駿馬無因迎小妾鴟夷何用强隨車復答迎郭侯犢車之句玉壺春酒射朝霞只看纎腰不看花但遣舟迎桃葉女仍須恩賜短轅車清明日舟中書事二首清明不到旅人家乞火鄰船自試茶㺯栁好風低作舞夾船春浪細浮花巢烏噪處緑楊村寒食人家晝掩門麥隴曉風收宿潤烟林午日漲黃昏題海州懷仁令藏春亭聞道山中賢長官種花不肻放春還故知車馬紅塵地催促東風不得閒題緑野亭渺渺孤亭滄海東天連平野四無窮可須戶牖毫端上自攬山河眼界中漫成三首驅除牢愁須酒聖狼藉春色要花紅定知春來無一事苦教有情愁得儂容易得愁即不去苦教春物喚愁生遣愁飲酒大拙計遣誰蹙眉為慢聲閉門春風作往還誰家有花堪醉眠栁腰榆莢爭入眼江梅一枝逺如天題榮子雍陋居二首草舍隆中一幅巾閉門三致漢將軍紛紛自獻知何有終遣斯人了鼎分一室荒蕪孺子貧知君四海入經綸殺身虎口終何補灑掃􅒉除自可人秋日有作寓直散騎舍黃省文書分道山靜傳鐘鼓建章閒天邊玉樹西風起知有清秋到世間曉雨緑滿園林紅已稀濕烟和栁共霏微誰家油壁春寒裏獨輾天街曉雨歸送周六赴濠州户曹二首老顒有婦何妨道一室蕭然尚愧君但恐小喬來丈室却須射虎作將軍從來悟道不由書覿面相呈已有餘麈尾花飛終不近濠梁古鬼解揶揄趙弟男兒何用立竒勳趙弟從軍初不聞但斬郁城侯萬户不須猿臂老將軍贊皇公才高一世有竒功掩卷令人獨想風莫笑狄祠遷武相致人從古是英雄夜來夜來風雨掠餘春晏起蕭條一病身三月長安泥浩浩懶隨車馬作遊人桓溫北征談笑縳姚公靜掃諸陵見洛嵩不用登高笑夷甫正緣此輩使君雄和天啓惠橘詩十年不摘洞庭霜喜見新苞照眼黃但對典刑休嗜味原注天啓辭以橘酸虎賁猶得作中郎題畫二首敗蘆浸水凍灘沙朔雪隨風亂綴花濕翅老鴻鳴未起暮雲山色暗天涯蒼蒼老石守寒叢雪灑林鳩美睡中鶉傍陳根飢更啄雀栖高枿瞑愁風題庭木枯條怪石坐寒禽玉軸髙懸畫萬金歲晚荒畦真在眼寂寥方見此時心有所歎駢脅當車闟㦸先相君冠蓋照秦川六雄未滅君無苦當念杜門公子䖍五更歲事先教蟋蟀催暮雲樓闕殷輕雷五更庭葉驚殘夢知有清秋犯雨來下直留住長安鬢已絲宫廊還見落梅飛暮雲踈雨蒼龍闕不惜障泥䇿馬歸題史院直舍魚鷺屏鐘鼓聲稀下直遲秋暉𥘉轉萬年枝寒㕔盡日誰相對慙愧屏風兩鷺鷥梅花二首便使栁肥終解舞莫驚梅瘦為含酸因風自裊還成態與雪爭姸却要寒天質自清非為瘦仙姿正白不施紅未開如怨開如笑枉乞幽香與北風探春啾啾凍草羣飛雀裊裊高林獨嘯猿忽憶淮南春意動早梅池館斷鴻天雙槐老去相看終慘淡秋來無賴對婆娑任從葉逐西風去要聽庭寬夜雨多晏起晚起翻書日欲西偶然乘興忘遨嬉好書自癖非求利掘冢才須數句詩和人二首臘殘春近獨消魂殘雪長安千萬門青鳥何曾寄音信碧雲剛解報黃昏曈曨曉日漏春光欄下萱叢尚卧霜認得君家門上雪易知何事却難忘天忩鑿屋分將一尺明坐令隔幌見簾屏任從世界傾盆雨只要蕭蕭數㸃聲失性失性摧頽君子鶴忘羞跳擲沐猴冠須知六合梟鸞雜供與閒人靜處看夢至一園池藕花盛開水鳥飛鳴為作二小詩記之偶來乘興不須疑一頃秋香欲發時老子婆娑真為爾百回相見愧鸕鷀平池秋水雨來深無數紅妝出岸隂翠幕深藏知有意白鷗相見本無心讀王荆公詩名實由來不可逃悠悠毁譽亦徒勞臧公已死言終立不是軒裳世祿高雨霽豐隆故犯青冥上列缺應逢返照還樓外細蟾呈窈窕枝間少女故徘徊蹇驢驥伏鹽車飢不行疲牛與爾飽平生子荆自是佳公子亦向人前作汝聲局中晚坐高林晚葉漸疏明雨過長安萬屋青為問西風來幾日夕陽宫殿亦秋聲無題二首風槐已踈遽如許夜蛩雖怨可若何出門屐齒苔㾗滿隱几書塵鼠跡多晚起清秋一枕涼四簷鳴雨下淋浪竹籠燒藥時添火書榻焚香卻閉房鵯鵊整刷衣裾紫翠新曉天風露壓雞晨應知不置蓮花漏長喚林中宴坐人久雨欹簷積雨苔生瓦陋巷人稀泥及門坡下牛羊來逺墅舍旁麻檾接荒村吳江道中懷陸魯望我亦扁舟一散人江湖為洗十年塵筆牀茶竈經過地風月相望亦有神霅溪道至四安鎮苕霅清秋水底天夜帆燈火客高眠江東可但鱸魚美一看溪山直萬錢喜雪走筆呈李宣城三首殷勤寄語宣城宰公事何時是了時病守欣然有嘉思亦須對雪把空巵聒聒庭中爭曲直紛紛筆下判鞭笞坐曹決事輸歸飲須信薛宣稱吏師萬夫餓腹待倉儲三戶窮民守破墟疲瘵不禁鞭撻甚長官對酒且歡娛遊園病來久不上層臺忩有蛛絲徑有苔為報園花莫惆悵故教太守及春來聞蛬二首晚風庭竹已秋聲初聽空階蛬夜鳴流落天涯聊自得今宵為爾感平生二年江海轉萍踪白髮蒼顔換舊容新月窺簾風動竹宣城今夜又聞蛬雨中題壁去年此日泊瓜州衰栁蕭蕭繫客舟白髮天涯歎流落今年對雨古宣州鵁鶄敗荷枯葦一方池溪上鵁鶄坐得知何事月寒風露下攣拳孤影在風枝秋蚊江城落木已窮秋病客初寒欲襲裘暗室飛蚊猶撲面不知天上火西流冬日忽忽新冬無一旬自憐憔悴楚江濵滿前魑魅何曽禦尚愧無功作逐臣預作冬至紫壇曽從奠琳琅親被天人玉冕光今日黃州山下寺五更聞雁滿霜林原注某元祐七年南郊曽與捧皇帝禋帛席左見上冕玉簪白如雪為燭所照出光數尺云九日登高黃梨丹柿已催寒一月西風積雨乾紺滑秋天稱行草卻憑秋雁作揮翰試墨金案氷忩净絶塵破寒龍尾縠生紋澄江清淺汀洲靜忽有蒼螭下吐雲綵花清寒帶雪未成春可得芳菲早向人須遣艷陽歸掌握故教桃李及芳辰送窮年年瀝酒拜清晨風俗新正競逐貧不用為文送窮鬼直須圖事祝錢神寄陳州朱教授三首殷勤寄語朱夫子僧舍花前亦舉觴學舍蕭條官職冷不知誰與戴姚黃欲曉山禽百種鳴最憐啞咤是雛鶯遙想西湖烟栁色深春風露水邊聲春雨江干不肯晴大江櫟岸轉雷霆山頭方丈渾無事掃地焚香看佛經送春二年江上見春歸原注子年春在金陵江上預想重來我未回淹速世間誰料得祗應相遇且銜杯寓寺八首門外清泉浸稻畦西南修竹作城埤川平林斷空明處郤有遙山作翠眉道人鐘梵久寂寞倦客弭車聊靜便我亦雲山閒衲子平生香火舊因緣病卧淮陽太昊城牡丹叢畔過清明那知春暮長江上竹裏招提聽曉鶯江城梅子青時節嫩紫夭紅掃地無修竹滿山連草色郤煩林鳥勸提壺翠眉長好何曽損寄語啼禽漫不閒應為殘春足愁恨長疑蹙破鏡中山原注有鳥聲如呼翠眉損平曉春雲失半山濛濛小雨暗江干寺樓倚遍消殘醉只有春愁伴薄寒錯落星河沒半空江城悲角五更風幽人夢斷西忩雨背壁籠燈到曉紅籠燈到曉只微明獨擁單衾聽雨聲葛幌竹牀清過暑蕭然未覺負平生黃葵黃葵貴麗不妖嬈一朵新晴檻外高還似邇英臨便坐曈曨朝日照天袍聽鳴禽流滯江邊鬢已霜又聞春鳥啅朝陽他時北去懷陳迹寒竹疏梅黃土岡曉雨輕隂江上千峯秀小雨墻邊百草生惟有春禽慰孤客曉啼渾似故園聲黃州酒務稅宿房北忩新種竹戲題於壁異時小杜高眠地幾向秋風聽楚江身世浮雲那可計試留雙竹守忩寒梅花我愛梅花不忍摘清香却解逐人來風露肌膚隨處好不知人世有塵埃分冬莫驚人事浮雲變且作吾儕飽飯行白首分冬聊自勸江城今夜一陽生食薺糝論斤上國何曽飽原注高力士至黔中見薺云兩京論斤買五溪無人採旅食江城日至前常慕藜羮最清好故應不糝愧吾原原注原憲藜羮不糝戊寅正月八日早寒濃淡春雲夜雨乾寂寥庭院夾衣寒無人為發樽前笑但把梅花似舊看正月七日雪晴西忩融雪飄如雨故與新春作薄寒昨夜雁聲渾向北夢魂隨去過關山原注光蔡之間路名關山春蔬新春書劍滯江城又見南蔬入旅羮關心太昊祠前路小甲連畦帶雪晴原注豫有蔬圃在陳州太昊祠南讀秦紀二首烹滅羣雄力未疲赭山射海奮餘威誰知傳與癡兒子祗得阿房似舊時汲汲威刑繼祖龍收功終在望夷宫未應家國歸車府郤有山東老沛公偶成許君踏月夜相過此語當時恨已多但願相逢休怨老不妨白髮聽新歌春日懷淮陽六首西城門外古壕清太昊祠前春草生早晚粗酬身計了長為閒客此間行靈通禪剎古叢林永日惟聞鐘梵音閲世興亡千室佛百年風雨古牆金原注靈通院石晉末所創有千佛殿壁繪用金最愛南城汲井園春來蔬甲不勝繁人家斷處無雞犬遲日東風似古原黃巢寨南琵琶溝古原芳草靜春流大艑舸艤何處客檣竿西北是神州莽莽郊原帶古丘漸漸隴麥散羊牛杏花楊栁春濃處一片青帘慰客愁城中萬枝木芍藥姚黃一蕚得春多日日踏春渾坐此人間無醉奈渠何柯山集卷二十四
