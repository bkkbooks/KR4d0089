body:
  text: 柯山集巻四十二宋張耒撰記伐木記人與物各以其氣相勝而後能全夫氣也者假其所託而後有者也夫長江大河積水之淵俯視杳然莫知其深長波巨𣲖出沒奔突近窺而神寒逺視而目竦此則蛟龍虬蜃魚黿之所託以禦物之害已者而全其生者也髙山大麓緜亘盤屈翳以林薄捍以木石縈溪絡澗懸壁千仞使人望而不敢近近則畏而走此則虎豹熊羆之所託以禦物之害已者而自全其生者也使虎豹窺魚龍之淵蛟黿視熊羆之藪則惶怖疾走而求去之矣何則物各以其所託者見其氣氣勝則非其類者避之矣今夫叢祠墟墓之間入者慘然而心不寜目不敢肆視足不敢肆逰其背肅肅如畏是何也叢祠墟墓鬼神之所託而人之氣不勝故也夫惟氣勝者全故氣不勝者受其病故虎兕蛟鼉易其所處則其心悲沮而無聊者病之所從入也予官福昌福昌古邑之廢者也官舍依山為地十餘畆其竹與木居十六地曠人寡草木茂遂其大者皆百餘年根幹蔽覆若幄若屋交羅籠絡縈以蔦蔓凡日將旦夕將晦鳥鳴獸號聲音百千終日闃然不聞人聲夫環為城通為衢限為域立為屋室闢為塲圃夷易洞逹内外相應面陽而背隂附燥而瞰濕間以草木表以臺觀人之所託也惟其所託者若是故禽獸不敢藏蛇蚖無所蟠居之而安逰之而樂而人之氣乃能勝其異已者是故無疾患無驚惕壽考安樂逺去疾癘而今吾之所居草木居大半矣其堅頑碩老無以異於藪澤此則鳥獸之所戀而蛇虺狐貉之所樂而人之所居乃其棄餘則凡使吾四鄰之外晨夜而不敢出其心矜矜若畏敵國一夕數興寢而不夢是豈非蛇虺狐貉之氣勝而人之所託者弱耶于是聚吏徒集斧斤一日之役十夫不三日而盡伐之剖根窮本芟伐翦剔大者備梁柱小者中椽杙弱者補藩籬惡者從薪蒸洒掃墾除平地乃見隂陽疏通表裏洞然屋室階闥如湧而出於是鳥獸之聲狐貉之迹不復至矣朝逰而足不忌夜處而心不惕吾知人之氣勝矣夫氣也者起乎其所類發乎其所託莫知其然而然者也何則物以類處者未嘗自見其氣也所託者無情不能與物為始也至其相待而後成相感而後發自外而視之隠然不可無也大荒之瀕行者返顧久廢之室寢者數驚推之而無故窮之而無物故物之未始有形而不可慢者其氣也歟雙槐堂記古之君子其將責人以有功也必使之樂其職安其居以其優㳺喜樂之心而就吾事夫豈徒茍悦之哉凡人之情其將有為也其心樂而為之則致精而不苟雖殫力費心而不自知故所為者有成而無難古之馭吏也為法不苛其勤惰疏宻隨其人之所欲而吾獨要其成是以古之循吏皆能有所建立夫望人以功而使其情愁沮不樂求舍去之不暇誰肯以其怨沮不平之心而副我之所欲哉頃時予見監司病郡縣之政不立扼腕盛怒曰是惟飲食燕樂居處遊觀之好吾日夜以法督責之使無得有一于此一嵗之日數計晷刻吾從而課率之使無得有頃刻之間以約束為不足而繼以辱罵辱罵為不足而繼以訊詰方是時吏起不待晨臥不及暖廢飲食冒疾病屋室敗漏不敢修完器用敝乏不敢改作其勤苦如是猶不足以當其意宜其郡縣之政無所不舉小大得職而民物按堵矣然吏益姦民益勞文書具于有司而事實不立吏足以免其身之責而民不知徳相為欺紿以善一時而監司卒亦不得而察也豈非其所為者無至誠喜樂之心出于畏罪不獲巳苟以充職故耶其事之滅裂如此理固然也酸棗令王君治邑有能名以其餘力作燕居之堂洒掃完潔足以燕賔客閲圖書庭有雙槐因以為名夫王君豈以為茍勞而無益不若暇佚而有功將安其居樂其身以其獄訟簿書之間與賢士大夫彈琴飲酒歡欣相樂舒心而養神使其中裕然然後觀物圖事其致用於文法尋尺之外以追古循良君子之風以大變俗吏之弊而為也哉夫古之善為政者不佚而常安不勞而善成吾知王君其有得於此矣景徳寺西禪院慈氏殿記過去有佛號大通智勝佛十方梵天十六王子羅列上下請轉法輪而曰佛之時未至受請黙然坐及時至也乃三轉十二行法輪如興雲普雨一切夫具福慧至於佛而演法利衆猶須候時者雖聖人不能違而况其餘哉景徳寺西禪院有慈氏菩薩聖像至和中院僧法肇自錢塘内之而居院之傍舍如是凡厯五住持僧而未有以易也比丘詮嗣院事乃歎曰此我之責也佛以象法道利羣品使濁刼惡世猶獲見佛紫金光身其奉事當加謹其為役當加勤而吾慈氏像乃藏之屋漏不大振顯天龍鬼神其謂我何元符元年發憤出都遍一切以願力故諸受化者歡喜施與金帛無量乃創為正殿其命工以二年之春粤五月而殿成慈氏居中菩薩列侍種種妙好莊嚴之具以為供食青蓮下觀悲愍四衆白毫旁耀如現大千都城士女凡瞻禮者如升兜率逰内院聞海潮音受妙勝樂詮乃屬予記其事予曰前五比丘豈無一人嘗作是念欲集是事者乎而殿成于子何也佛子當斷一切法有時譬如草木敷榮于春夏黄落于秋冬過去未來不可得及時既至則我雖不為而彼自成子當其時故財不勞而足役不久而就如償所負取而不怨時哉時哉當知佛子成是功徳是大福本是大善根盡未來世無有窮盡雖然佛身充滿一切聲色是行邪道向上一路向慈氏未生時參取記異元豐已丑六月予故人子假承務郎楊克勤自合肥赴京師過咸平為予言道出亳州太清宫下太清之人為楊言有道人方士者貧窶而意氣甚揚携藥爐燒藥老子殿下大言自尊指老君像曰吾老君師也衆聚觀須㬰有火自其爐出然其衣即熖發滿身其人驚走左右以水沃之不滅狂走庭中火所經他物不然獨燒其身須臾北面老子像若首伏者已而斃視其身灼爛矣楊問之太清宫人與驗尸官不異嗚呼其亦異矣狂士之以僭誕自尊者其情豈有他哉欲驚愚夫癡氓以自售其藥為一金之利而已世之狂者欲自售其學以誑昧者之耳目而冒其利滅棄訓典毁訾先儒操臆見私智而以聖人自欺者與太清之狂士何以異哉得無有怒目切齒者乎夫學不死養氣煉形者皆宗老子狂士之術出於老子者也因其師以有知乃掩其所得而求售焉叛其本甚矣世之欲自大而忘其大者可以鑒諸此冀州州學記朝廷以學校道藝教天下之士亦已乆矣而其興衰亦繫其守長之能否慶厯中始詔郡縣立學而信都乃即孔子廟而為之僅以塞詔其後為守者欲興之數矣皆不果成元祐某年河中劉侯守冀始大作學舍師之授經有堂而諸生肆業有室凡學之百須皆具精壯完好可以傳久逺又為賈良田治市舍籍其所入以養士而士之來學者日有餼學之有司者月有給其秀民良材從其先生長者皆徃逰焉四方之士聞而來者日至劉侯喜其有成而使其屬李公輔請文於譙郡張某以記之為之言曰嗟乎政事之緩急如人之於飲食不可强也强使急者緩如止飢者之食强使緩者急如持食以進飽二者無怪其不可也予嘗怪今之士大夫皆能責守令不如古者興學校隆師儒讀書行禮其中而為守令者雖責之不受亦不害其為政論守令之能否與夫人民之利病亦絶不在此何也三代之時天子諸侯之有學其朝夕政事之所繫不啻如今省寺之要且急也自出師受成獻馘皆必由之則一士之不率教至勤天子公卿而親臨焉葢無足怪當此之時雖欲緩而不治亦不可得先王之俗既亡更數千嵗風俗禮樂既已大異矣而朝廷郡縣之政視學校無毫髪相及而乃日夜責之以不如古夫我則無用而强授之此何為者也且不怪夫冠者之不為章甫騎者之不為駟馬而獨怪學校之不如三王不亦異哉夫求三王之治不立學是廢食於饑而必責學校於今日猶强食于飽必不行矣由是言之學之興廢其本末逺矣吏未有責也夫未可以責吏則劉侯之為此殆苟然歟蓋昔者子貢欲去告朔之餼羊子曰爾愛其羊我愛其禮夫不告朔而去羊未害也然使後世不知有告朔者自去羊始以今之政為無事于學而不為可也因我之無用而毁古人之所急安知來者之不有作乎此劉侯之所不忍也侯之意亦深矣司馬温公祠堂記元祐元年九月甲子丞相司馬公薨朝廷議所以追崇之於是進爵為公而國於温惟司馬氏系出晉安平獻王孚而獻王河内温人也故推本其故家而封之五年奉議郎王仲孺為温令告其邑人曰惟司馬公道徳功烈著于朝廷施及生民者自匹夫匹婦與夫荒陬外裔悍夫姦民心革誠服左右兩宫格于太平是其功徳宜配社稷天下祀之而温者公之封國也顧不能祀而可乎于是度地作堂畫公像而禮祀焉告于譙郡張某使記之某為之言曰盛徳之不作于世久矣古之所謂盛徳者不施而民服無事而民信未嘗動顔色見詞氣而天下從之若子弟之慕父母故其為功也不勞而物莫之能禦三代之亡聖賢不作而士之能有所立于世者亦多矣然皆費心殫力招天下而從之以其智勝之後能有成是何也徳不足而取辦于其才故也故其所建立勞苦而淺陋夫豈不欲為盛徳之事哉葢其所積者有不足故也子産君子也猶曰惟有徳者能以寛服民其次莫如猛夫子産豈欲為猛哉以謂徳之効實難懼夫好高之難成也是以甘心于其次以求夫無失嗚呼徳者子産之所難而况其下者乎故自秦漢而後更千有餘歳而盛徳之士不作蓋無足怪惟司馬公事君而君敬之未嘗求民而民與之非其類者有不合而無不信受其罰者有不悦而無敢謗其自洛入覲也郡邑田里至于京師觀者千萬環聚嗟嘆至于泣下嗟乎此可以言語術智得之哉故其相天下也因物之所利而與之因人之所厭而更之從容指麾内外響應而天下無事矣蓋自秦漢以來至公而盛徳之效始見于世可謂盛矣嗚呼當大事處大疑勇者招敵智者招謀惟有徳而後萬物服則夫二聖之所以用公其可知也夫某辱逰公之門而喜王君之好徳使以其説書于堂而刻之真陽縣素絲堂記慶歴中起居錢公守真陽名其燕寢曰素絲堂耒紹聖初忝守是郡此堂具存而四年謫齊安道蔡之真陽真陽宰錢君起居之孫也授館于縣舍其西有堂宏敞而高潔寒暑之居咸宜而錢君名之曰素絲而屬予記之惟錢氏有大功事于吳為宋忠臣著于令甲而子孫仕于朝以才徳為名臣者相繼號為天下甲族觀錢君所以名堂之意則其潔巳守公之意有自來矣錢君治真陽不勞而庶務舉與客終日清言于堂上視其規畫繼其祖無難也起居諱彦逺吳越忠懿王之孫閏月二十五日萬壽縣學記萬夀令皇甫君治縣有餘力吏之常職無不舉矣而嘗慨然曰是未足以為政也今吾民小之為鬬鬩大之為盗賊鞭笞戮死相繼于有司而不知恥意者未嘗教之歟教之道必先治學校誘其民之才秀而勸養之使之業成出仕受禄于朝而後田里閭井之人風動慕悦而興于善蓋漢文翁之治蜀唐常衮之治閩皆用此道然蜀閩皆去中原數千里其民雜乎蠻夷猶且教之有成而况吾邑之在淮潁間去王都纔數百里其民儉樸而倡優拙静慎而獄訟稀若是而不教令之罪也縣故有孔子祠前令嘗増為學舍而不果成廢且二十年矣君于是相地賦工興役四旬而學成自孔子之堂與夫門廡齋序凡學之百須皆具而邑之士買田十有二頃以獻君又闢學之四隅得地六十畆植雜果千本凡此十二頃六十畝之地取其毛足以給養士而又為之延師儒以教之而邑之子弟來學者日加多予守穎時則聞君之興學辛巳之冬予移官臨汝道邑中君館我于新學而屬予記之予謂之曰今州縣之吏取辦目前責以教民則不受而上之人亦不復責之者而君乃引以自任如此古循吏之用心也雖然為政易教民難教民者始于至誠終于不倦二者皆本于治吾心一不至焉則不能以有成蓋未易也君勉之哉太寜寺僧堂記圓明岳師住淮隂之太寜寺其始至也墻屋圯毁佛事不嚴嵗乃大饑寺田之入不足以給其衆圓明日夜刻苦菲薄率其徒為勞辱事完補葺治雖寒暑不休寺乃僅完予去太寜五年而再至入門視左右前後脱然疑非昔者視聴步履明潔安穏蓋易舊而新者十五六矣予勞圓明曰小邑民貧能相勸而成此未易也圓明曰自容而巳未足道也佛之道先物而後巳苦身而安人吾之僧室庳陋弊惡不足以延四方之學者吾將易為重堂使容百人飲食寢處于前讀誦燕息于後而吾之居此可以無愧者矣明年春堂成其周廣嚴好皆如其言而命予為之記曰天下之物各以其功而居其享未有無故而安受天下之養者不幸而冐得之則饑罵詬辱其或傾害簒取必奪之而後已若佛者世固未嘗見獨以其書東越幾千萬里而來中國未嘗期人之尊敬奉事而自一邑一國望其宫室棟宇傑大壯麗者必佛與其徒之所居富人大家愛嗇蓄藏至不以分骨肉而擇取精好交手而獻之佛其心惟恐其不我享也人之所畏愛莫若賞罰人君持玉帛爵禄刀鋸鉄鉞率其下從所欲有偃然不肯為用者世之營治塔廟佛像者其不能為也無强之者其能為也豈遽有利哉而其勤力者不啻於愛父母畏官府殫智畢力不以一毫自欺至其有成公上之力或有不能及夫君子之于簞食豆羮其得不得皆以為有命彼獨安享天下之奉如此國君不以為僭天下莫之敢議謂之無故而得世豈容有此理哉嗚呼世之學佛者無有一毫之累以勞其心饑而人與之食居而人與之舍人任其饑寒之憂而巳享其學道之利者毋乃人以其望佛者望之耶嗚呼使誠得佛之道則吾將以所以事佛者事之如其不足而將冒而處也則資物之一毛亦將償之彼佛者果無故而得之蓋亦視其所享而占其功觀其所取而知其與是其黙相天下隂利萬物之功宜亦不可計矣而惑者嘗欲憤詆而勝之不亦過乎彼屢詆而不勝者其必有可恃也粥記贈邠老張安定毎晨起食粥一大椀空腹胃虛穀氣便作所補不細又極柔膩與腸腑相得最為飲食之良妙齊和尚説山中僧毎將旦一粥甚係利害如或不食則終日覺臟腑燥渴蓋能暢胃氣生津液也今勸人每日食粥以爲養生之要必大笑大抵養性命求安樂亦無深逺難知之事正在寢食之間耳柯山集巻四十二
