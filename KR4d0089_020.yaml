body:
  text: 柯山集卷二十宋張耒撰五言絶句江上二首相别亦何事相逢盡偶然愁腸貫綵筆離夢繞朱絃紛紛渾是夢黯黯只消魂江上浪無限舟中酒一樽暇日六詠雙白鴨已斷鷹隼猜仍叨主人惠皎潔靜天姿雙棲莫相忌蛙越國未亡吳曽動君王意句踐自有心慿車汝無恃百舌曉語月斜樹晝啼春霽天胸中自有激不是故多言栁絮零亂委空風悠揚點芳草却為身最輕華堂等間到龜映日漾清淵沿沙暴元甲愛爾千嵗姿藏身一蓮葉槐庭清隂滿我庭蒼蒼六槐老野性苦避人青苔不須掃春日書事禪宫門寂寂庭草無行迹東風自掃階疑是開簾客鹿邑道中去嵗秋時去今年秋又來浮名何所得嵗月苦相催豫元祐六年六月罷著作佐郎除祕書丞是嵗仲冬復除著作郎兼史院檢討復至舊局題屏庭樹應如我相逢益老蒼别來秋苦雨但覺瓦松長絶句雨麥渾漫壠風梅已退粧髙鴻望燕塞飛疾不成行晝卧口占二首人事日益逺秋居何颯然苔隨牆半雨葉放樹中天擾擾終何得蕭蕭亦自如將求解牛道要解斫輪書發金陵折栁亭二首匆匆十日事回首亦凄涼何處無芳草行人休斷腸瞿曇昔教我林下一宵行何事春江上依依作俗情昔蘇先生逰廬山詩云平日懷真賞案蘇軾集作自昔懷真賞神逰杳靄間如今不是夢真個有廬山案有字蘇軾集王氏注本作在施氏注本作是輒繼一首人生孰非夢夢裏見廬山若了元無夢何曽有往還蘇先生詩云芒鞋青竹杖自挂百錢逰何事春山裏案蘇軾集何事作可怪人人識故侯輒繼其後齋心禮仙聖不是愛山逰山中笑何等白髮故諸侯六言絶句登山望海四首江濶風煙易晚山髙草木先秋獨倚闌干盡日此身與世悠悠仕宦此身漫爾功名已老茫然山鳥不須驚客相親此復窮年西望揚州何處雲中雙塔巑岏山外雲濤斷日夕陽應近長安鳥去蒼煙古木人歸緑野孤舟信美雖非吾土消憂且復登樓書寺中所見三首江市樵蘇早散山家燈火常昏紗帽搘笻獨立龕中佛像無言日出鄰僧乞食鐘鳴老叟關門誰見春宵淨境娟娟霽月當軒叩户誰驚午睡烹茶聽客論詩病裏雖成禁酒興發何妨杖藜讀潘郎文卷霜鬢我猶謫宦蝟鬚子合封矦老拙何勞咄咄踈慵且復悠悠夜坐三首門庭草草是客寢室泠泠似僧春寒猶須篝火夜書頗復明燈靈通寺前老圃畦蔬想見如雲謀拙嗟豫飄泊歸來與爾知聞微寒騷屑窗竹淡月朦朧夜天路暗城頭傳警漏稀更士髙眠贈廣靖上人七十龎睂禪客曽見天衣老人柟檀林中香氣悠然時有餘氤六言青春要去便去美酒得斟且斟莫問世間蹀躞須知老境侵尋乾明院門望江山懷淮陽城南步二首危臺寺東野水春來栁色鵝黃江上滄波似屋蛟龍作惡難量憶昨淮陽把酒目前惟欠山林江上雲岑千壘何為特地愁心和子瞻西太一宫祠二首太一祥儲世世祠宫嵗事年年綘節霓旌何處松庭玉座蕭然玉斚清晨薦酒天風靜夜飄香鳯吹管截孤竹琴弦曲奏瀟湘白沙閘西艤舟亭下二首倦客時時醉眼津亭日日春寒目極傷春懷抱黃昏猶在闌干客恨如雲冉冉風光似水迢迢回首十年舊事令人淚盡魂消秋園雜感二首秋晚園林疏靜天髙風日明鮮中有搘笻病客三杯卯酒醺然世事我深諳委人生他自奔忙刻木牽絲作技幾回弄罷凄涼七言絶句寄都下舊友二首一别長安西復東琵琶舊地已應空當時風景歸何處須信人生是夢中城西古地昔同逰望月思家相對愁明月秋來應更好何人看月又悲秋秋思故人陳迹生蛛網古殿苔深疊緑繒簷雨晚秋鳴稿葉忩風深夜觸孤燈魚蝦相望悲歡回首兩茫然憶别龍門又半年應是舊時歌舞處和風開凍一層天臘月殊有春意二首一夜長風無片雲曉來風動似初春應知春近催桃李更有輕寒不著人拂檻垂楊雪後青誰家朱閣曉來晴拂簾動幕無人解先把春愁寄有情送李十之陜府斷蓬泛梗偶相依一别重逢又幾時人世悲歡消遣盡為君流淚忽霑衣送客愁數星點點間微河城上三更樹影蹉霜落夜深風悄悄月明無限客愁多夜坐半消爐火夜三更欲滅青燈暗又明閉户無人瞑目坐此時一念悟浮生豫向集賢殿罷試寓居京師嘗逰西岡錢昌武郎中之第時同會者河東栁子文與錢氏三子夏中豫出京今才半年而昔所共逰者或東或西有不知所之者古人所謂俯仰之間已為陳迹者歟夫求昨日之我于今日終其身而不得而況偶然相值聚而旋散者歟追記春睡詩一首乃寓錢第所為者東風冷峭著衣寒雲影深沉美睡天青杏園林花盡落晚風吹雨濕鞦韆上元都下二首淡薄晴雲放月華晚粧新暈臉邉霞管絃樓上爭沽酒巧笑車頭旋買花驕馬金鞭白面郎雙鬟小女坐車箱輪聲轆轆歸何處留得紅籠綘蠟香荆軻燕丹計盡問田生易水悲歌壯士行嗟爾有心雖苦拙區區兩死一無成送聖民出城即事東風堤上送行人漸出城來漸少塵栁色已深花又落客來下馬獨傷春西湖三首沙鷺汀鷗盡日間水邉風起萬荷翻客來莫厭重樓望樹杪闌干直對山水上亭臺涼氣多扣舷倚棹唱吳歌何人為放青蓮出剪却翻翻一萬荷一曲清池栁岸風長苗新稻短蒲茸功名由命何須問幸有滄浪作釣翁别錢筠甫三首倦客無眠聽曉鐘五更蠟燭淚消紅城西古寺來何處今日分携獨向東春燈欲盡曉雞啼殘月影中征馬嘶為語相逢不消喜相逢終有道分離原頭緑盡栁初芟落月滿川風滿衫已過寺西三十里為君回首駐征銜偶題屋角纎纎挂斷虹清蟬一噪起髙桐天涯雲盡見殘日林下雨餘來好風宿錢睦甫南齋瀟灑南軒與病宜庳牀長簟碧紗幃三更月上夢初覺竹影滿窗風入衣夜斗柄闌珊風瑟瑟銀河錯落露森森人聲靜後幽蟲急月色好時清夜深田家二首門外清流繫野船白楊紅槿短籬邉旱蝗千里秋田淨野秫蕭蕭八月天新插茅簷紅槿籬秋深黃葉已飛飛灘頭水濶孤舟去渡口風寒白鷺啼謁僧不值古寺人間僧掩扉客來下馬解塵衣雙松帶月風蟬噪古閣鳴鐘夕鳥歸中秋夜酌一片秋天碧萬尋月華初上水沈沈遣愁不用先愁醉更看清光到夜深舟行六絶獵獵西風秋水清野花寒草傍流生沙邉水鶴待魚立石底暗蛩先夜鳴船尾初回轉野灣波平天淨惜投竿飛飛小蝶秋花晚嘖嘖沙禽野水間落景秋雲晚不開天寒古岸野船回初驚波面微瀾起已覺風前細雨來渡頭風雨晚生寒蓑笠漁翁坐釣船為問篷中有魚否一雙新鱖出籠鮮天寒野店斷人行晚繫孤舟浪未平半夜西風驚客夢卧聽寒雨到天明渡頭煙雨欲昏天灣畔枯桑繫客船風打篷窗秋浪急一杯寒酒夜酒眠書潁州皇甫祕教書室間來便是日侵階窗下棋枰林下杯曉解扁舟又南去百年還得幾回來初離陳寄孫户曺兄弟三年流落寓于陳一命青衫淮水濱城北橋邉長送别扁丹今自作行人望淮山硤石寺豫幼年過此今十載矣十年落泊竟何成人事紛紛幾廢興今日扁舟淮上去青山似與客相迎題夀陽樓二首渺渺長淮去不休行人獨上夀陽樓一闋長歌不須唱山川都是舊時愁長淮不斷水悠悠樓下行人淮上樓誰謂滿前風景好古今供作别離愁淮上曉望酒醒窗明月半川怯將病齒潄寒泉樓西别有清秋色一片淮山在曉煙宿南山普濟院閃閃青燈照薄帷幽人不寐自吟詩僧來邀我更深坐待聽山風到樹枝原注宋景瞻和云可憐萬里南飛翼肯向霜林借一枝旱池藕梢菱蔓緑才深日射逰魚聚岸隂詬沫巳知為計盡渚鷗沙鷺亦何心湖上成絶句呈劉伯聲四首湖北風來吹曉鐘湖邉漁客閉船篷波光不動天光濶更在浮煙細雨中風蕩雲容不成雪栁偷春色放衝寒湖邉艇子衝煙去天畔青山隔雨看野岸北風歸客愁浮煙不動雨颼颼圍成野色縈紆岸點破湖光三四鷗誰道原頭春未回栁梢黃軟凍齊開爭驚臘日崢嶸盡忽問田翁乞野梅偃王城蔓草悲風知幾秋黃桑晚葉野雲愁偃王城下樵蘇盡猶有耕人指舊邱自上元後間作五首閶闔樓南粉署西舊時種栁長應齊如今冷落窮山縣卧聽春風百鳥啼東風吹雨夜侵階樓角長煙曉未開何事舊時愁意緒一畨春至一畨來面冷春霜拂瓦乾曉風吹雨凍闌干栁梢黃弱梅苞破更放東君幾日寒燈火人家夜不收三更明月過南樓風煙隨處自能樂何事客心還獨愁喧喧野縣自笙歌風卷髙雲天似波誰謂樓前明月好月明多處客愁多寫情二首牆外誰家桃李開何由花下一徘徊先教飛絮傳愁去却遣遊絲取蕊來人間漏永報春暉日過簷牙夢未回隔夜雨飄梅蕊盡入簾風捲栁花來題扇二首越衫羅薄逆新涼扇剪青綃秋水光花前一把羅敷手直到花殘襟袖香彎彎涼月帖淮天露濕蒲梢風墮蓮松蓋草茵迎不至南山桂子老秋煙淮隂蘆梢林葉雨蕭蕭獨卧孤舟聽楚謡生計飄然一搔首西風沙上趂歸潮宿銅陵寺題壁僧房秋夜月明天下馬擁裘人悄然老僧何事亦晨起清磬一聲驚客眠將之天長題新亭壁二首新亭登眺解征鞍飛鳥悠揚雲意間誰謂塵埃無野興故乘風雨看秋山雲捲山光到眼前滿川搖落早秋天客來繫馬成何事風雨寒窗一覺眠過漣水城頭落日在旗竿城外長淮水浸天左海門前燈火盡櫓聲嘔軋夜深船春宫團金𫀆袖繡長靴寒食宸逰樂事奢風擺珠簾紅幕潤滿宫春雨落梨花效李商隱夜深傳警報更籌霜桂月華寒未收昨夜雨昏今日朗一畨風雨一畨愁楚城曉望鼓角凌虛雉堞牢晚天如鑑絶秋毫山川搖落霜華重風日晴明雁字髙楚橋秋暮阻雨水滿城西釣艇橫雲豪風弱晚冥冥天寒小店人愁雨燈暗孤舟客卧聽柯山集卷二十
