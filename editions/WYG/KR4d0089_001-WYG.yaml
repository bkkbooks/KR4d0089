body:
  text: 柯山集巻一宋張耒撰賦大禮慶成賦惟宋六世皇帝踐阼之七年所以和同天人綏静中外垂鴻襲裕増髙累厚以對於神祗祖考者固已䝉被充塞光融翕赫六合一意四海一口無得而言矣粤以壬申之仲冬將有事于南郊乃詔列位恪職賦事而有司建言惟我國家因時施禮郊丘之位天地咸在牲幣並薦禮樂合舉而古者乃以隂陽之至即南北之郊别位殊時薦獻異數有司其何從于是天子惕然深思祇畏敬慎曰兹大事我其敢專羣公卿士典禮之官竭思和㑹以訂不易于是議者曰先王齋明以享帝而帝之享否雖聖人末由知之惟受福者其享之占恭惟國家合祭天地於兹六世矣惟我太祖躬膺駿命以遏亂略堂皇二儀拓落八極以定萬世之業太宗威定宇内震蕩大漠以一九有定天下於一尊真宗熈洽富盛符瑞委積南牧之旅不戰請命威加北荒奏功岱宗仁宗席安據厚不動指顧孽獠猾羌含毒内向吏士未頓藏竄屈伏終始太平垂五十年英宗入纂百姓與能神考有為六服承徳此可謂受天地之福矣然則神祗之安吾享也其久哉于是天子乃翳青雲之屋乘雕玉之輿應龍受轡招搖翼輔建虹霓之修竿兮颺彗星之飛斿太一執節以先驅兮二十八星拱手布武經營而周游貔貅六師雷霆萬乘初海沸而雲涌忽山峙而川静葢天子粹然玉温健然天運望宫門而動色顧執䇿而命進惟烜赫之靈源兮實鼻祖於神明覽光徳而來降兮館玉宇之嚴清張咸英之廣樂備干籥之盛舞景光交徹鸞鶴來下神嬉靈豫醉爵飽俎翼翼清廟觀徳之宫七聖在天時降於宗世有哲孫豈弟無疆惠我文人案此下原脱四字瞻祖祏而念功兮顧禰室而感親聖孝油然發中兮在位望而含辛霽暘告旦祥颷掠塵從我髦士來祇精禋御史肅吏司馬飭兵既逶逶遲遲雲流而日行兮又洶洶業業海運而天聲靈旂洪順翕赫歘霍兮攫拏龍虎而亂鯤鵬雄驁憺威而震伏兮柔良化禮而肅清弛天威戢天戈兮固已熄威蚩尤而折欃槍執飛亷圉商羊屬之有司矣羲和磨刮披拂盡獻其光明葢傾都空閭翹首跂足俯窺履綦傍覘佩玉者忽焉不知手之加顙口之成祝也于是背都城望帷宫郊坰坦其迤邐兮埸圃既寒而畢功頽青雲以連屬粲紅霓之經緯紫㣲下屬於兩觀勾陳錯施於萬雉扶頃之神仰立而拱翔徳之龍下視而曳疑神變之欻成兮涌九地而出峙連廡千柱廣殿萬杙飛甍鬬桷洞牖屹壁酸股之隅眩目之極唐洛執算而莫計班倕操斤而自惑者類非資才於斵墁而皆機杼之紡績也一室之用足以温一家一宫之費何啻衣一國驚霆之蹕既震洶壑之聲咸寂敞齋寢之静深兮何清虛而䆳密天子方端儼而虛一多儀未舉精意已塞甲夜始晦嚴鼓再作飛斂走伏神讋鬼愕望舒騰精以燭宵兮𤣥㝠收威而布徳靈鼉五震軫車將中天子乃披衮執玉兮齋明莊肅之誠動于進趨表於形容千燎具揚萬炬畢融上揜熒惑旁爍燭龍近為朝暘逺為融風赫赫曦曦煌煌輝輝列次之士野屯之師巋如酌醇醪而御兼衣黄流汪洋璧玉照徹祥祲衡布協氣下浹音為樂和形為人悦白質之獸簫聲之鳥紛披雜沓應奏而舞節陟䧏既周燎烟始升奔星走虹奉璧薦牲豐隆奔馳而仰騖兮祝融焜煌而上征開閶闔兮闢清都后帝燕兮百神愉圓錫葢兮方獻輿岳輸固兮溟効濡于是禮備樂成整車而旋萬類環極端門闢天賞出千庾恩流百川北包大壤南盡島蠻西越流沙東窮海壖令未脱口雷運風傳野無窮人獄無宿愆破械解縲負帛囊錢車反其舍士復其伍効技呈才千鐘萬鼓天子舉酒以屬羣公咸曰休哉天子之功系曰於穆聖王建皇極兮嚴㳟精禋帝來格兮柔祗並位儼牲璧兮文祖在坐臨有赫兮於惟祖宗有常則兮諱兵畏刑後貨食兮政有損益兹不易兮帝則鍳之戩榖錫兮兢兢業業日一日兮三載一祀年萬億兮游東湖賦紛不知吾之所如兮獨漫漫而若狂乘醉飽之餘力兮遂陟巘而縁岡惟大冬之栗烈兮莽川澤之茫茫農功休乎埸圃兮平陸散夫牛羊憫大木之百圍兮慘赤立而無裳鸛鶴羣鳴而下上兮雜篁竹之青黄忽平陸之既窮兮漸積水之汪洋曰是為齊安之東湖兮右𣲖合乎濤江荒灣寂寥而葭葦兮懸疏罾于夕陽為舉網而無獲兮嘉魚逝而洋洋弔村落之柴荆兮哀淮夷之陋荒呼徒侣而還歸兮隂風振而塵颺畏星昴之將中兮冒𤣥夜之飛霜顧謂童子汝其賦詩爰有小子褎然致詞歌曰嵗窮木落兮大澤空雁宵征兮天北風曷不飲酒兮御𤣥冬歸來歸來兮樂未終余曰汝歌置之乃歌曰臨山川兮懐故鄉歲窮隂兮晝不暘升髙堂兮潔余樽耿余思兮古之人問雙棠賦自序雙棠者予寓陳僧舍堂下手植兩海棠也始余以丙子秋寓居宛邱東門靈通禪刹之西堂是嵗季冬手植兩海棠於堂下至丁丑之春時澤屢至棠茂悦也仲春且華矣余約常所與飲者且致美酒將一醉於樹間是月六日予被謫書治行之黄州俗事紛然余亦遷居因不復省花到黄且周嵗矣寺僧書來言花自如也余因思兹棠之所植去余寢無十步欲與隣里親戚一飲而樂之宜可必得無難也然垂至而失之事之不可知如此今去棠且千里又身在罪籍其行止未能自期其於棠未遽得見也然均於不可知則亦安知此花不忽然在吾目前乎因賦問棠以自廣云寓舍之壤既膏且腴手植兩棠于堂之隅風來自東氷雪融液興視吾棠既葩而澤乃沽我酒又命我人期一醉於樹間聊快酬於芳春夾鍾之初謫書在門陸走千里止於江濱天星一周穆然舊春想見吾棠粲然含姿俯睨舊棠今居者誰婉如怨而有待淡無言其若思嗟乎始種自我其享將獲盈我㫖酒㑹我賓客一酌未舉俯仰而失事至而驚其初孰測惟得與失相尋無極則亦安知夫此棠不忽然一日復在余側也且夫棠得其居愈久愈敷無有斧斤斵傷之虞我行世間浮雲飛蓬惟所使之何有南東夫以不移俟彼靡常久近衡從其志必償歌以訊之用著不忘柯山賦入東門而右回兮原迤靡以相屬抜磅礴以陸起兮是為柯山之麓其上蕭森而晻靄兮冠萬竿之修竹下磽确而堅密兮拱髙林與喬木散雞犬于危阨兮雜茅茨與夏屋通樵牧之蹊逕兮路縱横而㫁續撮土石列暗竇谷虛鳴鳥上下伏獸號呼俯江流之蕩潏招列山之蟠紆林巒作態而蔽虧兮風雲効技而巻舒固可以開闔隂陽于一氣寅餞日月於天衢爰有窮人癯然無歸曠四海無所投其足兮后帝命我于山之隈庇蓬茅之數椽兮撫枵腹而常飢時醉飽而自得兮亦杖履而遨嬉逾山而東席門草藩爰有君子于兹考槃自種自食隣里莫干圖書滿家兒稚飢寒相見輙喜有時不冠寄萬事于一笑兮不知食糲而衣單吾不加物以一毫兮亦莫受人之燠暄悟紛華之多虞兮幸寂寞之至安飲我薄酒懽有餘啜我豆羮甘而腴隠几而休讀我書乃曳杖歌曰升柯之巔明逺眺兮築柯之崦可以老兮終古不忒天之道兮于于而行無喪吾寶兮夘飲賦張子晨起落然四壁千林霜曉四顧寒寂先生惘然而不自得顧視壁間若有物焉短脰魁腹兮長喙旁啄而椎髻上直也雖未知其何祥而津津然有喜色矣于是童子趨而進曰是有客曰麴生者願奉先生于頃刻先生欣然三揖而進之葢其氣盎盎冽而浮兮其聲瀏瀏和而幽兮其質醇醇毅以柔兮先生曰甚矣予之不敏也今日乃知從子之遊于是體之栗然寒者温心之鬱然結者散已大忘於寒暑尚何有于夜旦揖麴生而告之曰吾將旦旦與君周旋既導君以良辰又餞君以芳鮮而可乎麴生對曰斥子之泉吾泉出兮枵吾之腹君腹實兮陋彼昏之獻嘲何啻富子于一日鳴雞賦先生閒居學道昧旦而興家畜一雞司晨而鳴畜之既老語黙有程意氣武毅被服鮮明峩峩朱冠丹頸𤣥膺蒼距矯攫秀尾翹騰奉職有恪徐步我庭啄粟飲水孔肅靡争山川蒼蒼風霰宵凝黯幽牕之沉沉怳余夢之初驚萬里一寂鐘鼓無聲聞振衣之腷膊忽孤奏而泠泠委更籌之離亂和城角之凄清應雲外之鳴鴻弔山巔之落星歌三終而復寂夜五分而既更萬户皆作車運馬行先生杖履而出觀大明之東生暑雨賦提九山於空虚忽並擊而俱烈壅百川於河漢乃防隤而一决哀下土之微生何足拱夫推折方朱鳥之宵中嵗仲夏兮大熱雖惔焚之一快俄鬱蒸之莫洩叢百指於環堵顧杖履之安設委熏風於九旬滛疾苦于百節付六鑿於渾沌獨天游而神悦忽翛然而輕舉固已窺寒門而蹈氷雪攬北斗而酌天酒覲上帝於𤣥闕聊逍遥兮窮年俯故土兮螘蛭蘆藩賦張子被謫客居齊安陋屋數椽織蘆為藩疎弱陋拙不能苟完晝風雨之不禦夜穿窬之易干上雞栖之蕭瑟下狗竇之空寛先生家貧一裘度寒曽胠篋之不䘏何籓籬之足言鼓鐘于宫聲出於垣中空然而無有徒望意而輙還故吾守此敗蘆其固比夫河山若夫朝暘不出㣲霰既零聲如跳珠浙浙可聴及夫衡門暮掩鳥雀就栖挂荒山之落景絡衰蔓之離離其下榛草樵蘇往來螻蚓出入羊牛覘窺先生跫然杖藜過之瞻顧四隅憫然歌之曰公宫侯第兼瓦連甍紫垣玉府十仭塗青何嘗知淮夷之陋俗窮年卒嵗乎柴荆也哉燔薪賦嵗暮苦寒烈風不休先生家貧衣無重裘讀書夜闌爐炭己灰先生瑟縮凄然不怡顧謂童子與薪偕來童子把薪而來曰是薪也陳之壁間自春徂冬風日所熯埃塵所䝉固瀋液之乾竭乃外稿而中空唯利簇燔無所獻功與火相得赫然大烘堅枿勁節久而後燃後羣枯而効技又熒熒而不烟于是先生欣然環坐皆喜或祼股赤足或引手張臂窮谷蕭條薪炭如土益取之而不竭顧此樂之甚富又何必琴材修直獸材攫搏漢壁之椒效煖魏宫之金辟寒誰知空山寒夜之叟敢傲温于狐貉之前原注今供上方炭率斵成琴材胡桃文鵓鴿之色杞菊賦予到官之明年以事之東海道漣水漣水令盛僑以蘇子瞻先生後杞菊賦示予予不逹世事自初得官即不欲仕而親老矣家苦貧兾升斗之粟以紓其朝夕之急然到官嵗餘困于往來奔走之費而家之窘迫益甚向日悲愁歎嗟自以為無聊既讀後杞菊賦而後洞然如先生者猶如是則予而後可以無嘆也有蓬四垣張子居官童子晨謁有駒在門張子迎客平生故人予致其勤餽客以飱擷露菊之清英翦霜杞之芳根芬敷滿前無有馨羶客愠而作謂余曷然張子始歎終笑以言陋雖爾棄分則余安子聞之乎膠西先生為世達者文章行義徧滿天下出守膠西曽是不飽先生不愠賦以自笑先生哲人大守尊官食若不厭况于余焉不稱是懼敢謀其他請卒予説子無我嗟㝠㝠之中實有神物主司下人不間毫髪夫徳不稱享者殃勞不稱費者罰予身甚㣲余事甚賤聊逍遥于枯槁庶自逺于人患客謝而食如膏如飴兹山林之所樂予與爾其安之涉淮賦涉清淮之浩蕩兮聊以豁吾之幽憂轉峽石而下泛兮觀波濤之複流何佛廟之巍峨兮隠于兩山之幽眺東崖之飛閣兮納萬里之清秋昔淮人之倔强兮恃江左而不賓方中原之多故兮遂竊帝而稱隣遭世宗之勃興兮乘累聖之威神盡疾馳而奉命兮戈一揮而遂臣始盤桓于夀春兮葢嘗挫而益振驅貔虎於順流兮臨長江之廣津馳千里之玉帛兮擁百萬之精軍計其一時之氣兮固叱咤而風雲嗟百年之㡬時兮山川儼其如新忽人事之㡬變兮撫墟廟而湮淪訪遺事於樵夫野人之談説指餘迹于荒城故壘之荆榛徒見夫雲悠悠而朝出水漠漠而東流飛沙鷗于晴渚聴夜艣于行舟彼時豪盛此日廢昔人功業今人愁嗟夫旦之心暮不可求前之迹後不可再胡為寂寥之前古乃以興亡而感慨雖物至盛者其存也宜久勢極大者其亡也可驚方登臨而逺想豈獨予兮忘情後涉淮賦甲寅之秋自正陽渉淮作渉淮賦既至泗之臨淮邑之東南皆淮也朝游夕濟凡淮之驚畏風濤之變無不厯之矣今秋又以事之東海至漣水入漣河舟人告予曰淮水自是入海矣予生二十有二年吳楚秦蜀之國來往殆遍竊悲其跡之不常作後涉淮賦以自廣云浩淮流之湯湯兮蕩余身以沿洄嗟我居之不常兮未期嵗而再來始進棹于正陽兮睨下蔡之窮城界陳許之北壤兮望荆塗之兩山緬川原之迴複兮思禹功而慨然爰係舟于徐邑兮浸淮隅之兩壖駕長帆于朝風兮凌星河于夜湍豈所覽之未周兮恨未窮其本源忽行役而南去兮税吾檝于清漣指溟渤于西北兮曰此淮流之所還彼百川之歸海兮吾固知其必然惟循源而極末兮哀予迹之未安當天時之晩秋兮風露慘其既至山峭峭而瘦出兮水紺潔而無滓曳孤篷而忽驚兮出游鱸于短葦白鷺飛而下來兮翩如避世之君子酒芳香而盈盌兮吾陶陶而日醉方頽然而遺形兮孰卑髙而賤貴彼貴者樂其府兮富者懐其資無二者之累予兮何羈游之足悲窮天下之竒觀兮極覆載之所藏膏吾車而勿反兮畢吾世而徜徉雨望賦談海天之蒼茫觀驟雨之霶沛飄風擊而雲奔曠萬里而一蔽卒然如百萬之卒赴敵聚戰兮車旗崩騰而矢石亂至也己而餘飄既定盛怒己泄雲逐逐而散歸縱横委乎天末又如戰勝之兵整旗就隊徐驅而回歸兮杳然惟見夫川平而野濶夫雲霞風月之容雷雨電雹之變非巧力之能為葢人間之絶觀必也登雄樓傑閣之峥嶸憑髙山巨海之空曠徹除耳目之障蔽而後能窮極變化之竒状嗟我居之卑湫兮束觀聴于尋丈顧所欲之莫得兮徒臨風而惆悵暮秋賦嗟予志之莫就兮哀天時之不予謀嵗冉冉以將暮兮無以蕩吾之幽憂昔吾之既有知兮獨信道而不顧鞭吾駒之不戒兮𦕈一世而獨騖儼章甫以自好兮安知越人之異容恃所持之不欺兮謂彼此之情同夫何事物之多故兮因少愚而老智彼善惡豈有常兮固繫夫一世之賤貴或指礫以為玉兮人皆知其不然衆既訛而莫返兮事隨信而名遷偽言實於衆舌兮至寶賤于獨知正無助者必危兮惡乘朋而或濟決大河而東奔兮挽予舟而上泝嗟爾檝之㡬何兮蛟龍鬱其方怒外既揆而内度兮考舊好之同異韜九襲以深藏兮固可死而不可試巻杜蘅之幽佩兮苞芳蘭之翠衣畏久畜之不揚兮時竊陳以自戲怨所資之不售兮非達人之宏規彼廢興之有命兮何憂樂之足係奏吾琴之憤怨兮酌吾酒之冽清攬芳桂與秋菊兮聊以駐吾之頽齡吾又將之夫深山兮遂絶世而逺去身九浴而後衣兮齒三滌而後咀納氷霜於胸中兮蕩焦膈之宿汚求仙人之竒術兮與彭咸乎為伍彼君子之蹈常兮曷急世之有知聊逍遥以卒嵗兮樂天命而不疑柯山集巻一
