body:
  text: 柯山集巻九宋張耒撰五言古詩喜雨四首隂陽不暫駐今夕已秋風晨興綿絲冷嵗月驚衰翁朝烟㸑薪濕小甲蔬畦空且復一杯酒吾生不終窮手種五色蕉意待聽秋雨南風扇旱日破葉萎不舉霶𩃱未終夕綠潤遽如許秋色入書幃已覺青鸞舞牆東有髙樹夏葉圓綠綺西風纔一夕蕭颯遽如此寒螿號其顛蟋蟀曉未已羣動催流光榮華難乆恃隙地秋日曉寂無鄰里音惟有草根蟲風前咽復吟悲歌者誰子徂年驚苦心青燈夜齋静微温生薄衾次韻㑹存之直舍種竹曽郎風塵表不似宰官身吏舍數竿竹鑿池水粼粼此君不可疎亦復未易親虗心澹相授頗似南郭鄰我知王子猷正是君輩人贈蔡彦規我不見蔡子杜門十日餘今日叩我門滿手擕瓊琚鏗鏘寫我前雜以貝與珠我愕不知報低頭驚且吁讀畢致於懐餘光溢衿裾坐令簞瓢室磊犖堆璠璵我拙寡所合甘為不材樗嗟君何所聞屢枉長者車我來淮南遊靄靄子之譽驊騮走千里凡馬安能逾奈予不自量痛鞭而疾驅常憂過所往疲憊傷吾軀願君少待我且欲休吾駒跳奔舎其羣子樂誰與俱俯身援其類是亦仁之徒不然但用我畏甚將逃逋何如少待之効技供子娱我無功名願與世日益踈反慕古沮溺窮年事耕鉏皇皇吾夫子憂世亦勤劬雖然竟何就孰若安以居人生各有懐未用相賢愚得樂願即止安能較錙銖又疑異所任勞逸事亦殊作歌以訊之子意當何如寄劉聲原注在海州作别君幾何時人事浩千萬身如張射侯憂愁劇强箭崎嶇走窮縣艱苦君未見未知菽水豊已感霜露變羈孤寄窮海親友誰弔唁析圖補冬裘乞米煮朝飯無聊猶自思援溺固誰願人生不終否此語非我分英䧺伏泥塗暫晦乆必現如予百不能理自合貧賤豈當議隱顯而有不遇歎但思竄山林逺脱人世患有田足耕耘有水足罩汕蕭然便終老到死百不問平生泥佛祖久已師壁觀况將無生禅下視有為幻吾子出羣材千牛有餘刃行當脱塵埃鳴佩侍清燕髙卑各有得願勿譏尺鷃不有行道人誰當佐堯舜時哉勿自滯功業在力勸握手不可期此計吾行辨寄陳九别來常思君無異饑待哺如何偶相逢握手復告去念初别子時芳草才及屨天時不可㽞冄見歳云暮出門怪子瘦告我困道路飄飄千餘里陸走復水泝古来黄金盡壯士色亦沮斯人獨何少乃有衣食慮才髙窮不怨志大貧若富吾將告君理子其聴我佈人生不終窮否泰亦有數子其保所有錐穎嚢必露古來立功名其始不無忤得難失自寡進鋭退亦遽念君歸海瀕誰與朝夕聚我方困而學每冀朋友助一從城北歸夢魂見已屢願因南來者時以尺書寓贈江瞻道我行于四方其所急者友嗚呼得之難百不一邂逅人心不可齊若十指於手随其短與長亦各有所取剛㦯硬而折柔有弱而仆質良文不揚中美外莫副寛壺泛以枵狭盎廹而陋此猶其大概瑣瑣難悉究譬如選長材棄百不一有其間雖得之猶或煩矯操我友居淮濵飲德悉自幼豈期覊旅間乃獲聞謦欬嗟君如美玉外徹中乃厚埋藏困塵埃要以不可垢他人十不一子乃得八九餘虧能㡬何不待勉而就乃知昔求艱特以見未乆但憂奔莫及敢惮喘而走我心子所知濩豁無所囿是以行於世往往得嘲詬人才如其面不自知好醜立之明鑑前乃見其可否子於我無嫌告我當苦口惟我于改過竊不敢自後嗟予廹飢寒子亦仰五斗何當兩有歸投老作鄰叟呈徐仲車朝日照高簷夜霜猶在瓦纎纎墻邉桞春色已可把殘年能㡬何奔駛劇湍瀉雖無功名求衰暮亦悲咤出門問徐子两計决取舍為當勉自修汲汲不可暇為當飲羙酒送老在杯斚子當指我途我即䇿其馬但我懶拙姿終非服勤者正月望夜示童子呼童致明燭展我忩前書顧謂爾童子此豈不足歟得意自忘偽觀一知其餘爾觀千萬燈豈與一燭殊爾豈不欲醉舉杯傾我壺爾豈不欲飽搆火烹我魚人生貪外物要以樂其軀吾求安不足安用勞馳驅贈敦復敦復想為詩目見無全牛天工忌其才小邑使拘囚漫塗以塵埃訟訊羣啾啾尚于紛紜中逸興時奔流不知誰使之瞥爾為南遊驊騮解其縶鷹隼脱于鞲山川困搜羅風月遭嘲咻舉手聊探之縱横爛琳璆不有同行人更歌而迭酬天應憫子勞乆苦暫使休柰何少縱之一放不可收歸來見我喜逸氣凌髙秋我竊不自量妄將挾其輈心知不可追子幸為我留君方嚴旗幢我亦戒戈矛將圗詰朝見百敗非予羞讀戚公恕進巻世方尚纎柔子獨不可揉人皆喜呶呶子語不出口巉然即之髙俗子競嘲詬我嘗要之難快使暴其有乃知謗之非更覺所得厚由來難小知此固可大受讀書常辛勤世務飽經構琅琅滿編文一一可推究俗儒昧事實文字工綵繡可觀不可用章甫冠土偶子能獨不然渾樸謝雕鏤寜為目前玩功見施設後知心古所難形兀實難售嗟君聽者寡風雨但孤雊又思理難常功業亦邂逅豈令匠石斤常縮䄂間手無為扣角歌且進滿尊酎但非遽可令有所待而偶干將伏黄土氣乃在牛斗顧君乆自安蔽抑寜復又與友人論文因以詩投之我雖不知文嘗聞于逹者文以意為車意以文為馬理強意乃勝氣盛文如駕理惟當即止妄説即虚假氣如决江河勢盛乃傾㵼文莫如六經此道亦不舍但於文最髙窺不見隙罅故令後世儒其能及者寡文章古亦衆其道則一也譬如張衆樂要以歸之雅區區為對偶此格最汙下求之古無有欲學固未睱君為時俊髦我老安茍且聊獻師所傳無以吾言野寄參寥春風入楚鄉與子别經嵗有客過我門携君尺書至昔我出京師倉皇省家事遂令千里别不一執君袂又聞子亦行杖履若飄駛雖成相思詩欲寫不可寄飄飄山水夢時與飛錫值乃能以書來知子猶我記浮雲隨髙風聚散未可計遲君氷雪詩濯我塵埃思送胡考甫胡公精悍姿勇氣如秋鷹兵書百萬言揮塵談如傾羞戴文吏冠慨然喜功名願得文二殳為國作長城朝廷士力盛戰馬如雲騰貔貅飽肉食武庫森神兵此豈不足用麾之若雷霆如何彼疆鄰坐敢邀金繒由來在得將選擇當至精譬如飬騏驥有御乃能行安得偉大夫長驅兩隅清淮南聽公語乃是衛霍朋終軍白面児尚欲請長纓縱横老將手出䄂盍一呈䇿馬勿自滯我將觀厥成一奮庸將驕汎灌出精英立功報天子執節擁旗旌男兒當封侯寜為老書生旦起漫漫東牖白開帷納晨光欠伸推夜枕叩齒披朝裳瓦盎汲石泉潄濯齒頰凉維兹孟夏初宿雨清髙堂栖鳥起且啅露鶯鳴更藏悠悠曉花殷落落古桞蒼西舍初鳴㫪東隣出求糧客馬已别櫪啇車欲踰岡羲和一揚輝羣動皆擾攘有生無不求誰得偃于牀人生但如此勤苦亦可傷况我病倦翮飄飄信風翔永懐中林士栖志烟霞鄉願言寄旅跡相托以徜徉庭草冉冉朝雨霽欣欣禽哺雛鮮鮮中庭草佳色日已敷童子惡其蕃謁我盡掃除我為再三擷愛之不能鉏人生羣動中一氣本不殊柰何欲自私害彼安其軀况我麋鹿性得此亦可娱延蔓藩籬間常若田野居亭亭濯露曉偃偃披風餘所嗜乃若此我生合樵漁寄荅參寥五首昔我初見子子時客京師聞名久不獲既得過所知示我一卷書大小百首詩我嗜不可輟熊蹯薦朝飢約子彭城遊念當行有期中間忽倉卒决去不子辭子後來髙郵我居淮之湄中間無百里詩句履欲馳客來得子書云子乆南歸投書不能讀恨我聞之遲使我早知此扁舟尚能追逺别不執手近居不相携毎念今悵昔耿耿𠂻膓悲子行日已南我去日已西音書不可頻何以慰我思蘇公守吳興山水方有主子兮從之遊挂錫當可駐塵埃困孤鶴念子乆失所秋風展其翼道使萬里去青雲引髙唳爽絶誰敢伍予駒欲西秣東我江海艣平生二三子往往在南土子才得所樂我拙日益魯拳拳相思心契濶不得語秦子我所愛詞若秋風清蕭蕭吹毛髪肅肅爽我情精工造奥妙寳鐡鏤瑶瓊我雖見之晩披豁盡平生又聞與蘇公復與子同行更酬而迭唱鐘磬日撞鳴東吳富山水草木餘春榮悲予獨契濶不得陪酬賡我生為文章與衆常不偶出其所為詩不笑即嘲詬少年勇自辯盛氣爭可否年来知所避不敢出諸口時時未免作包以千襲厚低心讓兒曹黙黙衆人後見君不能已頗亦陳所有君豈少取之時以佳句授幽絃喜有聽清唱慰孤奏如何瞥然去使我不得友蕭蕭江湖客踈瘐若秋竹苦心為詩章日夜撓心腹清絃無浮聲促柱有哀曲湔湔幽嚴泉一一清可掬人生于文章初若力不作及其成欲售又困瞽者目子從吳興公乃獨獲所欲得意有知賞幽懐免窮猶嗟予有所投痛學自藏覆子當慰我窮時寄書數愊夏日雜感四首我前十日至桞葉不蔽日我後十日來芳條如紺室枝間有好鳥鳴和若琴瑟渠渠哺其雛啄我園中實梢梢筍成竹濯濯草過尺心驚嵗己半念此日月疾朝來數葉隨盛憂有萎色悲哉一隂生長養從此極士而懐其居孔子亦云非賢臣事晉侯夜載使逃齊酖毒比晏安君子不可怡樂小必害大安近逺之迷野芻養騏驥當念和鑾馳一飽願即止㡬何非犬雞髙賢意有在汲汲不敢遲安能守槽櫪長伴兒曹嬉羣動入夜息我歸亦安眠脱我身上衣援枕體晏然朝日常營營有生不可閒羲和戢其光幸此須㬰間人生一世中大小無百年胡為不自睱長抱勤苦歎才者勇設施誕者夸勢權彼有驅其心欲休諒無縁我本與世踈少慵老成頑何為不引去坎坷行所難娟娟簷前月雖缺猶媚好團團理絲蟲養身恃其巧無能老蝙蝠乘夜出堂奥那能捕飛蚊未解聒耳閙悲歌草間蚓辛苦自鳴噪爾生可以黙何所欲而躁鳴蛙訴其渴謂若天可禱瘖蟬死不鳴豈以訢無效悠悠羣動情誰得辨醜好我歌豈徒然亦用自警告和周楚望宿雨生曉潤繁雲滋暑隂我居廢不葺常苦積雨侵果墜厭風惡草沉知潦深拳拳抱幽歎耿耿嬰煩襟吾子乆不來幽居誰見臨飄然得秀句生我江湖心一官亦漫爾勤苦安能任何當舍此去拂我塵埃琴飢寒仰五斗求尺而㤀尋悲我復契濶誰復知吾音秋日晨與寄楚望夜雨霽清曉浮雲散凉川幽人理青髮汲彼石井泉焚香展素帙持珠諷妙言晨暉淡悠揚秋霞䴡紺天萎花開露餘孤葉零風前感此芳節晚長嘯心悠然傾觴散滯念粲菊留華年牢落嵗暮心非君誰與宣感秋呈宏父兼呈周楚望三首西風吹我舟繋䌫岸邉桞蕭蕭落船葉日夕煩我帚心驚芳嵗晚日月去如走搔我鬢邉髪少壯寜復乆平生拙謀身辛苦為五斗茍逃飢寒憂不敢擇所受心因摧折低面若塵埃垢拳拳警前勇俛俛蹈新闕功名委之命寜足計薄厚獨遺古人書千古相獻侑我烹亦有魚我酌亦有酒非求與俗違聊以安吾守西風中夜來飛雨隨以至攬衣不能眠起坐為涕泗炎蒸雖云酷香草猶可佩清商來無情凋我蘭與蕙吚吚草蟲悲裊裊露蟬嘒高梁燕如客鎩翮鷹方鷙乾坤本無心萬物隨一氣如何於其間感愴坐自累置之勿復道得酒但知醉陶然杯杓間蕭洒無餘事浮雲無停隂急雨來清秋颯颯水上風吹我千里舟二年客淮楚乞米充飢喉空堂堆詩書冷落妻子羞操舟將何之漫浪為西遊豈不厭奔走貧賤無良謀人生天地間如萍水中浮安得必所往南北但隨流逹者知其然委已任去留止若寄渚雁行如浮海桴萬物本無事百年漫多憂𡨕懐付造物俯仰予何求和登城依子由韻步登髙城望望望殊未己惟時嵗將窮冬孟月魄死紛吾方有懐一坐為三起悲歌撃枯枿聲與淚俱至人生隨大鈞命不貸君子付之無如何外垢資内洗前知賤終吉外頗與愚似開門張瓊瑶誰者目不寄支離冐多福嬋娟畏獨羙舉頭蒼天髙歎此青雲士酌公芳尊酒願公百憂止履善神所勞委置目前事西華道中我行陳許郊千里平若掌居民雜荆榛耕少地多曠野兔乍跳奔驚鳶或髙颺喬林多疾風寒澗有餘漲棘籬蔽茅屋雞犬入村巷主人掃土塌秣馬具朝餉童児汲土井敗飯堆瓦盎勿悲為生陋自足無他望嗟予走薄宦奔走年將壯長抱羈旅愁何時税歸鞅泊南京登岸有作呈子由子中子敏逸民客行嵗云暮孤舟衝北風出門何蕭條驚沙吹走蓬北涉濉河水南望宋王䑓落葉舞我前鳴鳥一何哀重城何諠諠車馬溢四郭朱門列大第高甍麗飛閣湯湯長河水赴海無還期蒼蒼栢與松岡原常不移覽物若有歎誰者知我心口吟新詩章予撫白玉琴鳴琴感我情一奏涕淚零子期乆己死何人為我聽推琴置之去酌我黄金罍幽憂損華姿流景良易頺宿合溜驛空庭野雀噪客至休我駒盡日衝塵沙解裘振裳裾熒熒青燈光夜永寒堂虗破忩見星斗明月照廣除搆火旋烹煎妻児具盤盂強飯一為飽困眠體㣲舒嗟我山野姿懶拙與世踈如何強所難忘躡仕進途己習未易舍欲行倦馳驅悲哉不早計既晩空嗟吁至日離許州先王重至日静息資㣲陽閉闗絶啇旅后為不省方我獨何為者古寺嚴晨裝酌酒飲僮僕披裘冐朝霜眷彼道路人熈然樂而康尊酒迭為夀華衣冐鮮粧懐古固非士逺客亦可傷悠哉任行止且復傾吾觴沈丘道中霜霧沈逺星芳林語春鳥客眸帶餘睡馬力健清曉凝烟披草際初日動林表心隨和風快興與飛雲杳芬菲悵已晩夏隂生桑棗慷慨一㨿鞍此懐殊未了感事二首投老益無趣誤為世塵嬰飄然欲脱去疲弱安能耕始謀苦不臧妄欲事功名中路两不可徬徨始嗟驚囘轍愴己晩悠悠事遄征萬物各有求我生安得寜自古衣食勤物生無時閒春耕望時雨厚土常苦乾舉頭呼天公天逺安得聞幸此中夜雨瀟瀟洒中田天人兩異情相值良獨難水旱與豐年由來皆偶然愚夫苦多怨智士即而安我歌寜獨此萬事一嗟歎漫浪翁劉壯輿年過壯乆不仕嗜學著書自名漫浪翁所居之園林堂室皆以是名之求予為詩因記之堂有書萬卷園有竹千竿逍遥于其間漫浪追昔賢乃祖首陽人疾世餓空山堂堂秘書公赤手犯鯨鱣後來得吾子門户真有傳己信懐道貴預知行世艱婆娑欲頭白不肯弹其冠我頃未見之千里知肺肝不惜委珠玉投我書數編我窮安放逐老去頗知田君獨胡取之學問攷淵源江鄉嵗已晏幽獨抱悁悁何當一杯酒與子相周旋發岐亭宿故鎮三首我别竟陵時楚稲如碧絲秋風發齊安稲穗如植旗流年去荏苒客路何逶迤弛擔終未卜永負山中期乘月入秋山月午山蹊静森森松竹林夾道散踈影隂風留暗壑白露䝉朝嶺耿耿村雞鳴坐感单衣冷征人不敢安蓐食待明發潤衝石上雲冷踏松間月艱難付一笑嵗月驚屡閲偃亞道傍松茯苓應可掘獨遊東園清曉步東園獨遊悵無侣菰蒲緑己深鵝戯春塘雨取酒就花傾隔林邀客語歸來春興䦨睡起日停午同毅夫賀無斁教授吾聞寃句民盗若春竹笋異時用武吏摶撃縱鷹隼洋洋劉太守原注貢父治曺不用刑而盗衰豈弟發素藴凶年盗乃減見謂君子敏先生衍詩書循吏副憂軫庶㡬從風靡少緩束濕𦂳君家龎眉伯學行我標凖捧書見華髪應為一笑聽喜晴有感呈晁郎山城滛兩霽牕户含餘清老人午睡足杖䇿遶荒庭長夏吾廬秀清隂交衆榮茫茫榛莽中萱草揚其英植杖視天壤悠然感浮生淹泊且無歎人事亦難恒一旦舍此去觸物不無情何為乆戚戚遇酒但知傾春雪二首春雲驕不行凍雨作飛雪夜深歸無燭已覺馬啼滑那知事未己通夕注不歇堂寒曉附火簷滴更清絶前者城東遊桃李粲己發隂陽不可料寒氣晚猶洩青青髙坡麥舊事日可閲當春望時雨盛雪或為孽生民常苦勤不敢愛膏血如何待一飽常苦神物奪茫茫元精理未易論本末解裘換斗酒莫畏衣百結天寒城南寺門外無馬迹東風雪疾消春泥深一尺豈無老欵叚畏蹶不敢䇿還歸見児女怕冷不下席揚雄𤣥未就雙鬢颯已白雖云客載酒此意終岑寂功成則有命生事亦人力胡為不自勤守此欲何獲田桑既有裕醪醴亦餘溢嗟哉好事客從古百無一柯山集巻九
