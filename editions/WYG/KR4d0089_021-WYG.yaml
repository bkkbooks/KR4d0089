body:
  text: 柯山集巻二十一宋張耒撰七言絶句吹角斷霞歸鳥隔山鐘日過西山轉海空長恨南城催曉急五更吹角怨秋風登乘槎亭海天秋霧暗乘槎風響空山浪巻沙杳杳艣聲何處客一帆衝雨暗天涯臘荒秋野水間荆榛惟有青山日對門草木向隂猶帯雪風光近臘已如春題宅後井原注泉色正白清泉十丈白如漿甘似醍醐透椀凉君欲道中無渴死百尋操綆莫辭長和房日嚴換武詩青衫厭著待封侯慷慨知君定逺流莫歎書生長齷齪元戎曽與報更籌春磔牛門外色初分共喜釵頭彩勝新花萼怯寒猶積雪鳥聲催報已知春感春三首日長殘雪滴高簷院静人閒風度簾可是嵗華隨日好故應愁恨逐春添氷消水面波光動日暖樹梢花意歸世上繁華隨日好却應春淺勝芳菲梅稍栁眼㺯春嬌雲暖南山臘雪消近郭樵漁成野市逺林簫鼓隔溪橋荒園荒園午日照青蕪樹罅鳴鳩相應呼一片隂雲送山雨漸漸新麥地親鋤小雨蕭蕭小雨不能收一霎西風便似秋枕席夜凉燈火暗丁丁更漏隔南樓㸔花風暖日高花氣動鳴鳩乳燕自求羣經營美景還詩匠傾掃頑愁頼酒軍題唐宋輔城上小樓二首沙田小雨不成泥一帯溪光照翠微逺目直隨殘日盡晚雲還望故山歸近郊小徑絶人行水滿菰蒲取次生沙岸雨來長集燕桑田深處忽聞鶯晚歸學省歸來門巷秋伴眠書史滿牀頭低雲漠漠梧桐晚屏上江山亦解愁秋日落星稀河漢微清秋一㸃水螢飛凉風白露愁先覺可待梧桐報即知調全玉病二首維摩丈室自蕭然病起新凉得恣眠我愧聲聞難問疾想君獨對㪚花天詩將收功久戢戈羸師再鼓奈疲何想君無物驚禪定獨未能除是此魔女几山不復當年端正樓多情猶問故宫逰山川不改繁華盡須信人生一世浮昏昏昏昏落日下墻東歴歴晴雲送去鴻嵗晚蒼槐甘老大盡將黄葉付秋風謝仲閔惠友于泉原注上上多紫竹地吉泉甘慶所鍾直疑遥與惠山通曲肱煩暑都消盡如卧蕭蕭紫竹風貧病投劾乞補外官親友問者以詩答之卑如揚子官執㦸貧似玉川居洛陽不敢彎弓輕妄射争如覆被逐山郎楚王十二巫山聳翠巒楚王宫殿玉㠝岏定知為雨為雲處不似當初夢裏㸔宋玉雲雨朝朝峽裏興可能無復夢中情巫娥若問誰為賦敢乞君王道宋生項羽沛公百萬保咸陽自古柔仁伏暴强慷慨悲歌君勿恨㧞山葢世故應亡范増君王不解據南陽亞父徙誇計䇿長畢竟亡秦安用楚區區猶勸立懐王蕭何蕭公俯仰繫安危功業君王心獨知猶道邵平能緩頬君臣從古固多疑韓信登壇一日冠羣雄鐘室倉皇念蒯通能用能誅誰計䇿嗟君終自愧蕭公賈誼賈生未免孝文疑自古功名嘆數竒逐得洛陽年少去白頭絳灌亦何為李廣李廣才非衛霍儔孝文能鍳不能收君王未是忘征戰何待高皇萬户侯東方曼倩軒冕功名何足為先生聊作易農資漢庭誅死皆卿相猶説才能勝滑稽成帝百華衣上漬餘香夜照猶煩蚌有光解道温柔勝武帝不知壯髪似元皇趙飛燕苦心膏沐不論貲富貴人生各有時直使中流畏仙去君王何啻似嬰兒朱雲直言請劍斬安昌勿謂朱游只素狂君㸔漢家文景業張侯能以一言亡孔光鄉原世盡謂醇儒漢室傾危孰與扶試問不言温室木何如休望董賢車梁兾力回漢鼎未收功又道將軍世上雄不悟折腰同齲齒百般裝束為秦宫殷浩田野高風過有薫廟堂經畫竟無聞固應竹馬思元子江左興亡不在君偶成低雲著地曉悠悠雨濕簾旌不上鈎江北江南千萬里年年長向此時愁傷春浮雲冉冉送春華怯見春寒日欲斜一夜雨聲能幾許曉來落盡一城花七月六日二首月落暗蟲啼不休五更白露曉悠悠西風是處將摇落可但梧桐獨報秋積雨空堦生緑衣幽幽㸃㸃弄秋姿黄昏樓角㸔新月還是去年牛女時元忠學士八兄耒離京師逺䝉追送許惠服丹法託故竟未惠及賦五絶句身逐孤舟似斷雲故人追送尚殷勤秋城夜泊西風岸落葉悲蟲獨自聞衰栁苦催空壁月悲蟲眞弔短檠光無情少壯抛人去只有窮愁氣味長欲盗羲和一㸃春五更注想隔重雲如何但欲獨不死分我刀圭未費君昔見將軍破虎韉玉堂曽共掃千言功名老去皆蹉跌相見諄諄勸學仙無復顚狂似少時逢君猶自説蛾眉玉堂舊事君休念雨袖啼痕又送誰閒歩枝上啼鴉巢欲成晴簷向日乳鳩鳴可憐霜雪餘威盡春草無名著處生寓楚題楊補之官舍一辭螭陛走天涯客路悠悠老嵗華住乆不知身是客自來堂下採黄花傷春四首曉雨催春不惜花亂紅飄泊委泥沙傷心憶得年時事白髪風前只嘆嗟紅杏墻頭最可憐膩紅嬌粉兩娟娟曉來併逐東風盡容易分飛又一年嫩紫妖紅惜不得亂隨風雨㸃蓬蒿荒田野草花開晚主管春光輪爾曹高樓春晝獨驚心白日閒雲亦自隂風雨催花花已盡滿城新緑亂鳴禽三鄉道中遇雨蕭蕭古道西風雨慘慘黄昏匹馬行未遇功名莫嗟嘆逢時更自憶平生題南禪院壁二首乞食高僧午未歸秋庭落葉日暉暉蕭條古寺松隂下簷鐸風中乳鴿飛秋林落葉已斑斑秋日當庭尚掩闗掃榻晝眠聼鳥語可憐身世此時閒次韻王彦昭感秋三首木落風高秋雁歸初晴野水漲清伊東流㑹向淮南去慿寄秋來無限悲年來詩酒最闗身滿酌休論薄與醇愁見洛陽秋夜月無情偏照不眠人塵埃容易㸃吳衣澤國秋来信息稀想見淮南初木落秋雲秋水鴈初飛絶句三首藹藹晴郊花氣浮午窻正睡擁駝裘覺来鳥雀茅簷静屋角春風怒未休照水輕明楊栁枒隔林相映占巢鴉東風香草城邊路到處人家盡是花淮上春風萬鼔鼙落㠶舟泊岸邊磯喧喧野市殘陽裏沽酒攜魚客散歸雨後逰朱園綠葉隂隂䕶翠枝晚花雖小亦應稀東風不惜殘桃李吹作春愁處處飛酒病中寄李十二招飲五首班郎握筆未封侯嗜酒揚雄欲白頭寂莫著書誰作伴兩枝風葉碧梧秋酒病岑岑更怯寒一窻䟱雨擁衾眠西風一入庭前樹便有秋聲到枕邊乍晴二首洗来桐葉晚青青積雨䦨干暗菌生􅉹角半傾苔暈合蕭蕭風草一蛩鳴虹長飲雨川無滴蘋末生風沼有波一掃煙雲不知處夜天如水㵼銀河雜題二首寒雨蕭蕭桐葉驚浪浪還作夜堦聲西風忽起幽人覺枕簟凉時向五更蒼蒼落月井梧西睡覺幽人自巻帷只有林鶯知夢斷曉庭人静語移時徐園閒步二首平田小雨潤新耕曉日園林信脚行襯歩野蕪吹面栁可憐春物總多情動地春風晚未休吹花折栁却成愁塵埃不用頻車馬獨卧􅉊毺正擁裘雜詩二首邾城山下梅花樹臘月江風好在無争似姑山尋綽約四時長見雪肌膚病腹難禁七椀茶小窻睡起日西斜貧無隙地栽桃李日日門前自買花絶句伏暑新除風露清五更山舎一雞鳴幽人枕上朦朧睡卧看東岡次第明赴官咸平蔡河阻水泊舟宛邱皇華亭下三首怒河憑雨正奔流踏跕卑梁滯去舟淹泊我生應有定不須歸怨一汙溝裊裊悲蟬古栁風水邊幽草巳鳴蛬長河未放羲和宿却放斜陽更向東夜空如鑑碧新磨倒影䟱星亂素波天色水光無别處為君垂手攬銀河春雨中偶成四首廉纖小雨作春愁吹濕長雲漫不收架上酴醿渾著葉眼明新見小花頭槐葉青青染不如䕶巢鴉語有新雛蕭蕭晚雨窻鳴急卧穏藜牀玉枕書天低芳草接浮雲萬栁含煙翠不分燕子歸時花徧落暮雲和雨入黄昏春隂只與睡相宜卧聼鳴禽語復飛一縷斷香浮不散何人深院晝熏衣春詞二首殘紅新綠間鞦韆寒食園林人意䦨一陣春寒花上起畫廊連夜雨珊珊靄靄芳園誰氏家朱門横鎖夕陽斜鳩鳴鵲噪閒庭館盡日春風吹百花遣興百感摧傷强對春看花花畔獨沾巾祇應閉目林中坐須學無言壁下人潮水二首水滿清淮自在流落花吹盡浪悠悠總將春雨為春淚未比思君一半愁近来消息愈堪猜飛鳥無情不肯迴惟有清淮慰人意春流日日自東来夏日池上三首新蟬上樹空遺蛻野雀哺雛爭小蟲粉沾衣袖竹枝雨香滿水亭荷葉風落日鳴蟬夏木荒芙蓉半落栁成行何人紈扇生新恨亭館迎秋夜夜凉拒霜灼灼欲破紅夜来雨落荒蘭叢空亭無人日色午但聼桐葉驚秋風秋日即事三首支離卧病不知秋暑退初驚大火流蟋蟀知時鳴近壁銀何照夜直當樓蕭條嵗晚搔雙鬢流落天涯念舊逰惟有醉來心暫展無錢沽酒合長愁蕭蕭衰草傍墻生中有寒蟲白日鳴秋物荒凉禾稼熟悠悠驅馬水邉行秋雨二首南山雲起滿庭隂薕幕初凉七月深桃子壓枝桐葉老連綿風雨作愁霖離披衰栁已無蟬黄葉閉門風雨天陶令無錢難得醉竹窻過午枕書眠秋夜寄逺秋晚蕭條風露清星河耿耿漏丁丁袛應新月頻相見長向玉樓東畔生秋夜微雲淡月夜朦朧幽草蟲鳴樹影中不待南城吹鼓角桐聲長報五更風逺思裊裊霜風吹碧梧孤城殘角奏單于山川浩蕩愁千里樓閣黄昏月一梳柯山集巻二十一
