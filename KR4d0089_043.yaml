body:
  text: 柯山集卷四十三宋張耒撰傳任青傳任青壽春人少無賴為盜以智數雄其黨有聲羣盜中然青為盜不多殺害為濟所欲不多求稍有以賢其類矣里儈有善驢其值數萬錢儈愛之所以圉備之甚固盜數取之不得于是里少年聚數萬錢邀青曰子能得驢則請以錢為君壽不能得君妄得名也青笑謝少年辭不能少年固強之青曰具飲夜半吾乘驢來詣君矣雖然願以是為戲卒事請以驢還儈少年曰諾夜半青懷刀超其垣入儈繫驢房外鎖驢前足無可解理青即解刀微刺驢足間見血以刀擊地跑者久之僧聞使童疾走燭視驢青疾起匿童即語鎖齧驢足流血矣僧即取鑰命童解鎖童去寢熟青即牽驢自其門出疾驅而至少年所一座大驚明日乃使謝僧還驢曰吾以為戲願勿罪也其多智數率如此後稍聚黨罪過數發吏捕逐不得聞朝廷詔使招出之青即自詣壽春詔以補卒太守使捕部中盜往輒得境為無盜以勞稍遷等後數得尤賊詔授官至右侍禁元豐三年河南伊陽賊張晏聚黨抄掠傷吏士朝廷選青為伊陽巡檢五年盜劫伊陽之小水青追盜至福昌豫因見之青長六尺餘慷慨敢勇持刀入山獨行二百餘里以一時往返然貌恂恂謙恭事士大夫甚謹惟恐不當其意居官小心畏法亷潔御下有恩其語捕盜甚有方略云先是朝廷興師取靈州陜西轉運使李察當領徒從大將髙遵裕軍出塞察與青有舊恩奏辟青從行遵裕軍疾驅入塞察數危窘矣青衛之夜則被甲守其寢撫左右得其歡心察卒賴以全者青之力也張子曰青始強暴為賊盜後乃折節士大夫或愧焉其始蓋無有教之者故也夫中道為善猶不失為士况終始于善者哉然青才有過人者彼雖為盜固有以自異也竹夫人傳夫人竹氏其族本出于渭上往往散居南山中後見滅于匠氏武帝時因緣得入上林中以髙節聞元狩中上避暑井泉宫自衛皇后已下後宫美人千餘人從上謂皇后等曰吾非不愛若等顧無以益我吾思得疏通而善良有節而不隱者親焉于是皇后等謝曰妾得與陛下親沾渥多矣而不能有以風陛下罪萬死于是共薦竹氏上使將作太匠銛拜竹氏職為夫人既進見夫人衣緑衣黃中單上笑曰所謂緑衣黃裏者初夫人家久見滅上曰爾滅亡之餘也夫人謝曰妾之滅亦大矣然夫人未嘗自屈體就帝帝每左右擁持之上有所感時召幸後宫寵姬而夫人常在側若無見焉而諸幸姬等皆相謂曰是謂善良者安能間吾寵由是莫有妬之者是時上方郊五畤祠太一以致神山率常齋戒自祓除而每召夫人有所逰幸諸將軍幸臣等更為帝携抱夫人以從帝亦不疑也上幸汾隂祠后土濟汾水飲羣臣作秋風詞歸未央坐溫室夫人自此寵少衰上謂夫人曰而苐歸善自安明年夏吾召卿矣明年夏果復召夫人夫人見上中不能無小妬由是罷之而遣將作大匠選于他竹氏使加職焉夫人居後宫至孝成皇帝時猶無恙是時班媫妤失寵作紈扇詩見怨夫人讀之曰吾與若類也然爾猶得居篋笥乎至王莽敗漢軍焚未央夫人猶自力出然遂焚贊逹磨真贊靈山會上舉示一華迦葉微笑空葉生風鼓動羣有遂號萬竅枝葉芬敷去本愈遠知者得要世間凝然一味法界孰粗孰妙老胡鼻孔在手裏一任勃跳紫君贊有序紫君者豫紫竹杖也世以君命竹久矣輕堅滑澤有足嘉者云青龍之孫被以紫綃其理也象其堅也瑤其腹心清虛而表甚粲其文理疏通而節甚高得之黃岡從我逍遙翼我衰疲孔武且勞誓與汝歸侶我簞瓢不願同雕幾以寵強國惟可奉賢老以步王朝秋乎有知母我獻嘲新開朝天九幽拔罪懴贊有序廬山太平觀蓋唐開元中所建九天採訪使者之祠其地邃潔而嚴清故四方之為道者樂居之又為藏室以藏道家之書蓋無所不有而獨所謂朝天九幽二拔罪懺者久之未補道士溫信之謂二書皆衆真之格言拯下民之多罪援之淪墜教以自修在道家尤重者也其可使學者不見乎乃獨丐錢于旁郡凡一年得五百千而二書復完又模散印施使人皆獲見焉非立心誠篤用力勤久者能及此乎紹聖戊寅歲豫謫官齋安見信之有求于人而問焉信之以告我故于二書之成也求豫紀之為之贊曰上真高居憫下民兮導以格言出苦淪兮昔亡其書今復新兮誰力成之道士溫兮疇嘉爾心有至神兮報之以福名不泯兮衛靈公贊有序昔衛靈公有臣史魚將死而命其子曰吾不退瑕而進蘧生不能正君則死不得備禮致尸牖下于我畢矣靈公弔而問焉其子陳父之義靈公愕然引咎在已命改殯于客之位進蘧黜瑕衛國以治嗟乎後之人君非無忠臣端委立朝諫説諄諄兩耳洞然聞如不聞其暴戾者斧鉞乃陳孰肯既死愧其僵尸追用其言以禮致哀嗟乎靈公衛之淫君所立如此宜免其身作此贊詞我思古人徐翁真贊有人之形無其情塊然獨以其形立聰明睿知守以愚微妙玄通不可識銘淮陽郡黃氏友于泉銘東出譙門少南馳十三里有井焉其味甘冽故駕部郎中黃公諱好謙卜葬其親汲而異之問諸野人曰是友于泉也何以得是名哉曰昔有兄弟灌園以奉親者鑿井而得甘泉邦人美之以名其鄉即其地也公曰地名勝母曽參不入邑號朝歌墨子回車今吾將卜窀穸之事而遇斯泉吉孰甚焉遂葬諸泉上而公益以孝弟著至公之子若孫皆雍雍如也人以是泉為祥而以公家敦睦為法式昔有南遊過貪泉而酌之比及南海裹其珠璣以走其貪如此泉之能移人也甚矣貪自其心而發于泉然則友于獨不發于泉乎蓋志士取舍亦自有道不得不徇其名夫柏人者以為迫于人也邪蒿之不可以食世子皆惡其名也不然曾墨之所以去人者彼皆非歟公既葬其親遂以泉遺子孫子孫世飲斯泉則孝弟世相守也守孝弟者天必豐之以福吾以是知黃氏之大未可量也敢請銘之銘曰孝乎惟孝兮友于兄弟公之懿德兮實天所啓啓我以兹泉兮其井如醴以羞祭祀兮以餴以饎我銘其泉兮名以定體世飲是泉兮雍雍濟濟咨爾後人兮勿忘周禮李援宴坐室銘騰跨九州蹂踐大千而我室中宴處超然謂吾騁兮吾固在定孰謂吾寂皆作皆應是中不立一塵則與維摩同境偈求畫觀音像偈補陀仙人勝第一以一願力救諸苦慈護十方如日月衆大受用光明中是故一切當供養如人知飽必敬穀我于往劫曾承事今世獲聞無上號願見淨月妙眉目黃子施我化佛身如影于物不可取而一一具諸色相願以是觀無上道受者非貪施非愛于未來世作妙緑施者能度受所度評評書唐世秉筆之士工書者十九蓋魏晉以來風俗相承家傳世習故易為工也下及懿僖昭哀衰亡喪亂宜不暇矣接乎五代九州分裂然士大夫長于干戈橫尸血刃之間時時有以揮翰知名于世者豈又唐之餘習乎如王文襄之小篆李鶚之楷法楊凝式之行草皆足以成家自名至羅紹威錢俶武人驕將酣樂于富貴者其字畫皆有過人及宋一天下于今百年學者優遊之時翰墨不宜無人而求如五代時數子者世不可得豈其忽而不為乎將俗尚茍簡遂廢而不振乎抑亦難能而罕至乎往時蘇子美兄弟皆以行草見稱于時至今殘編斷簡人間藏以為寶自二子亡君謨繼之非獨時人莫與為比前世能者亦罕過也君謨所書亦多為世所寶而荔支譜永城縣學記特又其精者是可珍也故聊志之云評郊島詩唐之晚年詩人類多窮士如孟東野賈閬仙之徒皆以刻琢窮苦之言為工或謂郊島孰貧曰島為甚也曰何以知之以其詩知之郊曰種稻耕白水負薪斫青山島曰市中有樵山客舍寒無煙井底有甘泉釡中嘗苦乾孟氏薪米自足而島家俱無以是知之耳然及其至也清絶髙逺殆非常人可到唐之野詩稱此兩人為最至于奇警之句往往有之如雞聲茅店月人迹板橋霜則羈旅窮愁想之在目若曰柳塘春水漫花塢夕陽遲則春物融洽人心和暢有言不能盡之意亦未可以為小道無取也案雞聲茅店月一聨乃溫飛卿詩栁塘春水漫一聨乃嚴維詩此誤屬賈島柯山集卷四十三
