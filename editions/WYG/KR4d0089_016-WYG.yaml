body:
  text: 柯山集巻十六宋張耒撰七言律詩出都有感來時雪盡花初發歸去桞隂蟬亂鳴四序風光半為客百年飄泊一浮名春來多病思髙卧老去違時畏後生若有黄精換華髪敢隨車馬到髙城贈别何道士疎散多違久自知形骸况復病先衰全身幸免誅三獻避世何勞賦五噫聞説永嘉饒水石便思輕帆向天涯郤嗟病翮傷摧甚孤鶴髙飛不得隨北橋送客橋上垂楊繫馬嘶橋頭船尾插青旗船來船去知多少橋北橋南長别離亭上㡬傾行客酒遊人自唱少年辭百年回首皆陳迹浮世飄零亦可悲九日獨遊懐故人故人分散在天涯九日登臨獨嘆嗟人世光隂催日日鄉閭時節自家家風烟滿眼臨秋盡鼓角荒城送日斜取醉憑誰正烏㡌遣愁猶强挿黄花夜木落風髙砧杵傷孤城更漏入秋長寒生疎牖人無夢月過中庭樹有霜報落梧桐猶隕葉知時蟋蟀解親牀年年多病渾無寐静對楞嚴一炷香早春輝輝暖日弄遊絲風軟晴雲緩緩飛殘雪暗隨氷筍滴新春偷向桞梢歸可憐鬢髪蹉跎老每惜梅花取次稀何事都城輕薄子買懽酤酒試春衣上元日駕回登樓二首紫霧氛霏閶闔開團團明月上天來香車百兩天街晚清蹕一聲仙仗回燈隔晝簾時閃爍風穿髙幕故徘徊太平日久多閒暇簪笏從容侍燕杯長街十二逺相通閶闔峩峩彩霧紅天白華燈交皓月樓寒朱幕蕩春風車頭笑語歸時醉城下傳呼夜向中自古長安多樂事周南留滯意何窮原注予方寓陳探春有感二首出城但怪風光老草色蒼茫桞色深烟樹逺浮春縹緲風光不動日隂沉芳郊未厭縈紆入美酒何妨取次斟羸馬青衫亦何事一生空負野人心桞萼䝉茸待放綿櫻桃新葉大如錢深春冷落花殘後寒食朦朧月淡天獨坐每將詩作伴遣愁安得酒如泉傷心千里休凝望城外東風早滿船暇日同孫畢二同舍遊李氏園亭蕩蕩東風散客心出門驅馬問園林花房待暖徐徐放桞色隨春旋旋深城郭逺來無俗客松篁深處有幽禽王公留壁題詩句應許騷人盡日吟暮春夜雨輕寒拂曉晴牡丹開盡過清明庭前落絮誰家桞葉裏新聲是處鶯白髪生來如有信青春歸去更無情便當種秫長成酒逺學陶潛過此生秋興薄雲閉日晩悠悠簷雨蕭蕭急未收佳樹已彫今嵗葉西風還是去年秋蹉跎不奈時驚客牢落惟憑酒散愁多病支離欣得睡晩來凉氣滿衾裯秋雨二首急雨凄風未肯晴墻隂先報候蟲鳴掃除暑氣驅三伏催促秋聲向五更美酒若能斟靖節二毛偏解著潘生醉來真有無窮意老去何勞浪自驚陋巷柴門揜寂寥一忩風雨晩蕭蕭清秋漸冷尤宜懶閒日苦長無處消烏几青笻扶病弱青琴黄巻伴逍遥交朋南北音書隔雖有芳樽誰可招夀陽樓下泊舟有感夀陽樓下清淮水帆去帆來何日休浮世十年多少事風烟依舊别離愁樓頭夜静行人絶樓下影斜淮月秋不道孤吟不能寐一聲羌笛怨誰舟和桞郎中舒州潛菴二首浪走塵埃竟未甘仙郎六十制潛菴門前山色雲侵坐峰下秋光水滿潭野鶴避人巢古木清猿乘月嘯寒巖從今不作軒裳客多買烟霞未是貪蒼顔華髪未能甘欲覺長年先創菴坐久烟嵐開翠壁夢回雲雨起寒潭松風夜掃鳴琴榻溪溜晴分種藥巖不是仙翁有仙骨幽竒争許世人貪將至夀州初見淮山二首浩蕩平波欲接天天光波色逺相連風鳴雨槳初離浦岸轉青山忽對船澤國秋髙添氣象人家南去好風烟步兵何必江東走自有鱸魚不值錢晩繫孤舟古岸隈蒹葭風定渚鷗回山兼野色蒼茫去月向淮心晃蕩來秋色解將愁並至年華偏與客相催青衫手板徒勞爾富貴功名安在哉晩發夀春浮橋望夀陽樓懐古烟水蒼茫古岸髙危樓縹緲枕波濤山圍粉堞青屏合橋跨長淮百艦牢争戰往年空故國登臨行客嘆前朝青旗試問誰家酒風雨蒹葭晩渡遥夜泊逺雁初歸楓葉乾孤舟晩繫岸邉灘淮聲夜静凌風壯月色秋深照客寒疎拙功名甘濶畧飄零蹤跡但悲嘆不闗酒薄難成醉自是年來少所歡將别普濟二首老槐疎竹寺門幽九月輕寒襲客裘漠漠淮烟天際晩蕭蕭山雨坐中秋風前紅葉知時落籬下黄花對客愁為語老僧無我笑此生終待老林丘孤城淮北晩鐘殘落日橋邉送客鞍物外樓臺秋更豁山深松竹晩多寒忩風細細侵衣冷簷雨蕭蕭到夜闌佳境欲留嗟不可塵埃蹤跡但悲嘆發泗州萬艘獵獵戰風桅我亦孤舟别岸隈漠漠曉雲生木末蕭蕭飛雨送帆開消磨嵗月書千巻零落江湖酒一杯因病得州真漫爾功名於我亦悠哉病中得晁應之秋懐詩西風堂下飛黄葉病卧空牀白日髙疲苶扶行孤竹杖蕭條隐几兩霜毛散花有客談真實燒藥無人過寂寥怪得晩來頭目快新詩秋興苦飄飄夏日雜興四首隔墻泉下是東溪細溜涓涓入我池一部笙簫寒竹響百年風雨古槐姿果懸幽檻朱初熟蔓度空墻翠欲垂野趣轉深身愈老故應寂寞畏人知無地從容解鬱陶寄懐林野散塵勞含風槐桞參天合足雨桑麻映露髙五斗得官迷簿領一㕓何處斸蓬蒿致身富貴須年少顧我衰遲已二毛墻下溪流清且長夾溪喬木雨蒼蒼裊風翠果擎枝重照水圓荷舞葉凉蝸殻已枯黏粉壁燕泥時落汚書牀南山野客閒相過贈我能携藥滿筐蔬圃茅齋三畝餘溪光山影動浮虚病妻老去惟尋藥稚子年來解愛書中散無堪心放蕩馮唐已老興蕭疎全真飬素安吾分敢謂軒裳不我如清明日卧病鶯花零亂清明日巾褐蕭條老病翁烏鼎相親勤煮藥素屏深坐怯當風愛花未免呼兒摘畏雨還成對客慵自嘆年來怨青鏡衰顔改盡少年紅水南春望洛岸東風送馬行橋横落日半川明天連觀閣雲垂地春入山河秀滿城老去飄萍甘屏跡興來懐古未忘情短歌一曲聊回首不待悲秋白髪生春日遣興洛陽自古帝王都百戰荆榛只故墟零亂園林遺物在嬉遊人物古風餘草迷公子障泥錦花近佳人油壁車漂泊强隨遊客轡不辭塵土汚衣裾送楊補之赴鄂州支使相逢顧我尚童兒二十年來鬢有絲涕淚兩家同患難光隂一半屬分離扁舟又作江湖别千里長懸夢寐思何日粗酬身世了卜鄰耕釣老追隨送楊念行監簿侍行赴鄂渚楚天南去水㝠㝠鄂渚悠悠到幾程京洛信稀千里隔江湖春盡一帆輕莫辭送别青春滿㑹是相逢白髪生飽讀詩書取卿相不應如我老無成送三姊之鄂州兄弟分飛各一方老來分袂苦多傷兩行别淚江湖逺五月征車岐路長休嘆伯鸞甘寂寞所欣楊惲好文章原注克一甥苦為詩北歸㑹有相逢地只恐塵埃髪易蒼正月六日楊桞梢頭臘雪消東風猶著晩寒驕新年花桞傳芳信去臘星霜變斗杓來共春烟情冉冉洒隨疎雨淚蕭蕭蛾眉一閉年華改縱有遺魂可得招遊李氏園堂下新年見草芽驚心强起探年華桞呈雪後青蒼幹梅破風前一兩花綽約風光新物態栽培園沼好生涯奔馳世路吾何有一到林塘一嘆嗟寄榮子雍蒼茫臘雪欲成泥又見東風上桞枝萬事過前渾是夢百年投老只添悲功名末路收常晩節物驚心空自知千里故人猶念我書來辛苦話相思題朱氏園東風邀客入芳菲夾徑吹香李萬枝啼鳥逺聞知晝静好花相續得春遲連檣東去淮天濶緑野南環楚澤卑客至㑹須留醉墨主人留榜待新詩離宿州後寄兄弟落日村橋涕泫然東風匹馬去翩翩兩行緑樹當隋岸一片春雲限楚天妄意致身常許國强顔得禄廢求田幅巾㑹作淮南叟白髪相收一釣船寄榮子雍三首東風三月洛陽城傾盖相逢氣倍增㸔盡園花方信馬飲斜樓月更挑燈年光飄忽雙馳轂心事蕭條一老僧酒病年來慵把筆新文寄我苦憑陵蒼蒼老柏古南禪嫋嫋脩篁泮水灣此地笑談惟我共百年交友得君難已甘心向詩書老㑹與身圖雲水閒年少功名須力致㸔君朝佩日珊珊家家新酒滴新醅殘嵗峥嶸春欲回霜野寂無新到雁雪林寒有欲開梅闗河路永雙横轍天地身閒一舉杯酬答風光千㸃淚怯將愁眼更登臺陳履常惠詩有曽門一老之句不肖二十五嵗謁見南豐舍人于山陽始一書而褒與過宜陽有同途至亳之約耒以病不能如期後八年始遇公于京師南豐門人惟君一人而已感舊慨嘆因成鄙句願勿他示南豐冢木已蕭蕭猶有門人守一瓢文彩自應傳壷奥典刑猶可想風標紛紛但見侏儒飽寂寂誰歌隐士招十載敝冠彈未得簪纓知復為誰彯泊舟候水一水悠悠斷復連卸帆終日小灘前青旗招飲篙工醉五兩攲風賈客眠樹色逺分芳草路鳥行斜斷夕陽天漁舟慣伴危檣宿饋我霜鱗不用錢同李十二醉飲王氏牡丹園二首東風窮巷只埃塵誰見城南萬朶新不問主人聊一飲為携佳客送餘春比君意氣三年老貸我疎狂一味真醉裏尚能馳馬去㸔君倒著接䍦巾吹盡紛紛桃李塵天香國艶一翻新正過榖雨初晴日分得西都大半春舊態似推新艶好紅芳不似淡妝真嗟予久得丘園意何日相逢一幅巾同无咎遐叔文叔同遊迎祥得遊字客子長安塵滿裘道人門館自深幽東風拂地千條桞春水平池數㸃鷗俛首一官真底事倒囊三百更何求讀書挾䇿君知否失性還同博塞遊晝卧懐陳三時陳三卧疾睡如飲蜜入蜂房懶似遊絲百尺長陋巷誰過居士疾春風正作國人狂吟詩得瘦由無性辟榖輕身合有方欲餉子桑歸問婦一瓢過午尚懸墻將至海州明山有作望望孤城滄海邉好雲深處是人烟鳥飛山静晴秋日水濶人閒熟稻天旗影逺摇沽酒市棹歌歸去隔村船功名富貴非吾事誓斸明山數畝田秋日登海州乘槎亭海上西風八月凉乘槎亭外水茫茫人家日暖樵漁樂山路秋晴松栢香隔水飛來鴻陣濶趂潮歸去艣聲忙蓬萊方丈知何處烟浪參差在夕陽屋東蒼鳩呼雨屋東啼麥穗初長燕子飛竹裏人家雞犬静水邉官舍吏民稀溪聲夜漲寒通枕山色朝晴翠染衣賴有西鄰好詩句賡酬終日自忘機題齋壁松庭日午聴啼鶯簾外人稀睡老鈴已歎近秋添白髪更因多病讀黄庭江魚未上烹難致原注江魚未上則不漁丹陽暑日絶無魚吳酒空斟醉易醒好住安心莫惆悵此身天地一浮萍次韻李徳載見寄頭顱幸獲免姦鋒甘分江湖老釣篷老得一州聊自慰相望千里與誰同已欣臺省登羣俊猶數湖湘卧病翁原注謂二蘇公來書之及詩就醉餘頻走筆待觀雲海戲羣鴻讀孫巨源經緯集等閒咳唾爛成文奏牘三千世共珍不向人間調鼎鼐郤歸天上作麒麟侍遊曲水歡何在敷奏延英迹已陳四輔當時曾避柱熙寜天子屬詞臣將赴上庠偶成巻中課最詩成後枕上功名睡美餘弟子解疑常隠几輪人能笑久觀書山林沉痼時搔首松菊耽淫自荷鋤干世可能尋一飽虀鹽未用食無魚寄楊克一吾甥頗似魏家舒新罷推囚郤著書顧我獨傾陶令酒思君同鱠季鷹鱸荒凉雲物秋將老寂寞山城誰與娛倐忽風光行老矣躊躇不去欲何如已卯十二月二十日感事二首髙樓乘興獨登臨搔首天涯嵗暮心帶雪臘風藏澤國犯寒春色著烟林山川極目風光異嵗月驚懐老境侵可是斯文天未喪楚囚何事涕沾襟蹉跎流落已華顛又見荆湖一嵗遷人怯苦寒愁日短天收殘臘放新年園林寂厯飄梅後里巷經過爆竹前自料知非猶得在潛心久學衛蘧先冬節小不佳懐正叔老兄老境光隂短景催新冬又復一年回焚香燕坐衣僧衲煑藥髙眠廢酒杯處處庖厨鳴甕缶年年歌笑慘風埃孟公歌舞猶須雪未放愁眉取次開耒將之臨淮旅泊泗上屬病作迎候上官不敢求告比歸尤劇疎拙無以自振但自憫歎耳謀身不解免飄蓬零落孤舟西復東雙鬢雖青應早白病顔更醉不成紅﨑嶇避俗人難合憔悴多愁疾易攻蓴菜碧鱸秋正美歩兵終欲向江東放人汴上有感萬尾鱗鱗汴岸舟汴流日夜去悠悠舟行水去常如舊世事紛紛何日休落日昏昏天際晩白雲片片碧天秋案此下脱二句望龜山二首淮上風髙寒日西龜山嶺下白雲歸遊人苦憾日已晩青山自與雲為期輕舟漁子犯烟去照水白鷗窺影飛人間不作逍遥客老去塵埃空滿衣日落龜山山更清原頭啼鳥已春聲可憐山近不能到盡日與山相對行雲裏人家自來徃天邉樓閣逺分明白鷗不解遊客意驚起碧烟深處横次韻答存之環堵蕭然汝水隈孤懐炯炯向誰開青春不覺書邉過白髪無端鏡上來祭竈請鄰聊復爾賣刀買犢豈難哉故人休説封侯事歸釣江天有舊臺離天長寄周重實相逢握手便忘形射䇿天門盡弟兄浮世有誰尊道義青衫自笑為功名髙談未盡胸中意作别猶如夢後驚半夜叩門投野寺天寒孤月更分明秋宫帳額斕斑暗舊金玉猊香重煖沈沈秋風宫殿梧桐老暮雨樓臺簾幕深銀箭漏遲雞唱曉綺窓人睡晝生隂無眠慣滴班姬淚聴盡長安夜夜砧題堂下桐零落當軒兩樹桐秋來相伴一衰翁寒枝向月空餘影隕葉知時不待風故國山川天黯淡美人音信雁西東嵗華節物俱寥落滿眼牢愁賴酒攻登海州城樓城外滄溟日夜流城南山直對城樓溪田雨足禾先熟海樹風髙葉易秋疏傅里閭詢故老秦皇車甲想東遊客心不待傷千里檻外風烟盡是愁秋日憶家汩汩流光長逺客年年秋至是離家孤城入夜寒更迥霜月滿天歸夢賖摵摵老桐風後葉娟娟疎菊雨殘花茅簷布被猶無力長走塵埃真可嗟七言飛鴻歸盡燕將還亭院深沉人倚欄斜撘鞦韆寒食雨已黄楊桞暮春寒密毬杏蕚紅如糝半落梅花香未殘人世年年非舊事感時惟有淚汍瀾山下山下疎鐘日夜催城頭畫角五更哀流年忽忽愁中過世事紛紛空裏來沮溺漫髙輕世節管商空盡濟時才古來擾擾今何有一熟黄粱夢已回京師廢宅當道朱門白晝扃髙堂歌吹久無聲古忩積雨昏殘畫朽樹經隂長寄生門下老人時灑掃舊時來客嘆平生案此韻複艶姬驕馬知何處獨有庭花春正榮送徐任白髪青衫困宦遊相逢不復話封侯少年壯氣青雲上投老生涯一醉休獻璞誰憐藏美玉惡聲不至為虚舟從來滿巻新詩句寫取淮天萬里秋登城樓沙雨初乾巾褐輕獨披衰蔓步髙城天晴海上峰巒出野暗人家燈火明歸鳥各尋芳樹去夕陽㣲照逺村耕登樓巳恨荆州逺况復安仁白髪生寄陳鼎懶著青衫沉醉眠近來沽酒困無錢常憂送乏隣僧米何啻寒無坐客氊直道漫憑詹尹卜浮生已付祖師禪袛應居士無醒日知有淵明種秫田原注陳新置九華田自號居士柯山集巻十六
