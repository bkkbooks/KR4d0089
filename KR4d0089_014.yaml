body:
  text: 柯山集卷十四宋張耒撰五言律詩從黃仲閔求友于泉炎暑戰已定清秋當抗衡碧雲生雁思幽草見蛩情㬠麥村墟靜觀書枕簟清誰能酌𤣥酒來破屈原醒清洛清洛西風急遙知故國秋羇游成嵗月疏放合淹留地回驚身老山髙更旅愁登臨有詞賦不減在荆州落日落日西風急空山客獨驚夕雲寒不動秋水暮多聲粟厭周人飯蓴思故國羮南飛有征鴈羡爾羽毛輕贈陳履常勞苦陳夫子欣聞病肺蘇席門遷次數僧米乞時無旨蓄親庖急青錢藥裹須我埸方不給何以縶君駒至安化驛先寄淮陽故人蕭條安化驛倦客思悠哉積水連天闊青山送客來疏籬風捲葉敗屋雨生苔寄語淮陽舊人今放逐回發金陵折桞亭二首緑衮溶溶日紅飛寂寂春青山今古事芳草去來人歌吹酒家市帆檣賈客津誰云絶勝地登眺更傷神桃李蕃晴日江山秀晚春孤舟多病客長道未歸人豪俗競行樂倦逰慵問津南山還暮雨疑有楚臺神秋日隕葉鳥不顧枯莖蟲莫吟野荒田已穫江暗夕多隂夜語聞山雨無眠聼楚砧敝裘還補綻披拂動歸心次韻斯舉送巖桂新釀叢桂仙君子小山幽處芳案此下脫三字鄙素漢殿略塗黃有客憐衰病新醅許撇嘗併將塵外物助我北窗涼發安州作積雨陂塘秀南風蒿艾肥烏犍立橫隴白鳥下深畦雲木叫杜宇曉林啼竹雞平生倦遊興賴有濁醪攜賦得瀑布浩浩自太古洋洋灌百川深將一源潤首出萬峯巔晴浴岱宗日香通華嶽蓮應有真仙子揮榜上青天江城江城寒食近風雨作輕寒花落已可惜春衣猶怯單畏人成不出巳老自無歡沽酒金明道回頭十五年都梁亭下金塔青冥上孤城蒼莽中淺山寒帶水旱日白吹風人事劇翻手生涯真轉蓬髙眠待春漲鮭菜伴南公過孝感縣十里所望一土山下有漁舟呼之不來委舟負魚徑去不顧俄有一舟不待呼自拏舟直前取舟中美魚致之求價甚賤豫倍與之值卒辭倍值而去豫語之曰爾不待招而赴人之求仁也售不求厚價亷也子豈有道者乎兹楚境也昔有勸屈大夫以餔糟啜醨者豈非子耶為作一篇有道隱屠釣仁亷非偶然傾筐出紫鱖揮手謝青錢昔有離騷客名髙楚國賢獨醒遭爾笑吾幸醉終年二月三日艤舟徐城戲呈戚郎自嗟為客久羇旅過淮時雪野挑蔬瘦霜天暖酒遲流年下坡轂萬事一枰棊異日懷陳迹孤舟近古祠重到臨淮夀聖院陳迹不可訪舊游三十年相逢非故物大半已沈泉世界揚塵海淳生不繫船老人無固必醉即掩篷眠舟中曉思樹色未啼鳥漿聲初度航客燈青映壁城角冷吹霜飄泊年來甚羇游情易傷年豐清潁尾吾計亦差良將至漢川夜泊水翼飛栖定連檣宿暝烟葦風驚客夢江月伴人眠多病閒偏樂苦吟愁易牽漁郎爾何恨終夕獨鳴舷酬同年徐正夫司户時欲卜築嵩洛間少别老相見無言空惘然功名屬多病詩酒樂衰年釡厭顔公粥囊須趙一錢歸裝何日辦嵩少好林泉何處春深好二首何處春深好春深禪宿家茶爐寒夙火佛案曉添花壞宅無妖火通途有寶車院深人不到幡影逐風斜何處春深好春深居士家荒園幾畦菜環堵數株花自蠟登山屐仍驅下澤車時時客問字醉帽任傾斜次韻寄趙伯堅二首西湖望中灘能有幾多程問訊懶不講篇章來愈清為邦循舊政把酒憶交情祝子過新嵗春風入帝城相思何處望月閣對南堂念子猶記我懷君時舉觴可能思潁好端是種花忙閒說河陽政佳哉副所望陋屋陋屋秋霖後荒城落葉中壞牆朝插菌幽草晝聞蛩豈是不浪出直緣無奈慵何勞求季主吾自了窮通道旁花長夏百草秀道旁多野花無名自紅紫有意占年華灼灼照流水斑斑上古槎中原何日掃將爾付泥沙寺西閒步閭里靜無事野塘春水生好風時獨立芳草共間行閏月遲春候輕隂弄晚晴鄰炊烟火動下舍晚雞鳴巳醒已醒厭厭醉將開灼灼紅年年到春日忽忽遇東風暇日如年永閒愁似酒濃時能將醉眼天際送飛鴻題廬阜官㕔平生山水興今夜宿東林落日樓殿影西風鐘梵音雲橫山閣迥雨過虎溪深腳力猶堪在他年當重尋今早將飲酒聞鶯有感蕭條古蘭若春日等閒斜啷唧初聞燕匆匆又過花舊遊都似夢到處即為家把酒聽鶯處羇懷感嵗華破幌破幌一㸃白臥知千里明低窗通雪氣喬木尚風聲傳警軍城靜鳴鐘梵剎清髙眠尋斷夢鄰樹已烏驚食筍荒林春足雨新筍迸龍雛鄰叟勤致饋老人欣付厨朝餐甘飽美放筯為嗟吁惜取葛陂杖猶堪代我駒夜意每見青桐落常虞白髮侵傷心惟片月不睡更清砧蟋蟀秋聲早銀河夜色深崎嶇無限意蕭索一長吟秋雨階下梧桐樹芳菲亦已休嵗時驚病客風雨送清秋栖鳥歸何晚鳴蟲響漸收蕭蕭寒色暮吹作夜深愁秦兵部書堂丈人憐我厚許與過常情身世已迂闊功名何敢爭笑談忘晚輩樽俎罄生平欲斸臨淮地從公老此生日落日落長雲暗風悲古岸秋渚鷗遙避客野蝶戲隨舟疏拙資微祿飄零厭逺遊若無尊裏酒何物與消愁晚卧日落煩暑退秋晴河漢明微雲映天白纖月過林清獨臥誰晤語幽懷殊未平蕭蕭夜深冷皓露滿前楹捲簾捲簾新月上林影散微茫庭草鳴蟲近風燈秋幌涼長年惟有病晚嵗苦多傷身世竟何就吾將問蜀莊秋懷次韻朝應之三首木落晚風急宵涼侵暑衣有期惟向老無計未成歸只益顚毛脫還從髀骨肥感時仍弔古回首意多違衰鬢不堪洗病軀先覺隂天寒白日短嵗暮亂山深薄酒醒無力危絃奏不禁謀身老逾拙三聽洛陽砧清秋萬里興力疾上層臺嵗熟雉兔飽風髙榆栁摧晚篁元自緑幽菊為誰開寂寞無人問鄉書久不來冬至三首昨夜新霜落淮南十月初寒雲風後白髙木雨來疏功業嗟謀拙星霜逼嵗餘子雲真拙者寂寞為𤣥書汴水日夜淺天寒霜野寬拂衣秋葉亂衝面北風寒不作歸山計空悲走馬鞍濟時吾力薄俯仰一悲歎孤衾不成寐起坐聽雞號樓閉更籌靜天寒星斗髙蕭條陶令酒清怨楚臣騷凛凛悲秋意何須待二毛青陽驛㑹劉伯聲夜話奔走倦塵埃相逢顔暫開語䦨燈燼改飲散月華來行役風霜苦流年嵗月催我愚甘自分惆悵子多才十二月二十六日旦聞東堂啄木聲忽記作福昌尉時在山間環舍多老木臘後春初此鳥尤多聲態不一今琵琶箏中所效既不類又百不得一二云睡餘聞啄木忽憶福昌春官舍題詩壁如今經幾人猶能老耽酒依舊拙謀身尚想蘭宫格東風清洛濵次韻和王彥昭九日湖園㑹飲故人憐寂寞九日共登臨天地客行逺山河秋已深狂來能醉舞興罷獨悲吟莫怪凄凉甚多憂損壯心暮春三首還將多病眼冉冉對殘春啼鳥日求侣晚花如向人物情懶著意杯酒最關身亦有功名志吾生付大釣應接非吾事深幽興有餘筍深鳴鳥下花薄午風疏草淺見飛雉溪清生細魚端居亦多趣不用席門車紅㸃薔薇架緑深桃李溪語鶯知果熟忙燕聚新泥節物有常態羈逰無定栖寧須說鵬鷃物理固應齊之天長㑹宿僧院蕭條林下寺客至解塵鞍雨過月逾白夜深秋向寒老僧無俗纍愛客故盤桓之子靜相對松風清石欄宿銅陵山色日已逺問人歸路長碧天凉夜濶秋物雨餘荒人靜路傍寺鳥啼林下房銅陵竟何就空死漢吳王漣水孤舟逆水上野靜聞水聲鷗飛不逺水寒浪濺霜翎夜氣岸兼木夕光潭照星長吟㺯雙槳知有睡龍驚一日復一日一日復一日炎凉行一周異鄉猶在望白髮久生頭且看尋橦技休懷失馬憂天公有至信萬古一春秋索莫索莫歸未得閒雲還滿空愁吟對寒月不睡到晨鍾衣喜初冬寄書憐手自封何當聽夜雪暖酒夜爐紅上方僧不下上方地夜禪心慮冥三更風雪暗一㸃佛龕燈持鉢呪潭水鬼神拳跪聽案此下脫二句冬夜山靜寒雲薄天空孤月明霜桐占階影風葉繞廊聲經濟心難就蹉跎嵗屢更冥鴻本清遠何事亦宵征和得故人書來書才一紙離别意何長應為相思苦還能細作行水浮新恨濶花想舊容芳欲問人何處青樓在帝鄉和西齊山色供開鏡溪光照掩扉暗蟲先夜響萎葉近秋飛灌壠晴蔬出開籠暮鶴歸鳴琴坐朗月輕露㸃秋衣和北寺寺倚蒼崖古僧閒晝掩扉曉雲辭嶺去夕鳥占林歸悟理觀幡動臨風想鍚飛寄懷𤣥觀外更覺此生微食薇嵗窮隂不解短日過墻微幽鳥穿林小寒烏啄樹饑氷霜崖嶺壯烟火井閭稀老拙安閒僻無心厭食薇春寒客舍逢桃李清樽聊自歡夢中經夜雨醉裏度春寒草色逺還緑鳥聲晴更繁預期多病眼花發更辭看遣悶為問庭前鵲歸期何太遲舊傳能報喜東去是何時黃葉西風急幽花白露滋朝朝清洛水坎坎只東馳嵗暮書事十二首嵗晏北風疾山空萬谷號木枯隨意折鴻斷不成髙深屋支蓬戶溫爐暖緼袍老夫原不寐鳴竹鼓蕭騷清洛魚梁淺霜鱗素鯽肥供厨調鼎快充腹此羹稀老去只便飽年來甘息機寒江鱸鱠美悵望未成歸風捲塵沙白雲垂雪意凝夜山時叫虎晚市早收燈園栗炮還美村醪醉不能三年官况味真是冷于氷牛羊已歸去殘照滿山陂霜雁田中靜風鳶木杪悲川原今自若龍虎昔交馳丘隴耕桑盡千年不復知原廟依岡起傳聞世祖營南陽無雊雉熊耳合投兵霜日蓬原路天風柏殿聲山川英氣在不負昔聞名北風吹馬疾石徑上危基野爼飽貆脯山爐煮橡糜寒耕敲凍石獵火上風枝留滯親麋鹿多慙髮欲絲壯心常許國平日討論兵天地身將老山河意欲驚病多緣痛飲吟苦更傷情斗酒新豐市何人問馬生自昔周人俗貪庸巧治生千金不冠帶一飲起紛爭佩犢攻攘敓通書為姓名二南分陜化寂寞久無聲千載傷頑俗遺風耿未忘陳荒丘擊鼓魏𥚹女縫裳逺客防猜嫉官居備冦攘妻兒怪多喜清洛有歸艎陳葉不肯墮凍醪凝未融寒林晴有影霜日冷無風許國片心壯勞生雙鬢蓬功名任愚智萬事古今同日落擎明燭一杯千里心驕兒驚醉舞山僕怪悲吟谷冷水流急天昏雲起隂三更何處雁急急尚哀音雲去暮天迥雁飛寒夜長姮娥守孤月青女恨連霜不寐看銀燭長吟送羽觴山爐與石鼎伴我老他鄉宿東魯父居二首夕陽低欲盡春淺色蕭蕭暝色催歸牧炊煙向晚樵踈星臨水際逺火隔村橋黯黯柴門夜栖鴉對寂寥郡國何時極羇愁觸處生望隨天不盡春共野兼平煙樹淮南濶漁鹽楚俗輕飄零五年别歎息鬢毛更淮上夜風縣郭初傳柝船窗已閉篷星低春野路月淡夜淮風烟水東南濶漁鹽吳楚同久逰諳里社賖酒問鄰翁春望鳥去晴雲外帆歸芳草邉平淮分緑野春樹接低天殘枿寒餘燒新青雨後田年來千里目容易淚雙懸村晚深塢繁花麗晴田細徑分孤舟春水路芳草夕陽村暗雀投簷靜昏鴉集樹喧牛羊自歸晚燈火掩衡門夜意荒城轉五更北斗向誰傾穴鬬時爭齧林棲或自驚老來神慮淡睡足骨毛輕石磬催僧粥低窗枕畔鳴春望暖日晴薰草清淮濶浸天地卑連逺水城廢入春田目極風燈外愁懸淚臉邊人生苦多感花栁自年年柯山集卷十四
