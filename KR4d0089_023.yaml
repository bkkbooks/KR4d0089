body:
  text: 柯山集巻二十三宋張耒撰七言絶句臨淮道中凛凜春寒犯客裘輕隂殘雪放孤舟無端惟有堤邊栁作態東風惱客愁許同塵示張八侍郎避暑覽館中舊題絶句俾之同作次韻聚散人生集渚鴻飛鳴邂逅一宵同是非榮辱何勞問共在邯鄲一枕中西園風雨雜花謝楚澤春殘雨又風啼鶯芳草思無窮蕪菁滿地黄金爛不及薔薇一㸃紅慈湖中流遇大風舟危甚食時風止逰靈巖寺心悸西江浪似山眼明僧舍一窻閒從今要見廬山靣畵作屏風静處看寓淮陽驛二首一庭秋色髙堂夜半壁燈光短幌凉都是去年秋氣味誰知飄泊古淮陽悠颺短日下西墻庭葉吟風作夕凉客枕甚安無一事隣雞不用喚朝陽觀魚亭呈陳公度二首千古濠梁荘惠詞不湏反覆辨真知直應人意逍遥處便是㳺魚自樂時獵獵微風波靣開近人鷗鷺不相猜樽前忽起扁舟興新管江南山水來寒食離白沙莫驚客路已經年尚有青春一半妍試上芳堤望春野萬絲楊桞拂晴天紹聖甲戌侍立集英殿臨軒試舉人作此兩絶春來小殿雪初殘曉日曈曨未破寒黄繖當軒公事退君王緩歩侍臣闌弱歳千名翰墨塲春寒摇筆試西廂茫然二十年間事還著春衣侍玉皇同仲逹雪後踰小山逰蔡氏園得紅梅數枝竒絶因賦二首與君陟巘踏春泥邂逅紅梅得一枝失却孤山風露格却成邜酒醉氷肌原注李正封牡丹詩有國色朝酣酒之句北風凜凜留髙樹融雪涓涓聚小塘三畝山園半春草無人為結小丁香戲呈希古半世辛勤守黄巻白頭容易過青春枕前亦覺春晴否試問東隣晚起人賞心亭楫迎桃葉家何處槳送莫愁人已非獨立東風今古恨春江無語又斜暉題洛尾亭二首原注入汴第一亭日出南山春霧收渾渾洛尾入淮流莫向行人贈楊桞折將離恨入孤舟洛尾亭邊淮汴交来波去浪恨迢迢無端更洒黄昏雨吹作春愁不肯消題周文翰郭熈山水二首魚村橘市楚江邊人外秋原雨外川遣騎竹邊邀短艇天涯暮色已蒼然洞庭葉落萬波秋説與南人亦自愁指㸃吳江何處是一行鴻雁海山頭立春三首天上春来誰報人江山氣象一時新懶將白首簮幡勝夀酒三杯慰逐臣風光先著竹間梅和氣應從九地回桃李滿園渾未覺微紅先向寳刀開蒼龍闕角回金斗文徳門南散曉班車馬紛紛殘雪裏鏤銀剪綵舞新幡寒食庭院輕寒新雨過江城寒食野花飛故園北望一千里極目江楓客未歸竟陵夢野亭在子城西南角一目而盡雲夢之野最為郡中之勝高甍巨桷壓城闉平視如將七澤呑幾度春光招宋玉碧闌干外獨消魂奉符縣北二十里林家莊馬鋪間壁有草書数行半毁矣問其人云熈寜中錢提刑所書予考其時盖翰林四丈穆父也錢公謫秋浦而卒其子己免喪矣龍蛇半滅亭間字泉壌長埋地下身從此世間無玉樹故人三嘆淚沾襟木芙蓉菊花盛開空山岑寂何所有晩菊芙蓉相對幽伴我悠悠過閒日憐渠灼灼媚窮秋夜間風雨有感留滯招提未是歸卧聞秋雨響疎籬何當粗息飄萍恨却誦僧窻聽雨詩次韻智叔三首才似庖刀不待硎思如流水更清泠詩壇李杜誰為將盡掃欃槍正國刑公子風流更可人仙家問訊桞湖春煩公甕下一杯水洗我胷中百斛塵今朝一見詩人詩不用更尋黄絹詞深山一鶴自唱和亦有松下童子知絶句竟陵秋色清如水客舍飄梧墜晚階已掩重門風葉定玉鉤還向玉人来西園滿園紅紫春無限盡日飛鳴鳥自由夜雨朝晴風日好盡舒雲錦不能收晩春苔封池靣草芊緜鳴蚓跳蛙意苦便頗覺風雲有竒變翻盆一雨便潺潺殘春三絶低簷送雨晩霏微濕透梅房白漸肥半捲畫簾屏扇掩䑃朧春睡擁春衣闌干倚遍更消魂春到淮南得㡬分裊裊桞枝烟雨濕畫樓殘角送黄昏強尋春物散無聊直使樓髙恨未消鱗碧萬家看不盡杏花時見隔牆梢偶題二首相逢記得畫橋頭花似精神桞似柔莫謂無情即無語春風傳意水傳愁春水長流鳥自飛偶然相值不相知請君試採中塘藕若道心空却有絲宛丘道中日斜沙路馬翩翩故欲迎涼不著鞭誰觧多情似新月伴人歸去照人眠青桐道中值雨凡數里舟行久之頗有江湖之思二首繫馬操舟問檝師却疑淮口掛㠶時人間遷改何須問便作江湖未可知㝠㝠煙外鳥飛歸野老得魚収網迴隔浦㫁霞沉欲盡半彎新月出雲来宿咸平驛蕭蕭暗葉鳴秋雨淅淅忩風戰客燈世味飽諳心巳老不煩潘鬢强侵陵蕭蕭蕭蕭風雨五更初枕上秋聲獨井梧只有菊花猶灼灼苦教摧拉就荒蕪淮陰道中映日斷霞臨水盡出雲新月向人来野塘秋晚無行迹㸃㸃黄花照水開夜坐庭戸無人秋月明夜霜欲落氣先清梧桐直不甘衰謝數葉迎風尚有聲試筆學館虀鹽驚歳晚寒窻書史伴身閒年来轗軻甘言命老去追隨厭强顔新春水鄉清冷落梅風正月雪消春信通昨夜園林新得雨杏稍争放曉来紅野歩帯水依城一逕微出城桃杏雨来枝最憐楊桞身無力付與春風自在吹春日偶題四首漫漫東風百草長夭桃如笑桞如妝惟慿酒作青春敵收拾風光入醉鄉隔屋桃花暖鬬妝好風時有過墻香滿園芳草無人種何事春来特地長舍北小桃纔及肩可憐枝弱苦花繁黄昏雨急東風惡惜爾不禁春夜寒白首傷春一老翁預愁寒食過春中下簾數㸃黄昏雨一霎輕寒青杏風偶成二首新引龍孫欲解包籬根抽筍已梢梢莓苔雨過蝸縁壁楊桞葉深鶯有巢乍晴幽步踏斜陽殘潦青苔曲徑荒風擲落花填小塹雨催芳草上空牆題軫師房二首漠漠雨苔依砌緑鮮鮮秋菊映堦黄山僧睡起日亭午出戸微微栢子香銅瓶布衲出塵埃疎瘦風標日一齋門逕蕭然更無事生螢飛鴿及時来初離山陽寄城中友人二首落月昏昏向水低五更殘燭一聲雞祗應魂夢猶東去從此扁舟日向西野岸蕭蕭落葉風秋光離思兩相攻殷勤臨水揮雙淚慿寄清流却向東淮隂晩望蕭蕭衰栁来時路裊裊危檣西去船白鳥歸飛夕陽盡㫁霞風約過平川宿第四鋪繫纜寒沙傷客情秋雲不動夜隂生蕭蕭兩岸黄榆葉解報三更雨到聲初見嵩山年来鞍馬困塵埃頼有青山豁我懐日暮北風吹雨去數峯清瘦出雲来有感鬢毛已自秋来變髀肉仍于馬上消滿眼青山不歸去强顔微禄亦何聊福昌官舍後絶句十首淮南梅栁想春還怯見西州歳暮寒惟有看山心未厭晴明終日在闌干小園寒盡雪成泥堂角方池水接溪夢覺隔窻殘月盡五更春鳥滿山啼無客門闌盡日扄兩行喬木擁寒㕔吏胥借問官何在流水聲中看竹行漫與東風作主人栽培花草伴閒身不辭伐竹成髙架收拾薔薇一片春卧聽堂南布榖鳴隴頭細麥已青盈殷勤謝汝催春種我為無田豈懶耕翠竹留人不忍還暖泉春漲已潺潺寄言山鳥休歸去與爾同来樂此間洛川春色㡬時歸漾漾清流照翠微日暖雪消沙岸軟鴛鴦相對不驚飛風吹春日下南山尚有輕冰結暮灘何事鴛鴦故相守清溪不怕夜棲寒不掃竹根藏筍茁旋培殘雪擁蘭芽為君更接櫻桃樹付與春風換却花清明山色到前簷汩汩溪流聚小潭一榻竹窻晴晝睡依依春夢入江南夢周楚望春風吹夢到淮南一夕從容盡笑談睡覺始知經歳别洛陽新栁已毶毶絶句坐局歸来已暮鐘濛濛寒雨濕裘茸正湏牆下一壺酒不怕江頭三日風有感屋角纎纎掛斷虹清蟬一噪起髙桐天涯雲盡見殘日林下雨餘来好風贈鐡牌道者微官待旦亦朝天頼爾絶勝鐘鼓傳舉世昏㝠竟難警憐君常負五更眠讀吳怡詩巻二首羅田春動雪消初主簿清詩雪不如休學風騷窮事業花前莫負古銅壺疎梅半落雪中香想子孤吟對酒缸野水荒山半猿鳥跨驢誰問賈長江題趙楶所收趙令穰大年烟林二絶江上孤煙蔽逺林秋原人静下鳴禽水鄉此景常經眼誰信侯家畫萬金楓林荻港白晝静落鴈飛鷗盡日閒平逺起君千里恨清詩可要助江山屈原楚國茫茫盡醉人獨醒惟有一靈均餔糟更遣從流俗漁父由来亦不仁觀音泉巖松偃盖不知年寂寂秋燈寳供前清徹一源傳萬古空山長伴白衣仙宿慈氏院樓上鳴鐘報五更朦朧深殿佛燈明更無幽夢隨寒枕聼徹風松到曉聲巫臣二首萬古風情不易禁多言未似不言深楚王只聼巫臣諫不道逃吳已有心咫尺山河不易知無言莫謂即無思人間只見枝頭繭不悟春蠶暗理絲北風北風巻地寒侵骨凍雪連山鳥不飛試問朱門餘酒肉㡬人廽首念無衣洛岸春行二首溪上映人楊栁黄滿溪流水碧泱泱慿君莫向溪南望春草春風能斷腸南山晴翠入波光一𣲖溪聲繞郭長最愛早春沙岸暖衮風輕浪拍鴛鴦漫成七首應敵詩才慙古人牽情春色空閒身鋪排物色雖甘拙消散閒愁亦有神脩竹娟娟一萬竿清渠引水正潺潺知時燕子来相語任意鳬雛去不還髙槐無花亦有隂參天老枝逾十尋流鶯不使人窺見故隔深條送好音風吹桃花西復東雨打海棠零亂紅可是春光即消歇牡丹音信未全通江南梅花凌雪霜桃李開盡春無光誰知洛陽三月暮千金一朶賣姚黄溪水春来清蕩沙溪南溪北是人家依依陌上多情栁簇簇原頭自在花庭隂當午起猶慵㫁送殘春醉夢中桑柘成隂桃李盡一川零亂桞花風和應之出城路穿槐桞遶山斜長夏村墟對物華青玉一尋披籜竹絳繒千片剪榴花永寧赴晁應之見招賞花途中遇雨行雲濃淡日無輝輕雨飄飄㸃客衣馬上漫郎醒復醉一盃容易送春歸依韻和晁十七落花二首投老殷勤向物華風前猶欲拾餘花更將夢逐殘紅去遍入長安百萬家飛隨風雨落随流更有餘紅亦已休杳杳天涯春物盡可憐鶯蝶不知愁和端午競渡深悲千載寃忠魂一去詎能還國亾身殞今何有只有離騷在世間偶成須知庖手有真如合遣輪人笑讀書擁褐蒲團深閉日老人于此有工夫雙廟成敗功名付偶然男児要是死生間故應城破知肝膽飛矢何勞記賀蘭株林九寡奔亡一老姬白頭蠻叟嬖西施二公費盡平生事深屋嬋娟世得知淮上阻風歩入寳積山訪軫長老少年飄泊歸淮東道人住庵何處峯知有招提煙水外雪雲山路倒杉松淮上觀氷下寒淮千里羣氷下古岸枯槎黄葦枝憶得天津橋下見五門春動雪消時柯山集巻二十三
