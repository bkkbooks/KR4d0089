body:
  text: 柯山集卷三十四宋張耒撰論敦俗論所謂人主之利勢者惟其能供天下之所求而我無所求於人故能奔走天下使其進退取舍莫不在我而天下之人雖欲去之而不得蓋惟其能貴故天下之賤者尊之惟其能富故天下之貧者宗之使之脫然舍去斯二者則天下之人誰肯以區區之名而役之哉故富與貴者人君操之以用其下者也雖然天下之利惟富貴而後可為則先王之治宜其隆勢利重權位使其民惟富貴之知而見其巳之尊嚴然其率天下也何其退約亷遜教其民務為安貧樂賤之事而深抑好爭務勝之心者何也夫天下之人不可使求為利也夫使天下之人惟利之為求則大者篡小者叛惟其得之而已矣嗚呼使人皆欲得其上之所樂則將日仇其上而奪之夫如是則吾之立於天下之上不亦甚殆哉是故先王思所以長享富貴之利求其安而無亂服而無爭是故為是亷耻冲退之道使之輕祿位而賤權勢而惟仁義之知公卿之爵人之所欲也然三遜而後受萬鍾之祿人之所甚貪也然無名而不敢當嗚呼使天下之人皆仁義之人耶則吾捐國而與之有不受者矣三代之厯年後世莫及而考其教化風俗之美詩書之所載後世亦無有繼之者然則其效可知也余嘗悲夫自聖人之亡後世之治天下者不明乎此也開功名權利之門以誘天下而使其民汲汲然惟利之知而幸其區區之功利尚功而賤德貴才而廢道奬勝而羞退進位而卑齒故天下始囂然皆有樂富好貴之心而不安其分反顧其貧賤而惡之而日思其所以去之之術夫惟人惡其貧賤而求去之而天下之亂起矣故後世之所謂利其國而自安者未始不亡其國而自危也昔者秦之俗蓋若此矣方其疾戰不顧以取諸侯也使其人惟攻戰爭奪之為求故秦之民皆忘其上而利其身功成戰克而後天下之人移其勝敵之志為仇君之心蓋其平日之所養耳目之所習有以使之而無足怪也嗚呼爭之不可啓也如此養虎之肉不敢全而生委之懼其决裂以動其怒而况持爭具而授之歟夫先王之道其始若鈍而後能利其始若迂而效最切老子曰非以其無私耶故能成其私夫成其私而惟私之求則天下去之夫惟公以得天下之情者天下之所歸也天下之所歸而有不能得其所欲者乎蓋梁惠王問孟子以利而孟子對以仁義其說以為上下交征利而國危又曰未有仁而遺其親未有義而後其君者利非危國而其極至於國危仁義者若非所以自利也而其效也使人不敢遺而後之則聖人之所以安其身者豈匹夫匹婦之淺道歟嗚呼孟子可謂知利之實矣法制論昔者聖人之立法告天下以其意而已故常立其大防而其節目委曲所以施於事者聽夫人之自為而不必其一切先立於我是故法立而意行意行而利至蓋天下之事繁細瑣屑其情狀變故不可以一致以吾一人區區之聰明而先為之經畫於此而使之一從於我則事將有格而不得成者夫其勢不可以有成而必求行焉則物有受其弊者矣天下之法常壞於此而世之惑者未之或知也今夫世之敢戰者其為行列什伍亦不過數者而巳彼豈不欲盡歟勢有所不可也何則敵人之智百出而不可測而我安能委曲而預測之耶必曰必如是而後勝如是而後敗其委曲瑣屑一切先為之所使無顧於敵者之何如而惟我之為聽夫如是則必敗而已矣善教人者曉之以其道而不示以其事故告天下使無違吾意則其委曲瑣屑雖小不盡而吾之意猶在也嗚呼三代之聖人其聰明睿智足以深見天下之賾隱然其制法也亦何以異於此欲均天下之田而為之井田欲分天下之地而為之諸侯九夫為井人得百畝而耕之使夫大之不得以兼小彊之不得以并弱而後又為溝洫之制自一夫而積之至於萬夫公之地方五百里而男之地方百里使之大小有序而又列為九服之逺近夫分田建國之法如是而巳矣夫天下之地高卑之不齊廣狹之不一水泉畎畝之差殊與夫名山大川汙池藪澤之地常居十五則亦安能較然如畫於一枰之上哉彼聖人之法不為之纎委瑣屑以盡之而特設其大端而已何也蓋聖人之告天下者特其意而已當是時公卿凡當其職者皆得出其智以盡天下之變因規而為之規因矩而為之矩使之各稱其宜而不亂是以天子恭已優遊於上而所以均齊天下之理亦莫不如意而天下安享其利人人皆得措手足於其中初若莫可依據而吾之法卒立乎天下此先王之所以有所動作而天下樂之雖天下之大事而為之無難者也不善為法者則不然窮析天下之理於一身之聰明恃區區目前之智而斷萬里未來之勢故其法不患於不詳而天下卒不能行而不知其患乃出於好詳是故善用兵者有違法無違意不善用者有違意無違法法可違也意不可違也夫天下之情常樂於有所為而困於齟齬而不得放夫使人人足以自致而其終不失吾之所欲則亦足矣何必區區使之從我而後可也用大論能用大而後能治天下而用大之術為最難夫惟有所不治而後能用大矣何則治大者莫若立法有所不治而後法立矣屨人之為屨也非量國人之足而為之也度其中而為之夫一國之足雖不能盡合於吾屨而中者居多故雖不知國人之足而吾不失鬻屨之利必將人人而較之則吾之為工不亦甚勞而長短小大之差要之不可盡得嗚呼使吾之為屨足以半國之人足矣雖有所遺而何害吾之大利哉通此說者其知用大乎夫立法以治天下者而吾之法果足以盡天下之理包羅籠絡使天下之智巧不足以用其姦乎吾知其必不能也夏后氏之為忠也使禹不知後世之將野則禹不智也知而為之是禹亦無如之何也商之質周之文亦猶是也夫以聖人之智猶有所屈於事物之變則立法以求盡天下之理吾知聖人有所不能故立法於此足以通天下之情至於聰明之不及思慮之所難測出於人情之外者吾有所不治也而吾之法立矣且吾之法果何為而起歟無乃出於天下之大情萬物之常理耶嗜膾炙者百人而惡之者一人膾炙之美未害也使吾法足以當國人之十九則吾之利多矣其所不及焉吾可以無恤矣非不欲恤也勢不可也嗚呼自堯舜三代以來更數聖人其講天下之法亦詳矣然後世可考者如井田封建車徒之制亦不過為大法而而世之惑者徒見其為法之略以為不可施於事而不知聖人示之大法不以臆度之區區而預盡天下之委曲茍有不合亦付之人而巳一絲之不齊無害其為裘一粒之不精無害其為食故曰有所不治而後法立矣傳曰小有所治者大有所失近有所遺者逺有所包此逹於治體之論也或曰量國人之足而為屨不畏勞者能之盡天下之情以立法不厭詳者能之吾未見其不可也應之曰非勞與詳之避也國人之足可以盡量天下之情可以盡得雖費於終身之力而為何憚焉吾知決不可為也吾不若從其逸而擇夫為利者為之也嗚呼何至屑屑然語治天下之勞哉知所以立法而後知用大知用大而後能不出户而天下無遺慮矣憫刑論上昔者先王之時議事以制不為刑辟者何也夫天下之情無窮而刑之所治有極使天下之吏操有限之法以治無窮之情而不得少議於其中而惟法之知則天下之情無乃一枉於法而失其實歟是以先王之時一權諸人而不任法是故使法出於人而不使人出於法至於後世其所以治天下之具不能如先王之盛時淳厚之德衰而吏有率私以立法恃其無法而放肆者故後始有刑法之書以治天下然天下之弊雖不可以不救而天下之情不可枉也是故法簡網踈而人與法兩立而不偏廢穆王之刑以為輕重諸罰有權夫五刑之屬止於三千者法之所不可移惟其輕重之間有所謂權者是故猶不廢行法者之志方是時罪入於法之內則歸之法罪出於法之外則歸之權雖不如先王之盛時而天下猶未受弊嗚呼奈何一歸之法而不任人也自秦漢以來治天下之具茍且滅裂務使天下為不可欺而待天下之吏以為不可使少行其意也故一切任法而廢人豫嘗悲夫後世任法之弊也蓋其弊非獨法不足以盡其情而其極乃至於變其情而合諸法蓋罪無必而易移法有限而難動故罪輕而法重也不幸無輕刑以處之則有入之重者矣罪重而刑輕不幸無重刑以當之則有出之輕者矣變罪而附法失情而合文不畏情之不盡而慮法之不合蓋其間有所謂疑慮而上諸有司者十不過一二而已嗚呼任法以治天下而天下無正刑矣豫嘗推其原而後悲夫天下之事未始不自夫賢不肖始也先王之時天下之事簡肅而精修其人才皆足以過絶天下而上有聖哲之絶德故堯舜之際與夫三代之盛時至於鳥獸之無情隂陽之不可測而人之才智皆能為之故其後有豢龍御龍之官而四時之官皆能候天地之氣導馭其節而制其和由是言之則人之所以深思極慮以治事赴功者何如哉自聖人之亡其後世比於先王之盛固巳少減而天下之事日以煩亂詭僞生於其中而信厚之德薄人之賢者不及於先王之時而間之以不肖混亂而不可知天下之事日以廢缺夫惟得如先王之時故可以舍法而不任而賢不肖之相半也故人與法並行後世非無賢而要以不可知故一歸之法推其原求其本則法之弊蓋出於人之弊也夫惟能隆任人之術詳於擇人而後法可以少簡姑無望其不為刑辟人與法並行者可庶幾矣憫刑論下立法以糾天下之過者必欲天下行之而不敢逆然而常至於沮而不行者何也是其立法非人之情故也何謂非人之情夫天下之所共惡者而時輕之天下之所共怒者而時重之不當恕而彊為之仁不必惡而過為之罰凡此者天下之情所不安者也今夫天下之情有極很惡而不逞舉國皆惡之者幸而入於刑而考於法則輕而不足以懲之則夫行法者必有不平之心故必入而處之於重夫如是則是好為輕者之有所不行也夫人固有不幸而入於刑者有誠犯而其心無他者不幸而遇刑而考於法則重則行法者必有不忍之心焉是故有出而置之輕夫如是則好為重者之有所不行也昔者聖人之於天下其言無不聽其令無不信然卒不可變者天下之好惡也惟其然故天下之所惡者聖人不彊恕以為仁天下之所哀者聖人之不深治也故法立而天下安之傳之後世久而不敢易夫犯天下之所惡當天下之所恕而吾寬之以所欲則天下之吏雖不如吾法之所為而人固已隂服之矣吾之法因彼之情故也故欲吾之法立於天下者莫若原天下之情而無所出入使天下無不樂之心而後可也後之惑者不深求先王之意而求夫恩威之名而不究其實以為恩主於貸而有罪者舍之以為恩思有所禁則小過者刑之以威行之者不快而被之者不服則何怪乎吾法之不立哉或曰吾之法過於威耶則不惟行吾法者有不樂於其心而固取亂於民使過於輕耶民將懷我彼行吾法者之不快是何怪也嗚呼是大不然也天下之情自顧其所為誠有拂於人而人不加怒彼固以為可欺而罔人之心至矣故人之不察其過而知德者君子也尚何懷之有哉夫治天下者何必茍為惠以諂天下之情也殺之而當其罪雖日殺而天下悅服矣馭相論天子能使天下之權在宰相而進退宰相之權在天子夫如是者可謂知馭相矣夫天子之所以必尊宰相者非以私宰相也而其勢乃所以自尊今以天子之輔相左右朝夕之所接以取謀而使天下之人有輕之之心則天子之勢亦卑矣夫人之情涉江河而畏險則終身不敢行海何則彼以為江河為可畏而况於海乎彼且以為宰相為不可慢而况其君乎嗚呼又非特如此也使天子之力足以辦天下之事則何所俟於相以吾為不能獨治也而後擇相而委之委人以事而奪之權猶為不任而巳矣故必使之可取可舍可賞可罰舍吾疑之之心而使少行其意而後彼得以自盡夫如是故不幸而有過吾有以責之夫使宰相之勢無以異於羣有司必使之一聽於我而後可則彼有罪而吾將無以責之而彼且有藉有口矣故曰宰相不可以無權夫與人以權者必使之其利在我以為與爾以權者凡以為我也斯可矣使竊吾權以據之久而不還以為巳私利則吾將折而受制此天下之大患也今夫世之畜犬與鷹者方其逐禽於野則必解羈弛禁縱之而不制然至不順而害人則吾必能制其命夫縱之而不足以收之則幾何其不為患也誠得天下之至賢如伊尹周公霍光孔明之徒不以天下易匹夫之命者而任之則何所復求然天下之賢不可以常得而吾之任人或有才而忘其汚或以功而舍其素未必皆天下之至賢也夫使擅天下之權於掌握之間而吾無以制之而望其不亂其庸可得乎故古之待大臣者天子為之盡恭致禮而至其有罪則不恕有殺而無罰夫惟君致禮則宰相尊至有罪而不恕也此所以為天子之權歟故曰必使進退之權在天子曹操司馬懿父子初不過能竊天子之權攻伐出處放意恣行而巳而漢魏之主惟其無有以制之是故養其勢固其身而卒盜其位若唐德宗則疑宰相而不任懲姦臣之弊而謂天下之人舉不可信乃一切自用其聰明當時宰相奉行文書而巳故當是時藩臣有輕朝廷之心彼一人之聰明而當天下之亹亹則數見其所窮而左右大臣皆有茍且之志而無出力死難之意則宜其陵犯而無忌也嗚呼與人以權而我不能收漢魏之主是也畏權之去我而奪人之職者唐德宗是也是二者皆過矣嗚呼天下之事不可以無術也而馭臣為最難或者不知其故以為先王之時一本于忠信而無術不亦繆乎夫坤之道臣道也而象為馬吾未見馬之可以亡馭也馭之以術何害于忠信耶柯山集卷三十四
