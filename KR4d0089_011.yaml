body:
  text: 柯山集卷十一宋張耒撰七言古詩美哉美哉洋洋清潁尾西通天邑無千里舸艤大艑起危檣淮潁耕田歲收米茫茫陂澤帶平原古時溝澗還相連昔人屯田戍兵處今人阡陌連丘墓今年雨足種麥多北風吹葉鳴空柯髙城回望鬱嵯峨豐年閭井聞笙歌河邊古堤多老栁去馬來船一回首百年去住不由人歲暮天寒聊飲酒西風西風吹屋絡緯鳴星河錯落巳三更軍城傳警萬家靜山堂含風遙夜清雲收纎月映山盡天轉北斗向江傾舍南髙林栖鶴鶂危枝髙巢雛夜驚觀梅北風號夜天雨霜屋東梅花晨洗妝老人旦起萬境寂一笑向我吹微香風月精神珠玉骨冰雪簪珥瓊瑶璫天姝星艷下人世靈真髙秀無比方老人年年被香惱學道無力時清狂吟詩覓句苦無味剪枝插頭羞鬢蒼眼窺手採心愛惜倘可取餌充朝糧不如痛飲臥其下醉魂為蝶棲其房魯直惠洮河緑石研冰壺次韻洮河之石利劍矛磨刀日解十二牛千年邊地困沙礫一日見賓來中州黃子文章妙天下獨有八馬森幢旒平生筆墨萬金值竒煤利翰盈篋收誰持此研參案几風瀾近手寒生秋抱持投我棄不惜副以清詩帛加璧明窗試墨吐秀潤端溪歙州無此色野人齋房無玩好慙愧衣冠陳裸國朝侯碧海為文詞盤薄萬頃澄清漪新篇來如徹札箭徑筆更似劃沙錐知君自足報蒼璧愧我空賦瓊瑰詩福昌秋日效張文昌二首秋野無人秋日白禾黍登埸風索索豆田黃時霜已多桑蟲食葉留空柯小蝶翩翩晚花紫野鶉啄粟驚人起洛陽西原君莫行秋光處處繫人情黃葉蕭蕭秋水清田中日午村雞鳴埸邊九月禾黍熟空原雉飛飽新穀棗籬蟲鳴村路曲道邊古墳生野菊人稀田濶草茫茫洛陽秋聲能斷腸贈張嘉甫浮舟大江里三千歸掃先隴清淮壖杜門古寺厭岑寂夢寐清潁如家山汝隂昔謬稱刺史自愧何術蘇恫瘝平生為吏甘賤拙敢作蟊賊傷民田未憂懷甎擊之去乃欲築室買一廛簞瓢三畝易辦耳寄聲父老不汝干長淮清冬龍蜃蟄放舟出郭天宇寬浮梁橫前嫋可纜金塔卻立儼莫攀髯張幼好此竒服白壁刻佩鳴玦環抱持微學不忍棄清明竹林遭削刪三年江湖友魑魅一日寶府觀璵璠漸消鄙吝心自喜追計存沒涕亦澘尋山把酒豈易得客路霰雪衣裘單塵埃可洗憂可豁待君一酌玻璃泉題江州琵琶亭危亭古榜名琵琶尚有楓葉連荻花嗚呼司馬則巳矣行人往來皆嘆嗟司馬風流映千古當日琵琶傳樂府江山寂寞三百年潯陽風月知誰主我今單舸犯江潭往來略巳遍東南可憐千里傷心目不待琵琶淚滿衫豫官竟陵時李文舉嘗以事至郡同逰西禪剎陸子泉烹茶酌酒甚歡也今歲豫移官齊安文舉自武昌渡江過我與之飲酒念西禪舊事相與慨然此生放蕩隨羣動一覺竟陵瀟灑夢江山喚我此中來卻愁風月無人共李侯年少能思我朅來兩槳歸潮送不辭薄酒與君飲坐覺西山夕煙重西禪舊逰巳陳迹壁間陸子塵生供石欄古井誰知味只有松風自成弄愛君為吏無俗韻快誦離騷飲仍痛不嫌寂寞過我來古縣年豐少爭訟乞錢穆公給事丈新賜龍團閩侯貢璧琢蒼玉中有掉尾寒潭龍驚山作春山不覺走馬獻入明光宫瑤池侍臣最先賜惠山乳泉新破封可得作詩酬孟簡不須載酒過揚雄將至都下竟陵南望稻新熟夢澤悠悠傷逺目春風嶺上望齊安太昊城邊攬秋菊那知歲暮東州客太山蒼寒曉霜白雲收霧捲日月明却上天衢瞻五色敝裘疲馬古道長九旬刺史歸空囊歸去故人應笑我滿衫清淚説潯陽題韓幹馬圖頭如翔鸞月頰光背如安輿鳬臆方心知不載田舍郎猶帶開元天子紅袍香韓幹寫時國無事緑樹隂低春晝長兩髯執轡儼在傍如瞻馳道黃屋張北風揚塵燕賊狂廄中萬馬歸范陽天子乘騾蜀山路滿川苜蓿為誰芳罔沙阻風大江春風浪如屋客舟迎風罔沙宿連檣接柂古岸傍岸頭無人春草緑船頭日出炊煙起買魚携菜來就市漁人水惡不出門蕭條野市無雞豚堤邊紙錢灰若雨沽酒賽神巫降語南人艇子不避風橫江五兩翩翩去寄曼叔求酒青衫畿丞頑不羞三十持板拜督郵歸來無物與消愁典衣沽酒寒無裘囊空酒貴不可得縮手愁坐凝雙眸秋風破屋冷颼颼夜長不眠吟掉頭豈無鄰家酒可偷簡書縳汝如窮囚淮陽冬醪滑勝油唇焦不飲已經秋汲公直聲聞九州小子昔也從公逰憫憐憔悴賜顔色時丐餘酌濡其喉軍厨嵯峨糟作丘萬甕沸響玉蟻浮轍魚所願斗水逰不敢多取煩陽侯玉瓶未至涎已流想見瀲灔浮金甌歌成緘書還自咻一醉猶須越境謀題吳熙老風雲圖雨腳橫空萬牛弩烈風吹山山欲仆草披木拔何足道大江翻瀾失洲渚路旁失轡者誰子道阻且長泥沒屨鞭驢挽車亦何急目眩心搖行不顧我生飄蓬慣羈旅顧爾艱難逄亦屢衲被蒙頭不下堂且與身謀安穩處京師阻雨二首深泥漫漫汚后土長安閉門三日雨頑雲不動風伯愁飛電更相雷師怒陽烏力弱不自持天漏已寬無石補麥蛾禾耳不足憂當念為魚救無禹大雨三日泥三尺駿馬髙車行不得我有蹇驢安敢騎閉户髙眠朝至夕誰家髙堂半夜秋軟綺輕紈換絺綌朱門樂事無時無爾自賤貧空太息應龍原注海州胊山有龍潭人傳有龍應龍未遇風雲起仰活泥沙數尺水彼能坐致千里澤可憐一掬何難致時哉未遇可奈何一掬雖微安敢易誰能寄語潭中魚相聚須臾莫相忌田家三首野塘積水緑可染舍南新桞齊如剪去冬雪好麥穗長今日雨晴初擇繭東家饋黍西舍迎連臂踏歌村市晚婦騎夫荷兒扶翁月出橋南歸路逺社南村酒白如餳鄰翁宰牛鄰媪烹插花野婦抱兒至曳杖老翁扶背行淋漓醉飽不知夜祼股掣肘時歡爭去年百金易斗粟豐歲一飲君無輕新見鵲銜庭樹枝黃口出巢今巳飛栗留啄椹桑葉老科斗出畦新稻齊田家苦作候時節汲汲未免寒與飢去來暴取獨何者請視七月豳人詩海州道中二首孤舟夜行秋水廣秋風滿帆不搖槳荒田寂寂無人聲水邊跳魚翻水響河邊守罾茅作屋罾頭月明人夜宿船中客覺天未明誰家鞭牛登隴聲秋野蒼蒼秋日黃黃蒿滿田蒼耳長草蟲咿咿鳴復咽一秋雨多水滿轍渡頭鳴舂村徑斜悠悠小蝶飛豆花逃屋無人草滿家纍纍秋蔓懸寒瓜女几祠下山邊白雲間不掃廟前土馬荒春草山下松花龍甲光東風古柏吹暖香朝霞為裳水為佩守廟千年老龍在清風掃堂神暮還山頭月出溪潺潺馬周馬周未遇虯鬚公布衣落魄來新豐一樽獨酌豈無意俗子不解知英雄賢豪相逄自相得一語君王見胸臆當時豈不為人言聾耳安能為君側南山南山鳳凰雙翅垂口不妄食腹苦飢山前老鳶飽腐鼠憑恃風日羣逰嬉俯身視鳳有驕色鳳不汝較空嗟咨九韶一奏為君舉坐看百鳥相隨飛福昌北秋日村行二首秋野無人秋日白黍黍登埸秋索索豆田黃時霜巳多桑蟲食葉留空柯小蝶翩翩晚花紫野鶉啄粟驚人起洛陽西原君莫行秋光處處傷人情黃桑蕭蕭新雨晴田中日午村雞鳴埸頭九月禾黍熟空原雉飛飽新穀棘籬蟲鳴村路曲路邊古墳生野菊人稀田闊草茫茫洛陽秋聲能斷腸歲暮歎三首秋日苦短秋雲多北風蕭蕭洛水波案此下脫一句長林撑空葉餘柯鳴雁高飛去不息晚花悠悠能幾何洛陽經年客未去歲暮搔首空悲歌寥寥野空禾黍荒北風日夜鳴空桑南山碧天青不極渺渺洛水東流長山空水寒行客少鴻雁飛急天初霜蕭蕭窮谷歲已晚嗟我再補冬衣裳南山蒼蒼秋季月北風如刀青石裂山隂半夜寒欲冰晚望高峰看新雪白衫少年臂鷹去暮歸飲酒烹孤兔強弓一斛尚可彎更欲射獵窮吾年一畝一畝秋蔬半成實竈突無煙已三日良人傭車斃車下老婦抱子啼空室秋風九月天巳寒飢腸不飽衣苦單我身為吏救無術坐視啼泣空汍瀾洛水洛水秋深碧如黛亂石縱橫㵼鳴瀨清明見底不留塵日射澄沙動璣貝南山秋風已蕭瑟倒影上下迷空翠何當載酒縱扁舟一尺鯉魚寒可鱠秋風三首秋風蕭蕭洛川渡水碧沙寒飛白鷺波頭伐木欲成梁落日樵蘇下山去山頭九月雪一尺山民燃薪當𥜗袴石田收薄婦子飢歲晚苦寒安可度秋風蕭蕭吹野桑田家黍稷初登埸雉肥兔飽鷹隼健水落沙冷魚龍藏長淮煙波渺千里悵望搔首山川長二年薇蕨苦不飽長安裘馬多輝光昏鴉歸栖暮天迥新月娟娟水中影秋聲索索起桑麻古道人歸煙火靜公庭吏稀霜樹老藥檻雨多幽菊盛山家生事飽暗知野果村醪遣朝暝感春三首我昨西來到昌谷主人致酒留我宿坐中少年美如玉高歌清歡春夜促還家病酒對殘春東風落花吹滿屋出無與語歸閉門安得萬里馳吾足我昔東行花始開我自東歸花半摧萬紅辭林捲風去坐見錦繡蒙蒼苔南山朝雲鳩逐婦日暮微雨蕭蕭來一春晴明苦難得掩蔽風日知誰哉悠悠朝興暮還息官間事少門無客空山多隂春雨足飢馬蕭蕭空伏櫪文章工巧謀愈疏顔鬢衰遲進無䇿繫身五斗爾自為何用中宵空嘆息又三首亦知春歸不可留有情未忘寧免愁平田茫茫芳草合清洛不斷波悠悠傷心千里寄雙淚催老此身初白頭問舍求田未成計青衫手板對人羞山民為生最易足一身生計資山木負薪入市得百錢歸守妻兒烹斗粟山林未盡終不憂衣食自足他無欲人生誰使愛功名萬慮千思撓心腹騎馬出門暮復歸出無所詣歸對誰妻兒具酒勸我飲兒稚笑語傍嬉嬉人生如此亦可樂安用軒冕生光輝九原可作欲誰與鹿門龎叟真吾師去年去年四月多風雨麥秀不實農夫苦今年麥好風雨調萬口嗷嗷飢待哺何事今晨還衣夾朝日無光寒慘切天工與物無怨尤安用日與人為仇謝李剛中齋郎好詩風調清語中有骨自老成愈鑱愈出當有名朅來宣城蓋為傾文章不如金滿籯我昔曾力今乃懲少年平步取公卿安用學此誤平生局中負暄讀書三首輝輝短景留寒光重裘不暖貪負陽老人背溫一體康我欲持之獻天王天王九重居明光玉几翠被女侍傍人不我知謂我狂此心耿耿不敢忘歲云暮矣天雨霜且復持此飲一觴輝輝短景留寒光瓦簷霜濕梧桐黃老蛩不知秋已去白晝嘖嘖空啼墻歲云暮矣羈旅傷塊獨守此天一方牀頭書史談虞唐我言匪耄聼者狂輝輝短景不能春照我貧屋亦復仁虞淵道逺寒雲屯羲和愁思隕厥輪君不見志士憔悴甘賤貧塊處屋漏含悲辛重堂溫室顛醉昏悠悠蒼天彼何人歲後三日春風攪空如怒濤春日寂寂在蓬蒿衡門鳥雀舞不下西園桃李氣已嬌天邊碧雲空漠漠門外荒草還迢迢人生幾何春復夏可但白首隨漁樵和陽念三自武昌至京師三年别我客荆州一日長安從我逰愛君詩有春草句使我神逰黃鶴樓江山望爾欲穿眼見我驚嗟秋鬢短扁舟可辦吾欲東年來五湖魂夢中二十三日晨欲飲求酒無所得戲作張君所欲一壺酒百計經營卒無有夜來客至瓶已空晨起欲飲還戒口努力忍窮甘寂淡人間萬事如反手百壺一醉有底難造物戲謔君須受贈翟公巽我昔出守來丹陽江流五月如探湯使君之居在山腹繞舍樹石何青蒼千年藥根蟠井底靈液浸灌通寒漿人言枸杞精變狗夜吠往往聞空廊金山蕩潏浪花裏一舸遙去隨魚郎最竒巖齋人迹少乳水時滴白石牀翠黿坡陀負日色白蹢掀舞占風祥我泊金山凡十日窮探力取無遺忘南風吹我渡江去已厭淮南塵土黃二十年間多少事身如疲馬起復僵淮南窮栖衆人後朝食不充藜莧腸公來衰顔得一笑側聼髙論驚尋常窮閻過我坐至暮滿懷珠玉無秕粳乃知世間有清議未可盡以已意量精金白璧天所寶理無破碎委道旁半年耳冷不聞此過公矍然神激昂論文自顧已老醜從事理絶隨飛翔斯文有屬不但爾因公作詩我涕滂讀中興頌碑玉環妖血無人掃漁陽馬厭長安草潼關戰骨高於山萬里君王蜀中老金戈鐵馬從西來郭公凛凛英雄才舉旗為風偃為雨灑掃九廟無塵埃元功髙名誰與紀風雅不繼騷人死水部胸中星斗文太師筆下蛟龍字天遣二子傳將來高山十丈磨蒼崕誰持此碑入我室使我一見昏眸開百年廢興增歎慨當時數子今安在君不見荒涼浯水棄不收時有逰人打碑賣將至嶺下作竟陵南風稻新緑夢澤悠悠傷逺目春風嶺上望齊安太昊城邊攬秋菊那知歲暮東州客太山蒼寒曉霜白霜收霧逺日月明却上天衢瞻五色敝裘疲馬古道長九旬刺史歸空囊歸去故人應笑我滿襟清淚説淮陽塞獵十月北風燕草黃燕人馬飽弓力強虎皮裁鞍雕羽箭射殺隂山雙白狼青氊帳髙雪不濕擊鼓傳觴打令急單于半醉解貂裘昭君獨抱琵琶泣耒病臂比已平獨挽弓無力客言君為史官何事挽弓戲作此詩君不見吾鄉少年曹子桓文章七步相後先有時擲筆事戈獵邀輕截駿馳平原濊貊名弓燕代馬射雉歸來燕清夜一聞驚倒荀令君何物書生乃知射我雖把筆笑腐儒束腰待懸玉鹿盧自從病臂憂親友百嗜為之心一枯降癘無名天悔禍奪之而與復完軀但慙未使杯安肘猶負當年門挂弧便使凄涼身未伏略聞弓馬氣猶粗莫謂早衰須袖手將軍臂折尚平吳踵息齋物之有知者恃息物之有息知為賊天長地久載元氣天地無心故無極君知一身誰主持六塵緣影工伎兒發生變幻不暫止令汝鼻息無停時喘呼呀呷生至死去今已逺何由歸真人嗒然吾喪我能使炎火為寒灰中空無宰氣不使內自升降如靈龜深之又深乃至踵根深蒂固凝不動超然內外無死地梨棗華實龍虎用真人示我尺素書萬卷丹經不勞誦他年緑髮對銅狄卻視吾齋真作夢喜晴朝看東南雲物好便有清風收濁潦吾知天意將悔禍約束蛟龍便粳稻山川轉眼異明晦冠屨宜人亦輕燥微涼入堂酒味好一杯徑醉愁如掃清幽枕簟東窗下曉睡老雞呼不覺大風與楊念三飲次作此北風黃雲卷飛沙吹暗長安百萬家溫爐對酒慎勿出且看酒靣生浮花我為吟詩説雲夢荆江洞庭方洶湧吟成飲君三百杯莫學雪中驢酸哀寄道公知公鼻祖冬之日謫向江山冷無匹粹然真氣滿輕軀自言位次神仙秩同輩幾人始謝老惟公躚躚居第一鸞腰不舞自欲飛神屨瞥波原不濕永巷春深簾幕幽西都有人名莫愁我老摧頽乖舊約空能時作夢中逰柯山集卷十一
