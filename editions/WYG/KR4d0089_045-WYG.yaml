body:
  text: 柯山集巻四十五宋張耒撰題䟦書道士齊希莊事道士齊希莊頗學養生喜㳺名山至王屋山樂之不忍去搆草堂居燕真人巖前王屋多栗橡蕪菁及諸果蔬可食者以時採收給食居三年自若也一日有猴入其室希莊初不甚怪逐之不去視希莊坐起百為從傍傚之希莊大怪念初居山時客有教希莊逐猴法取猴矢懸而擊之試用猴為去希荘獨喜居數日有大猴異甚如五六嵗兒垂毛至地熟視希荘傚其動作如前猴者希荘懼莫知所為不敢復逐乆之猴復去希莊意欲出山未决一日有人呼希荘出視有人若兩髻童子黄單衣綠帶目有光貌不甚類人問磨籠山安自徃希荘指告之童子疾去如飛直度嶺壑望視不及自是希莊夜聞舍傍百物有聲一夕大雪晨出視門外人跡無數希荘發悸不能復居走山下得瘖疾數嵗方愈濮陽杜毅言嘗主簿王屋縣有登王屋天壇峯得方玉如鏡者毅讀道家書載黄帝嘗以八方玉鏡懸壇八方祀上帝云予嘗以此事語洛人楊國寳應之應之云其故人有居嵩髙者言凡天下名山有神主之非有道者不得居若頑然無聞徒中夜咽唾山鬼笑汝齊希荘庸道士也僅聞養生小術其不容于王屋之猴何足怪哉藥戒張子病痞積于中者伏而不能下自外至者捍而不得納從醫而問之曰非下之不可歸而飲其藥既飲而暴下不終日而向之伏者㪚而無餘向之捍者柔而不支焦膈導逹呼吸開利快然若未始有疾者不數日痞復作投以故藥其快然也亦如初自是逾月而痞五作五下毎下輙愈然張子之氣一語而三引體不勞而汗股不歩而慄膚革無所耗于外而其中苶然莫知其所來嗟夫痞非下不可已予從而下之術未爽也而吾之苶然者獨何歟聞楚南有良醫焉徃而問之之醫嘆曰子無嘆是苶然者也凡子之術固為是苶然也坐吾語汝天下之理有甚快于予心者其末必有傷求無傷于終者則初無望于快吾心隂伏而陽畜氣與血不運而為痞横乎子之胷中者其累大矣擊而去之不須臾而除甚大之累和平之氣不能為也必將擊摶震撓而後可夫人之和氣冲然而甚㣲泊乎其易危擊搏震撓之功未成而子之和氣嘗已病矣由是觀之則子之痞凡一快者子之和一傷矣不終月而快者五則子之和平之氣不既索乎故膚不勞而汗股不歩而慄苶然如不可終日也且將去子之痞不無害于和乎子歸燕居三月而後予之藥可為也張子歸燕居三月齋戒而復請之醫曰子之氣少完矣取藥而授之曰服之三月而疾少平又三月而小康終年而復常且飲樂不得亟進張子歸而行其説然其初使人懣然遲之盖三投其藥而三反之也然日不見其所攻乆較則月異而時不同盖終嵗而疾平張子謁醫再拜而謝之坐而問其故醫曰是治國之説也豈特醫之于疾哉子獨不見秦之治民乎敇之以命捍而不聴勤之以事放而不畏法令不聴治之不變則秦之民嘗痞矣商君見其痞也厲以刑法威以斬伐勁悍猛鷙不貸毫髪痛剗而力鋤之于是秦之政如建瓴流蕩四逹無敢或拒而秦之痞嘗一快矣自孝公以至于二世凡幾痞而幾快矣頑者已圮强者已柔而秦之民無歡心矣故猛政一快者歡心一已積快而不已而秦之四肢􅑎然徒有其物而已民心日離而君孤立于上故匹夫大呼不終日而百疾皆起秦欲運其手足肩膂而漠然不我應矣故秦之亡者是好為快者之過也昔者先生之民其初亦嘗痞矣先生豈不知砉然擊去之之為速也惟其有懼于終也故不敢求快于吾心優柔而撫存之教以仁義導以禮樂隂解其亂而徐除其滯使其悠然自趨于平安而不自知方其未也旁視而懣然者有之矣然月計之嵗察之則前嵗之俗非今嵗之俗也不擊不搏無所忤逆是以日去其戾氣而不嬰其歡心于是政成教逹安樂悠乆而無後患矣是以三代之治皆更數聖人歴數百年而後俗成則予之藥終年而愈疾者盖無足怪也故曰天下之理有甚快于予心者其末也必有傷求無傷于其終則無望于快吾心雖然豈獨于治天下哉張子再拜出而記其説書董及延夀録後以貴事其親者不過崇爵位侈車服以富事其親者不過豐衣食美室廬老且病齒髪變衰悲日之就盡與其呻吟疾痛骨肉環侍莫知所為當是時所謂富貴之奉曷補萬一哉善乎董生之愛其親陳起居飲食之節導引吐納之方以調其平居又考其方術試藥物以防其疾痛務以强其身養其夀而不知其他嗚呼使誠身强而永年耶則雖樵漁以自給飲水曲肱而枕之視天下所樂無以易之矣顧爵位車服衣食室廬之奉果何物哉予讀髙堂延夀録既自傷致養之不逮而嘉夫生之能愛其親而其書可以助孝子慈孫之養也反復讀之不厭董生今有母八十餘耳目聪明飲食動作如壮人予知生之方既試矣于是為書其末書香山傳後佛法自東漢明帝時始入中國而此傳天人所稱莊王者以為楚王則時未有佛所謂觀世音者比丘之號無從而有與史載不合然未可廢也予嘗讀宣律師傳其載天人語甚多有一天人説周穆王時佛至中國與列子所載西極化人之事略同不知子寓言耶抑實事也佛自東漢明帝以來其書與教始大行于震旦亦安知其不已嘗見神于中國乎書之不見録于史册者有何限其偶遺此或以為怪而不録不足怪也不然明帝夢金人飛行于庭中當時何從知其為佛哉書錢宣靖遺事後世言宣靖嘗遇善相人言其相可以學道當昇舉而未能决遂與之見華山陳圖南陳一見曰是無仙骨但急流中能勇退耳宣靖後事定陵以髙退冠朝廷圖南言信矣夫能勇退于富貴急流去得道不逺矣世無神仙則已有則必此流為之書布衾銘後司馬公之儉徳盖望其眉宇聞其語言而使奢逸之意消不必考其服器而後知也公薨于東府某徃哭之見覆尸以布衾上有銘焉盖此銘也書唐吐蕃傳後自漢以來其能制四裔使不為中國患者莫若唐然獨一區區之吐蕃能困之豈其制之未得其術耶自太宗以來固已屢失其術而其尤可笑者平凉之盟也匹夫操刀而殺人則必從容伺察待其不備而後發執刀而呼曰束爾手吾将殺汝則雖賁育不敢施於三尺之童何則人固不可易也不然則必待狂疾者也使之束手而殺之告之殺而不避也則亦必狂疾者也吐蕃之于唐固非有深誠篤信之可以不虞也方徳宗之時吾方疑之彼曰必使多爾大臣而後盟惟杜希全李觀而後可擇其地利則曰必土黎樹而後可彼得殺吾之大臣而刼二将以空涇原靈夏之偹而擇險阻之地以為設伏之利此其必變之迹特未曰吾将變耳彼乘吾疑而直行其謀而求我成之其易我也甚矣而唐之将相大臣晏然不之虞如接君子長者與之握手壇上而不少偹此何以異于将殺之則告之束手而偃然不拒而待死者哉彼渾瑊者忠有餘而智不足者也古之善将者逺至于鄰國之動静皆知之夫豈有他術哉測之以謀而伺之以實爾夫縛其二將而不知三萬之卒伏于肘腋而不覺也則安在其為智也嗚呼平凉之盟所以大可嘆也彼尚結賛之智何足貴也是殺人而告之束手者之智也其為智亦殆矣彼李晟之智不可與盟也是知人殺之則避者之智也其可否之間亦明矣當是時唐之臣如渾瑊馬燧者亦可謂善将矣而猶如此况無二臣者哉書趙令畤字説後蘇公既謫嶺外其所厚善者徃徃得罪徳麟亦閒廢且十年其平生與公徃還之迹宜其深㣲而諱之矣而徳麟不然寳藏其遺墨餘藁無少棄舍此序其甲也予問其意徳麟慨然曰此文章之傳者也不可使後人致恨于我予曰此正先生所謂篤行而剛信予為道者歟記行色詩冷于陂水淡于秋逺陌初窮到渡頭頼是丹青不能畫畫成應遣一生愁右行色詩故待制司馬公所作也公諱池以某年中嘗監安豐酒税實作此詩距今若干年其孫宏知縣事刻此詩于石屬予記之惟公以文學風節為時名臣是生丞相溫公以盛徳名世以直道立朝名聞中外功施社稷其完節美行既載在天下而著書立言皆足以師範來世盖嘗評古今詩句著詩話一巻亦載此詩以其甚工不敢以父子之嫌廢也梅聖俞以詩名一時嘗言詩之工者寫難状之景如在目前含不盡之意見于言外此詩有焉東坡書巻蘇公謫居黄州時為奉議郎潘公書一巻偹正書行草數體予再官于黄首尾且三年嘗假此書于奉議之子大臨以為書法庚辰孟秋䝉恩守魯将之官盡出所假潘氏諸書歸之獨此一巻令男秬納之篋中予與邠老皆蘇學士徒也舍潘歸張奚擇焉邠老懼後東坡復徴此書疑于收視之不謹也使書此以為據書東坡先生贈孫君剛説後春秋傳曰使勇而無剛者嘗冦而速去之夫果敢不畏之謂勇無所屈撓之謂剛或謂申棖為剛者夫子曰棖也慾焉得剛夫使不以義屈于人而無邪欲以亂其中則其行已施於事者為仁孰禦哉此剛者必仁之説也蘇公行已可謂剛矣傲睨雄暴輕視憂患髙視千古氣盖一世當與孔北海並驅而猶稱孫君之剛又言其救十二人之死為剛者必仁之論則孫君可知矣其子思厲操履文詞絶人逺甚則來者未可量也予言其信題賈長卿讀髙彥休讀白樂天事髙彥休作唐闕史辨白樂天無因毋墜井作賞花新井詩賈子又從而續之張子曰二子謂之愛白公則可矣未可謂知白公也古之聖賢誰能無謗何獨樂天也哉有謂舜囚堯而奪之位伊尹放太甲而王世未嘗有辨舜與伊尹之非簒者也其心誠知其不然則辨無自而萌於心是其為説無待而自然人之飽者人誣之以飢未有自疑而辨其非飢者人知舜與伊尹之非簒如自信其飽雖或從而誣之而不在辨之之域矣故凡世之辨已與辨人其言雖工而察其心之始萌盖其於信嘗有所不足而後不能無言彼雖不能無疑于其初其攷于理較于迹而後能消其不信之心于是乎有辨故曰二子未可謂知白公者也嗚呼小人之害君子也亦多術矣謗之于意外惑之于疑似世之君子傍視而不平者起而與之辨起于知之所不足故縱言極口而益召天下之多言多言繁興而是非足以兩行於世夫惟真知而冺言者而後謗止夫世之真知君子者纔幾人則小人之毁賢敗善何時而止耶悲夫䟦吕居仁所藏秦少㳺投巻予見少㳺投巻多矣黄樓賦哀鎛鐘文巻巻有之豈其得意之文歟少㳺平生為文不多而一二精好可傳在嶺外亦時為文臨歿自為挽詩一章殊可悲也此巻是投正獻公者今藏居仁處居仁好其文出予覧之令人愴恨大觀丁亥仲春張耒書䟦范坦所藏髙閒帖予治平末嘗見太學直講楊褒家藏唐髙閒上人二帖石本歐陽文忠公書其末以為髙閒之書如此則韓序乃實録矣後予官秘書且十年凡秘府所藏與一時士大夫家所有晉唐以來名書妙墨皆獲見之而髙閒書絶未嘗見豈閒自重其藝不妄為人書故後之傳者少耶崇寕乙酉孟秋始見范伯履所藏千文追想楊褒石本真出一手足知退之之言不妄也柯山集巻四十五
