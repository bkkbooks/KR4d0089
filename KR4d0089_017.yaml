body:
  text: 柯山集卷十七宋張耒撰七言律詩蓬瀛臺二首青冥不盡海茫茫一望蓬瀛去路長秋信解慿詩客寄春心長為楚魂傷縈回四望山如畫興廢千年木已蒼直使臺傾荆棘滿聞琴何用涕霑裳蒼烟喬木古臺荒下見蓬瀛六月凉過雨誰知非峽女好風應是為襄王歡來未放流年老事去卻尋陳迹傷飄泊南逰未能返興來回首獨凄凉和即事溪如圓塹木如城魚鳥從逰信此情啅雀踏枝飛尚裊仰荷承雨側還傾彈琴廢久重尋譜種藥求多旋記名于世久判無妙策直應歸學老農耕自海至楚途次寄馬全玉八首迂疏懷抱獨君知杖拂親依即我師一句未能參妙道數篇空復寄新詩子方奮迅雲間翮我厭追隨世上兒安得巖坰兩如志銅瓶烏几為君擕蕭蕭桞岸野風秋虹掛前山晚雨收回首孤城空緑樹滿川斜日放歸舟年來雙淚供愁盡去去勞生幾日休試問故人思我否夢魂猶在海邉州髙城欲去更徘徊病眼登臨强一開風物盡為愁裏景山川疑是夢中來此身雙鬢何勞白未老塵心可得灰欲把煩愁付杯酒祗應清夢待尊罍生涯飄泊一航輕浩蕩晴川送我行北望山川連海逺南來風月近淮清人家稻熱豐年滿澤國天髙秋意生惟有羈愁消不得登臨清淚落如傾少年居士正安禪法是懷公門下傳已解出塵金裏礦何妨離欲火中蓮苦心參道嗟豫晚極口隨機恃子憐若許維揚傍仁里一㕓須買許行田蕭蕭晚雨向風斜村逺荒凉三四家野色連雲迷稼穡秋聲催曉起蒹葭愁如夜月長隨客身似飛鴻不記家極目相望何處是海天無際落殘霞二年海角寄東城嵗久移居亦有情去路山川嗟我逺舊時風月為誰清一㕓受地今難繼三徑懷歸久欲耕何日山林有茅屋百年無復問功名紫蟹雙螯薦客盤傾來不覺酒壷乾雨多澤國蒲魚美秋至楚天風露寒老去論交嗟我晚尊前一笑憶君歡紅蓮幕下無書檄剩寄新詩滿卷看夏日三首長夏江村風日清簷牙燕雀已生成蝶衣晒粉花枝午蛛網添絲屋角晴落落疏簾邀月影嘈嘈虛枕納溪聲久拚兩鬢如霜雪直欲樵漁過此生黃簾翠幕斷飛蠅午影當軒睡未興枕穩海魚鐫紫石扇凉山雪畫青繒廊隂日轉雕欄樹坐冷風生玉碗氷滿案詩書塵蠧甚故應疏懶過炎蒸棗徑瓜畦經雨凉白衫烏帽野人裝幽花避日房房斂翠樹含風葉葉香養拙久拚藏姓氏致身安事巧文章漢庭卿相皆豪俊不遇何妨白髮郎和朝應之大暑書事蓬門久閉謝來車畏暑尤便小閣虛青引嫩苔留鳥篆緑垂殘葉帶蟲書寒泉出井功何有白羽邀涼計已疏忍待西風一蕭瑟碧鱸斫鱠意何如遣興次韻和朝應之四首老去詩書倦討論一樽相對尚殷勤鍛爐放蕩狂中散書閣蕭條老子雲要路交親嗟隔濶他鄉耆舊飽知聞衰知多病頭風甚解寄新文獨有君西風淅淅滿征衣天畔危亭面翠微雲解映山常漠漠葉知辭樹亦依依苦飢黃鵠猶謀食無事輕鷗得逺飛落日秋風滿江漢杖藜三歎未能歸夜泛孤舟清洛津宓妃輕步若為親清涵星漢光垂地冷覺魚龍氣近人鏡裏悲秋雙鬢髮馬邊隨客兩京塵愁心欲比東流水滚滚無窮日日新蓬門鳥雀啅黃昏歸徑牛羊各有羣水濶魚龍隂後出山空虎豹夜深聞西來客引秦川雨南去秋連楚澤雲唐漢廢興無處問西風禾黍但邱墳自巴河至蘄陽口道中得二詩示仲達與秬同賦落月娟娟墮半環嘔啞鳴櫓轉荒灣東南地缺天連水春夏風髙浪卷山旅食每愁村市散近秋已覺暑衣單自慙老病心兒女三日離家已念還浩浩渾流卷白沙中流鼓棹四無涯喜逢山色開眉黛愁對江雲起炮車雨足郊原豐稻菽日斜鷗鷺滿蒹葭長年怕作扁舟客賴有髙談一笑譁離蘄陽守風林皇方慮風壯晚未知所止俄頃風息一食頃宿冨池作詩示同行老怕風波見輒驚賴逢談笑慰危情縱觀雲嶺屏風合坐見江濤鏡面平淹速人生難預計險夷世路不須營塵埃老作東州守得得扁舟作此行離冨池望廬嶽是日入夾口直達潯陽遂舍大江之險山秀江清三百里與君三宿一扁舟飲殘桑落溪雲暮卧冷桃笙楚雨秋舟隱長江逢夾口眼明五老立雲頭幾年澤國行將遍歸與親朋說舊逰二十三日即事已逢嫵媚散花峽不怕艱危道士磯啼鳥似逢人勸酒好山如為我開眉風標公子鷺得意跋扈將軍風斂威到舍將何作歸遺江山收得一囊詩度洛因泛舟東下數里頗憶淮上沄沄清洛轉山隈渺渺東流不復回輕鳥竟隨青嶂去亂波爭泛夕陽來偶驚舟楫鄉心起乍脫塵埃病眼開疑是盱眙郭門外月明帆席過清淮縣齊只合門如野叟家市朝聲利苦喧譁但知得醉頻沽酒何處逢春不見花暗樹五更雞報曉晚庭三叠鼓催衙知君宰邑端無事吟笑何妨到暮鴉和周亷彥天光不動晚雲垂芳草初長襯馬蹄新月已生飛鳥外落霞更在夕陽西花開有客時擕酒門冷無車出畏泥修禊洛濵期一醉天津春浪緑浮堤春日遣興二首流光向老惜芳菲搔首悲歌心事違緑野染成延晝永辭紅吹盡放春歸荆榛廢苑人間牧風雨空城烏夜飛斷送一番桃李盡可憐桑柘有光輝日烘烟桞軟于絲桃李成塵緑滿枝芳草有情隨處好落花無賴信風吹關心傷感知何處過眼芳菲能幾時一病春來妨痛飲遣愁惟有强裁詩錢仲珣追船及陳留野岸南風百草長沄沄汳水卷沙黃扁舟轉柂迷城市送客追船羅酒漿休唱陽關傷逺别所欣蓴菜入新堂宦名衰晚君無問便得封侯鬢已蒼遣興次韻和朝應之四首日落村虛烟靄青草根促織晚先鳴羣山衮衮望中去新月娟娟愁裏生暗峽風雲秋慘淡髙城河漢夜分明寄書故國還羞澀白首蕭條老病嬰洛陽宫殿鎖埃塵翠輦東還幾度春雙闕曉雲連太室九門晴影動天津地藏寶鼎寧無祲龍護靈書固有神遊豫此時期聖主保釐從古仗元臣女几山前雲雨收五更星斗轉西樓蒼蒼淡月關河曉裊裊西風觀閣秋獨鶴有求時飲啄孤雲無事任沉浮可憐白髮張公子還望西山歌四愁露下風悲螢火流周南羈客意悠悠山川老去三年淚關塞秋來萬里愁慣逐禽魚諳異俗每因霜月夢滄洲一拋硯井雙蓬鬢天畔詩成獨倚樓新霽園門幾日斷行蹤新霽欣然路小通晚萼有情開宿雨長林盡日舞髙風后皇佳植寧無橘鸞鳯求棲亦有桐不惜園林娛逐客此情誰似主人翁與李文舉登夢野亭樽爼相逢散百憂雖非吾土共登樓天邉雲送荆王雨江上楓雕宋玉秋華髮不堪懷故國清杯相與散牢愁清談七澤誰强健莫學騷人賦逺遊登夢野亭懷舊曽上髙臺望翠微重來悲嘆客難期章華蒼莾尋無處雲夢逶迤寒更遲墨客多情曽痛飲玉簫何處弄妍詞請君㸃檢當時事只應朱顔非舊時北堂齊居示秬秸窮臘貧家絺紵單可堪過雨夜堂寒屏除葷酒神應爽談笑詩書樂未閒净境眼前無俗物清都夢到有飛翰雞鳴月落紙忩白疑是從天風馭還送復守張坰朝奉罷歸一夢西都十二年竟陵相遇各華顛風流家世仁人後愷悌歌謡楚俗傳學道愛君甘淡薄倦遊嗟我久留連自憐江上傷春眼不待琵琶巳泫然嵗日同郡官朝天慶回偶成清曉琳宫拜謁還駝裘猶怯夜霜寒春生七澤蒼茫外日上三山縹眇間投老埃塵從馬後異時班綴近龍顔人間倚杖誰能料一酌芳醪興未䦨僦居小室之西有隙地不滿十步新嵗後稍暖每開户春色鬬進戲名其户曰嬉春因為此詩蒼蒼老檜已消雪冉冉烟蕪欲鬬妍圍得青春數畝地斷將平楚一方天春風入户如相覔新月低忩最可憐老子婆娑便終日一壷春酒與周旋發安化回望黃州山流落江湖四見春天恩復與兩朱輪幾年魚鳥真相得從此江山是故人碧落已瞻新日月故園好在舊交親此生已免嘲傖父莫避北風京洛塵發雲山近岐亭望光蔡接尉氏白草黃茅間瘦田郊原殘暑已蕭然澤連楚夢悲秋野山近堯封望日天濃緑逺陂鋪晚稼幽香秋水折殘蓮熱行更益相如渴悵望華陵陸子泉贈僧介然寒忩寫就白雲篇客至研茶手自煎儒佛故應同是道詩書本是不妨禪長松千尺巢雲鶴寒嶠三更嘯月猿請以篇章為佛事要觀半偈走人天寄子由二首萬里歸來真得仙七年瞻望漫悁悁安閒舊得還丹訣著論新成古史編應接强顔聊復爾是非䄂手獨超然門人白首侯芭在眷戀微官愧昔賢文席他年聞至言艱難不敢墜周旋文詞老去真何益道妙平生薄有緣人事眼前惟欲睡丹經肘後更難傳清秋一室林泉好灑掃思為杖屨先卧病月餘呈子由二首蔀室悠悠昏復朝强披莊子說逍遙四禪未到風猶梗九轉無功火不燒學道若為調鹿馬是身不實似芭蕉丹砂赤箭功何有想聼清言意自消風葉鳴忩巳復朝喚回歸夢故山遙酒壺暗淡浮塵集藥鼎青熒敗葉燒閉户獨依寒蟋蟀移床近就雨芭蕉雪深更請安心術長日如年未易消次韻李晉裕教授九日見贈滿酌聊酬菊蕊黃登髙仍在太山陽笑談佳節賔朋集詩酒清歡興味長倦客得閒聊欲飲老人雖醉不成狂先生莫嘆虀鹽久行見髙才頴出囊謁太昊祠千里垂精帝道尊神祠近正國西門風搖廣殿松杉老雨入修廊羽衛昏日落狐狸號草莾年豐父老薦雞豚舊遊零落今誰在塵壁蒼茫字半存上元後步西園物態欣欣換舊年收燈城市郤蕭然風光欲到氷霜樹日月初回雨露天近水逺山情脉脉碧雲芳草思綿綿酬春欲辦千釭酒灑掃花前作醉眠上元思京輦舊遊三首萬雉春城逼絳霄上元雕輦盛遊遨遲遲瑞日低彤傘焯焯榮光上赭𫀆雲捲朱簾開綵雉山盤玉闕枕仙鰲長安一别將華髮溪竹山城夜寂寥九門燈火夜交光羅綺風來撲靣香信馬恣穿深桞巷隨身偷看隔簾妝身居薄宦安知樂心逐流年暗减狂留滯山城莫嗟嘆貂蟬從古屬金張隨計當年寄玉京一時交結盡豪英倒觥凌亂迷籌飲醉帽攲斜並轡行仕路飛騰輸俊傑山城憔悴感功名佳晨强酌清樽酒寒竹蕭蕭月正明文周翰惠酒以詩謝之一夢東都白髮新天涯同是弔靈均讀書久誤平生事飲酒聊娛見在身漢上卧龍新得雨江邉饑雁晚知春黃髯相見應相問為道真成澤畔人原注時周翰自漢陽移陜與師是為代豫亦自復移倅齊安黃多髯故云金陵懷古控帶洪流古帝城欲尋舊事半榛荆六朝山色情終在千古江聲憾未平設險邱陵荒蔓草帶城桑柘接新耕十年重到無人問獨立東風一愴情都梁夜景原注汴上亭名浩浩黃流注渺漫南山峰嶺對巑岏青燈覆地嚴城夜白月當天淮上寒酒市歌呼迷客醉畫樓燈火暗更殘扁舟老客無餘事擁褐髙眠夜未闌大暑戲贈希古去年揮汗對淮流寒暑那知復一周土潤何妨兼伏暑火流行看放清秋鬢鬚總白難相笑觀廟俱閒好並遊只怕樽前誇酒量一揮百盞不言休春晚有感洛川三月鴨鵊鳴游絮縈空塵不驚茸茸草色鋪風軟㸃㸃楊花著水輕何處浮雲度天末不妨微雨破春晴江南有客增歸思悵望汀洲蘋芷生七月十五日希古生日以詩為夀蒼顔白髮老祠官邂逅淮揚一笑歡且可鯨吞巵滿酒行看鶚立豸拏冠夀觴滿對秋風舉生日欣逢伏暑闌閲世祝公松柏夀從來霜雪不能寒中秋無月戲呈希古年兄放逐江湖一釣舟蕭條故國又逢秋炎凉始信來如舊嵗月相催逝不留日落千蛩喧户牖風髙一雁下汀洲地無積潦蟾華好誰買新醪作夜遊病肺齒痛對雪擁庭晴雪照髙堂卧病悠悠廢舉觴肺疾僅同園令渴齒傷不為幼輿狂交飛翠斚知誰醉獨嗅烏巾認舊香惟有烹茶心未厭故知淡泊味能長泊舟都梁亭二首旅枕無眠客夢勞五更旁舍一雞號汴淮水濶浮梁小城郭霜晴寶塔髙梅鎖冷香通雀啄水翻新緑出漁篙君恩許作還鄉客肯對江蘺賦廣騷微春已動陳根緑晴日初流太澤澌客路苦寒惟飲酒老年便暖屢添衣霜林背日梅遲拆氷渚知春雁早飛江上三年陳迹在年年穿竹折梅時都梁雪天晚望浮梁淮面欲飛騰金碧浮屠間玉層古岸蕭條風捲雪長河咽絶水浮氷留連淮汴殘年客蹭蹬塵埃一老僧聞道都梁梅未拆可隨桃李畏嚴凝大雪中李提舉惠玻璃泉兩榼二首南山春雪凍雲凝暗火青燈急霰聲栗烈殘年新慶雪玻璃美酒舊知名饑腸未慣猶空吼凍臉何知輒妄赬隱忍且須留一榼晴明待作探梅行峰髙凍雪埋蒼玉河靜黃沙咽濁流嗟我殘年為逺客煩君雙榼散羇愁屠蘇禦嵗將傳盞綵勝宜春欲插頭痛飲須知謀日富無田何用慶來牟戲贈張嘉甫鐵鎖沉淵誰敢干塔中古佛淡無言嵗窮故里何時到舟泊危亭盡日閒博士虀鹽稀把酒腐儒氷葛慣衝寒籃輿未怯浮梁險興發猶能走馬鞍舟中書事久客益知行路難鏡中雙鬢不須看山川積雪堅氷地舟楫長淮古汳間餽費主人勤俗禮書來故里勸加餐北歸漸踏塵埃道盡日危亭且看山戲同小兒作望南京內門别都制席擬王畿雙闕岧嶤望太微髙乘旗常難望幸九天樓觀自相輝百年龍虎興王氣萬雉金湯却敵威一夢江南尚淹泊風塵似欲變征衣同榮子雍登石家寺閣髙樓南望一傷神靄靄東風萬里春地濶山川圍白日天低觀闕近浮雲驚心鳥語知時好照眼花枝著意新不是蓴羮勝羊酪素衣真怕洛陽塵不出偶成二首老人杖履一茅亭花謝西園不復扃翠被一方都蓋覆紅妝數子尚娉婷可憐鶯蝶狂都歇頗覺風雲意有營聞說陂田雨三尺逺城釃水種春粳結茅亭下小池新積雨通溝灔晚春風掠塵埃出明鏡影吞林木卧青雲泥中蘋藻生無數江上鵁鶄坐得聞太液漸臺深斗極乘閒杖履得相親和李令放稅晚田既廢麥初耕冠蓋侵星獨出城但見饑寒號嵗晚不聞簫鼓賽秋成倉無農父千斯慶稅比周人什一輕撫字從來須守令莫辜聖世念疲氓贈旡咎快哉亭下水連城落日斷霞相映明人在捲簾尊爼裏詩從揮塵笑談生揚州何遜風流在江夏黃香句法清案此下脫二句柯山集卷十七
