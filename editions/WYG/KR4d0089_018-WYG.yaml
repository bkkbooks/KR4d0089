body:
  text: 柯山集巻十八宋張耒撰七言律詩萬松亭有感犖确山行穿翠微石雲秋露濕秋衣朦朧小睡還成夢諷詠新詩且療饑千里歸來人事改四年辛苦舊容非祗應亭下青雲葢依舊蒼腰聳十圍送壻陳景初還錢塘乃翁風節老彌堅嗣子清修學有傳為愛詩書賢事業肯羞葛練拙包纒經年上國勞歸夢一棹寒流放去船飽讀陳編勤筆硯書來寄我好文編登懸弧城感呉李事將軍戈甲從天下丞相旌旗匝地來堪笑怒螳猶強臂不知蟄户欲驚雷咄嗟武相深寃洗指顧山東逆境開吏部聲名千古在叚碑何處卧蒼苔原注韓碑既磨復命叚文昌撰叚碑不復見二月十七日欲招客飲而風霾不果有作欲擕佳客燕高堂園館春風又作狂猶挾氷霜餘意氣未分桃李好風光青山無賴藏雲岫流水生波灔野塘不飲何妨還燕坐閉門掃地獨焚香鴻軒下有薔薇予初至時生意葢僅存耳予為灌溉壅䕶今年春遂大盛仲春著花數百蕚大㡬如芍藥豐盛妍麗頃所未見也余有黄州之行酌酒賞别堂下薔薇親灌溉辛勤纔見一春花時如轉轂無停軌客似飛鴻不定家一嵗相邀伴寂寞明年誰復對芳華驅車又向黄州去風月相望一嘆嗟早登望嵩樓望少室雪畏風不敢招客臨汝城中春雪消望嵩樓上對苕嶤已披氛霧呈孤秀未許春寒上泬寥子晉玉笙如不隔浮邱仙袂欲相招便思喚客同清賞苦畏春風入敝貂下春風嶺東歸已過春風嶺度盡千山路漸平人事水泡能㡬日流光駒隙郤堪驚居人落落多新屋行店依依認舊程世事飽諳身已老區區來往笑浮生江亭别故人津亭把酒燕西東無復餘花一㸃紅農事一春荒積雨長淮千里駕東風休談世事循環外且寄騷愁醉眼中船鼓巳鳴篙纜起客行何事亦匆匆讀黄魯直詩江南宿草一荒邱試讀遺編涕不收不踐前人舊行迹獨驚斯世擅風流一尊華髪江邉客萬里黄茅嶺外州虎豹磨牙九關䆳重華可訴且南遊原注辛巳嵗魯直見予黄州江上登城隍廟靈祠孤絶壓城頭下瞰清濠一曲流盡日風埃昏几席有時簫鼓祭春秋西瞻太昊祠千樹北望封君土一丘旅客登臨一長望春心容易起騷愁奉議楊君予姊丈也亷静樂道不交世俗造道微妙自得不耀未六十而終予實銘其墓其子克一又纂其遺文求書巻末懐想平昔不知涕之横集也楊君冡木已蕭蕭筆墨遺文久寂寥墮涙交親悲宿草長饑奴僕守空瓢平生好事誰能繼後世高名骨已消欲酌一杯澆墓隧遺魂楚些倘能招老舅寓陳諸况不能盡布以二詩代書得閒為和佳也欲知老子居陳事古寺蕭條屋數楹幸免絶糧慙孔聖更無環堵羡淵明參差拙句何曽是寵辱浮雲無可驚斷送光隂須美酒惟應此事費經營浮生巳老付悠悠未免饑寒目下憂全仗黄庭能郤老那堪白髪更悲秋所欣耳界常清浄漸放心君得自由壘塊苦消消未盡每逢風月亦閒愁贈邠老案首句脱去四字極蒸嘘念子柯山守舊廬盧叟今無僧送米案第三句亦脱四字吏徴租上書自薦心應恥扶策躬耕計未疎虎豹九闗今肅穆王門行看曳長裾仲夏雲間趙盾益可畏淵底武侯方熟眠若無一雨為施澤直恐三伏便欲然筭商酤酒有底急束帶坐曹真欲顛平生不解作熱客且復飽食窺陳編過泗州推官王永年致仕還鄉王年四十而致仕士大夫所少也為憶田園便拂衣休官退勇似君稀塵埃擺脱青衫去閭里驚嗟白髪稀南畆稻粱仍嵗熟舊山芝术入秋肥百年從此皆閒日寄語人間浪是非依韻和范三登淮亭身如客雁寄汀州北望休登王粲樓殘雪朔風驚嵗晚早梅新栁動春愁免遭斤斧甘無用敢向波濤較善㳺奔走塵埃欲歸去勒移恐作故山羞離山陽入都寄徐仲車孤城芳樹碧層層村落黄昏只見燈廻首事如前夕夢出門心似下山僧仕求行道時難偶意欲謀閒力不能寄語東臯多醸酒待予歸日解行縢題淮隂孫簿壁荒凉官舍對淮流樽酒相逢為少留夾道老椿鴉哺子隔墻荒草牧呼牛渡頭人㪚前村市天際㠶來何處舟自古詩人最多感新篇應解冩騷愁題洪澤亭三年淮海飄萍客今日亭邉再艤舟人似垂楊隨日老事如流水㡬時休閒于萬事常難得仕以為生最拙謀此世定知猶㡬至遑遑奔走欲何求宿泗州戒壇院樓上鳴鐘門夜扄風簷送雨入疎櫺老僧坐睡依深壁童子持經守暗燈千里塵埃長旅泊五年憂患困侵凌誰知避世天然子一見禪翁便服膺原注天然丹霞也宿栁子觀音寺黄塵滿道客衣穿古寺荒凉暫息肩倦體收來便稳榻汗顔濯去快寒泉野僧治飯挑蔬至童子擕茶對客煎夜久月高風鐸響木魚呼覺五更眠寄滁州邵子發同年二首夫子才豪官尚卑窮城冷落有誰知莫嫌五斗紆高興且與青山賦好詩得失可齊陶令酒功名休問蜀莊蓍三年流落甘憂患一笑何當慰别離年來萬事付禪宗兩鬢雖青心已翁欲借一㕓希許子更將五斗繼無功春來行樂君應厭老去裁詩我未工聞道琅邪山色好為題新句寄清風雁知時避就物之難千里蕭蕭振羽翰水國稻收朝食乏海天霜重夜飛寒烟雲秋去南山暖風日春歸朔野寛九萬騰凌那可測弋人矰繳漫多端已未早春有感南國栁黄鶯未知人情何事憾春遲雪抽宿麥晴來葉雨長枯榆燒後枝載酒有誰尋寂寞受薪只合學支離近知壁觀安心法亦擬平治不作詩同袁思正諸公登楚州東園樓杖藜蕭颯對雲沙白首逢春只歎嗟身老易傷千里目眼驚還見一年花地平曠野連雲直天帶清淮向海斜尚有風光供醉筆我生詩酒是生涯和宏父新秋詩年年庭下梧桐葉長為騷人先報秋已驚嵗月悲霜鬢更望山川歌四愁浮生百感漫自苦一醉萬慮同時休瀛州仙客莫惆悵直泛三山烟浪舟送江瞻道之汝隂尉少年相見已蹉跎千里分擕可奈何世路險艱知子少人間憂患屬予多二年窮巷山陽客一棹清風潁水波我為離居感身世援琴西望獨悲歌同周楚望飲華園杖藜擕手踏青苔瀟洒池亭為客開栁色漸經秋雨暗荷香時與好風來斜陽似欲粧詩句新月邀将入酒杯身世己甘長寂寞忘形賴有子徘徊登楚望北樓裊裊危樓百尺梯秋風有客獨攀躋路窮流水逺更逺目斷夕陽西復西簾巻似迎輕燕入栁深時有暗蟬嘶洞庭落葉悲騷客鴨鵊何勞著意啼赴官夀安泛汴二首西來秋興日蕭條昨夜新霜緝緼袍開遍菊花殘蕋盡落餘寒水舊痕高蕭蕭官樹皆黄葉處處村旗有濁醪老補一官西入洛幸聞山水頗風騷落泊雲隨宿雨開西風似與早寒催曉天雁起平沙去霜㟁風鳴敗葉來擾擾勞生移嵗月紛紛過眼旋塵埃求田問舍真良䇿功業應須與命偕過少室驅車繼日未知勞翠靄嵐光下褐袍日暖峯巒開少室雪餘松柏近嵩髙山行嵗晚風霜苦地勢西來氣象豪勝事欲歌紛滿目烟霞深處欲誅茅寄蔡彦規兼謝恵酥梨二首自煮新酥寵旋開秦霜猶汗紫梨腮舊園歌舞唐宫廢灌頂醍醐佛國來寄我逺傳千里意憾君不舉百分杯西來新味饒鄉思淮蟹湖魚㡬日廻洛川北㟁錦屏西竹樹蕭蕭靣翠微風月有情常似舊山川信美不如歸文章送老甘無用魚鳥從㳺久息機寄語長安倦㳺客年來何事素書稀三鄉懐古清洛東流去不還漢唐遺事有無間廟荒古木連空谷宫廢春蕪入亂山原注光武祠連昌宫南陌絮飛人寂寂空城花落鳥闗闗登臨㡬度遊人老又對東風鬢欲斑夀安懐古蕭王積甲事空傳子晉吹笙去不還千里荒蕪山色在百年興廢水聲閒雉飛隴麥新耕地花落叢祠舊戰闗旅宦逺遊仍弔古苦無樽酒奈愁顔水軒書事招夀安僚友官閒不覺簿書勞一簟清風午枕高静拂小屏圖女几就書新竹記離騷城空鬬雉孤飛健栁暗雛鶯學語嬌東縣官曹誰過我欲沽村酒具山庖連昌宫長安王氣已消磨弔古遺墟恨愴多宫殿成塵新草木邱陵無主故山河雨餘耕隴尋遺寳夜静溪泉響細波才子已銷泉下骨百年獨諷舊時歌觀洛漲雨鎖山川晝不開洛波一夕漲如催西來勢蹴諸山動東轉聲包厚地廻一片曉光呉陣甲萬案脫二字響㑹稽雷何人共此乘桴志直到蓬瀛亦壯哉芳華閣玉仗無蹤輦路摧舊名猶得榜高臺月斜曉樹鳴鵯鵊日暖春蕪放雉媒清洛夜聲縈谷轉錦屏晴色照人來悽凉滿眼興亡恨誰是蕪城作賦才福昌雜詠五首張翰飄然欲鱠鱸周南久客意何如風悲故國荆榛地日落空城雉兔墟明月搗衣聞洛杵故人憑雁寄南書旅歌辛苦空弹鋏誰念朝盤未食魚東望川原拱別都漢唐冠葢已坵墟地横嵩少雄中夏天險轘轅困萬夫宫殿荒凉興廢恨山河慘淡戰争餘登臨不見淮南道只有風塵滿客裾乘雲飛去不辭家女几荒祠一逕斜溪入亂雲鳴珮玦樹蟠蒼石老龍蛇夜寒玉鏡懸清月天碧霓衣曳彩霞陵谷易遷塵骨老衰顔更欲服丹砂天倚岡巒翠萬重倚樓搔首更書空莓苔古屋荒秋雨草木空山起夜風漢帛北來邀塞雁楚招南望憶江楓塵埃流落悲生事白髪年來擬見攻滿目凄凉供客愁斷霞殘照想滄洲風雲蕭瑟三川夜星斗縱横萬壑秋騎省衰遲空作賦荆蠻留滯感登樓迷魂不待巫陽些自有騷詞繼逺遊福昌故苑芳華路已迷連昌宫闕露沾衣繁華冠葢當時事戰伐山河萬古悲野色蒼凉新雨地秋聲蕭瑟夕陽枝塵埃未有東歸計天畔登臨且賦詩牛谷口十萬全師一戰擒谷盤蒼硤路幽深凄凉今古興亡事遼濶英雄割據心漲洛暮連諸谷雨秋雲低抱半山隂文皇功業今何處磨滅荒碑蔓草侵歸馬二首歸馬駸駸不受鞭晚霞如畫照晴川蕭疎黄葉孤舟㟁零落秋雲斷雁天臨水登山悲楚客烹雞酌酒愛諸仙任從老逐霜毛至莫遣愁來玉盞邉蕭蕭霜􅁂獨驚秋病眼天邉暮倚樓已老馮唐猶不遇思歸庾信正多愁溪通積雨流方壯山入重雲翠未休一夢淮南經嵗别菊林還向洛陽浮官舍嵗暮感懐書事五首衙鼓鼕鼕送夕陽經時無客上髙堂淵明栁老秋多雨子敬氊寒夜有霜山樹葉稀晴摘果齋爐灰煖曉焚香經綸自有英雄在閒㪚須教屬漫郎脩竹高槐交映門公居瀟灑近山雲醉眠多似陶彭澤官况貧于鄭廣文秋菊𢷬塵供曉餌寒松收子和香焚經年門巷無車馬只有清風伴此君霜菊娟娟尚有花蕭條㕔樹暮啼鴉萬竿修竹開侯府十里青山隐相家麋鹿並遊諳野性詩書相對是生涯冷官自有貧中樂敢向朱門肉食誇北風吹雁去翩翩流滯周南又一年田為嵗荒陶令秫酒無人乞廣文錢香籠鉢水清晨咒坐煖蒲團後夜禪更謝晴明好山色數峰殘雪在簷前筆床茶竈素圍屏瀟洒幽齋燈火明木落風霜初十月坐寒星斗欲三更消磨永夜書盈案分付閒愁酒滿觥干世愈疎身漸老官閒何苦厭山城望女几雪萬㦸高攅女几晴巻簾初見雪峥嶸光迎曉日峰千叠氣入隂風夜五更晴色北臨秦甸白寒威東抱洛陽清坐看溝壑承餘澤付與春田次第耕永濟橋墟廟無人弔毁垣故橋遺址至今存侵波野㟁生新草齧石老沙留舊痕金殿有基藏兔穴玉輿無路半樵村甘棠古道輪蹄斷落日空山暮雨昏雪晴野望蕭蕭空谷隐山雲渡水人歸何處村樵逕雪迷唐苑路鳥聲寒集漢祠門公堂吏㪚惟修竹近嶺林疎見飲猿客坐無氊君莫笑陶潛亦有酒盈樽福昌南望朝市推遷不復還暮雲平野水潺潺山川寂寞繁華後都邑蕭條魚鳥閒鶴柱千年無故老仙棊一局換人間興亡今古知何極莫向雍琴妄慘顔戒醉平生嗜酒愛離騷痛飲須知屬我曹仕宦低回要斗粟功名迂濶欲霜毛直須減省樽罍費莫厭沉迷簿領勞醉吐相茵君勿恃丙公遺事久寥寥醉宿慈氏院晨起痛飲淋漓半夜醒披衣坐待曉窻明風松一夕清無限罏火三更煖有情孤閣鳴鐘天黯慘寒山戴雪晚峥嶸年來漸向深杯怯强學劉伶欲解酲梅花北風萬木正蒼蒼獨占新春第一芳調鼎自期終有實論花天下更無香月娥服御無非素玉女精神不尚粧洛岸苦寒相見晚曉來魂夢到江鄉送丁宣徳赴邕州僉判邕南亭障久消兵莫厭扁舟萬里行嶺外山川從古秀幕中談笑屬時平天連漲海鵬飛近風巻孤城􅄓母生勿為跕鳶思欵叚古來男子重功名同陳器之題迎福院軒東風吹靣酒楹樽臘後一畨梅栁新殘雪作寒山向晩横烟不動野浮春地留京洛豪華氣川帶秦韓戰伐塵今古悠悠君莫問祗應沉醉是天真春隂二首漠漠重雲向晩低臘寒新去有餘威風捎簷滴難開幌潤引爐香易著衣把酒自傾金錯落探春誰汙錦障泥山城冷落無歌舞只有芳醪取次擕溪樹昏昏鎖暮雲晚山愁黛對含顰不甘小雪猶妨暖長恨閒隂每占春寳帶金貂侯第客鈿車珂馬帝京塵王城自古繁華地回首高歌悵望頻寒食贈遊客隂隂畫幕映雕欄一縷微香寳篆殘寒食園林三月近落花風雨五更寒筝調寳柱絃初稳酒滿金壺飲未乾明日踏青郊外去緑楊門巷繫雕鞍登榖州故城控扼兵屯事巳遼傾欹遺堞隐蓬蒿春蕪滿野牛羊㪚秋稼連雲雉兔驕苔卧斷碑昏故刻雨飄殘卉帶餘燒人間興廢知何極莫謂荆榛便寂寥東池東池暮春風景妍汩汩淺渠鳴細泉菖蒲遶堤青似劍荷葉出水大如錢薔薇著花方未已楊栁飛絮任飄然鄰翁芍藥正足雨預計開時須醉眠暮春贈陳器之牡丹開過解鞦韆鵯鵊鳴時三月天盡日好風吹絮雪一池春水泛蓮錢溪邉蒲筍供朝飯堂上圖書伴晝眠端坐窮城何所得只收風月入新篇離光山驛郵亭結束問殘更斜月西南雞未鳴草草勞人常少睡綿綿逺道苦無情田家稔熟人情好野路雨餘秋氣清老得一州藏拙去鵷鸞臺閣盡豪英内生日從我奔馳走四方清貧殊不厭糟糠黔婁環堵貧常醉夀母高堂老亦康夷險百為吾有命窮通一意子真剛今年生日心無事好為兒孫舉夀觴次韻張公逺二首襄王坐上徴詞客子建車前歩水妃瞥過低鬟流盻處争先含笑獨來時東邉日下終無雨闕上書時合有碑腸斷呉王烟水國扁舟何日逐䲭夷平淡春雲捧額浮秋光劍㦸近人流無腸可斷方為憾有藥能治不是愁可待挑琴知有術未傳驅豆更無謀遥知添得春忩夢尤在樽前燭下羞柯山集巻十八
