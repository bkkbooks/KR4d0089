body:
  text: 柯山集卷十九宋張耒撰七言律詩和陳器之謝王澠池牡丹十首新詩換牡丹故邀春色入深山御袍黃粉天然薄醉臉胭脂分外殷原注所得牡丹有此御袍黃添色紅二種開晚東君留意厚原注竒花開常晚落遲晴晝伴春間原注洛人以幕蔭花可留半月狂來滿插烏紗帽未擬尊前感鬢斑和聞鶯冉冉東風萬柳絲啼鶯常自與春期妝殘玉枕朝醒後繡倦紗窗晝夢時文羽自竒非谷隱好音應合有人知風流潘令多才思為爾春來幾首詩同器之遊大宋陂值雨微雲護日曉隂隂春去餘芳尚可尋詩倚醉豪連卷寫酒逄勍敵百分斟山光左右雙屏畫雨腳峥嶸萬羽林沙路晚晴歸馬疾一梳新月上煙岑和陳器之苦雨急雨凄風未肯歸三川煙樹遠凄迷瀉山漲潦千霆怒到地重雲萬幕低擾擾泥塗同野鶩蕭蕭昏曉聼鄰雞為君一借扶搖便靜掃平郊散馬蹄依韻和朝十七見招之什斷送春光酒萬壺敢辭羸馬為君驅桑田日暖鳩呼婦楊柳葉深鶯哺雛詩冷有情尋水石年豐無盜起萑蒲河陽潘令風騷客醉倒樽前許我無鹿仙山溪清山秀隱神仙乘鹿真人去幾年天地壺中無客到方書肘後有誰傳秦皇採藥迷蓬島漢武燒金得紫煙真境寥寥在何處未容塵世妄攀緣寄朝應之二首強讀詩書歎白頭一官飄泊寄東周匏瓜有繫身難去人足無音境更幽晚接賢豪寬病思老將文字寫離憂相思一夕親談笑夢斷雲山相對愁瑜珥瑶環豁眼明碧梧翠竹照人清同車汲黯今難忮挾彈潘郎舊有名自是風流襲家世行看談笑取公卿塵埃落魄誰如我一事無成白髮生喬木舍北參天喬木長依慿清蔭護高堂鳥啼杳杳重隂合風到翩翩翠葉涼已許孤高凌夏日不妨堅老要秋霜投身麋鹿無人地非爾煩憂未易忘竹堂誰道清貧守冷官繞家十萬翠琅玕直應流水深相與不待清風已自寒學得鳳鳴真自許化成龍去不終蟠知世何世無來者可是王郎獨與歡夏日二首詩書老去信無功偷得間官許養慵山影當庭初轉日水聲穿竹自來風晚催萱蘂昏還斂日射榴房午更紅覽物賦詩成底事蕭蕭雙鬢欲衰翁重雲卷雨過山來遍灑中田到曉回錯落晴山移斗極隂森暗峽宿風雷佳人夜夜齊紈恨騷客年年鵯鵊哀欲見清秋近消息月明白露濕蒼苔至日有感二首兩逢至日驚身老遠寄周南覽物悲佳節風煙長慘慘他鄉人物自熙熙荆榛崤澠秦關破草樹芳華隋苑隳原注隋有芳華苑在邑東悵望高歌一回首兹辰尊酒莫相違一卧孤村兩見冬獨搔華髮思無窮荒山極目漫汗雪老樹當庭晝夜風佳節妻兒具樽酒茅齋斟酌慰愁翁未央曉賀瞻天冕正在爐煙縹眇中歲暮福昌懷古四首榖州故城原北荒城舊榖州文皇功業莾悠悠天戈揮去開東夏金甲歸來獻二囚想像英姿輝日月蒼茫故國委林丘山川慘慘空回首落日悲風蔓草秋張子房謀臣何處不知名誰與留侯敢抗衡籌下興亡分楚漢幄中談笑走韓彭懼誅老將爭梟首高卧成功更養生戡亂直須希世哲乘時兒女漫縱橫李賀宅少年詞筆動時人末俗文章久失真獨愛詩篇超物象祗應山水與精神清溪水拱荒涼宅幽谷花開寂寞春天上玉樓終恍惚人間遺事已埃塵連昌宫欲問興亡已慘顔桑田滄海變人間無情野水青春在不動南山白日間伐木清溪寒剝啄鳴禽高柳曉緡蠻蛾眉皓齒終黃土誰道仙宫有使還以病在告寄楊器之飲冷寒中不自知故應病骨易尫羸老人素懶何妨病太守兼容得自私雨汗欺風元自濕火雲挾日故行遲江樓清絶真孤負正是齋居禁酒時豫元豐戊午歲自楚至宋由柘城至福昌年二十有五後十年當元祐二年再過宋都追感存殁悵然有懷宋玉臺前官樹林十年孤客獨沾襟白頭青鬢隔存殁落日斷霞無古今暮雲梁苑雁鶩暗久泛吳船江海深閲世悲歡嗟老眼呼兒取酒十分斟宿馬莊寺衝泥我馬僵欲仆空村落日不逄人開門野寺淨如掃迎客老僧間更真佛案青黃園果細齋厨汲洗野蔬頻年來到處無餘念靜對同龕金色身永城道中東行十日何所有衰草白茅梁宋陂大風官樹吹半折欲雨野雲垂不飛十年所遇半陳迹千里獨愁懷所思他日江湖片帆去白頭青鏡久相期贈柘城簿王微之青衫得祿苦不足白髮生頭頗有餘賦就相如猶滌器原注王作宋都賦詩成賈島獨騎驢先生五斗不挂眼漫郎一官聊讀書自古好賢慚好色何人朝夕駕于株夜泊泗上阻風雨雨昏古岸斷人迹天黑孤城閉水關燈火樽前初擁膝風雲淮上欲移山避人魚鳥那足怪吹浪蛟龍不自間便使乘桴亦何事滄波歲晚合知還喜七兄疾愈二首淨名居士本非病五禽先生能養身家人但訝少林觀鄉里不知顔子貧身內固知精是藥人間惟有道通神喜聞漸離烏皮几花氣晴來欲逼人南鄰隱士龍虎鼎原注陸先生平叔有道之士東寺比丘堅密身原注圓明師戒行無玷欲知十室有信處顧此兩賢非世人戰勝天魔初起定原注七兄已斷世緣寶成丹竈不妨貧原注兄新悟道祕何時共此間居士紫領長衫樂社神送曹子方赴福建運判平生鄴下曹公子家世風流合有文橫槊尚傳瞞相國紫髯不是畫將軍詔書寬大民何怨刺史威嚴吏合勤好作楚詞更下俚雲中一降武夷君次韻盛居中夜飲吳衣厭拂洛陽塵夢寐一樽淮海濵每願脫巾常漉酒况逢投轄苦留賔蒼龍挂斗寒垂夜翡翠浮花暖作春上界高真足官府追隨却屬散仙人送麻田吳子野還山麻田老仙身馭風萬里一息如飛蓬行窮山川出天外閲盡世界歸壺中經過賣藥勾漏客鄉里高年南極翁我亦有心遊八極從公一借葛陂龍和旡咎二首年芳經雨能幾許客愁得暖不肯融眼看乳燕行已哺手種小桃隨分紅世情付睡莫涇渭物態逢春無異同清時賴是未禁酒須惜紅紫轉頭空愛酒苦無阿堵物尋春奈有主人家未容黃蜂釀成蜜已怕惡雨不容花雲間明月無可攬海中蟠桃良未涯浮名誤人不得脫黑髮減來那得加和門下相公從駕幸學繼聖文明舉舊章儒宫傳蹕駐膠庠地疑闕里絃歌宅經奏周書𨽻古行遣子東夷思入學受成西旅佇來王魯侯在泮猶歌誦盛事須刋孔子堂效白體二首功名富貴付悠悠高卧山城又過秋燕坐香燈為靜侣間行麋鹿是同遊青黃草木新霜過瀟灑溪山夜雨收回首十年梁苑客枉教白郤少年頭州貧須惜尊罍費俗陋兼無妓樂名幸有蒲團供燕坐不妨藜杖助間行看炊香稻供齋飯自採寒蔬試野羮身外無營內無事近來心氣儘和平效白體贈楊補之青衫居士斷葷血一榻蕭然如在山堂下黃花驚歲晚尊中緑酒覺官間胸中已了一事大鏡裏莫驚兩鬢斑我亦久懷伊洛興煩君先為卜禪關雙槐晚秀三月一日初見新葉東皇無處著繁華亦復分張到我家他日老蒼悲敗枿今晨嫩緑出新芽秃翁承辨纎纎髮村婦縈鬟草草花桃李蹊中人絶迹緑隂門巷正藏鴉休日不出聞西池遊人之盛三日春風塵漲天溝泥愁汙破鞍韉掃門靜閉無來客隱几深居學坐禪薄雨掠塵時點點細蟾窺夜獨娟娟都人解與殘春競半在西池聽管絃送李公輔赴宰宣城與君騎竹即同遊抱子相看髮已秋莫惜往來勤馬足未須容易轉船頭君方搜句窗間岫我已懸情天際舟抱槧石渠無所欲勞君時致管城侯休日不出久厭衣冠塵土浸賜休何苦馬駸駸窮冬積雪春不雨昨日殘紅今緑隂郤掃不知門外事安禪深得靜中心讀書陶令非求解禁酒揚雄不待針次韻王敏仲至西池會飲聖朝無復用舟師戲遣艨艟插戟枝沸浪有聲黃帽動春風無力彩旗垂不勝杯酌寧辭醉傳語風光共此嬉遠比永和真繼軌臨摹繭紙看他時次韻王敏仲池上春晚餘芳尚可尋晴雷沙岸走車音苑分廣樂和聲度池受晴天倒影深席上宫花輝御醴坐中瓊樹間瑶林歸人自畏嚴城鼓郤望橋西日未沈題外甥楊克一詩篇末十年不復上天津間郤西都幾度春里巷夢中迷向背山河句裏見精神藝成斧鑿真須棄學富篇章自不貧莫倚詠兒兼贈婦須知漸與老為鄰題李方叔文卷末他日東坡譽子文瀾翻健筆欲凌雲決科正爾真餘事射策如何但報聞詭御獲禽雖可鄙挽弓射葉亦徒勤莫辭更擬相如作寂寞思玄未放君劉景文許惠氊裘未至督之案原本首句脫去五字氊毛軟于春絮膩于膏虀鹽倦客愁無褐案第三句亦脫去五字贈袍雅服何妨冠蘇帽瘦腰兼稱束郿絛想公封寄應多憾不挂長身襯佩刀耒嘗病痺親友以酒為戒作小詩戲答離騷僅得比痛飲旨酒何曽廢善言因病細斟尤有味無人獨酌亦成歡何須巾漉醅浮蟻不待杯邀月入樽但看井眉瓶作土鴟夷仍自穩隨軒和吕與叔祕書省觀蘭千里猗猗誰取將忽驚顔色照文房每憐墜露時施澤更許光風為泛香獨秀已先梁苑草託根寧復楚天霜坐令黃萄羞粗俗只合蕭條籬下芳次韻秦七寄道潛衰疲久厭五更朝每愧𡨕鴻在泬寥顧我塵冠雕舊鬢愛君山桂長新條文詞畫虎工逾拙世味春氷老益消只欲歸依香火社高堂時聽法音潮和宋二上元迎駕拜揖清光咫尺間雕輿欲動更移班蓬萊不動鰲頭穩閶闔未開天上間老去一官羞簡策春來歸夢滿淮山自慚衰病獨隨俗醉逐遊人月下還和張提舉案原本首句脫去五字國東自慚多病幸優容喜來丈室談何妙案第三句亦脫去五字莫從宛水春生初皺縠鍾山雪盡見蟠龍新年強起尋芳物零落宫梅白一重書壁晴窗浴罷試春衣芳草江南三月時隂合園林禽語樂風和庭院絮飛遲漫郎官事只畫諾騷客生涯惟賦詩極目江天已多恨何須木落長年愁和上維道祈雨有應江鄉長夏亢陽驕太息秋原稻穗焦暑氣暮收秦地火原注項羽火咸陽三月不息雨聲秋響浙江潮原注五月雨勢甚大夜齋涼送簷間滴曉枕清聞竹上飄椒醑禮神慙德薄聖朝當寧四時調早秋感懷一行為吏百事廢幸此村州終日間莫疑虎兕率曠野正見虎豹守天關櫳簾晝靜燕已去陂澤風高鴈欲還老見功名真戲事惱人何苦鬢毛斑木芙蓉菊花盛開空山岑寂何所有晚菊芙蓉相對幽伴我悠悠過間日憐渠灼灼媚窮秋清香但欲持供佛醉舞何妨插滿頭此生萍梗難前料知復明年相見不正月八日坐局沽酒為問里閭何蹀躞上元楚俗習張燈新春此時最佳處獨我坐曺如定僧霜林夢澤蒼茫野煙草江邉寂寞城小飲未能來喚藁雙眸終日冷如氷神宗皇帝挽詞三首獨化陶鈞運聖謨八方寥廓入雄圖將軍已勒邉山頌博士初修玉檢書西望忽驚新石闕東來不是舊金輿編年誰秉丹青筆流落周南一腐儒三百年成玉鼎丹縞帷驚變紫宸班遺弓有淚哀何及嘶馬無蹤去不還霜露無情金闕暗山川常在石麟間青衫曾賜當年桂欲附龍髯不可攀風霆武略走夷蠻雲漢文章著不刋萬世基扃傳夏啓百年威德畏軒轅月遊渭水儀空在舞罷西陵淚未乾腸斷反虞歌徹後滿山松柏夜霜寒太皇太后挽詞坐安民物由修已默合神明為至公他日已占懷月夢後來方信補天功四時化育坤無事六合清明日正中九載憂勤已陳迹空留雙闕對青嵩范忠宣挽歌二首晚生長恨老成空猶及風流正始中經國謀猷號名相傳家正直似先公回天巨力章猶在拯溺深言老更忠誰念人心弔邦國新阡客泣白楊風瀟湘卧病弔纍沈賜詔君王用意深多士方懷宣父日蒼生竟失傅巖霖氈裘他日瞻吾父丹扆何人附舊針白首門生恩未報悲詞空想薤歌音黃幾道哀挽風流正始久無聲頗復因公到後生千里族人分俸祿百年鄉黨守題評青雲脫屣烏臺峻白首含香畫省清但得將軍桃李在寧須公相寫銘旌鄧慎思學士挽詞青衫獻賦逄知已白首耽書還誤身名著道山傳故事政行兩郡泣遺民文成典午羣疑泮原注嘗注晉書詩和少陵佳句新歎息苦身成底事湖墳宿草已愁人潘處士挽詩異時輕士老才良况復程能翰墨場酒裏浮沈真得計生涯落魄定何亡德尊故社江山永文付諸孫虎豹章環堵如今空五柳蕭然風物似紫桑挽李少卿幾年林下遠埃塵儒雅風流誰與鄰筆尾病來猶壯健詩情老去更清新幽齋昔日琴書換新冢東風草木春懷想只疑高興在一吟遺句淚沾巾七言長律詩上文潞公生日盛德元勳絶等倫麟符虎節冠宗臣靈椿上古身千載一柱明堂力萬鈞伐叛豹韜威尚凛刋名金鼎鑄來新風謡四海占賢相笑咏山川是主人萬里山河供氣概九秋雕鶚入精神光華稷契無窮譽強健喬松不老身坐鎖熊羆瞻繡衮燕居松鶴伴綸巾只應便是神仙事方丈蓬萊郤未真至日有感前年至日在何處寒事蕭蕭客許昌乞火夜溫行客酒披裘曉冒五更霜暮投陽翟荒涼驛正見人家燈火光飢馬卧嘶毛瑟縮羸童曉對色蒼茫二年旅宦孤村僻東望歸心洛水長佳節幾逄長索寞我生何事苦凄涼更無賔客青山滿只有風霜老樹蒼昭代寧須厭留滯馮公白首任為郎清明卧病有感二首支離卧病逢佳節漂泊西遊寄洛城重帽畏風惟益睡青筇扶步不禁行紅飄殘蕚知風急緑滿新枝聽鳥聲不見賈生遺宅處空傳金谷舊園名悲歌身世驚將老悵望古今空復情笑看家人競時節爭持新火照清明飄萍著處即為家伏枕悠悠對物華處處鞦韆競男女年年寒食亂風花藥囊親坐勞頻檢酒甕生塵亦可嗟未老會尋吳市卒苦貧須種邵平瓜雲煙南望羣山會水樹東浮去路斜行止此身應有命不須辛苦問生涯柯山集卷十九
