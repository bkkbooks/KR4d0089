body:
  text: 柯山集卷五宋張耒撰古樂府歌詞龜山祭淮詞二首迎神木裊裊兮蒼山巔回洑重深兮其下九淵東風歌兮春水舞庭肅肅兮神來下神來下兮翠帷舉谷冥冥兮春山雨雨三休兮神三燕遊雲高兮見極浦安我舟楫兮君不怒水濵之人兮苦思君葛蒲生兮楊柳春解君旗兮醉君御聊樂一日兮莫豫棄送神楚巫醉兮君不留春風起兮木蘭舟弭余楫兮飲君酒君既不顧兮駕龍以出遊凌九江兮勒滄海萬龍舞兮百靈會君孔樂兮我思君望君故居兮其上片雲水淪淪兮石碌碌空祠草長兮風雨入君屋山中春兮鳥鳴悲明月皎皎兮中夜來惠别洞簫奏兮瑤瑟御日不足兮繼以夜吾寧獨此湛樂兮喜豫美之宜修披浮雲出明月兮揮衆星不與謀既成言以命豫兮顧永豫之光明豈獨謂不然兮託東風以惠聲嗟言獨何容易兮有傾身者鬼神中懷著而必見兮卷蘭舌而交信豫雖不執子明燭兮光輝其舍豫兩相審者不媒兮豫既獲子于鼻息舒子聲以歌兮鳯凰將聞而振羽結子佩而起舞兮星斗視子而上下獨翩翩其不可留兮君之居可知而不可得春水渙渙兮豫獨飲君河之曲鳥鳴羣飛兮其下芳草柳舒舒其可攬結兮桃李始就其膏沐行者懷兮别者思酌君酒兮壽君以不衰撫君舟之悠然兮將浩渺以浮航三江震澤兮舟師告􅉵而一息引日星之煌煌兮吾獨望子于南極想子其下兮鼓聖濤而鞭蛟龍使宓妃不敢巧笑兮皇英斂袵而來從南風之來兮入豫裾悅余心獨條暢而清婉兮曰是為故人之風訴魃并序壽安夏旱麥且死民憂之無所不禱雲既興輒有大風擊去之間而雨塵不辨人物類有物為之者張子考于詩以為旱之神曰魃意者魃為之乎作訴魃詞帝治下土兮遠于民撫御萬方兮周無垠物類億干兮莽蓁蓁出入日月兮運星辰廣必有容兮潛姦昏不上訴兮帝曷聞歲庚申兮斗建已旬逾十兮雨不施秀者燋兮實者悴麥莽莽兮不出塊舊榖既沒兮待新以食奪其所望兮民憂以惑捨耒而兵兮奪攘剽賊急不知慮兮求生頃刻民幸帝兮詔雲師氣朝升兮斂陽暉孰鼓風兮震川嶽上者揚兮旁者剝雲雖仁兮不得施野童童兮草木摧孰揚塵兮蔽朝日紛霏霏兮冒萬物昏迷蒙兮浩恍惚瞭者瞀兮失南北瘞根莖兮腐葩實世慘錯兮澤蓬㶿霍霍然兮侵萬室飄雨塵兮以旦以夕民曰誰為兮尸是有物其名曰魃兮旱是司惡潤忌澤兮盜陽威淫視稿木兮疾華滋憎飽妬飫兮幸民飢亢不伏兮風以助之慘懷柔茂兮塵埃是吹來炎火兮爛煒煌馭回祿兮驂畢方朱旗旐兮綘帷裳坦無畏兮樂洋洋朋疫癘兮友疾殃徒甚劇兮黨甚強慢帝威兮分害戕竊祠禱兮傲驅攘民賴帝仁兮以衣以食上帝孔昭兮訴無禍責幸帝震怒兮降魃罪疾無俾在世兮幽沉深溺雷伐鼓兮電揚旗雨卷壑兮雲張帷泛遊澤兮湛甘滋充稿瘠兮奮枯萎禾黍茂兮蔬果肥歲既登兮民飽嬉康帝民兮思甚思幽斯魃兮宥無期敘雨有序福昌之民有禱旱于西山者取山之泉一勺祠之不數日而雨邑民言旱歲取水以祠輒應且其取之者非特福昌也張子神之作歌以揚之西山之泉兮冽以清淳注萬古兮無虧盈應龍蟠守兮謹防扃有神司之兮帥羣靈神君曷處兮山之穹雲郛霧闕兮都邃宫騰駕逸景兮馭清風上友仙聖兮佑帝躬惟今之旱兮非神曷訴家無餘糧兮麥不庇雨土飄塵揚兮迷行錯步魃威孔張兮熾莫豫禦挹水一勺兮薦羔豚曷求于水兮神實慿土有蔬兮林有實芼馨香兮葅芳鬱神我饗兮臨我堂酌芝醑兮御椒漿巫甚祗兮時甚良哀我疾兮降我祥神君仁兮念下民撫民災兮號帝閽帝念神君兮詔雨官叱馭六龍兮奮互飛鶱掣飛電兮鼓雷震俾霈爾澤兮正無限山靈川怪兮更騰奔角毛羽鬛兮爛鱗鱗前幢後斾兮玄雙輪椎轟喧呵兮翻乾坤神龍九鬛兮雜蛟鯤瞪眼飛涎兮翻齶齦伏潛羲和兮止星辰一灑萬里兮傾河津妖風失威兮斂以奔魃濡厥裳兮伏以蹲稿蘇焦澤兮息惔焚優渥潤沃兮無涯垠菽牟詵詵兮奮裳紳秋種既即兮農則勤既足而止兮披霧昏朝陽清明兮斂遊塵功成不居兮駕歸雲空山寥寥兮夜無聞靈泉幽幽兮湛奫淪竭誠莫報兮仁哉君友山張子官于福昌塊然獨居無與為友賓客不至遺朋失舊經時閉門終日鉗口出無與逰居無與就誰同我食誰酌我酒歸守妻孥出對厮走駕言出逰田童野叟氣否莫交情包不剖塞聰蔽明盤足袖手披書閲簡眩目疲肘厭然成痼不可針灸于是張子滌慮除煩披庭掃堂枕手而眠恍若有遇有神降焉曰我實哀汝獨無友朋我有教告子乎我聼凡世之人百愚一賢古昔所歎非獨今然得賢與朋善固無儷賢不可得將愚與此友賢實難幸然後值不幸友愚與無孰利諂笑傾辟韜情晦實測心獻計因隙投䇿口是腹非面歌背泣友若此者實繁孔多曷若不見目清耳和我復告子真友之實爾遵我言友胡有竭人物雖殊可友同焉賜爾以友其名曰山居汝左右在汝北焉端不汝去淡兮絶言春麗夏繁秋疏冬瘦霞霧融明風馳雨驟孤楫橫奔牢屯巧鏤傲岸軒昂清華潤秀對食臨眠排堂入牖效技汝前雖勞不疚山有佳泉多灌爾囿厯石懸空泠泠清潄如聞妙音濯煩浴垢不猶愈乎卑議庸讀過耳增悶入心善煩者乎山有修竹汝園是植靜麗明鮮端虛正直如彼正人揚言發色微風散碧宵月鏤白不猶愈乎市兒塵顔歌眉鼓吻佞笑浮言工為媚悅善佞曲拳者乎山有喬木聳立而峙端無媚姿若對正士障雨蔽暍千人所芘微飇披拂吹奏竽籟不猶愈乎蠕蠕鼠輩女黠兒嬌奴趨妾拜者乎山有好鳥清喉麗羽引嘯長鳴羣呼迭語夜管風絃哀簧怨柱不猶愈乎巷歌里舞促縮跳梁顚妖淫汚父子不施棄禮忘數者乎如前實繁言胡可殫汝與之樂右攀左援曷為孑孑寤寐嗟歎張子再拜受言永懷解纍亡憂心通志開高山巖巖流水潺潺竹茂木翹鳥鳴琅然如前夷齊而後閔顔吾何為乎浩然其間種菊有序張子病目眩而視昏醫有勸食菊者春夏食葉秋冬食花張子以為菊華于草木變衰之際而又功足以禦疾類有德君子因求而植諸庭焉何馨香之芬敷兮昌緑葉而紫莖是其名為菊兮爰植豫之中庭性清平而不躁兮味甘爽而充烹當秋露之慘凄兮舒煌煌之華英色正而麗兮氣芬以清純靜秀潔兮族茂羣榮採食以時兮天和以寧穎輕竅逹兮瞳子清明散敗流濁兮風宣滯行仙聖所餌兮屏除臭腥久嗜不廢兮將延爾齡嗟豫生兮蹇薄煩𡨕憂飢畏寒兮微祿以生終曷歸兮山林是營膏粱鼎食兮方丈縱橫炙熊之蹯兮龍醢羊羮彼得有命兮吾奚爾榮惟兹佳菊兮野實以生採擷咀食兮薦爼盈登求之孔易兮世焉莫爭我有久疾兮壅塞煩昏支節堅痺兮氣閼于元􅉵不能支兮外壅中乾疥癬得志兮蟯蛔伏蟠餐華秋冬兮食葉春夏集新易故兮爾功是假寧康我軀兮骨節堅良産和剔戾兮其樂洋洋反華于玄兮易瘻以強忘生絶俗兮深潛逺藏驂駕雲霧兮呼吸太陽招友彭咸兮御風以翔吁嗟此菊兮吾于爾望逐蛇有序福昌官居北負山為堂有大蛇穴堂北時下飲堂南水中人皆以為神見者不敢逐或禱祠焉張子曰是吾居也蛇安得而處之且蛇爾安有所謂神者作此逐之嗟堯之時兮大水滂橫潰四海兮包陵岡蕩流湧汩兮周無防龍騰蛇奔兮嬉以狂腥鱗頑鬛兮更披猖城居穴處兮亂厥常頽蟲糾結兮肆害戕陸盤淵據兮傲不臧朋屯黨集兮蕃以昌穿穴噬囓兮民盡傷下民既病兮帝弗康黃熊幽殛兮羽山陽乃命伯禹兮行四方乘高趨卑兮陵復航鑿山疏源兮導河江萬水下走兮來洋洋經畫九野兮興農桑驅龍放蛇兮屏諸荒焚山燎野兮無遺芒野巢窟居兮保厥疆敢有弗率兮斷爾吭伯益作志兮稽妖祥帝虞耄勤兮黜子商天授神禹兮夏是王九牧作貢兮金鑑鍠大冶鼓鑄兮騰精鋩巗巗九鼎峙且剛奇形詭質兮走與翔鱗毛羽裸兮兮雜短長求情抉態兮幽微彰制馭百怪兮嚴紀綱獸蟲人鬼兮安其鄉殊宫别域兮異存亡曷為兹蛇兮宅我居妖頑堅老兮傲驅除深潛居此兮坦無虞下飲我沼兮稍林株朱眸丹舌兮玄鱗膚恍惚遽速兮疑有無居者畏避兮行者徐險奪我圃兮駭我徒盜竊祭禱兮欺羣愚我咨爾蛇兮潛山而穴野隂蟠逺伏兮與人乎異舍冬居夏遊兮時以行食爾之食兮朋爾朋僣亂我居兮常失經叛棄爾守兮帝有刑胡昏與頑兮居以寧自為不寧兮邀割烹荒戾天理兮悖聖程我宥爾愆兮逐爾行亟舍故處兮遐以征南山之幽兮雲霧冥草木薈蔚兮嶮不平爾徒實繁兮食惟爾盈捕取不至兮居無與爭汝生孔遂兮壽綿爾齡物違其常兮禍之所集豐狐畫遊兮冬裘以白龜厭淵處兮吉凶是卜虎不畏人兮皮包戈戟矜險恃孽兮其終鮮克我言孔昭兮語汝以理日吉時良兮汝遄以逝登高懷不展兮居無聊默誶語兮浩長謡寫我心兮登彼高陟萬仞兮捫九霄命清風兮披浮雲瞰四荒兮視天垠大海蕩潏兮潛龍鯤吐吞日月兮制明昏醖釀元氣兮函星辰羽載四海兮芥浮坤四嶽列峙兮嵩中蹲牽連脈絡兮子復孫草蔓木布兮升降如朋障南蔽北兮東散西分如掌列塊兮盤羅豆樽黃流中貫兮發源崑崙東騖大海兮縈如繚紳南方炎炎兮火之所宅朱鳥屹峙兮丹膺綘翮鶱飛以翔兮輝煌爛赫從擁萬羽兮紛羅羽翼煌煌尊嚴兮有斗在北升降玉都兮運量帝側呼吸隂陽兮秉持禍福真仙逍遙兮淡不可挹西有王母兮戴勝穴居壽厯萬古兮忘終泯初超遼恍惚兮獨與道俱驂友日月兮羣靈走趨既又左而東顧兮觀大明之始生震沸九淵兮麗天升精披攘羣隂兮重幽昭明有神司馭兮朱裳綘纓呼造物以致問兮吾將放乎太初彼天地其孰始兮日與月其代除四荒漫其何極兮人胡為而中居火何為而南宅兮水孰使其在北安知東之主生兮西配刑而主殺斗建寅而氣分兮疇為四時之消息世徒知其已然兮遂推類而立説彼厥初其誰造兮孰布施而殊别抑其不得不然兮或者私智之所設將忽然而自爾兮遂已成而不可絶造物為余究察兮曰此曷可以言陳而意悉彼混沌之一氣兮吾不知誰合而為一忽洞逹而兩分兮夫亦安知其誰闢爰升清而降濁兮水赴陰而火陽東升氣而敷生兮西或成而害戕強名之曰自然兮曷足以究其必至謂不得不然者愈疏兮尚安取于私智莊周誕而妄推兮夏革愚而臆對世號豫曰造物兮豫亦曷有所主尸茍待豫而後造兮彼造豫者復誰姑置之而勿校兮任萬物之自成遊小智于太初兮何異夏蟲之語冰曠任之而勿疑兮萬里會而一平夫何造物者開豫兮神飄飄而不居我將赴而逺逰兮招神聖以為徒騰九螭之奔輪兮追飛電而攬奔風周萬里于一息兮堂西極而有九區叩玉闕之九關兮覲上帝于絳都酌瑤尊之芳酒兮招赤松而友彭祖既錫我以難老兮黜嗜欲而襲靈虛爰侑我以祕藥兮合千簫而吹萬竽樂吾心之洋洋兮舒五體之與與降復還于我室兮聊彌日而一娛子由先生示東坡公所和陶靖節歸去來詞及侍郎先生之作命之同賦耒輒自憫其仕之不偶又以弔東坡先生之亡終有以自廣也歸去來兮行世不偶豫曷歸其出無所為喜兮舍去而何悲眄一世之無與兮古之人逝莫追求不疚于豫義兮又奚恤餘子之是非彼好惡之罔極兮或顚倒其裳衣顧吾涉之已深兮愧哲人之見微吾歸甚安無所事奔既守吾室又杜吾門一氣孔神于中夜存納至和于靈根兮挹天醖于玄尊既充溢于幽闕兮亦粹然而見顔往有坎而兹夷兮昔或危而今安將從化人于西域兮面藏吏于函關將以一世為芻狗兮廢與興吾厭觀彼福禍之一源兮必兹出而兹還彼自以為無隙兮何異夫石槨之宋桓歸去來兮吾悲夫斯人不返兮豈招仙聖與之遊昔惠我以好音忽遠去而莫求豫曷異于世人兮初為哽塞而增憂彼錢鏄則深藏兮盍視夫己懇之田疇萬古藝藝共逝一舟半夜而失旦號其丘畏逹觀之誚豫涕己泣而不流悟榮名之取憎兮善斯人之獲休已矣乎萬物之作各其時吾獨與時而去留豈或能力而違之既往莫或追來者尚可期蓋雨暵之在天豈吾稼之不耔彼蜀雄之必傳作猶愧于書詩嗟身屈而道伸于斯人兮曷疑哭下殤下殤者何吾兒也兒生慧淑父母有所戒輒絶不為性仁不傷物處其曹恂恂也年七歲得驚疾醫之不得其方而死作此以哭之醫之不得其方耶抑其命有短長耶獨爾能使吾悲若此耶抑為父者皆愛其子耶蒼顱夷顙秀眉清目今其存亡其猶有鬼也使無物則吾復何思其尚有知也則夫荒屋野寺風霜雨露食息誰汝視也柯山集卷五
