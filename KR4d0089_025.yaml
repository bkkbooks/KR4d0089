body:
  text: 柯山集巻二十五宋張耒撰七言絶句上元三絶清晨謁帝大明宮拜賜歸來夜過中原注予在書近十年每歲上元晨趨大慶迎駕近午駕囘駐輦大慶門上賜茶酒拜謝退率一二同舍擇勝縱觀至夜分必醉歸歲率為常一夢十年身老矣山城風月作過從沽酒壚邊人若市算商亭下浪連天張君官况今如此豈有工夫作醉眠江邊燈火似秋螢哀怨山歌不可聽自怪今春牢落甚禪房止酒讀黄庭二絶句衙齋無事雨初晴山澤有容春向深何物東風吹不散祗應多病謫官心茆簷斜日曉雞號水滿陂塘薺麥高囘首故園空悵望東門歸路緑迢迢正月二十五日以小疾在告作三絶是日苦寒黄土岡頭薺麥長春陰蔽日午風狂山前梅落無人見只有幽禽啼暗香春色三分有尚多且饒芳草占高坡門前桺色如彭澤爭奈陶君止酒何原注予方以病止酒見説櫻桃已爛開坐愁風雨苦相催自憐華髪傷春客兩見飛花未放囘所居有梅一株在堂東荒穢中正月二十六日巳謝矣二首平生常恨逢梅少及對江梅無好詩寂寞荒山少風味直須雲鬢插斜枝冷落疎枝寒草岡欲攀先怕踏榛荒異時折處何堪説臨水高城倚女牆堂前種二桃詩示秬秸平昔殷勤向物華誰知憔悴客天涯雙桃栽罷還惆悵憶得淮陽舊種花春日書事蟲飛絲墮兩悠颺人意遲遲日共長春草滿庭門寂寂數櫺忩日掛空堂十月十日夕同文安君對月林外霜風作夜聲入簷寒月似多情燈前爐畔深杯暖更聽昭君出塞行蘄水道中二首蠶老麥枯田舍忙誰令四月雨浪浪未容烏鳥私遺粒鳴蚓跳蛙欲滿塲緑野新晴風日凉肩輿細路轉重岡橋邊野水侵官道旋喚漁舟渡夕陽感庭莎桃蹊李徑有塵埃初放青莎秀滿階想見芊緜古城角有人嗟我未歸來㝛潘君草堂聞蛙聲二首跳踉鼓怒任爭雄何事鳴呼聒睡翁不用洒灰煩魯老正須兩股付吳儂孤村足雨菰蒲合只有羣蛙噪滿陂我亦閒來無鼓吹不煩通夕短長吹齊安春謠五絶江上魚肥春水生江頭花落草青青蔞蒿芽長蘆筍大問君底事愛南烹莫笑江城大如斗桃花如燒酒如油人生無病卽為樂莫誦離騷澤畔愁楊桺弄春藏不得雪絮㸃㸃吹人來輕清潔白非塵物寄語桃杏莫相猜赤壁磯前江急流周郎功業莽悠悠惆悵沙邊雨中樹無言供作古今愁江頭春泥妨踏春閉門守春春著人問春著人作何味半酣美酒聽韶鈞衡門衡門日晏晩雞鳴下舍人歸半掩扃邑犬無聲山郭靜暮天寒月撥雲生橘靄靄高林緑實圓清霜一洗若金懸李衡何等相奴𨽻自有高人相國賢梅覆釡湖邊雪壓塵數枝林外已先春盡將七澤清霜氣洗出姑山綽約身水仙花葉如金燈而加柔澤花淺黄其幹如萱草秋深開至來春方巳雖霜雪不衰中州未嘗見一名雅蒜宫様鵝黄緑帯埀中州未省見仙姿只疑湘水綃機女來伴清秋宋玉悲崇寧壬午臨汝四月始聞鶯二首青杏登盤櫻壓枝園林初夏囀黄鸝一聲風露高林曉却覺年華總未衰好音終在恥争先谷外寒多故後遷已過花時亦何恨不妨夏木緑參天采石阻雨寄宣城故人二首風雨江頭思故人東南煙水濕青春宛溪東岸埀楊樹想見煙眉亦解顰閒雲濃淡作朝陰柳色江頭春已深誰為宣城故人説依依祗似去年心漫呈无咎一絶題扇燈前亦偶然那知别後逺如天去年醉舞㸔花處獨聽琵琶却惘然壬午臘月下旬偶作二首啄塊饑禽傍短籬風鳶一笑起高枝君㸔草樹氷霜裏即是東風欲到時風折蒹葭水結凘燕鴻相語定歸期淮南水闊山長處小待燕山霰雪晞泊楚州鎻外六首滿眼荒寒春未知芳菲欲到野梅枝東南近臘風煙好美酒千鍾魚蟹肥便風吹舫去無情漫遣槎牙鐡鎻横未嘆客行鷗鳥逺五更吹角是高城襄王席上舊行雲二十年間生死分可惜風流一抔土年年春草斷人魂流落相逢二十年羞將白髪對嬋娟如何見我都依舊添得尊前一惘然水榭踈簾秋夜涼清歌一曲釂瑤觴明朝囘首高城處只有西風却斷膓莫愁家住大堤邊朱閣青樓映暮川斜映清淮一梳月晩妝相對鬬嬋娟東齋雜咏竹裊裊墻陰竹數竿秋風盡日舞青鸞平生愛爾縁瀟洒莫作封君渭上㸔菊野人齋爨屏羶腥自向堦前擷紫莖老去愛花心轉薄一盃蔬飯足浮生盆池㸃㸃青萍秋後衰溶溶晴日見魚兒水邊窺影何方客自照行吟憔悴姿老槐雪霜未死閲年華危葉蕭蕭戰古槎裊裊秋風官舍冷半枝斜日帯啼鴉皂莢畿縣塵埃不可論故山喬木尚能存不縁去垢須青莢自愛蒼鱗百歲根南忩門前塵土慵驅馬堂上文書厭坐曹只有南忩慰人意寒燈清夜讀離騷道榻紙閣蘆簾小榻安一裘容易却輕寒誰驚午枕江湖夢風落晴窻柏子乾墻東二首墻東椿老葉巳盡堂下菊叢無復香長安風埃歲巳晩閉門不出馬毛長歲晩長安足風土天寒官舍少文書下馬閉門復無事壁間佛像對銅爐凝祥三首齋祠太一館清眞望秩名山固有神斜日苑門人不到靈風自掃石牀塵巳隨芳草藉盃盤更任垂楊拂馬鞍斜日兩竿眠犢晩春波一眼去鳬寒奉靈桃李巳堪攀只有春風作徃還園吏不須防客到長安從古少人閒謝人惠金沙酴醿二首金沙倩麗閨中秀酴醿謝郎林下風欲試此心無結習兩株常守浄名翁金沙豐腴合德艶酴醿輕盈飛燕身乆無丹白應知我齊散天香供道人奉安神考御容入景靈宫小臣獲覩有感二首靈風依傘繡輿深仗外猶疑警蹕音不似尋常逰幸日樓前鼓吹却沾襟渭上衣冠故老哀西陵石老巳莓苔從今仗下新歌舞長及年年獻酎來次韻子由舍人先生追讀邇英絶句四首天寒書殿曉班清氣爽仙盤瑞露零講罷羣公佩聲㪚一竿宫日轉槐庭聨翩右史直西垣舊墨螭頭㸃未乾自是退之平昔事可須慙著進賢冠冠佩煌煌拱北辰道人風骨自軒軒茯苓松下龜黿老須乞靈丹一粒吞恭黙誰聆金玉音陶甄萬物付無心君王好意眞天意憂國論思不厭深荒園日暖風簷翻乳燕曉寒露桞囀流鶯荒園日日東風裏吹盡閒花香草生東海旅夜二首無酒消憂寒未減隔帷相對一燈愁蟲聲喚覺五更夢風雨滿庭桐葉秋蘭釭背壁影微微千里天涯客夢歸一夜海風聲不斷曉來寒葉滿庭飛寄李不危憶昨東風吹馬蹄瓦關分袂涕交揮淮陽風物應如舊獨在柯山送雁歸曉發途中坐無燈火夜蕭然馬上匆匆未曉天値驛老兵應笑我肯將斗粟換高眠病起登疊嶂樓病來乆不上層臺窻有蜘蛛逕有苔多少山茶梅子樹未開齊待主人來觀蘇仲南詩巻蘇子詩如刃發硎十章入耳韻泠泠文章三昧無多子祗守君家舊典刑讀仲南和詩異時文席許論詩三載江湖讀楚詞自笑酸寒無好語少年倉氏獨相知謝仲南和詩曽約西湖薄主人只今湖色已知春㑹須多載連車酒絶勝寒倉滿目塵渡沙河溶漾澄明徹底清鸕鷀慣客不相驚却疑洛水新霜後八節灘津石柱聲題五柳亭大夫風韻如彭澤五柳蕭森手自栽我亦扁舟倦㳺者登臨聊復賦歸來項城道中塵壁蒼茫有舊題十年重見一傷悲野僧欲與論前事自説年多不復知離京後作七首蘋芷江邊巳五年厭聞風浪打船舷南風蕭艾荒凉野時望高丘一慨然水諳送客渾無浪風解畱人却有情今夜榆林繫帆宿却從北斗望天心灌畦沽酒兩三家春去芳叢有晩花莫道長安在天上女牛猶有客乘槎一水夷猶達汝陰年華客意兩相侵河邊無限青青草攬轡何人繫此心過雨陂塘處處深南風蕭艾欲成林道邊拾穗行歌者亦有豐年一飽心高槐老柳舞南風晴日家家蠶麥中芟盡黄雲見原隰却教風雨洗長空燕雀翩翻夏屋深成谿桃李巳成陰黄鸝深處無人見時有清風遞好音對菊花二首官閒身世兩悠悠種竹栽花一散愁黄菊叢邊對疎雨一年懐抱此時秋躬耕遇嵗眞吾事牛下齊兒婦妾歌招飲風烟過閒日遶籬栽菊可如何柯山集巻二十五
