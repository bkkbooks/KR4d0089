body:
  text: 柯山集巻三十六宋張耒撰論漢文帝論昔者絳侯既平吕氏親握國璽授之孝文當是時劉氏之後惟大臣所立文帝為諸王特以其賢而取之其初未可以必得也絳侯以天下與所不可必得之人恩徳至厚也文帝之報絳侯者宜如何哉雖分國而王之天下未以為過也然内難既定君臣之分既明爵賞祿賜所以慰答昔日之功者未聞有卓然過于常時何其不旋踵而遂去之速也予嘗觀漢之大臣少全武帝以來不啻如殺囚𨽻獨文帝時公卿被誅者無㡬人然則文帝之待大臣亦有恩矣當是時大臣之有恩者宜無有過絳侯然匹夫一言罪辜未明廷尉折簡以召之如取孤囚侵奪困苦僅免于死文帝非昏蔽無知之君何獨于勃少恩若是哉葢嘗深思其故而得其説夫高祖之將大有功者至文帝時㡬盡矣非以逆誅則以疑死彼皆心有所恃矜其功能日邀其上不得所欲則狼顧而起絳侯吹簫之羈民也用兵十餘年習見天下之勢喜事而尚功其驍勇之習豈能帖然無毫釐于心哉以英雄之資挾立君之威臨視其上無異于保婦之提嬰兒如是而不驕者伊尹周公之所難也驕則縱縱則亂因以生文帝豈無愛勃之心哉視前日之誅死族㓕者皆恃君邀功驕蹇放縱之所致而絳侯之迹異于韓彭者無㡬耳吾亦畏其有所恃而驕驕而不巳則亂亂而不誅則廢法從而誅之則傷恩甚矣嗚呼理至于是曽不如抑逺困辱使之慊然内顧而無所恃鋤去其驕慢之心全其生保其家使其子孫長有國土之為愈也然則文帝之恩亦深矣且能尊霍光者莫如孝宣委天下之政與之而不敢専光死又立其子兄弟聨兵女充後宫賞賜寵錫不以數計天下翕然以為孝宣無負于霍氏矣然光死未㡬妻子為戮以天下與人而身死之後弱子單孫之祭曽不得享天下之人聞之者誰不為霍光痛心哉嗚呼使宣帝既正君臣之分則遂攬天下之政光既死視子孫之賢愚而授之官與之財而收其權取其尤無良者而屏逺之霍氏雖欲為亂不可得也然則霍光無後者非宣帝誰為之哉天下之事要其終而後知君子之用心絳侯無禍于身則知文帝之所以裁之者乃所以深報之也霍光無後于漢則知宣帝之所以寵之者乃所以深害之也語曰嬰兒常病傷于飽也貴臣常禍傷于寵也然則文宣之報功其得失可攷也漢景帝論景帝稱竇嬰惉惉自喜多易不足以任宰相因持重而相衛綰夫自喜多易固不足以持重是也而求持重者必如衛綰則己甚矣古之知人者不觀其形而察其情得其妙而遺其似夫天下之善惡其似者固未必是而其真者或不可以形求也綰車戲之賤士也其椎魯庸鈍偶似夫敦厚長者之形耳夫敦厚之士其用之也必有䝉其利者矣豈謂其無是非可否如偶人而己者也茍以是為長者而用之則世之可謂持重者多矣夫惡馬之奔踶不可也求其無奔踶可矣得偶馬而愛之可乎景帝之相綰也是愛偶馬之類也帝之惡周亞夫也曰此鞅鞅非少主臣也卒殺之夫天下之情其未見于利害之際者舉不可知而要之易刼以勢者易動以利不輕許人之私者不輕行其私亞夫之不納文帝于細桞與夫不肯侯王信可謂不可以勢刼而無私意矣仗節死義與夫見利而心不動非輕勢而㓕私者莫能可以相少主共危難者意非亞夫不可而帝乃反之是徒以其剛勁不茍其形若難制而嫚上者故殺之而不疑嗚呼景帝者求人于形似而失之者也葢昔者高祖求傳如意者而不可得一周昌能强項靣折而高祖遂以趙王委之夫昌之不能脱如意于死其勢葢有所廹而所以任昌者固相危弱之道也嗟夫周昌以此見取而亞夫乃用是不免則景帝之與高祖其觀人也亦異矣唐代宗論予嘗論代宗唐之庸主也而安史壞亂之後肅宗草創事出一切人情震摇易以生變此非常才所能定而代宗承之又嘗一為吐蕃所驚逃奔于陜然國遂以定不及其身者何也予考代宗行事有類英主者二焉誠率是道而充之其身安而國定葢無足怪何也能容大功之臣背之而不疑犯之而不怒而外無姑息之迹一也僕固懷恩李光弼二人之功著矣懷恩之恃功犯上自敵以下誰能忍之而代宗不與之較故優容包納卒待其自斃豈不曰與之較力則彼驍獷也與之較理則彼異􅁼也其乘氣而兇悖也葢將亡也是其料懷恩于目中矣李光弼身兼將相功無與二而幸陜之後堅坐不應此其意非持兩端則高卧以觀變也代宗恩禮終始不衰豈不曰光弼之功而傷之天下其謂我何彼之不赴吾急吾不問則已問之則必討焉彼非束手受死者而吾使誰敵之哉代宗之待二臣如是天下不謂之姑息者理當爾也徳宗之于懷光則姑息之迹不可勝揜矣人有當其意則用之衆怒不與則必殺之其用其殺莫或能間之者焉始用元載委已聴之惡載之甚誅而不疑寵魚朝恩㡬危郭子儀然其横也則殺之程元振之寵固矣桞伉一言而逐之易如反掌卒棄不用元載之獄問目皆從中出則是平日載雖擅權于外而代宗居中無不知也去三大姦如殺犬羊中外不驚上下厭服觀此則昏且孱者不能為也是二者英主之所難代宗有焉所以能保國而安身也哉唐徳宗論徳宗憤藩鎮之强僭有鞭撻海内之志竭其帑藏空其禁衛以從事于伐叛然師出無功兵連禍結大盜竊發身播國殘㓕亡之禍間不容髪自是之後亂不得熄至于憲宗用一裴度決䇿出師淮西既平山東河北强藩大鎮弭耳聴命終憲宗之世海内略定二帝于用兵伐叛則同而功烈何其相反也葢攻堅則瑕者堅攻瑕則堅者瑕徳宗始使馬燧李抱真討田悦魏鎮自承嗣以來兵强國富屹然大鎮非可易攻者也二將之力弊于田悦而王武俊朱滔相煽而起自魏至燕數千里間莽為戰塲而四方諸侯始輕京師淮西雖積于叛然數郡之地也暴取其才虐用其民為日久矣危亡之機已見而元濟昏庸倔强其間此特不欲取耳取之可以必得豈與河朔諸鎮比哉憲宗乘其機察其時一舉而㓕之而李師道王承宗之徒或誅或臣而四方靡然效順矣此無他徳宗先攻其堅敵未已而已之氣先索力先弊矣已索之氣既弊之力人所易侮此朱泚李懷光所以陸梁而不忌也憲宗先攻其易碎其巢穴戮其鯨鯢兵雖未出而氣己震于天下師道承宗所以消沮而不能抗也有扛鼎之力者使之負石而趨終日則必蹶立談之間而磔嬰兒則賁育在旁必且心悸此攻堅攻瑕之論也唐莊宗論古之善戰者不患乎敵强而不我若而所大患者與之為敵而兩無有以相制也夫兩無有以相制則勢足以相擾而不可以有成惟其曠日持久兩憊而不振如是而後有起而收之者雖然非有優游久逺之心誰能安坐而待之而至其兩憊而不振也吾亦安能必其變之所在則是吾與敵人常戰于不可知之間夫豈不殆哉是故古之善戰者必有以審天下之勢而為之計取之以可必之計而待之以可成之功夫如是而後能有立今夫天下之勇夫其才足以相勝其力足以相困奮臂角力以戰其死其勢終日而不能解至其能者則不與之致争于手足之間而獨徘徊待伺一發而擣其虗中其要害之地而使之雖有手足之技不能以與吾較夫知是者勝敵之道也故力弱于敵則謀之力倍于敵則乘之力敵勢均則擣其虗襲其所忌而不可戰葢昔者唐人以河東之地南靣以争天下百戰而無功以朱温之强親冒矢石與唐人從事于河上不能有河北尺寸之地其力之不足以相制亦明矣譬如兩人終日而􅀶也代勝代負而不決勝者欲罷而負者留之負者欲返而勝者激之葢終朱温李克用之世更勝迭負而卒不得其志至于莊宗力戰不顧思決成敗而不可得方其盤桓于楊劉徳勝之間葢嘗蹙而不振矣其後郭崇韜為之決入汴之䇿而後天下歸于唐夫梁人之有汴是猶人之有腹心也使吾之力雖不足以過之耶一日而潰其腹心則彼手足雖全而不為用此擣其虛襲其所忌之道也故莊宗之取天下其要在此而或者猶歸罪于段凝之區區何異夫披心腹而責手足之不救也昔者荘宗與劉鄩戰于莘劉鄩越黄澤乘虚而襲太原中道而敗乃不能進夫劉鄩之襲太原是莊宗趨汴之䇿也彼鄩以為人得糧十斛而後可以有成彼誠見天下之勢非朝夕之所能成其決䇿不顧以趨太原所以擣唐之腹心也歟夫莊宗能知其勢而為之防故唐不亡而梁人惟不能蔽其所忌故莊宗得志夫古之善戰者觀天下之勢而後戰從之者此之謂也子産論天下之大患莫大於不量力而不量力之患起於好高今夫使人皆量力而無慕于賢己者宜若怠惰而無志而不知夫力之所受于天者莫不有極强任而過使之則將有禍嗚呼怠惰而無志不猶愈於禍歟吾知量力之不可廢也今夫天下之才自匹夫以至聖人其别無窮然大要有三而己上智中人下愚是也昔者聖人之治天下使民畏也有不待刑使人愛也有不待賞夫無刑賞而畏愛行焉此天下之純徳也夫惟聖人而後能之而使中人之才其為治也去賞與刑以求天下之畏愛曰吾將學聖人也則亦敗而己矣使量力而行之治刑以明威信賞以施愛其誰曰不可以為徳不及於聖人耶不猶愈于敗乎夫烏獲之力至于舉千釣而弱者至不舉一石以一石之力而負千鈞則膂絶而死此又天下之所知也昔者鄭國有灾有勸子産使遷國者子産曰吾不足以定遷矣夫遷國以免灾與安坐以待不測之禍二者孰利也然子産知其力之不能及則寧為安坐之計姑求其力之所及者而行之豈其心以為不能定遷則其患將甚於安坐而待患歟葢子産嘗鑄刑書而叔向非之子産卒行之也彼以為議事以制不為刑辟者非我之所能故也予讀書至此未嘗不竊歎古之君子其智慮深逺而較利害也詳量分審力而不誘于天下之浮説而深悲後世之説者夫宋襄公之求諸侯徐偃王之行仁義卒無所就而敗隨之而世之人遂悲仁義之不效而予不知二人者果能為文武之事者歟非仁義之負二人二人之負于仁義也或曰天下之士不可好卑而務近而量力之論不可以訓嗚呼使無妄學聖人者是豈使無學其徳耶吾惡夫無其徳而僭其事者也彼聖人之為聖豈好高而為之哉其中之所有舉而措之而已使誠有其徳吾何愛聖人之事而不使為之哉呉起論吾讀呉起傳觀與田文論功發三問文不得一然則起之才豈淺淺者耶及曰文為之言主少國疑大臣未附百姓不信當是時屬之子乎屬之我乎起曰屬之子矣吾嘗疑起才何獨短于此而不敢與文較及觀起之相楚方悼王之死未㡬而楚之宗臣大臣起而殺呉起方是時悼王死起相新君可謂主少國疑矣起也于是乎不免然則起之才是誠短乎此則其始無以抗田文之言葢無足怪而田文之于知人也亦明矣然則田文之知起之不足以處此者何説也起之為人也明厲而不逹于變從事于法而不知權是二者盖相疑國輔少主親未附而安不信者之所深忌也昔者鄭國有難而子孔當國乃為載書以序位聴政辟而子産請焚之夫子孔之為載書叙羣臣而使之聴政豈有所不可哉而子産請焚而鄭國果定何也葢誠未加于物則吾之所為衆之所疑故急之則亂繩之則怨方是時法有所不行是非有所不較徒知吾法之不欺而不顧物之情此取禍之道也故曰衆怒難犯專欲難成葢當新造之國與夫衆情反側之際者不可以求定乎法而取必于理之是非而其權乃在夫人情可否之際此子産所以焚之而國定也史稱呉起治楚明法守令捐不急之官廢公族踈逺者夫起當新難之國輔未壮之主而馭不附之大臣與不信之百姓而其所行顧若是而不知變是其死也不亦宜乎嗚呼智士因變聖人乘時一龍一蛇與化推移庸得而制之哉吾悲呉起之志故論其説云商君論昔者商君之治秦貴利尚功明賞罸信號令使其日夜趨于功利之域而無閒暇樂生之心勇于公戰怯于私鬬葢凡所以求生者非從事于公不得也不過十年而秦遂以强後世因之以有天下葢始皇之王自商君啟之而世之議者以為秦以商君而興而不知商君之術是秦之所由亡也今夫世之善養生者和其血氣平其心志安養而徐用之導引屈伸以宣其滯而導其和故藥石食飲平易而舒緩惟其然故其效也得其所欲而無後害有賤丈夫焉不知其為如此不能忍歲月之勤而急其效于耳目之前于是服毒石餌惡草以激之方其效也剛壯勇力倍于平時然不過數年之後草石之力巳盡而遺毒餘孽潰裂四出故癰疽壊決之變一日皆作而不可制至于是而不死者未之有也嗚呼用民之道亦何以異于此昔者三代之聖人也其得天下也不為旦夕之謀揉伏其民而和輯其國一出于愷悌忠厚之政使其民無勉强不得已之心故其功成事立而民莫有厭之意是以享國長久而無後憂彼商君以為仁人之術非所以速功朝有所為而夕望其利日夜峻治其刑罰以驅廹其民斬艾懲創以齊肅其怠惰之氣汲汲然常若不可以終日故方其效也所求者得所敵者破徭役使令莫不如意然至于後世天下己定而吾之所欲己得而後前日怨毒之志乃始大發而不可制故更二世而秦亡原其所以取怨于下者豈一日之積歟嗚呼商君實首之也夫民之力人之血氣一也可以徐治而不可以求近功夫欲求近功則必出于深刑痛罸毒石惡草夫四者用而危亡之禍可立而待故曰商君之術是亡國之術也陳軫論陳軫之辯不及蘇秦張儀然軫常從容于戰國之際而儀秦汲汲不能補其所不及周流諸國不得少休用智巧而為力勞何也葢逰説不可取必于一端而儀秦之術一定故也何者蘇秦必于縱張儀必于横夫一室之人不同心一日之心不同事以叛散相傾之六國而使之一心以為縱雖孺子知其不可以久此蘇秦之所窮且天下嘗見為縱之利矣一日而散為横雖足以解約然合散未可必此張儀之蔽也縱者不敢横雖見横之利而不敢陳也而逰説以非之是附其所不親横者不敢縱雖見縱之利亦不敢陳而强詞以亂之是讒其所不怨附其所不親是交胡越之道也讒其所不怨是間兄弟之道也天下未有胡越之可親而兄弟之可閒者也天下有胡越之可親而兄弟之可間者矣然其親與間之際勞矣且夫胡越者是必親之而後可兄弟者必間之而後可中道不幸而謀失者必敗故儀秦之身顛沛而頻于禍者數矣秦以此死而儀竟以免故縱横危道也常負天下之責縱而散者蘇秦負其責横而合者張儀任其咎然天下之勢故不一要之合散必不可以一定夫操不可以一定之勢而身當其任故曰縱横危道也陳軫之智不逮二子而不主縱横之任乘勢伺變而行其説故其為不勞而其身處安故軫者説士之巨擘者也應侯論吾觀應侯之入秦其心未嘗不在穰侯也彼其困苦展轉既瀕于死而求報于魏也切骨腐心不可終日故其奪穰侯之位而代之也慎重周審不敢輙發非如朝逰夕説之士徼幸一言而勝之何者其怨魏之心重故傾穰侯之心必傾人之心必則其計求出于萬全故其上秦昭王書曰其深者不敢載之于書及見秦王乃先言越韓魏以伐齊之非計也陽陳外事以當秦王之心而自顧其權勢已成因乃一言穰侯太后之専恣不終朝而逐之則睢之憚穰侯而不敢輕發豈不甚哉太史公之序睢事如此乃言睢之始見秦王誤入永巷聞有穰侯太后而不聞有王也何言之誤耶且睢與秦王相得數年而後敢言穰侯太后之事者知己之與王處密勢定而計穰侯之不能奪之也其始不敢載之于書一見秦王而不敢及之者知徒嬰其鋒不足以成吾事而吾將受其禍故也且一見秦王而語穰侯太后之惡如此彼獨不畏穰侯之聞之歟以匹夫無援之分而斥骨肉子母之親非獨取患於穰侯秦王亦且逐之矣彼睢之入闗料穰侯惡諸侯之客下車而逃之其為計如此萬一有幸而得見王徐徐而圖之何所不可而遽為是鹵莾之計哉且秦自孝公以來操法繩下最嚴于宫闥之禁所以自衛者皆以峻法防其下故荆軻刺始皇而殿下之兵不敢輙動安有悮入永巷事耶揚子曰子長多愛愛竒也此亦好竒之過歟柯山集巻三十六
