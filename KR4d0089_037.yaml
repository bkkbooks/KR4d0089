body:
  text: 柯山集卷三十七宋張耒撰論樂毅論吾觀夏侯太初之論樂毅稱毅之書謂伊尹放大甲而不疑太甲受放而不怨以知毅之心不止于兼并而稱毅之不取莒與即墨謂明信義于天下將縱二城而降之以為王業之所起嗚呼何其言之過歟毅戰國之雄耳其智豈足以知王者之事哉一說昭王而平齊復其數年之仇毅之才盡是矣何以知毅之有心于王者之事哉且以戰國之際士馳說以干時君惟恐其言之不足以動人其所說一切不出于情實則毅之稱伊尹太甲之事是果其心歟且毅將燕師一戰而破齊虜獲其重器而逐其君燕國之弱小而五嵗勤師于外親所下者凡七十餘城則士卒亦少敝而國之轉輸應接亦少勞矣故頓于二城之下盤桓而不能取且不終毅之計而騎劫代之矣由是觀之毅之不拔二城者是力有所不足未得盡用其計謀而考毅之用心固未始有縱二城以收民明信而有意于王業之事也且毅嘗一至臨淄盡取齊寶財物祭器輸之于燕而下七十餘城其所殺傷不知幾何而即墨之大夫出死干戰齊民之視毅不啻若寇仇而乃欲以不攻二城以明信示民毅之為計必不若是之愚者且方是時田單守即墨單善為兵故其守即墨固而不易拔耳何夏侯生之妄論也司馬遷稱異時事類蘇秦者皆附之秦故戰國䇿士之所載多不足而遷之所載毅事未始有此故余皆不信之魯仲連論昔者君子之於仁義其行之非不勤而好之非不篤也然勤而不得其中則君子不為是故罪至於可殺則君子不生之以為恩而鄉閭之鬬勢之所不能救則捨而不顧凡天下之事有可以不為而非不義者君子不强以為義也嗚呼君子之道豈顧若是恝然而已哉誠以為事至于可以不為而無我責而我偲偲然求為之以為功則夫世之求為君子者蓋亦甚勞而我之心無乃非出于樂而後為之歟蓋昔者夫子之道未嘗不出于忠恕而其所以待物者亦甚厚矣然陳恆弒其君則孔子沐浴而言之朝告其君而請討之至其不能討而孔子不强也門人有謂報怨以德者而夫子謂何以報德出而告之朝者吾之所職者止矣鄰國之不討賊非我之責也受人之德而樂加我以惡則怨之者是天下之常情也以德復德以直復怨則理已足矣彼天下之人必將以所樂施所惡則夫為善者不亦枉其情歟彼魯仲連者里閭之自好者耳安知夫所謂真仁義者也以布衣遊諸侯而不食其祿不當天下之責而出身以救天下之患功成事立而不享其報此魯連之所以為賢歟嗟夫魯連之所以為賢乃其所以為戾也夫當其位而後憂食其祿而後勞施其功而享其利解其憂而享其樂者孔子孟子之所不能過也而魯連者獨不能然吾見其越常棄禮亂世敗俗而已矣夫無責而憂人之憂致力而不享其報則使世之中人不免於義必自魯連始使天下之賢者如必魯連而後可則亦率天下為僞而已矣蓋施義而不當其處者義之賊也嘗聞之昔者夫子之道所以行于天下後世而不能廢者惟其不强仁義以為賢而不舍仁義而求自便也不强以為賢故為善者不難不捨以為便故不為者有所畏夫人不可不為而為之不難此天下之所以同守而不廢而後之愚者嘗欲摩頂放踵以利天下而其自便者不以仁義易身之一毛而天下卒去之然則夫子之道為不可易也田橫論豫讀田橫傳橫之將死告其客曰豫與漢王俱南面稱孤今漢王為天子而橫乃為亡虜而北面事之其耻固已甚矣讀韓王信陳豨盧綰等傳竊怪此數人者其受漢恩亦厚矣或拔于士伍而王之或皆恩昵親黨然少不得志出則起而為亂蓋其素所蓄積未嘗不在于亂特因事而後發而考其本心蓋亦如田橫之所耻者耶夫高祖以匹夫將羣雄取天下非有德義禮樂以感懷天下之心而其下非有樂推不厭之意高祖特以才勝之耳故怏怏以就北面乃其所甚耻而禍亂起于恩昵親黨之際亦無足怪也故國之興也不以仁而君臣無禮義以相與而以利合則國之所以存者幸也豫觀高祖之時韓王信反以招陳豨而盧綰隂使丐奴與豨連衡而淮隂謀起于長安內外搆禍高祖奔走不息而追勝之一有不及天下非漢矣漢之所以存庸非幸乎文王之興也啇士膚敏祼將于京啇士從之矣而況周人乎則恩昵親黨之際可知也啇之興也曰非啇求于下民惟民歸于一德則其有天下非一日之幸也嗚呼漢與三代文王之際異矣魏豹彭越論豫愛司馬遷論魏豹彭越之不耻囚虜以至刑戮也曰彼無異故智略絶人獨患無身耳得攝尺寸之柄其雲蒸龍變欲有所㑹其度以故幽囚而不辭嗚呼何其論之之至也漢自高祖之後其將在者皆常才中人而其名將皆已誅死放滅彭越以疑死韓信黥布相繼以反誅豫嘗疑漢之于功臣少恩如是推遷所論而後知高祖之誅功臣勢變之不獲已而世之論高祖不善馭功臣如光武故相繼族誅皆妄論不推原當世之故嘗試論之曰秦之亡豪傑並起世之英雄才過十人者無不興起而士大夫去戰國未逺其人皆有六國豪傑之餘風故其用兵行師有可稱述方此時人人皆有帝王之心如韓信之徒其屈體為臣者其初心豈將屈體委身而已乎高祖豈不知其然而收之者何也夫操白挺驅市人而爭天下非得如斯人者則誰肯為吾使彼亦將有所寄以求所欲彼之視高祖猶高祖之用三人何則兩各有所私利也而非君臣之分故也且彼之所以臣我者非有至誠之心而不厭其所欲則反顧而去耳故非裂天下而王之其勢不可使故固陵之敗子房勸高祖并王韓信彭越且是時天下之地分于二人者何啻十五而子房不敢愛者不如是不足以留二人故也夫以英雄好亂之姿無君臣至親之分而據萬乘之强國此其勢非得天下則不厭何則如韓信彭越之徒束手為虜而不耻者其心猶冀萬一有不死而庶幾得尺寸之柄以施其知而況南面稱王據有甲兵士民之衆肯帖然而為人之下哉嗚呼高祖安得高枕而卧也昔楚王田于雲夢有熊當路而不去弓矢戈㦸之力不能殺王患之或曰南山之虎其勇無敵方飢而休驅而逐熊其能勝之哉王日善驅虎當熊未及死而王之左右六鈞之弓百鍊之戈當虎之衡虎食熊未盡而殺之矣夫楚王之用虎非樂使之也非是則無能勝熊者矣其殺之也非有怨疾也不殺且及我矣彼虎之視熊其與視楚王無以異也不乘其便而殺之一失所制則彼雖欲殺不可得矣虎之食熊非為我除患也勢驅之而不知其為人怒也故高祖之用三人非樂使之無是三人則項籍不為我擒矣髙祖非以怨殺三人也知其終不為我用故也三人之為我亡楚也非為至誠欲王漢也勢有動其心故也為長者之論曰漢封功臣其地太過故反天下既定當明制度别上下稍裁之庶幾矣嗚呼彼安坐無事猶狼顧其上況削之乎故髙祖于是三人者不得不分天下而封之而三人者封之亦反削之亦反囚之亦反其勢必誅之而後定故豫悲高祖于此有不獲已焉蕭何論高祖論蕭相國為三傑之首及論功行封為諸將百計諭曉卒以何為第一髙祖之待何也可知矣高祖之有何是人之有五臟木之有根魚之有水也使何雖有大過猶將容之然一日為民請苑中地高祖發怒奮然如斥奴𨽻使有司械繫辱之而不疑此在常人為之則必以為狂易反常而高祖獨安為此其心蓋有說也高祖知何之才而不能不疑者也何之居關中用鮑生邵平之說而帝乃大悅夫二生之說淺夫畏嫌之常情也而其術足以當帝之心是帝於何未有無間不疑之至信也吾未能安枕于何之心則其心惟恐其恃功驕恣而以我之不忍侵辱之也故以天下之大功一日有微罪則以奴隸之辱加之而不疑使何意知吾之不憚侵辱之如此務以逆去其驕蹇之意此高祖之術也其後絳侯立文帝以天下與人論功宜何如一日有疑謗下之獄吏幾死而僅免夫文帝非不德絳侯其心未免于疑如髙祖之于何也雖然絳侯吹簫之羈民其驍武勇鷙疑其恃功而喜亂恐其甚疑而逆折之可也若蕭相國謹畏德厚之君子雖共天下可以無疑而馭之乃與韓彭同術然則文帝得之高祖過矣子房論天下之善辨者不過能折天下之人以理而已矣夫折人之情使從于理惟畏理者而後能從之彼無所顧于理者雖極天下之理而與之辨彼將悍然而不信蓋言至於此而後不足恃是故莫若示之以事而動其心夫天下之人雖于理有所不畏然至于心之所不樂亦不為也昔者鄭莊公疾叔段而出姜氏夫子出其母天下之大惡也彼其時必有以不義而止之者矣而莊公卒為之然則是雖有諫者而不聽也至于潁考叔為一言于飲食之間而莊公若不可以終日易其平日忿疾之意為孝悌不忍之心是何也蓋莊公不可以言奪而可以心動也今天下之人固有告之以禮樂孝悌而不喻者然退而視其所為未必不愛其父母而樂其兄弟然則外雖不免于愚而心之智猶在也吾之智足以發其心則彼固無俟乎區區之辨折而服之矣子房之立惠帝其說近若是矣彼高祖之為人出于草莾戰爭之中豈知所謂廢嫡立庶之說耶故叔孫通之徒極其說而不納亦無足怪也至于子房乃引四老人而輔之從容于片言之際而太子得不易雖有戚姫如意之愛而卒不能間彼子房以為高帝者雖非理之所能曉至于感之以利害之計則足以攄其平日之惑彼能屈其所難致者而為之臣則天下之心歸之天下之心歸之而吾捨之則必有禍彼高帝雖不顧天下之所當立而亦知天下之所歸者之不可易也此子房之所以為智歟故折人以理從者十五感其心而動之從者十九夫人之于理其信與否相半也故十得五而人有感于心則無不從雖天下之至悍未有行其所不樂者也故十得九其後唐武氏欲以武氏易唐而中宗已甚危矣彼方傲然不顧其下雖有忠諫無所用之蓋人以為說者皆其所忽故也其後狄仁傑為之一言以感動其惻怛之情而唐遂以濟嗚呼是子房之術也陳平論吾觀陳平使人劫酈啇使其子說吕祿陸賈勸陳平以百金交歡絳侯而平勃日以親卒用此滅吕氏未嘗不竊歎也夫士不以仁義相與則其于利害之際其能不以詐謀相欺者鮮矣酈啇為列侯事高祖十餘年其視吕氏之危漢其心豈能無惻然哉雖不劫之豈不肯使其子也絳侯漢之大臣雖無百金未必與平異心也平之心豈不知酈啇絳侯之未必背漢也然必為是之區區者其心不能無疑于此二人故也彼其不能無疑者何也士不以仁義相與而其合也以權利則其于利害之際安能無疑哉昔周公為師召公為保而不悅周公詳說而宣諭之夫師保之際有所不悅而周公不忌焉諭之以義明之以理而已嗚呼聖賢之事為不可及也哉平勃論吾嘗怪昔者高祖之時其將相大臣皆天下豪傑之才其謀謨勇力皆足以過絶天下以戰而無不勝以計而無不中以項籍之勢卒敗于此數公者然及天下既平吕后惠帝之際彼吕后者乃一婦人提祿産之庸人而王之放肆縱弛無所不至此其間非不可窺而其智謀非有深逺可畏而不測者夫以陳平周勃之才而馭吕后祿産之庸人此無以異于取諸懷中而殺之然是二人者恇怯畏縮而不敢發乃更先為自安之計以固吕后危疑之心終吕后之世而不動及吕后既死是二人者其取祿産何其多憂自重而不敢易之蓋如史之所載謂陳丞相使人劫酈寄說吕祿解趙王印之國而吕祿從之太尉以節入北軍而猶左右袒以觀三軍之心既得北軍又不敢倡言誅産也灌嬰以數萬衆與齊王合乃相與待吕氏之變而後動此三者豫未嘗不竊疑之夫吕祿之棄北軍無以異于遇盜而使之束兵也則陳平之視祿也亦易矣然猶委曲迂逺使其親戚劫之以利害之謀周勃豈不知天下之與劉氏也而猶區區謀以觀其意以灌嬰之才資數十萬之衆而倣徨于外不敢先發夫以吕氏之區區安坐而肆其所為亦安能有所立而數公者反遲疑慎重待之以天下之大事夫何其勇于爭天下謀項籍而怯于此也蓋嘗為之深思其故而後數公之志可見考其所為之故則夫天下之善謀者無以過也何者昔者高祖之與項籍角馳于中原其初非有所慿藉也特徼幸于一戰之間此其所為不得不出于果敢而勇決棄死而不顧何者使其成功則固得吾不可必之求不幸而敗則吾亦何所愛哉彼高祖之得天下于百戰之中困辱傷敗既老而僅得之則吾愛其所得豈與匹夫馳騁徼幸于一戰之際者同日而語也故其遇諸吕之禍也以為吾輕發而遂勝耶則吾固何求使萬有一不勝則其存亡無乃甚可惜哉曷若遲之而求無失也是故不憚嵗月之勤而深慮夫一失之可愛此其所以遷延委曲待其敝而後發歟夫千金之賈見日而行未夕而止一日之力有所不盡是何也彼力非不能逺也惴惴乎畏失其所愛者也夫山林之盜出入于險阻之間晨夜而不顧彼以為有所獲者固我之所幸不幸而敗于吾何失哉此平勃之智也夫操天下之重利者不可為匹夫輕死之謀匹夫之謀是不得已之計也衛青論自古中和深厚之士可以保富貴處功勳而不足於名高輕俠慷慨之士立可喜之行者可以為名高而多履危禍二者若皆有所不足然為可喜以取名者其技止此耳使為中和深厚必不可得而中和深厚之士其于取名驚世或者能之而有不為也司馬遷論李將軍之死曰知與不知皆為流涕論大將軍曰以柔媚於上其于天下未有稱也愚意李廣之所為青之所不願而非不足也以青為奴虜庸人遭時幸㑹以取富貴者耶則汲黯不拜大將軍曰使大將軍有揖客顧不重耶青由此益重黯李敢怨其父死至擊傷青青為諱不言青知揖之重于拜權足以報敢而為諱之懲田竇之事至絶口不薦士不斬蘇建使歸命天子言之如不快人意而其知時見逺皆中幾㑹青顧不能交灌夫籍福之歡而為決意斬伐者之所為耶凡此類非庸人所能也彼非庸人而為此則必有道矣而遽欲賢廣而貶之不亦過哉夫好名之士常鼓舞于壯鋭可喜之節而不快於持重逺見之士廣之所為天下之健勇者好之其明者未必善也後世論郭子儀李光弼二人者未嘗不右子儀夫善戰而有謀果敢而精鋭是數者子儀皆苦其不及其寬緩仁愛宜若魯鈍矣而卒過光弼者何也子儀之所長光弼之所不能光弼之所長子儀或未必待是故也淮南王與伍被為反計而彼獨稱大將軍以折之彼其仗節死義則憚汲黯用兵決勝則忌青然則為天下未有稱者又果然哉柯山集卷三十七
