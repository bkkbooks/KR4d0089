body:
  text: 柯山集巻二十九宋張耒撰同文唱和詩詩呈同院諸公忠臣秋日同文館多朋信可依慧鶯還伴宿巧燕自知歸藻鑑由來定翹材未覺稀賢書早晩上拭目看珠璣秋日同文館朝暉淡淡光聚蚊喧敗帳飛蝠入雕梁香散青綾被詩翻古錦囊羣居有英彦晤語興何長秋日同文館虛廊日幾囘浮光出林杪古樾蔽城隈逺笛悲仍壯幽禽去又來微吟還自喜共和有清才幹秋日同文館官寮許暫依衛軒留鶴住楚澤滯鴻歸木選山中勝珍求世上稀清時方物貢寜在篋中璣秋日同文館興賢道與光雄竒思汝潁浮巧笑齊梁緑醑傾蛆甕青燈折米囊原注罌粟亦名米囊雅談揮玉麈未厭漏聲長秋日同文館掄才又一囘梗柟輸海徼金玉振巖隈富瞻看先達清新畏後來百朋行可錫所樂在多才耿南仲秋日同文館閒無一事依鬬羊誰得雋倦鳥客思歸寢處還相向過從不患稀何當有星聚誰為問璇璣秋日同文館褎然觀國光泗濵何限磬岱麓易求梁劒氣頻衝斗錐鋒定出囊顧予慙拙匠操尺預量長秋日同文館新凉逐雨囘棘垣嬰吏局蕙帳憶山隈射為巧狙發田因文豹來西城隨分鎻夫子室多才商倚秋日同文館羣賢道足依心遊黄巻静目送白雲歸寳玉荆山盡文星禁掖稀原注館閣諸公多集於此清談欣屢接紛若落瓊璣秋日同文館雲沈夕照光蛬吟階下草螢照屋間梁臥月搜詩句挑燈認藥囊夜䦨獨衾枕歸夢楚山長秋日同文館愁腸夜九囘圖書堆枕畔歌吹隔牆隈宿鳥翻枝去凉風帯雨來新詩勞見寄難繼謫仙才秋日同文館羣書畫可依衰遲多病在留滯故園歸但怕酒杯滿莫教詩巻稀惟羞狂斐句瓦礫報珠璣秋日同文館晨暉帶冷光彩雲瞻鳯闕細雨憶魚梁久事班超筆空嗟趙壹囊簾間坐無語千丈旅愁長秋日同文館西風昨夜囘燕巢留屋角蛛網挂牆隈書任邊韶嬾詩慙匡鼎來人人皆抱璞誰是濟川才耒鄧侯讀書室編簡自相依胝手焚膏冩瘡肩滿槖歸業文從古有裁句似公稀欲挈空虛篋從君乞貝璣鄧子詩成癖全分李杜光楚風還屈宋宫體變齊梁蔡子辨焦尾晁公懐智囊三賢方鼎峙安敢用吾長原注慎思旡咎天啓偶獲同院故云我媿言詩賜公真好學囘讐書芝閣上藏史楚山隈原注慎思成書多矣把酒論交裏連房校藝來知君懐水鏡依頼免遺才補之平生鄧夫子文墨晚相依臺閣佳聲在湖湘爽氣歸原注慎思潭人再入館詩誇束筍宻髪歎蒔苗稀勤苦千秋事川明水孕璣雄深張子句山水發天光黄鵠愁嚴道𤣥龜困吕梁愛君毫穎脱嗟我病傖囊驥尾何當附西風萬里長蔡侯南國秀經緯耿昭囘文史苔生劒風雲蟄起隈吾君求助意之子為時來萬旅防秋費何如一士才輔十歳湖湘客淹留何所依清名漢閣在他夜楚帆歸落日三秋晚浮生一笑稀每煩貽秀句真似暗投璣妙論凌朝徹髙文敵夜光煇煌照羣玉縹緲絶飛梁得句題青竹圍棊換紫囊相從媿衰朽湖海興偏長富貴心非願山林首重囘拂衣清世外築室白雲隈杜口同摩詰㤀形學子來斯游行欲遂聊此接羣才肇圖書從所好英俊此焉依奎壁重開照琳琅盡得歸地嚴宫漏轉門掩吏人稀子有詩三百西江咀寳璣客去衣裳嬾更長燈燭光隨身一書笈貯腹萬雕梁夢舊傳青館封須拜皂囊羽翰從此正天歩赤霄長諸彦聨翩入斯文迤邐回㴞㴞引溟漲爛爛繚巖隈此地身拘窘他時心徃來倡酬真有味顧我獨非才子文鄧子知名乆秋闈得暫依論文虛以徃講道實而歸得句賡酬數高言笑語稀自慙初學歩魚目混珠璣刻意長沙客編書逝隙光朝方登廟器時可詠山梁未用嘲經笥端宜號智囊頗聞窮史學猶想見三長官輟蓬萊直身從帝所囬文章孔庭奥事業傳巖隈多士朝庭念諸公殿閣來英雄須入彀應有濟川才公麟苦學鄧夫子仁風良可依顔囘樂也内曽㸃詠而歸盛徳年彌邵知音貴我稀瀟湘逢此地咳唾得明璣瑠璃墨客堂太一助燈光紬史探金櫃摛詞和柏梁近傳江彩筆逺緝漢珠囊吏部文難可猶稱萬丈長共校南宫藝多年復此回羣賢主堂奥一榻占廊隈歩屧朝隨逐詩筒夜徃來故人情不淺無乃困慳才秋日同文館詩忠臣秋日同文館分塲試未齊借書窮石室刋字費棠梨想見英雄彀誰當甲乙題喜陪羣彦集通籍在金閨秋日同文館来游翰墨塲預聞周俊造多有漢文章蘭室依新潤原注與文潜无咎天啓連次芸書識舊香逢辰强思報矯首詠明康秋日同文館晨興不待雞耽書迷甲子行樂任東西静對庭柯盼閒常杮葉題相期放朝後連日醉如泥補之髙堂置書几連幕與雲齊暑服猶便葛秋盤已飣梨官醪聊且醉古錦不成題空對燈花喜重城隔夜閨輟直讎書館連裾校藝塲騰驤來萬里挺拔出千章直釣何妨得餐風未必香搜才賴公等要助俗成康憶我蓬萊閣同聴午唱雞星辰望天北簮組隔城西幾日宣魚鑰長驅響月題更慿催鄧子要剸玉如泥耒騎列千牀直雲羅萬巻齊舒妍交孔翠争味雜柤梨白日諸侯貢青春天老題秋清文酒健莫歎羽林閨聲鳴皆出谷觜距各争埸鐵網收明月霜鋩倒豫章湛恩終錫宴優禮合焚香最苦讎書客消愁賴杜康六街分夜鼓鄰屋報朝雞寒引秋初老天將斗轉西滯留聊飲酒談笑亦分題須信家居樂休嫌窮巷泥肇清月㸔初滿黄花吐未齊小山思隠桂大谷憶佳梨節物信可美詩騷慵自題長年諳獨宿聴雨閉秋閨匝合青雲幕從横白羽場誰矜率爾對吾念斐然章名淡隃糜牓衣飄月窟香春風馬蹄疾鞭帽散平康萬里夷王子曾聴若木雞泛舟滄海外授館國門西琛幣來重譯車書想舊題蒼梧弓劍冷雲雨泣芝泥原注試院乃館髙麗使客關寂同文館秋英綻欲齊禪庖分白乳仙果破青梨琴理將忘曲詩探未賦題清歡在文史誰復夢重閨明時勤選擢間設譽髦塲該學添三傳微能及九章静無桃葉唱清有菊花香解我幽憂病惟應頼杜康鵠卵因時化如何赴越雞逸羣來冀北屏氣入淮西盛事兼三物浮詞斥百題慎須精藻鑑寵辱異雲泥倚秋日同文舘髙臺燕集齊杯盤供魯酒殽核有張梨揚孟持新論韓莊鄙自題湏知宗匠手文采冠朝閨秋日同文舘何人獨擅長養莪方在沚琢玉已成章筆列千鋒陣庭焚一炷香得賢從自始豈特致民康秋日同文館棲林㸔晩雞斗垂宫殿北月轉戸庭西酒勸杯中緑詩分燭下題何時還九陌細雨莫成泥南仲詔命連催發英髦一日齊周瑜醇似酒崔逺爽於梨高館清無夢寒燈坐賦題還同宿山驛風雨閉重閨槐市任花黄賡歌且闢埸醒心流水曲驚耳白雲章冷竹枝枝翠芳蘭葉葉香滿前皆俊彥何但有三康翠幕春雲合登場㸔舞雞𠖇搜人不到驚眄日沈西矒學愁精鑒英材喜巨題何人當首選雙觡起蚖泥子文磊落羣英集崢嶸逸氣齊㨗機聞墮竈妙論及交梨庭木何年植忩塵異域題原注高麗人館此書字尚在獨憐車馬散寒月滿宫閨嬾散江湖客秋深念滌場端宜返田里安敢論文章山塢橙應熟霜籬菊正香行歸招隠客鼓腹詠時康原注卜居南徐有招隠鶴林之勝國器來金馬儒冠萃木雞勝心羣逐北鋭氣鼓爭西海嶠鵬程急春風鴈塔題應思連夜雨車馬六街泥公麟鎖寂身如隠幽清物向齊忘憂經露菊蘇肺到霜梨白髪資談嘯朱籤厯品題賢書天下望鵲喜徧深閨呦呦鹿鳴野皎皎白駒場朋盍連茅茹文程琢玉章門通三級峻桂露一年香慶及飛龍旦同歌庶事康寄棲容幕燕覆蔀等醯雞欲雨風多北窮秋日易西官書便夜讀家報索親題早晩驂騑入重門拆印泥輔别館朋簪盍華堂燕俎齊手香思露橘齒冷怯冰梨桐影迷金井苔㾗上壁題共憐今夜月亦解照秋閨平生詩酒興縮手少年場誰敵江河量争看綿繡章論才皆國器滿袖尚天香欲寫𢎞文士風流有長康開口曽吟鳳臨池豈厭雞詩豪杜工部墨妙庾征西歸及黄花在能忘彩筆題醉游須爛漫莫惜錦障泥未試即事雜書率用秋日同文舘為首句忠臣秋日同文館沈沈鎻棘圍捲簾襟乍快欹枕夢先歸驟雨憂環堵囘風喜袂衣十年經五試撫事意多違秋日同文館人閒景自長重簾朝氣入嘉木午隂涼朝市喧聊避山林興未忘頻添繞爐水還與試香方秋日同文館重門静不開雲隨鴻影去風送樂聲來插架書千軸論文酒百杯晩花陳葉滿還是作愁媒耒䆳館深魚鑰華堂静鎖闈每勞蛬作伴不與燕同歸古棟蝸成篆空牆蘚作衣寂寥還泛菊九日莫相違名自諸侯選功收一日長文章雜蛟蚓丹墨有炎涼平昔曾充貢酸寒未易忘書生成底事飽死笑東方倦枕愁霜苦晴忩宿霧開幕雲當晝合𫀆雪與風來元日彤庭實春風曲水杯何須戀楊栁聖世要無媒原注唐無名子有不第落句云早知不用無媒客悔別江南楊栁春肇翳翳雲生樹翻翻風動闈高秋忽如此吾黨苦思歸極目愁闗塞侵寒寄褚衣少年真喜事回首壯心違物色清秋逼官曹静夜長華星披夕靄皓露洗空涼律細詩難繼禪心夢易忘依稀貪佛日香火宿諸方取士魚鹽出傳經戶牖開驚濤簾外起驟雨筆端來人競懸金鑑書方貴玉杯太平元有象勿遣賦良媒補之風雲日夕改秋氣襲堂闈映葉無蜩響依叢有蜨歸官壺催賜酎鄰杵急成衣留滯真何補􅐜鱸興又違氣入中秋勁更傳五夜長青燈蛾舞急白日鴈啼凉羈旅生應慣淹留乆却忘吟詩愁鄧子畢昴出東方前世諸生選平居數路開鄉閭自相與巖穴亦時來射雉空忘矢為蛇更奪杯千金曾市骨聊用作龍媒幹零露沾明砌凄風入䆳闈添愁蛬勸織警夢鳥催歸哀調孤吹笛寒聲逺擣衣飄蓬雖已久今夜覺分違引類憑先進搜材及寸長隔簾愁晝瞑隱几怯秋涼化力人難測機心我已忘封侯良可待雖有不龜方簾幕深常閉門庭闃未開愁將河女隔喜見月娥來騷客吟冰柱仙官醉玉杯蹇修那可得笑齒竟誰媒倚氣候逢秋晏蛬鳴入戶闈簷空看雀鬬天闊慕鴉歸風急飄庭葉寒先著客衣重陽故人酒應念賞心違門深鄽市逺幽寂興何長徑菊晴披豔忩風晩逗涼聖經閒裏醉塵鎖夢中忘更苦年來病時看肘後方旁舍迴廊接重簾晝日開鳴蟬随雨退疎鴈拂雲來吟興降難韻羈懷寄淺杯驚飇漸凄𦂳又欲作寒媒子文虚廊空白月燈火閉重闈思苦詩難繼更長夢易歸徒勞爭墨牓須信有朱衣原注朱衣吏事見登科前定録萬事前期定升沈不爾違一一聽宫徴銖銖較短長品題分玉石得失異炎涼中的非無術知音豈易忘魚龍頭角老變化更何方萬戶争看牓三年此一開異時千載遇此日四方來價重連城璧珍逾羽化杯山梁欣有獲置網豈須媒公麟葉乾風索索霜月到書闈枝並鷦鷯宿牀吟蟋蟀歸幽人知坦履游子念縫衣暗喜還家近承顔慰久違莫以多為贅須知寸有長拾才何濟濟顧我獨涼涼雷雨龍皆起江湖魚兩忘攀依聊假手賢立本無方今朝庭鵲喜燈為一花開側指皂囊去轉頭驄馬來新橙家斫鱠殘菊客浮杯樂事連休日須憑酒作媒南仲敗葉掃還飛秋容肅粉闈青錢如已選白璧㑹須歸燕坐書横案孤吟月滿衣還同潘散騎魚鳥性都違大軸累千箱鳬中見鶴長静臨窻几讀爽入肺肝涼誇詫争求勝疲勞忽自忘由來京邑貢正合冠多方藹藹儒冠至恢恢賢路開才須金鑑别人自玉山來謝客書千巻嵇康酒一杯如君富術業當與雉為媒輔空庭秋色晩風露入重闈白髪已無數故山猶未歸江湖千里月砧杵萬家衣把鏡西風裏低囘志願違鄧子詩成癖苦吟秋夜長江山得竒秀風月借清涼郢曲髙難和騷人興未忘從君乞餘教換骨有仙方驄馬何時到重闈計日開迎門稚子笑載酒故人來休沐猶三日狂歌且百杯祥麟秋苑静更約看龍媒天啓有少年真喜事之句用其韻和忠臣慷慨論邊事飄蕭動禮闈貴須金印綰老要玉關歸食酪便榆塞鳴鐃慣鐵衣懸知雄辯在志願未應違詩呈同院後至諸公忠臣秋日同文館飛章待報囘絲綸先日降鵷鷺忽朋來諸彥俱精鑒微生亦濫陪紛紛五千牘誰定冠倫魁子文秋日同文館中官押入囘西風初雨去明月為人來藻鑑憑君許賡歌媿我陪相逢已忘寢坐見斗移魁向案此人姓闕秋日同文館英遊賜與囘搜才推藻鑑明試副招來玉麈聞餘論金樽喜屢陪歸鞍期早晩斗柄指天魁輔同文秋已半簾幕燕初囘議論皆先覺衰遲媿後來文衡那敢與談柄且容陪誰掘豐城劔光芒徹斗魁公麟秋日同文館凄風動九囘亂雲收暑去一雨送寒來猥與英躔接慙非藻鑒陪雍畿兹籲俊元祐看新魁肇文書汗牛馬棟宇切昭囘剸玉君曾試吹竽我亦來鑒精眞有賴詩妙不容陪只憶歸山去霜畦斸芋魁耒驄馬嘶將近天門報欲囘妻孥憐别久隣里問歸來左學徒仍在原注嘗官太學西城宴許陪腹毛何足問竒捷看渠魁聞愼思話舊隱用囘字韻補之聞在豪塘隠松林日百囘當年鹿何徃異世鶴歸來未許茅齋並終期蠟屐陪丹留杉不死夜氣看星魁原注慎思家臨湘豪塘晉陶淡隠此山嘗養一白鹿蓋乗鶴仙去藏丹於杉今大十餘抱矣詩呈同院忠臣秋日同文館論交手重㩦越秦常恨邈李杜豈堪齊尚喜新知語閒思舊句題千年勞夢想同直集英西温益秋日同文館文編亦共攜升沈都莫問榮辱已能齊酒美何妨醉詩成强自題從容約歸日訪子省闈西慎思説家山之勝用其語得詩肇江清石磊磊野曠竹修修此地有茅屋我行尋白鷗分留須物色來徃更風流相對黄塵夢詩成擁鼻謳忠臣野橋隨岸架茅屋倚林修木落吟霜狖雲晴舞雪鷗山屏當戶列瀑布入溪流只合樵歌唱何因得蔡謳柯山集巻二十九
