body:
  text: 柯山集巻八宋張耒撰五言古詩納凉靡靡春事退寂寂夏日長日西騎馬歸卧此北户凉官事幸休逸甘為白頭郎朝出暮還家悠悠愧路旁所欣藥物靈頗覺疾病康幸免三已愠敢希五饋漿難堪七有餘不過三巳嘗呼兒且糲食貧固士之常三伏暑甚七月八日立秋是日風作凉爽炎酷頓消老病欣然命酒成二詩西風吹淡白牕戸含淒清炎涼一朝變徂暑逝不停山堂曉瀟洒病叟巾褐輕平時干雲樹芳葉亦復零苦熱逢三秋西風颯然起金氣入草木傷夷從此始盛極衰從之循環固其理老翁復何事新涼欣酒美白樂天有渭上雨中獨樂十餘首倣淵明予寓宛丘居多暇日時屢秋雨倣白之作得三章寒極則有暑晦乆則有明開闢迄今兹此理信可慿炎炎者易滅巍巍者必傾聖智無奈何况此愚昏氓設羅以獵獸切骨陷其膺重勢以鎮物懸絶壓其案此下脱四字與育力有不獲呈物情千萬變可盡得經營案此下脱四字士葛帶而蘭纓無求復無憂容貎甚和平案此下脱一句秋氣日姿凊悠然有佳興美酒時一傾罷官卧窮巷值此雲物稠連延經旬雨城市欲行舟柱礎變㘭塘瓦溝成暴流蕭然殘暑退寒事戒衣裘老人朝睡足起坐梳白頭呼童飭晨餐薪濕爨婦愁洗我朱提杯不復具肴羞一觴巳徑醉萬事良悠悠故人遺我酒氣味芳以清置之屋壁間興至時一傾銀杯度一合三釂已徹觥既免戒沉湎且無憂病酲嵇阮愧令徳劉石無遐齡荒狂有何樂徒以酒自名吾幸免困此庶幾盡平生古意園中楊桞樹飛舞似含羞如何風靜處盡放眼中愁金鋪銀屈膝動處有人挨棊盤作十字中心為子来橘犀如半月何日是圓時如何一種味却有兩人知權勢權勢世所重桓温役孟嘉桓公自人雄為下未足嗟頗怪蔡中郎為董受疵瑕因之以取死曽不念漢家士固感知已尚安知其他搜牢則可誅好邕自其佳臨文一病廢百嗜好文心未忘南牕納虚明羅列陳縑緗茫昧考巢燧典章斷虞唐清妍進屈景雋永旌蘓張少狂不自料遇事形文章誤逢作者嘆因復力披攘蹉跎生白髪始紬石室藏粗見漢家事濡毫時否臧文詞比工祝不殊公卿行何用疲心精舎本棄耕桑讀賦意凌雲律令尊張湯榮華繫遇合才技無短長頗師老氏術抱璞和其光無營以卒歳刻意翰墨埸自淮隂被命守宣城復過楚雨中遇道孚因同誦楚詞為書此以足楚詞秋庭新過雨佳菊獨秀先舎芳良未展風氣已清妍金鳯汝婢妾紅紫徒相鮮老人對節物昏昏祗欲眠與子讀楚詞亹亹忽盡編嫋嫋兮秋風憀慄在逺行蟋蟀鳴西堂淹留了無成寓陳雜詩十首傳舎不可乆束裝投新居新居亦茍完佳木頗扶踈洒掃尋丈地琴書遣朝晡風雲中夜變大雨如决渠落㸃若强箭穿我老屋塗中夜起明燭移牀䕶吾雛傳聞北城隅老弱堤上廬官吏操畚􅓩紛紛役千夫螘漏或一決城闉變江湖吾衰也乆矣豈復憚為魚昔記古甲子商滅而周興如何雨此日乃為霪雨徴隂陽乆乖張此事頗有憑豈天悔牧野洗此漂杵腥舊雨水未乾洞房苔欲青新雨雖霡霡欺我墻善崩虚堂就夕眠永夜楸桐聲蕭然秋氣至豈覺巾屨輕憐我老病者三伏困薫蒸得涼且飽飯何暇念秋成朝雨如棼絲咫尺不相辨俄然晨光漏紺碧出天面天工易明晦頃刻俄屢變今朝事大定雲物巻組練客有北來説蝝生被數縣榖穗無一粒遺稈如立箭卑田成大澤投種哀莫見官人懵不知猶喜輸租辦興懐及鰥寡猶愧吾飽飯唐有元相國實殺顔平原平原腹有丹尸觧神已仙顔公死已矣人見如生前致令遺其像委曲與人言相國死倉卒穢韈塞其咽家門隨手破但怪椒斛千顔公黄塵外風節猶凛然元子墮九幽遺臭萬世傳清夜何晏晏客眠亦復佳隣鐘喚我覺咽咽聞城笳披衣行中庭星漢已横斜缺月挂西南皎皎流清華莎雞振其羽蟋蟀旁悲嗟悠哉歳巳秋日月如奔車開門無客來永日不冠履客至我老懶投刺輒復去端成兩相忘因得百無慮故人在旁郡書信不能屢興哀東城公將掩郟山墓不能往一慟名義真有負可能金玉骨亦遂黄壤腐但恐已神仙裂石終飛去疲馬齕故草閉門苔蘚深閒坊居人少秋日踈槐隂境寂心亦間蕭然散巾襟靜中有深趣因見至人心谷神古不死兹理良可尋無令兒輩覺一撫無絃琴念昔為吏日朝夕羨人間觧印出公府翛然若歸山衡茅三畆居無客門常闗早眠而起晏永日或不冠故人逺寄酒為致一醉歡我亦領其意呼兒具杯盤長閒貧亦好安用朱其轓我生本蓬蓽乆已傲飢寒我不知暑退但覺衣汗乾頗怪庭中天湛然青巳寛有物呌草根啾啾自相喧問知巳新秋大火流金天九土變寒暑正爾事亦繁靜觀付一笑吾事寧相闗但無筋力徤悠然佳意還喧喧憎隣里砧杵亂人眠秦子死南海旋骨還故墟辛勤一生事空得數編書琅琅巧言語玉佩聨瓊琚知者能幾人憎者頗有餘書生事業薄生世苦勤劬持以待後世何足潤槁枯興懐及昔者使我涕漣如道路阻且長悲哉違撫孤寄李端叔二首束髪聞至道榮辱乆齊觀中年嬰世故巳復傲憂患閒居雖荒寂几杖頗清晏悠悠閒晷景草草貧寢飯狂言無為發濁酒醉自勸與君通家舊邇者頗屢見相望豈云逺數舎隔異縣吾人師佛祖妙㫖得忍粲斂蔵避世俗未免逢侮訕坐令鬢垂雪猶把從事版尺書每見警妙語珠在貫復君進明徳同遂丘壑願陳墟自古皇疆野實楚縣沃野接神畿荒溝漕淮甸民風静而陋原隰平以逺我來逢艱歳禾黍秋色淺荒居困蛬蚓風雨老藜莧閉門謝車馬隠几親筆硯馬跡巷泥深庖烟簷日宴深居窺老易妙理殊自玩困亨方寸足夸安勞逺願乖離感歳月老色各滿面友道古所敦尺書莫辭倦秋日曬古城秋日曬古城西風振塵埃出門何所之壊道連蒿萊飛鳴雞犬稀破屋枯壕隈老圃理蔬畦晚甲瘦未開輸人暮出城栖鵶一一回悵然心不怡歸坐勸一杯古意效東野二首與君雖異坊秋凉各平分已遣月入牖更教風掃門照君幌中寢拂君堂上塵綢繆似衣帶終日遶君身扇不風自凉身不蘭自香深居不出門幽獨更清揚為鵲栖君樹為燕巢君堂不食亦可飽况乃餐輝光早稻早稻如倒戈十穂八九折晩稻不及秀日炙根土烈踏車激湖水車衆湖欲竭得泉如沸湯旱土濕未徹老農祝天工叩額眼垂血游雲不作雨風至輒散滅昊天未悔禍牲玉無徒設誰能縛妖魃敕起龍潑刺鳴蜩鳴蜩嘒髙風逮夜且復静草蟲何為者落日鳴復逞隂陽且戰争微物何所競化工執其機開闔惟所命朔雁有行意肅肅如待令江河有舊渚寧畏風霜勁書初涼夜至將曉原注靈夀寺作秋房燈火清人語乆已寂城逺不聞更警柝鳴未息横參已入地斗柄當天直乃知三更中市㕓已寂厯我時守書几磨墨傾硯滳反覆小學書昏目如芒刺試尋隣房僧鼻鼾背負壁體勞徑就枕冷夢分南北覺來寺鐘鳴僧禮像前席須㬰聞梵唄木魚如叩石舉頭視東牖朝日巳淡白反身起披衣神爽徤筋力亟來酒甕邉側聼聲唧唧秋日喜楊介吉老寄藥閒坊逺市聲終日掩衡門惟有風中葉蕭騒終日聞午枕不成寐起坐無與言喜開故人書珍藥幸見存其方受仙聖其效未易論豈惟蠲沉疴庶可輔本根珍重復珍重厥價萬璵璠永年未可冀庶保無天昏見黄仲達感秋意秋風吹衡茅寂厯如荒村獨立無與語悲蟲鳴草根老木經疾風枝葉僅得存踈䕃不滿地白日耿當軒北城有黄仲眸子清不渾時能出秀句寳鐡雕璵璠念將舎我去為吏國西京荒凉古中牟晝夜輪蹄奔青衫給吏役懐惡未易論强顔詭應接有抱誰能言從容來去間無厭走黄昏原注黄每相訪常以昏夜服仙靈脾酒冷氣侵吾髀趨拜劇苦艱仁哉神農氏遺藥驅恫瘝持錢取之市易得如茒芫繁枝與芳葉盡取無可删貯之白縑囊漬以壺酒寛七日以供飲跛曵皆翩躚呼兒謹葢藏用此九轉丹平生誤信書安坐得老邅方書豈盡信栁子固無言事固有然者豈容盡欺謾疾走非吾願且復補羸殘孫志康許為南釀前日已聞糴米欣然作詩以問之平生一尊酒風月不可無謫官將十年一醉未易圖市豈無旗亭官亦有酒壚薄乃捩齒酸一滳不可沽英英孫夫子臭味真吾徒自云得異糵乃出粳稻腴歳乆精粹出去者乃其粗醖釀纔浹日芳甘已盈壺傖人喻其力若火經茅蘆此語真野陋殆出負販夫前日聞吉語糴米已在途每恨乏陳糯價直如買珠憐君乆客囊傾倒無復餘假器走僕僮供我一笑娛欲為漉巾潜請學滌器如作詩以訊之何日陳尊盂夜書黯黯夜烟青寥寥秋漢迥海月出天髙霜雲泊天静鶴鳴知露寒樹影當軒正幽客獨未眠經牕夜聲磬小雨稍稍隂靄集肅肅春寒生牕燈耿初照小雨細無聲還來就温爐依然有故情燕坐悄無語軍城遞逺更月夜懐陳永源衆喧息遥夜爽氣漬煩襟殷勤低簷月入幌來相尋平生學虚静每為多病侵卧想陳夫子幅巾修竹林冬日放言二十一首清冬萬境肅墻戸益蕭然薄寒惟可飲短景不容眠貧厨烟火暖塵釡亦烹鮮且復養口體何勞更問天湯餅慰朝餒三杯澆旦寒醉飽外何欲昏然宵就眠幽通夢有告黙存神自全蕭蕭松竹舎歳暮聊盤桓風雨連江氣十月如深冬坐曹日暮歸宻室温爐紅惨惨庭下日騷騷忩外風三杯容我醉萬事聴天工小兒喜學書滿紙如塗鴉老婦寒不績當戸理琵琶樽中有神物快㵼如流霞三杯任兀兀凍臉生春華夘飲終日醉萬事付悠悠醺然據榻瞑簷雨方颼颼吾事幸無急不醉欲何求顧謂婦與子酒盡為我謀寒羊肉如膏江魚如切玉肥兔與奔鶉日夕懸庖屋嬉嬉顧妻孥滋味喉可欲謫官但强名比者何不足酒聖卯時歡此語聞樂天安用苦了了白日供憂煎浮世本幻妄空花電露然人間無實事惟醉庶幾焉愈老愈嗜酒益醉益自然兩人同墜車醉者乃得全我不但醉酒天和醉心源當其醉甚時更類癡與頑至道與物反夫豈㑹俗心聖處有閫域扃鑰一何深時時資美酒可得及其門送君者既返君駕胡可尋清晨坐官舎官舎復何有離披經雨菊蕭踈委風柳飽食或至睡涉筆無可否油然有好懐日暮歸飲酒日暮歸飲酒兒女戲我前須㬰徑三酌據榻已欣然老妻坐我傍餚胾已炮煎大勝劉伶婦區區為酒錢我初謫官時帝問司酒神曰此好酒徒聊給酒養真去國一千里齊安酒最醇失火而遇雨仰戴天公仁吾腹如鴟夷但滿貯醇酒外圓故不滯中静一無有紛紛千百輩納若一塵垢下而至真源保之故難朽淮陽名都㑹爽塏太昊墟最愛西城道汪汪數頃湖古木巢翠鳥清濠見游魚幽居多不愜懐我平生娛靈通古叢林他日休吾車出門循古城荒圃畦寒蔬手種堂下花頗已數尺餘何人攬其華故人應念予塞向乆室處帟幕亦復周温爐熾薪炭永夜炎光流五更屋霜重重衾如無裘興懐無衣子卒歳聊優游陶潜經世才齟齬不得肆彼寧徒嗜飲有藴託諸醉時時吐髙詞頗復見一二義熈書甲子此意有涇渭葛公葢世才功業亦云偶世無左將軍老作躬耕叟皇天挺竒産必使有所受珠玉在山淵終為王府有秦人焚詩書意欲遂絶滅六經至今存何曽損毫髪興衰有天理人力自淺拙不憂驪山墓回首遭發掘元子本豪爽頗復有俗氣孟嘉亦可人乃與較權勢崛强盡百年究竟成何事江左無英雄汝得免徒𨽻淵明非無心似以酒忘憂如以藥愈疾未佳寜免憂我直好飲耳與世本悠悠人間有何事奚足煩杯甌四月望日自孝悌坊遷冠葢孫氏第青蕪滿古城白日照大澤街荒雞犬閙市逺喧閧寂中有騰騰者淮陽四年客坐偷太倉粟穩睡而飽食平生願陳力衰老困逼迫何曽一可意但有百無益偷安淺夫志茍且志士惜窮通有天理誓不安茍得朱陽方肇序春去無轍迹悵此復幾時撫事三歎息謫官謫官成吏隱古寺度髙秋寒燈明夜室清坐聞更籌裘葛屢往還感彼歳月遒吾意方有㑹誰能賦離憂十月二十二日晩作三首黯黯東牖闇寂寂吾廬閒粗糲飽婦子苜蓿無餘盤雁急天欲雨雞栖日巳寒老人䄂手坐一杯聊自寛天寒聊飲酒再酌已停觴豈不欲酣暢要使夜腹康意得樂有餘偶然不必長寄身造化中勿使天和傷蓬蓽無奥處北風利戈鋋空爐有微火且復與周旋酒隱柴桑叟醉吟渭上賢二士忽已逺遺風載陳編題壁命駕欲詣客欲去復遲遲事幸無甚急何用勞驅馳家貧幸有酒亦畧具鮮肥且復東窻下髙歌醉而嬉夜坐萬籟聲乆寂三更霜已寒老人袖手坐一氣中自存自得此中趣不與兒曹論但有老孟光相對亦無言任仲微閲世亭志士抱竒䇿常苦不得伸及其利害出倐已亡其人今古同此恨愚智竟誰分哀哉老任公英魄乆已淪惟餘亭下柏閲世盤深根紛紛凡草木幾變秋與春朝菌與蟪蛄盡死我獨存任公不及見見其賢子孫請君利斯竒仍復大其門感懐枯樹桓司馬五桞陶徴君微木何足道所歎此兩人一埋柴桑骨一為九錫臣榮辱俱已矣芳穢萬世聞次韻題李援舫子紫髯不復見故宫無入門元子亦寂寞一丘弔遺魂興亡兩夢幻今古一朝昏念當置是事盡此舟中樽秋感二首秋日無逺暉秋草無羙姿殘蛩弔白日寒鳥悲空枝時節一如此余出悵安歸强歌不成音還坐空涕垂感動百慮遊觸心遂紛披棄捐勿復道日暮眠吾帷秋山多逺聲日暮尤百態鳴風落髙樹清澗㵼寒瀬鳴蜩黙誰憐瘖死不償罪蛩啼獨不已有愬未逢觧天時激汝曹寧自知進退吹嘘成踴躍芻狗忌撤祭庭空月宵掛園冷露晨沛嗟哉心雖忘俯事還感慨夜思江邉鸕鷀嗚栖我屋南樹夜深風霜寒呼鳴自相語樹頭鴉翼動樹杪雁行度朦朧見江山一一翻飛去嘲南商兩䄂全匹帛望知江淮客深藏計算苦好鬬意氣窄愁逢湯餅盌遇鮓論甕咋市南沽茅柴歸店兩顴赤種芭蕉幽居玩芳物自種兩芭蕉空山夜雨至滴滴復蕭蕭凉葉泛朝露芳心展夕飈東堂日虛静秀色慰無聊無題蔌蔌鳴葉下初無風過之流年一如此慷慨使心悲平日談堯舜立朝羞自私温爐煖老客聊復此棲遲大雨十日不止五月十八日晩始霽昊穹忽悔禍滛雨霽今夕峯嶺舒紫翠雲天麗金碧深蛙鳴逺汪涼葉墜餘滴漏屋百不憂宵眠始安席天運天運不暫止何啻過隙駒向來簷前日忽巳牆東隅樂者苦其疾憂者怨其舒由來盛與衰變滅皆須臾悼逝結髪為夫婦少年共飢寒我迂趋世拙十載困微官男兒不終窮㑹展淩風翰相期脱﨑嶇一笑紓艱難秋風摧芳蕙既去不可還滳我眼中血悲哉摧肺肝兒稚立我前求母夜不眠我雖欲告之哽咽不能言積金雖至斗紆朱走華軒失我同心人撫事皆悲酸積日而成時積時更成年山海㑹崩竭音容永茫然柯山集巻八
