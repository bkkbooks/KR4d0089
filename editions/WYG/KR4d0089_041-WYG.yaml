body:
  text: 柯山集巻四十一宋張耒撰記漢世祖光武皇帝廟記南頓令江君惇裕以書屬某曰吾邑有漢世祖光武皇帝祠邑人奉祀甚謹而昔人所記陋甚君為我述焉將刻石以詔後世某辭之不可謹按光武皇帝以哀帝建平元年生于濟陽而皇考欽實為南頓令帝嘗從父于此既得天下亦屢臨幸葢平生之所遊處則邑之有祠所從來久矣豈獨氷早疾癘之請有賜於民亦其功盛徳尊後世有不能㤀者故南頓之民世詞之惟謹蓋無足怪漢自成哀不君權歸外家王莽卒盜而有之天下大亂民心思漢惟世祖以匹夫起田畆出入行陣躬夷大難勇無堅敵智無遺䇿故能祀漢配天光復舊物一時羣雄芟夷畧盡撫有方夏覃及蠻貊聲教所暨比隆武宣是宜暴鷙强伉玩兵黷武視民如草芥而不講於治國之事也而武功既成海内既定則抑功臣進文吏投戈講藝息馬論道英偉之度屈于禮樂驍猛之氣束于儒學敦尚經術賔延儒雅開廣學校修明典禮煥然一變舊漢之俗葢嘗以為吾理天下欲以柔道行之至于明章繼志承統纂修洪業典章文物粲然大偹故後世言禮樂稽古稱東漢焉孝和以後漢徳不競破壊板蕩可謂極矣而仗節死義之士如袁安楊震李固陳蕃之徒救于上符融郭泰范滂許劭之徒助于下矜尚名節以震激衰弊蹈死而不悔至于獻帝人主特號而巳而曹操終不敢身自取之彼其心誠有所畏故也葢禮樂之功風化之美足以保國長世如此皆世祖之遺烈也嗚呼自三代以來一人而已建武十九年南廵進幸南頓縣舍置酒㑹賜吏人復南頓田租一嵗父老前叩頭言皇考居此日乆陛下之寺舍每來輙加厚㤙願賜復十年帝曰天下重器常恐不任日復一日安敢逺期十嵗吏人又言陛下實惜之何言謙也帝大笑又増一嵗中元元年又復南頓徭役同于濟陽則帝之于是邦豈若他邑漠然而已乎髙祖曰吾萬世後魂魄猶思沛吾意光武于南頓亦云咸平縣丞㕔酴醿記咸平五年詔以陳留之通許鎮為咸平縣先是章聖皇帝幸亳祠老子道通許築宮以待幸既為縣即以宮為縣令治所主簿居中書府而樞宻府為尉舍熙寕某年始置丞于是遷縣尉于外而丞居焉丞居之堂庭有酴醿問之邑之老人則為樞宻府時所種也既老而益畨延蔓庇覆占庭之大半其花特大于其類邑之酴醿皆出其下葢其當時築室種植以待天子之所休必有珍麗可喜之物而後敢陳是以獨秀于一邑而莫能及也每思唐自天寳以至于周厯嵗數百天下未嘗無戰其治安僅足以小康而禍敗嘗至于大亂自安史以來藩鎮四據而天下無完國降及其末分裂攘奪至五季而中原正朔之所加僅止門閾之中惟我藝祖神宗受天休命神武四逹馬首所向破滅摧伏于是劚百年之蟠據合厯世之分裂數百年間禍根亂源薅翦堙塞大掃而無餘矣肆我章聖皇帝誕承祖武以無㤀大功寛賦薄征順天養民四方無虞休養滋息如人之疾病蠱敗醫者既擊逐鈎取其累年之蠧矣而後為之調利撫養安居美食以使之豐腴而强堅也由是觀之自開元以來至于章聖而天下之人始復見大治之全國嗚呼亦可謂盛矣于是封㤗山禪梁父祀后士祠老子汪洋四方以明示得意聞之古者天子廵幸所至郡國必建原廟所以廣孝㳟示後世而況當太平之盛時講一世之大禮八鸞之所經六龍之所駐可以昭後世示子孫以為厯世之大訓成法者宜如何哉是宜一草木一瓦礫皆當䕶守保藏無敢棄壞以無㤀祖宗駿功成烈而使知夫百餘年間地平天成養生送死而無憾者誰之力也酴醿之生當是時沾嘗沾雨露之濡近日月之光與夫旄頭屬車皆為一時之物矣可不愛哉冰玉堂記熙寧中予為臨淮主簿始得拜劉公道原于汴上是時道原方修資治通鑑而執政有素髙其才者欲用以為屬道原義不屈遂與絶復以親老求為南康酒官故書未成而去予既慕公之義而望其眉宇聴其議論其是非與奪之際凛然可畏而服也士大夫皆曰劉君之賢非獨其信道篤立心剛博學洽聞之所至是葢得父之風烈公之父諱渙字凝之有詞學為小官數以事屈在勢者節髙不能容于世年五十餘為潁上令即致仕歸隠於廬山築室種蔬而食之無求于物人皆師尊焉于是既老矣公歸廬山無幾何得疾以元豐元年九月䘚公諱恕道原葢其字後十餘年而當元祐元年予受詔校資治通鑑于秘書省是時公同時修史之人往往而在道公之事本末尤詳皆曰道原㢘介剛直其在必欲逹其道不以一毫挫于人者也方其激于義而作雖足蹈坎井手攬虎兕視之若無見雖古烈士或愧焉平居自負經濟大畧而視其為吏則嚴簿書束胥吏撫鰥寡繩豪猾纖悉曲當皆可為後法其學自書契以來以至于今國家治亂君臣世系廣至於郡國山川之名物詳至于嵗月日時之後先問焉必知攷焉必信有疑焉必決其言滔滔汩汩如道其閭里族黨之事也其著書有疑年譜年畧譜通鑑外紀十國紀年惟十國紀年先成世傳之世以比遷固歆向公亦自以不愧而自蔚宗以降不論也當時司馬君實歐陽文忠號通史學貫穿古今亦自以不及而取正焉凝之晚善養性篤行老益壯年八十一後道原數年卒累言至屯田員外郎其終也未嘗疾浴沐正冠而絶嗚呼亦異矣元符中予謫官廬陵道原之子義仲主簿于徳安叙其大父與父之事于予且曰頃眉山蘇子由嘗道廬山拜我大父于牀下出而歎曰凛乎非今世之士也其卒為詞以哭曰凝之為父與道原之為子潔㢘不撓氷清而玉剛鄉人是其言名吾大父故居之堂曰氷玉君為我實記之予曰昔司馬談能推明孔子作春秋之意欲為史未成以授其子遷而遷遂能網羅三代放逸舊聞馳騁上下數千嵗成一家之意與六經並傳父子之于文學美矣而風節無聞焉疏廣疏受于漢宣帝有師傅恩而父子一旦棄去視舍富貴如棄塵垢骨肉之際風節同矣而文學無傳焉孰若君家父子文學風節煇焯並著名立于父而顯于子千載之逺四海之廣而一家擅之嗟乎世固末嘗有也始予應舉時與道原之弟裕遊愛其學博而論正是葢得其兄之餘而義仲敏于學而健于文屹然好名而立節者也予知氷玉堂之掃洒有繼矣其爵里世系與其行事之詳則既有誌之者矣故不復出固為詞以系之曰我所思之人兮嗟可想而不可見意其人兮俯青雲而下睨矚九日而不眩超然不知其何之兮遺此空山之故居豈訪重華而陳義兮父唱子和與仙聖乎為徒紓為雲霓兮注為江湖偉為哲人兮我言在書超駕言而從之兮指廬山乎休吾車耕山而食兮梁溪而漁儼頓轡而不敢留兮恐其尚謂我汙也二宋二連君祠堂記治國有善政不如在位有善人之化民速也在位有善人不如其鄉有善人之化民易也夫人之情所感動常在其所易接而親者若夫政事者固民之所畏則其從之葢有不得巳之心焉其及物淺矣安陸之應山楚之窮邑也然其民好文多學者其俗善良不爭純静易治其里之人為予言曰始吾邑之人未甚知學之利也有宋氏兄弟者講學吾邑之法興佛舍其後兩人皆取髙第有聲名乆之並為大官名尊益顯所以吾邑之人其鄙魯不學自棄于夷者愧之其居法興時有連氏兄弟者與二宋君遊相好也其後亦登科兩人起家仕不振然視所同舍生富貴光顯可攀為聲勢而兩人亦自力不少屈已以附之其官終不顯故吾邑之人其不篤于亷恥徼倖貪利者愧之凡吾邑之俗好學而文純静有恥者四君子之化也後五十年宋景文之孫羲年令應山與連君之從子仲儒緣邑人之意作祠堂于法典方丈之西嗚呼為吏于鄉其有恩徳乆而民祠之者幾人在位之人不如其鄉里之君子也二宋公之行事爵里書于國史士夫夫舉知之連君錫以尚書職方員外郎致仕好修而自重直諒多聞之君子也其仲偉庠字元禮為尚書都官郎中敏于政事號良吏世稱王陽在位貢禹彈冠者為故舊之美然嚴光所以逃光武不肯仕彼獨何哉連君不因宋君以顯名當世卒以湮没而不悔彼誠知所處與世俗所謂顯晦異矣智軫禪師塔記惟正法眼藏流布震旦渉其道者如恒河沙然根有利鈍知有深淺故號老宿宗匠者以之教人未免或滯於一隅而惟雲門正真大師文偃始以其道振于嶺表諸方大士無不斂袵與奪可否莫有間言雲門之後至雪竇重顯最盛於東南其嗣法門人衆矣而天衣義懷號為偏得其道自天衣之殁其法嗣往往出現一方四方禪學之所折中比丘載者學于天衣既得其道而隠徳晦迹終始莫得而攷獨泉南比丘智軫問道于載而得法焉智軫少為儒卓犖有奇志忽悟世幻遂為佛徒既悟道于載人亦頗聞之嘗往楚州夀昌漣水淳化然師之道孤峻而行介若其徒非似之者莫能親焉某居憂山陽時嘗從師逰其所以開警者至矣每勸師少出其有以為衆福而竊攷其志葢篤于已而慮于外尊其道而不妄以及人也其後㐮州守逐其部中禪院主者請住持師曰此將有訟矣不可因拒之而後果興獄逮捕甚衆而師獨免來京師閒居天清士大夫有欲請師説法者師言佛化人各有分何待説為卒亦不可此豈載之微意歟或議師以為佛之道主于利物而師深閟其有不以及人豈佛意歟予曰不然五膳玉食不入瓦缶四大海水不灌牛迹吾何容心哉虛無以受之則一毫不以及物道當然也師以紹聖丙子十月二十八日夜右脇示寂于天清朝請郎李延世者辦其終事挈以骨𦵏於漣水淳化後若干年有盱眙楊某者欲刻銘焉以予嘗從逰而請銘請以此銘之復説偈曰雲門大開士後世繼始祖具佛正知見建此妙法幢師滅度以乆正法訛變時雪竇及天衣二大士出見挽佛日囬照嗣説雲門法裔葢其𤣥曽天衣有逸嗣􅃅曰比丘載獨此具妙法付之智軫師軫真似其師曰道本為巳視人不我契不絶以一毫毋以天酥饌而投之穢器是将不能受惟般若之累以是坐通塲俄即自謝去或悲後無述謂師道不顯稽首窣堵波師所在不滅陵州縣山水記陵州河東之竆邑也其民葢有唐晉之餘風儉樸而敦本而澤潞在唐為雄鎮以精兵聞天下故其民好武為徤鬬夫以儉樸好武之民則其于山水奇勝之觀冝其忽而不治委棄而不惜也今縣令張侯以暇日與其僚遊於縣西南所謂四梁拒者見其風景稍異披榛而得二泉馬其一出石下激石而聲琅然張君名之曰潄玉其一出大石下而石狀若龜因名之曰龜泉㑹二水而注之石螭之口以下逹于大池構亭于泉側名曰爽氣亭後為石磴磴窮為小亭名之曰白雲軒而其喬林秀木水石奇麗之狀皆悦可人意而不可以言盡也孔子曰仁者樂山智者樂水夫盡仁之成名必若堯舜而語智之正必若禹然世之好山水者豈皆具聖人之成徳哉予以為凡安静可乆淳厚而不變者皆仁之類也臨事而不滯遇物而不惑者皆智之類也張君從予遊其行已操術其為仁智之類有餘矣而又好學而甚文予意其為政滋乆政事日信于民以其簿書之簡日徜徉于山林之間仰喬木而俯清泉資之以烟雲魚鳥之麗把酒賦詩與夫雜見于文字言語者將超然世塵㧞俗而恨未之見也鴻軒記鴻軒者張子讀書舍也客有言曰吾聞之時其往來以避寒暑之害而髙飛逺舉能使弋人無慕者鴻也今子以戅暗不見事幾得譴辱于聖世䝉垢忍恥于泥塗茍升斗以自養為欲自比于鴻不亦愧乎張子曰子之言是也然予居此以已卯之秋其遷也庚辰之春與夫嗸嗸陂澤中獵食以活秋至而春去者得無類乎客曰唯臨淮縣主簿㕔題名記四方之舟車其之乎東南者十九出于泗而臨淮者又據汴凡往來于泗者必之焉淮南之衝以重法禁盜賊者三郡而泗之臨淮宿之虹地大而多藪澤與豐沛接其民驍悍而慓輕于三郡之盜居多焉其豐年無事則㓂盜為之少息而其悖戾之氣發於嚚訟爭鬬欺妄詭詐而不畏法故臨淮為泗之劇而吏於泗者于淮臨為最勞自予之來未㡬而得安坐以治事與夫寮屬之往來而間以休于家者纔十一凡飲食之安朋友之歡疾病之養率無有予亦幸未至于衰老病憊意猶足以及之而今年之秋困于疾癘者數矣吾聞之君子之道使内不傷已外不傷物可也不當事物之責而求尸天下之至勞則傷已必求甚安至樂之地而不能少行所不欲則傷義是二者皆過矣擇乎中而無傷者君子之道也既求其凡主簿於此者名氏日月著之而又告之如此思淮亭記淮之源發於桐栢其初甚微或積或行洋洋而東旁㑹支合滂沛滛溢連潁合蔡一流而下㑹于夀春其流浩然于是蛟龍之所藏風雨之所興包山界野而負千斛之舟又東行数百里而汴泗合焉水益壯其所負益重而遊者益謹旁沾逺溉豐田沃野物頼其利而縈抱城郭間以山麓洄洑清泚長魚美蟹茭蒲葭葦之利沾及數百里而南啇越賈高帆巨艫羣行旅集居民旅肆烹魚釃酒歌謡笑語聫絡于兩隅自淮而東與潮通而還于海予淮南人也自幼至壯習于淮而樂之凡風平日霽四時之變與夫蛟龍風雨之怪無所不歴而令也得官於洛陽之夀安而官居福昌凡風俗之所宜飲食之所嗜與淮之南異矣官居之西有泉幽幽出于北阜瀹而注之有聲淙然聚為小潭其上有亭環以修竹吾遊而樂之潄濯汲引無一日不在其上而時時慨然南望思淮而莫見之也于是易亭之故名曰思淮焉夫士雖恥懐其故居而君子之于故國也豈漠然若秦越之人哉故孔子之去魯也遲遲吾行也曰去父母國之道也君子不敢樂其所私而無志于天下故自其壯也則出身委質奔走從事于四方以求行其學至安其舊而樂其習豈與人異情哉特與夫懷土而不遷異耳夫棄故而不念流寓而㤀返則必薄于仁者也予既不敢愛其所處出而仕矣然少之所居處耳日之所習狎豈能使于漠然無感于中哉且夫懷居而不遷流寓而㤀返者均有罪矣然與其輕棄其舊也則畧于所習者不猶厚歟柯山集巻四十一
