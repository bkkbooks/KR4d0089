body:
  text: 柯山集卷三十二宋張耒撰論論法上古之善為天下者不患法不立而患不能為法不患法不足而患法密而不勝舉然則天下之治亂不係法之存亡歟夫亦有推本而後知其至也夫法之所生不生于無事事起而不可理則法從而經之事日益多法日益周事日益新政日益工並起而相制則不勝者受其患故法不勝事則天下之亂紛然而起故治天下者非無法之尚也為其無事之可貴也非法備之可制也為其事變之可慮也昔者三代之治不若堯舜商周之治不如夏后孔子曰後世有作者虞帝不可及已又曰虞夏之道寡怨于民商周之道不勝其弊堯舜之禮比于夏后之時則略矣商周之禮比于夏后之時則備矣夫四代之治否豈禮不具之罪哉制度日多淳粹日衰矣天下之勢譬如人之一身夫世之人有不畏寒暑不治藥石恣口之所食肆體之所安夫如是者問其年必壯者也深居奧處愛養備至藥石百物毒烈並進而炙艾針砭遍體而無遺問其年則必老者也夫虞夏之道壯者也其不治可為也其不足可補也壯者之疾易治也其成質未虧而可以有為也商周之道老者也其不治難為也以其嘗治之而不信故也其不足難補也以其嘗補之而不滿故也以彼之疾方來而吾之術己窮彼之變朱休而待之道巳盡如是則死繼之矣嗟夫天下之不願取辦于法也如此而世之君子撫事制變而尤法之不足豈不悲哉夫法度之弊起于德不足而求勝其民而敗于啓民之邪心而多怨夏之繼舜也豈不知舜之為不可及也商周之繼夏也豈不知弊之將不勝也然而明見其弊而為不巳何也豈其世變日繁而德有所不足故耶德不足以還民之初熟視其亂而莫之禁則將以智加之故曰法起于德不足而求勝其民夫上以智勝其下則下亦以智勝其上不絡馬首則毁御竊轡之馬終身而不知不立門户則穿窬竊發之盜終身而不為法之于民常制其一而開其一制之者易見而開之者難防上下以智相勝而姦邪詭偽不可勝究故天下之人始忘其歡欣戴君之心而有怨怒忌上之仇故曰敗于啓民之邪心而多怨嗚呼夏之後為商商之後為周三代之變未甚相沿也其治亂之迹未甚相逺也周亡而為秦天下大亂三王之治掃滅而無餘治世之迹卒不能復先王之絲毫而三代之俗遂以不見于後世何也夫法未極則俗之變未足夏商之法嘗若極矣然民未大厭也民有未厭之心則其淳氣美質猶有存者周之法詳矣不可以復加其俗之變己窮而民之姦心邪態靡不畢出其智備其質盡其惡足其美殫故周之亡而不可復為矣此聖人所以深悲之而曰周人之末瀆神而賞爵刑罰窮矣此後所以為秦也歟論法下古之有天下者必得于紛爭放亂之後夫人之情出于亂亡之後則其情苦而思安夫惟其情苦而思安故其事簡而易教天下有易教之俗則上無難立之法故有國家者其初世常綏靜而易治安平之日久而民之侈心生嗜欲之動無窮而罪過繁故居其上者乃始日夜補完其缺敗而調伏其倔強曲為之防多為之制法度繁興刑政畢舉文勝而質不足名美而實不稱故大抵有國者中世以後天下之事常多而國家之觀益美生民之過日滋而有司之文加備而世之惑者以為能完上世之不足而務求前人之所未成以為成功而不知其不若使上世之質未散而前人之朴常在也天下之物其勢相激而後變生焉觀美者實之所由亡文備者偽之所自起蓋嘗以漢之事考之高祖取天下于秦民出于百戰夷傷之餘父子弟兄僅相保聚以安其生故其氣帖然靜願而少事而髙祖文景得以畫一之法羈縻而安輯之厯數世而天下安妥內有人亂而豪傑不作此民淳而法簡之效也至于武宣天下之勢久習于無事民意日縱豪俠盜賊稍起于里閭而二帝乃修明制度收納天下之才講政備物以與天下戰于才智之中才者奮而姦者隨之強者勝而亂者因之紛紛藉藉以傳于不肖之子孫而漢以大壞此則事衆而法備之弊也故下之難治不在于創始鹵莽之初而而常在于積安大備之後是故君子必觀其兆而審其宜解其甚而不激其變使其勢不為周人之巳甚而務使後世可以有加嗚呼其夲果安在哉蓋天下之弊好極治者必召天下之大亂務窮利者必貽天下之大害夫汙尊而抔飲簣桴而土鼓天下之人茍未厭其為禮樂也則吾之禮樂雖足以備天下之聲容藏而勿陳也橧巢營窟之居衣薪不封之葬天下之人茍不失其為生死之所安則吾之生死雖足以建九几之堂五稱之衣棄而勿用可也不亂則已不必邀其敬不欺則已不必盡其忠是謂不求備于民矣可久之道起于不求備而效于人不厭譬之萬金之家責之千金其力亦足以供我之求然吾曰取一金焉于是有不得已而取之百金彼猶樂輸而不怨何則彼惟所有者未竭而不厭故也故禮樂刑政之設于下使有未厭之意則後世有作者得以復加焉故其弊也可以有救而不至于術智竭盡而無繼嗚呼惑者徒見法度密而民不化文理具而功不立日夜從而加之嗚呼亦失其夲矣天下之勢不可以激而民之智不可以窮激之以所欲者必得其所不欲窮之以所能者必報之以所不能徐導其欲激之勢而不扶其未用之智則天下久安而無虞然則周人其未足以知此歟彼惑者遭其會而有不得已焉故也嗚呼治天下之難也其為物也大而難舉其為情也雜而不類為之不得其要用之不中其節用力勞而功不成是故聖人本諸道而明于術凡吾所以為術者制物以使入于吾之道也然則何其不直致吾之所欲而為是委曲迂緩而使之從也夫人之情使之從我而劫之以刑則成功難陰有以役其心使之不得不從我則成功易今夫欲天下之畏也而陳之以刀鋸欲天下之愛也而陳之以金帛此直致其畏愛者也夫刑戮賞賜非不足以立畏愛也使必陳其物設其具則刀鋸金帛亦不給矣且天下固有不愛金玉之賞者則賞之所不能悅也有不畏刀鋸之刑者則刑之所不能懼也故欲求吾欲而直遂焉者其事繁其教粗吾與物以力相勝而物之從之也內有不伏之心而吾力之所不周者亂之所從起今夫駟馬之于車也奔驟舒遲至難齊也夫人之于馬必待夫躬臨之而後如意耶則一車而四馭未能足也今以一御而駟馬之遲速惟十指之聽者以吾所執者轡也以一轡之約制駟馬之節者執馬之要雖欲不我聽而不可得也是先王之所以後天下者執天下之轡也今夫橋衡之舉水也左仰則左俯右抑則右掦夫曷不欲俯則卑之而仰者何與焉欲掦則舉之而抑者何與焉夫惟卑者有不能使之卑而後仰者用也舉者有不能使之舉而後抑者用也先王知天下之卑高有不可以刑為也故其為所以卑高者而不為其刑古之知是道者執天下之所必從者如轡而制物理之必應者如衡四凶天下之巨蠧也商容比干箕子商之望也舜能使天下不犯于有司而度罪之不可以盡刑也取天下之巨蠧者而擊之天下雖有悍強不化者知所畏矣舜非徒能施刀鋸也能沮其不畏之情也武王得商而善者未可盡賞也取世之望者三人而尊禮之而商之為善者悅矣夫武王非徒知尊賢能也能動其悅我之心也故舜武王執天下之轡者也昔梁惠王以利問孟子而孟子非之然其終曰未有仁而遺其親者未有義而後其君者也何必曰利夫使不遺其親不後其君利之大者也梁王以為利而孟子非之何也孟子者以為不求不遺于民而後民守之不求不後于民而後民先之彼以利而責望于民則民散而惟利之從而卒不獲吾之所求梁惠王之術踈而孟子之術精梁惠王之事拙而孟子之事微老子之道絀術者也其言曰將欲翕之必固張之將欲取之必固與之又曰非以其無私耶故能成其私夫將翕而合之將取而奪之行其私以成其私是以暑徴暑以寒致寒陰陽之所不能為也天之將寒也不以霜雪為之也金石烈土山焦者所以為今日之霜雪也天之將暑也不以蒸鬱為之也震風積雪者所以為今日之炎烈也故邀其反物之功不能逺守其復物之情不能伏故孟子之術低昻天下之衡者也夫術有小大道有邪正天下之士徒見夫世之淺人執小術踽邪徑而流入于譎詐之域而曰聖人無術直道而已矣嗚呼亦惑矣聖人之所謂直道非無術之言也過乎術者之言也故其道平易而有成惑者之所謂直道不及乎術者之言也故其道踈魯而多敗文王以仁義而王宋襄以仁義而亡均為仁義而存亡異何也烏獲之力弛而不用遇盜而三揖之則盜知服矣無烏獲之力遇盜而揖焉則死矣文王過乎術者也宋襄不及乎術者也而况聖人之未必不出乎術也知人論甚矣用人之難也天下之實材常深伏而不發非遇事焉則有終身不可窺者故其勇足以暴三軍服四夷而其外如怯其節足以斷大事成大功而其外若不能有所為者方其未發也其言語動作坦然無以異于常人卒然即之而不知其器是故非有深智英明之君不得而用之而世之小人常有自蔽其不肖以惑世主之聽而卒敗天下之事可勝歎哉彼小人者其中實怯而視其外則發揚振厲而若勇其中實庸而聽其言則辨給開敏而若才卒然即之若真可與有為者是故世主往往甘心而不辭至于謀窮計失而後悔嗚呼用人之難也如此蓋嘗聞之古之求知人者于人也不觀其形似而察其中于已也不逆于耳目而逆于心察其中則見其所窮逆于心則為慮也深彼小人之將欺我也不過多為形似以動吾耳目之間而己彼安能為實哉而吾應之也常出其所不意而後小人之情見而天下之實才亦雖欲伏匿而不得蓋昔者霍光之所為固非有征伐攻取之謀而文采緣飾之可喜也朴然庸人而己耳非有武帝之聰明不足以知之故卒然用之而不疑與之以兵尊之以權提孺子之天下使之謀之而光果有以當之也蓋當其初朝廷之臣孰不以為過之而至其有所立則有震懼而不敢與者然則光之平生之所為豈可以占其後之所發者哉議者不知武帝之用光蓋其知人之明而遂以為當時之臣惟光可以勝其任彼徒見其成功而後知之不知當時之人才足以治軍旅決成敗而書生儒者之論孰非仗節死義之人安肯棄而不求而授一木強之霍光哉唐之文宗昭宗其憤亂也甚矣不愛高爵重祿以致天下之士投其誠而與之此其志皆可與立功而其取人無術故徒以益亂彼李訓張濬者其言語動作如可以立功者也大言而不顧敢為而不憚故二君惑之雖有間焉不可得而入其後卒然而發以區區之宦人不能少制其亂提兵數萬而不能取李克用之一鏃卒之身滅國弱為天下笑彼二君惑于形似故也李係好言兵而王鐸與之兵李元平好大言而關播授之權卒于無成為天下笑嗚呼使人之知人獨視其外而可以不疑則知人者帝何其難之也將論天子之臣自公卿大夫雖或闕焉而不足以為急其不可以一日闕者其惟將乎夫將之所以為急者非以夫任之有以過夫公卿大夫也為其事之不常有而人之能之者少也今夫醫之為藥也金石草木之珍世之所共有者未必藏也至于逺方之物山海之竒産與夫人力之不可以常得者則必預蓄以待其用今夫百姓之不安而財用之不登刑罰之未平而禮義之不興其為患大矣然其為事也天下之所習知故其為術也人人皆足以措手足卒然求其人而易得也講其術而易䁱也譬之于金石草木之珍其所治者大矣然人人之所知而有之雖不素有無害也或一旦之急提百萬之卒以與人戰勝則生敗則死天下之人無事則廢而不講有事則避而不願見者也故其為事不常有于天下幸而千萬人之間而有一人學焉而知其術用焉而見其利故人之習之者少非卒然可以朝求而夕得茍取而驟用者也譬之有疾于此而待逺方之竒藥豈不殆哉先王知其然故雖隆仁義禮樂以化天下之俗消伏悖戾好爭之心而常陰求天下之竒才以待不測之患蓋嘗寓其法于六鄉六遂之間使卒乘車徒之制素具而朝廷之公卿大夫外之諸侯之君朝聘燕享從容歡欣之際必陳弓矢以講射而四時之隙則命有司以講武以天子之尊而馳騁于草野親金鼓干戈之勞以射取禽獸蓋享宴者人情之所樂而弓矢者威武之具田逰者佚樂之事而殺獸者征伐之容蓋先王所以藏天下之所畏于人情從容之際凡此者所以陰養天下豪傑之氣使之一日習知其術安之而不懾也是故先王之于將也非特能求之而又能養以致之至於後世秦漢以來其慮天下之變已不能如先王之時而獨知求而用之而已養之有術以致其才求之有方而知其實此先王之法也故其術無窮養之無術而知求之愈于不求焉可也此于先王之時則十已失其九矣嗚呼先王之法後世既亡矣安坐而不求求之而非道者未見其可也本治論上治天下之道有厯萬世而可知者有朝不可以知夕者自三代以來至于今蓋已數千百年事勢之變雜出而不可期然而如是而為仁如是而為義得之則安失之則危者未始有改也此雖厯萬世而吾能知之者也雖然仁與義者吾能知之其所以為仁義者吾不能必也今天下之所謂仁義者有生之而為仁亦有殺之而為仁有利之而為義亦有宥之而為義彼聖人之治天下其可必者吾之所為未有出于不仁不義者而巳矣必將求其所以致仁義之迹則雖聖智吾知其不能前知夫天下之事未始一也循之則弊激之則變反覆相代而不可知今夫質之與文是無以異于氷炭之不可同也然質之弊則文必至是何也勢之所激故物有以極隂極不生隂而生陽寒極不生寒而生暑故物有以同相戾有以異相使此之謂激之而變者也彼先王之治其初固未嘗不善也而至于後世而不能行何也循之故也譬之水也決之而注于海則有所避有所就縱橫委曲而不可一而後海可至也有賤丈夫焉不知其為如此以為水出于西則決而西水出于東則導而東當避而不知避當就而不知就則力可竭而海不可至也夫聖人之法何為而立也吾乃處于此時去矣而法不改則雖聖人之法有所不能為區區而循之堅守而不變時日益異而吾方倀倀然抱巳陳無用之物而求施之則亦何施而可哉此所謂循之而弊者也惟其循之而弊是故隨其所激而變從之天下之事如此而不可一也而世之惑者猶將舉腐餘己棄之空文而求為之無乃已踈乎凡此者朝不可以知夕者也治天下者必求至于仁義而無禍猶治身者必求至于安樂而無疾也夫求安樂而無疾則必察夫寒暑之動而為之應故狐貉以禦寒而絺葛以去暑凡晦明燥濕之變吾皆有以制之而吾初不能自必夫如是而後安樂可為也寒而為裘暑而不易暑而御葛寒而不變如是則疾而死耳尚何安逸之有哉嗚呼知此而後可以語治天下也本治論下或曰三代以來天下之未大治豈非天下之勢有不便歟嗚呼是未逹夫變者之論也且天下之勢果何為而起也方三代之時列而為諸侯自王畿之外皆侯國也當其盛也藩翰屏蔽而王室以之強及其衰也分裂四出更為攘僣而不可制而後天下之勢合于一而秦始為郡縣以收天下之權而其弊也天子孤立于上匹夫橫行而莫之禁至于漢而天下之勢遂離而不一裂為三國而合于晉分南北而一于隋天下之勢雖或不同然當其改也必有所懲當其立也必有所利蓋自唐之末始有藩鎮之強而唐以之亡厯五代而不能改至于今而藩鎮之禍遂大去而不復今天下之勢委于守令而分于監司總于朝廷自三代以來至于今何其屢改而不一耶其無乃出于有所激歟故堯舜之不得不為諸侯猶今之不得不為郡縣也故兩出于不得不為則勢者固有所定而不可變故天下之政有是非而天下之勢無可否譬如人之自少而之壯自壯而之老也夫三者固未始不同而各有所養亦各有所樂茍不知所以待老之具而必曰壯而後可則惑矣按今之勢而善為之其誰曰不可而必曰唐虞三代之勢而後可則天下卒不可得而治也然則三代以來其隳于治者其病果安在哉蓋有二説一曰尚虛名而忘實利二曰謹小過而失大患何謂虛名好堯舜三代之名是也世之學者圜坐而議政未有不曰唐虞三代者也其言當時之病未有不曰不如唐虞三代者也夫唐虞三代之法豈誠有所不足哉時易而事遷世變而勢異譬之鑄金琢玉以為飲食雖美而無所用之矣有一人焉強立而不顧則必羣笑而競排之以為臆説而不學而不知吾之于堯舜三代固相期于仁義之地而吾何求其名哉蓋昔者夏為貢法以取其民至商而為助孟子曰莫善于助莫不善于貢嗚呼使世之惑者必曰禹之法豈有不善哉而不知夫末世之利聖人不能預為而已去之時聖人不能強至也嗚呼使堯舜三代之聖人復出于今而反顧當時之所為吾知其必不復為之矣故夫天下之不治未始不自好名始也昔者王莽之井田後周之周官房琯之車戰嘗試之矣譬如病狂喪心之人越行妄作而不顧是果何益哉此之謂好虛名而忘實利者也何謂小過夫世之人有好種植者一日種之一日溉之一日培之朝俟其長夕伺其蕃一日百至而不倦是其愛之亦至矣然木不加盛而日稿又有一人焉既植而去之行三年而反而木之大可拱矣是何也凡物之性不擾則樂而滋數治則殘而稿且秦之吏比漢之初則勤矣逺邦小都之民其知秦之政令亦熟矣秦之命令布于田野閭里之間者亦至矣而民亦怨苦而漢初之吏雖不如秦之勤而民樂之何則秦之所急者不過簿書文法之間謹嚴其細而勞擾之民固已不勝其弊矣此無以異于愛木而日擾也彼漢之初雖號為文濶而網疏然不過少弛于簿書期會纎悉委曲之間而民乃不至于勞擾則何怪乎天下之治哉彼一溉一培之失時于木之性未害也彼不求政之所病而乃尤天下之勢嗚呼其亦不知治本哉柯山集卷三十二
