body:
  text: 柯山集卷三十八宋張耒撰論司馬相如論司馬相如雖以文章事武帝而慨然有君子之風蓋其心不専以其技易寵祿又有不忍欺其所知者東方朔論上林苑害民田號為正諫咈人主之欲而相如上林其終所陳與方朔何異且相如事景帝遊梁羈旅不偶亦思泰矣起而逄其合持末技以求售此常人之情惟恐失其意也愛惡未可必而諌及之此其心似不志于利者也其後為帝開夜郎通西南夷既至蜀得其父老之說頗自悔其失作書為諭蜀而實以風夫既巳開其利于前矣徐覺其害又不忍默默此其心似不忍自欺者與夫遂非而忍愧者亦異矣始相如亦自以慕藺相如彼其從來有足觀者矣司馬遷論上司馬遷作伯夷傳言非公正不發憤而遇禍災此特遷自言為李陵辨而武帝刑之耳論管晏之事則于晏子獨曰使晏子而在雖執鞭所欣慕焉遷之為是言者蓋晏子出越石父于縲紲而方遷被刑漢之公卿無為遷言故于晏子致意焉且方李陵之降其為漢與否未可知而遷獨激昻不顧出力辨之如此幾于愚乎與夫時然後言片言解紛者異矣不知其失而惑夫道之是非何哉至怨時人之不援巳于禍而拳拳于晏子遷亦淺矣遷亦淺矣司馬遷論下司馬遷尚氣好俠有戰國豪士之餘風故其為書叙用兵氣節豪俠之事特詳其言侯嬴自殺以報魏公子而樊於期自殺以頭遺荆軻皆竒誕不近人情不足考信以嬴既進朱亥以報魏公子不自殺未害為信而樊於期自匿以求苟免尚安肯憤然劫以浮詞以首遺人哉此未必非燕丹殺之也豫讀刺客傳頗愛曹沫豫讓之事沫有補其國而讓為不負其君然皆不合大義而庶幾所謂好勇者如聶政荆軻之事此特賤丈夫之雄耳豫觀竇嬰田蚡灌夫之事考嬰與蚡皆庸人不學其所立無可稱録而灌夫屠沽之人也鬬爭于酒食之間不啻若奴妾是皆何足載之于書而遷叙聶政荆軻竇嬰田蚡之事特詳反覆叙録而不厭蓋其尚氣好俠事投其所好故不知其言之不足信而忘其事之為不足録也趙充國論豫讀趙充國傳觀其用兵決䇿若可以有竒功然提大兵對五萬之先零持久數年而不決其取之也又未有竒變可喜之功蓋嘗疑其多畏而少斷及見其言兵勢國之大事當為後法而後知其非徒然也夫先零之事微矣然其規略即古之謀臣智士之遺法也古之善計者未嘗一日不志於功名而不肯為徼幸之利而其術本於觀時時非吾之所能為而吾能引而致之不然則安坐以待其疲舍是未有肯妄動者夫提兵決戰斬級捕虜與敵鬬吾可以有功而不可以無患也未可以無患則變生不常而勝負未有所在謀人之國都而吾之勝負未有所在是天下之危道也充國救罕开以離其支黨遣其降者以亂其腹心培之於覆亡乃徐待其熟而後振之夫充國豈以力戰決死為必敗哉以為善戰者其法不當出此故也昔豫嘗怪武帝用衛青霍去病出萬死百戰以踐蹂胸奴之强此兩人斬馘降虜不可勝數單于逺遁漠南空虛而終不能得志至其晚年漢與胸奴兩不振矣唐太宗與頡利臨渭水而盟方是時內有太宗之雄而李靖李績為之將帥致頡利於室中而閉其門覆軍殺將何求而不可太宗竟不出此而其後頡利危殆國中空虛李靖以五十騎談笑而滅之夫武帝之無大功何也戰胸奴之强而不能致胸奴于弱而後戰而太宗之明知頡利之方强雖足以取而未可以無患李靖以孤軍而功過衛霍之百戰彼惟投其時故也其後太宗舉國以取髙麗猛將鋭卒自以無前而頓兵堅城逡巡而退何則蓋蘇文之雄而欲以亡國處之過矣高宗之時蓋蘇文既死則用一李績取之而有餘夫績之才豈過太宗哉敵之時異也勾踐與范蠡百計而謀吳勾踐不能忍而欲發也數矣蠡獨不可而至稻蟹之變則遂起而不疑何則彼之至計不獨以戰為也故充國以善戰之才謀五萬之衆至百計蹙取彌年而後成彼非惡速也以為此用兵之法也陳湯論豫觀漢公卿論陳湯矯制斬郅支之賞其守常不通者則曰是不當賞且開後奉使者乘危徼幸生事夷狄有竒其功憤其為庸臣所詘者則稱譽贊說大功不録小過大美不疵細瑕宜加尊寵以勸有功此劉向之論也夫奮不顧身決計出竒以孤軍取單于之頸梟之藁街自漢擊胸奴以來有能如此者而欲以一切矯制生事謂之有罪而赦之不使有尺寸之賞此天下皆知其不近人情而人不服也然湯之還使朝廷遂厚賞之一不問其矯制如受命討伐而有功者則亦不可何則人臣不待命而有功以要我則亦為國者之所病也故劉向之論善矣而未盡也元帝遂從而賞之愈於不賞可也所以為說則終亦未有以服惡矯制者之論惜乎無有以是說告之者矣所惡夫賞矯制而開後患者謂其功可以相踵而比肩者也陰山之北凡幾單于自漢擊胸奴以來得單于者幾人終漢之世獨一陳湯得單于耳其不以尋常徼幸而立功者又寡少如此則裂地而封湯乃著之令曰有能矯制斬單于如陳湯者無罪而封侯吾意漢雖欲再賞一人而未可得何遽有邀功生事之憂哉故上足以尊明湯之有功褒顯之而無疑下不畏未來生事邀功之論天下之善計也古之為法者行法而不失人情當夫事實而亦不使之不可繼凡若此也昔者韓患秦之無厭也下令曰有能得秦王者寡人與之國大夫皆諫曰不可賞不可以若是其重也韓王笑曰得秦王而寡人與之國是賞有再乎且得秦王矣寡人其憂無國哉是賞湯之說也丙吉論丙丞相為人至深厚也豫獨有恨焉虜入雲中詔問丞相御史以虜所入郡吏不能對得譴責而丞相能具知見謂憂邊思職夫吉之能知馭吏之力也夫平日不知從事于其所急而一時際㑹于他人之力亦可以為徼幸矣謂之真憂邊思職也可乎因徼幸以得譽遂從而冒之坐視人之得譴責而不分謗則亦少欺矣龔遂因王生一言天子以為長者遂不敢以為出巳曰此乃臣議曹教臣夫遂以能歸功于君其善微而不冒人之善其德厚矣方天子讓御史吉如曰臣與御史等耳臣之僕有先白臣者臣是以知之此其為能豈獨憂邊思職而巳哉世人有未嘗射挾弓注矢一發而中不知者曰天下之善射者也其人不讓則知之者笑之矣吉脫宣帝於死能絶口不道獨貪一馭吏之功殆必不然傳曰思則得之不思則不得也吉未之思歟夫冒徼幸之福而安處之此庸人之所常行獨為丙丞相恨也遊俠論所貴乎遊俠者謂其身任人之患難而脫人於厄也朱家郭解雖不合於大義而其感慨雄俊先人後已故可取也樓護平生齷齪守常無可稱吕寬得罪王莾以其父故窮歸之豪俠立節無如此時謂宜斬莾使脫寬于死身自亡匿或者以身任之而不悔如此謂之俠可也護得詔書即日斬寬以聞莾大喜此茍偷畏懦閭里屠販人耳當莾時天下威畏誰非護者班固立護與朱家郭解同謂之俠此何故也泣涕責妻子使終養吕公此朱家郭解糞土之餘也何足道哉王鄭何論昔孔子論令尹子文陳文子皆以清忠與之而不與之仁管子之德不及二子逺矣而以仁與之何也夫仁之為道雖大然其實以濟物為本濟物之事非一善可以當之必其才德為世所賴得我則存非我則亡我之所在家安而國治如是則有一善不害為不仁而有小不善于仁未害也豫觀王祥鄭冲何曽三人者考其行事之迹從容無事之際雖謂君子可也然為魏大臣陰相司馬氏以喪魏室卒道而授之夫平日則戒慎君子之所忽而當事則為小人所不忍為此所謂色取仁而行違在邦在家必聞者也昔西漢之衰有似乎此孔光師丹皆盜當世仁賢君子之名而或屈於董賢或迫於王莾使為姦者反依之以為重嗚呼治天下其不可以無才智骨鯁之士也淮南王欲為亂獨憚大將軍與汲黯畏衛青畏其武畏汲黯畏其正也夫世固有德不足以化姦才不足以止亂而可以謂之仁人君子乎夫使令尹子文陳文子當管仲之任則不勝矣李德裕曰平淡和雅世所謂君子者居平必不能急病理煩遭難必不能捐軀濟危可以羽儀朝廷潤色名教如宗廟瑚璉園林鴻鵠者此數子之謂也張華論裴頠勸張華以黜賈后而華不可其言曰聊以優遊卒嵗當時華有天下之望姦臣孽后切齒于華久矣雖不舉大事可得優遊卒嵗歟華之智寧不知此而為是言何也夫華為之亦死不為亦死徼幸苟免自安之言耳方是時華之計無可為者矣與外臣為仇則賈后得藉口以誅之與孽后為怨則强王將以仗正而行其意起貧賤取富貴既無棄屣之高又名重纍身衆所不置已有遁尾之厲嗟乎華于是時蓋知不免矣自古為是言者不以賢不肖皆知不免者也董卓築郿塢曰事成雄據天下不成守此塢夫事不成而塢可得而守歟卓雖愚亦知之矣曹爽不能用桓範之計而曰不失為富家翁其措意亦如此華之優遊卓之守塢爽之富翁皆知不免而徼幸茍且之言耳不足論也士之謀身至此亦可悲也夫王導論豫觀王導之為晉有以也哉自古開國建邦尚功利修戰伐其俗好武喜功其國家法度修立若是者必速强而無內亂然當其亡也以為大敵取之何則法制素立人畏而不敢犯故無內亂夫國小勢單而有所恃必敢鬬其人才可用則不能下人夫小國敢鬬而不下人大國之取也吳蜀是也諸葛亮治蜀法制謹密兵武修立糧儲豐而器械精故以區區之蜀而魏人不敢侮亮既死姜維恃其餘力黷武好戰而魏取之孫權之為吳也江東才武之士悉用而無遺其將帥多可用之才權既死而規略風聲不改其舊孫皓不肯俯仰畏縮為自守之計時用其武而晉取之故曰小國敢鬬而不下人大國之所取也夫政和俗弱畏患自守者多內侮其弊也內之强有力者取之然不待其力盡勢窮則不亡何則內有强力之臣而無所忌則必起然國人未去則去之也難非極弊不可復振之際則不可得東晉是也導相元帝于江東所以立國者不過賓延賢士招禮名勝設學校謹選舉力為柔仁和厚之政而已夫當西晉之末羣雄並起天下大亂非有商君管仲之節制刻深以圖功利起怠惰收蓄天下才勇之士不畏勞苦往反與之深入力爭未有能立者也而導顧為此豈其才不足歟或者曰導之意以為限長江而與關洛交兵相元帝而與劉曜石勒爭雄駕御賀循紀瞻之徒而與外裔馳逐此百舉而百敗曽不如勿為之愈也是以置江北之紛紛而為保國之計苟無後世不遽亡之䇿而可矣夫王敦蘇峻之內侮桓溫桓𤣥之倔强大則君廢大臣誅小則控制上流而朝廷奔命宜若朝夕而亡矣卒之劉裕取之于凌夷甚弊之後此固導之深圖也齊之政强魯之政弱魯朝齊而齊先亡乃自古然矣屈突通論屈突通知隋之亡力不足以救也審矣然力盡勢極猶為萬一之計其心皎然非負隋也通未及死而被擒其不死者非自免也唐救之也唐之為隋之仇明矣通不負其所事而舍其生然忘其仇而食其祿責通報其怨非也天之所與通安得而報之君子于其仇度非所得報則不敢行其私然亦不敢忘其私故食其祿者通之罪也凡負恩圖存于可為之時者得罪于通可也忠亦不足為矣裴守真論先王之禮不明于世日以廢壞遂至于滅亡者其初未始不自于諛夫盜儒茍欲媚世主之私而不務行先王之意而俯從今世之便也先王以至誠仁義之心誠意于禮樂之際齊明盛服如臨師保父母之嚴一有不中凶咎從之而使後世之汙君習于安樂驕傲者勉而為之其欲捨而從我也固已不勝其怠而諛夫盜儒又從而為解說旁引曲取既使之便其私意而又曰自義理之所安嗚呼先王之禮何從而興乎秦併六國典禮盡滅高祖撥天下之亂庶幾其有興矣而叔孫通阿其意不能尊其所聞而行之乃為是茍且滅裂之具而漢之禮終以不明則起于叔孫通之狥其君豫讀裴守真傳守真善容典為太常博士當時謂才稱其官至論射牲禮曰古者天子自射牲漢遣侍中令天子奠玉酌獻而已可也古今異宜不必射牲破陳慶善二舞入天子為起守真言古無天子立觀舞者請從古夫射牲古也勞而今也佚則從今立觀舞今也勞而古也佚則從古守真非能法古也特從其佚便使人主便之而巳夫先王之禮惟惡夫好便而無制者而後為是曲折制度之嚴也使有司之禮近于人情者非其至也嗚呼自秦漢以來天子之車服金珠翠羽婦人之服竒文巧畫房闥之玩仙美鬼怪可駭之物雕韋織毳非法之用皆有之矣推其禍本亂原未有不起于好便安者為之也夫一守真不足道也而世遂以才稱其官則知史說偷風瞽俗相扇而不知耻也可勝嘆哉李郭論雄傑好亂之士可服以天下之大義不可掩以匹夫之小數何也彼其心甘為理屈不肯負人以其智幸而掩之得志其後必大亂凶悖放恣而後其志乃巳此不可不慎也漢髙祖苟一時之便僞逰雲夢而執韓信雖能執信而信之反心自此生矣當此時高才智士亦有輕其君之心故英布貫高之亂繼踵而起者此非服英雄之道也李光弼提孤軍與安史健賊百鬬百勝其治軍行兵風采出郭子儀之右而當時諸將皆望風服子儀如敬君父而光弼之在彭城諸將巳不為使子儀能使吐蕃謂父而史思明乃上書請誅光弼大扺光弼之實不及子儀之名子儀安坐而有餘光弼馳騁而不足豫嘗思其故讀史思明傳見光弼使烏承恩潛殺史思明事而後知李郭之優劣蓋子儀之為人至誠不欺主于忠信其胸中洞然大人也故靜則人安其德動則人服其義光弼用烏承恩使襲殺史思明此雖狡夫詭道之常態意其人必雄悍驃勇而中有所不可保信者市井之智盜賊之謀有時而用也不然何以召史思明之侮而田承嗣之膝獨為尚父屈歟此于服人之道小矣嗚呼成事以材不若以德服人以智不若以理惟德與理始鈍終利以之治大以之行遠未之有悔也韓愈論韓退之以為文人則有餘以為知道則不足何則文章自東漢以來氣象則已卑矣分為三國又列為南北天下大亂士氣不振而又雜以南蠻輕淫靡嫚之風亂以西北悍魯鄙悖之氣至于唐而大壞矣雖人才衆多如貞觀風俗平治如開元而惟文章之荒未有能振其弊者愈當貞元中獨却而揮之上窺典墳中包遷固下逮騷雅沛然有餘浩乎無窮是愈之才有見于聖賢之文而後如此其在夫子之門將追遊夏而及之而比之于漢以來齷齪之文人則不可然則愈知道歟曰愈未知也愈之原道曰博愛之謂仁行而宜之之謂義由是而之焉之謂道果如此則舍仁與義而非道也仁與義為定名道與德為虛位道有君子有小人德有吉有凶若如此道與德特未定而仁與義皆道也是愈于道本不知其何物故其言紛紛異同而無所歸而獨不知子思之言乎天命之謂性率性之謂道修道之謂教曰性曰道曰教而天下之能事畢矣禮樂刑政所謂教也而出于道仁義禮智所謂道也而出于性性則原于天論至于此而足矣未嘗持一偏曰如是謂之道如是謂之非道曰定名曰虛位也則子思實知之矣愈者擇焉而不精語焉而不詳而健于言者歟柯山集卷三十八
