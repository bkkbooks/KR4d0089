body:
  text: 柯山集巻三十一宋張耒撰表状進大禮慶成賦表臣伏見皇帝陛下即位以來事天治民䖍恭豈弟光被四表格于上下雖太母保宥一遵聖訓而仁厚之誠不言而孚乃者肇見天地實陛下即位之初郊内自臣工外逹海宇于以觀神人感格之際占信順獲助之騐前祀二日隂霰暮集俄而氛祲廓清星月明潤将事之夜風伏不興景氣晏濕圓穹清明神祗來格于是乎在凡執事在列之臣與夫侍御奔走之𨽻喜動乎容和見乎聲記曰福者備也備者百順之名也天既順之備孰甚焉帝之來格見于天時祭之受福見于人情臣幸執筆待罪太史實奉祝册天威咫尺親見齋荘粹穆之容陟降拜俯誠敬兼盡臣竊喜太平之必至多祥之必集四方之民受福不疑姦宄作慝不禁而息謹撰成大禮慶成賦一篇随状上進雖不足以追配甘泉河東之廣大盛麗然犬馬之愚庶以自竭伏惟清閒之燕畧佇覽觀干犯宸嚴無任激切代文潞公辭免明堂陪位表合宫備禮方蕆事于季秋列位侍祠尚不遺于故老仰恩榮之優異循衰瘵以戰兢伏惟太皇太后陛下聰明自天博厚載物左右景命已大濟于艱難保佑神孫既聿躋于齊聖邦家康靖邪正昭明頌德告功既對天而不怍隆禮備樂念報本之惟時當魚麗之時而物既盛多由思齊之聖而神無恫怨擁絶禧于二聖肆大賚于萬方曠古上儀于今盛典臣乆辭屏著退伏里閭覩聲名于垂盡之年受德澤于維新之政顧餘齡之已幸矧召節之見臨是宜䇿勵造朝齋明就列而衰朽之質登降畏失容之誅疾病之餘朝夕有負薪之懼與其失周士在朝之敬不若同堯民擊壤而歌文物莫瞻夢有鈞天之想精神未巳心為魏闕之逰代文潞公辭免明堂加恩表禮行郊廟方推報本之仁燕及臣鄰皆獲増封之錫恩雖縁于有慶賞亦惡夫無名惟是衰殘尤為冐昩伏念臣朴忠一意際㑹四朝超踰等夷出入将相洎老休于鄉社已位極于師垣何期垂白之餘復相繼明之運空心半朽乆自分于不彫十里已疲冀時資于辨道而歲月逝矣補報缺然惟知愧懼之無容夫何恩禮之加厚肆時大享兹謂上儀方天子致齋荘之嚴而老臣私宿衛之逸雖聖朝尚齒惟所便安而寵數非常更為憂懼已足矜榮於在位豈當同衆以䟽恩伏望皇帝陛下時軫睿慈俯廻神鑒必欲寛殘年之隕越莫如裁今日之寵光耄已及之雖終知其無補天其或者尚假息于餘齡願正已行庶無太甚第二表加地無名方抱戰兢而莫處稽天未答蓋縁誠確之罔孚盡而腹心再干旒扆臣聞亊君盡禮而臣獨無趨拜之勤陳力就列而臣久渉衰殘之境兩無一可雖聖主曲為之優容日加三思顧國士如何而稱報惟有稍裁其寵數庶幾未即于顛隮而恩禮増繁光華㳫至既紓勤于齋祭又申錫其土田髙巳近危将必憂于隕越折而致覆亦何益于生成伏望皇帝陛下垂德乾坤收恩雨露賞行四海當酬可勸之功職備上公豈憂不及之禄實思危于居位非受爵以茍辭謝得請表不能與祭自憐衰老之無堪罔俾造朝更佩恩榮之從欲内循安便未免驚慚伏惟皇帝陛下龍徳光亨天仁覆露牲玉備物允若神人之和同禮樂在廷肅然祖考之來格祭則受福天且弗違臣猥以殘年莫瞻盛事雖行不俟駕在常禮而有誅而老弗及齋知異恩之獨厚苐想光華于天漢竊同歡忭于里閭代張文定辭免明堂陪位表明德惟馨方格神于盛禮相予肆祀俄賜召于老臣衰朽知榮兢惶靡措伏惟皇帝陛下嗣隆聖統躬致太平翼翼文王之小心烝烝虞舜之大孝季秋順序方萬物之盛多四方和來加多士之奔走祗見列聖裒對昊穹敞布政之法宫大明禮樂受丕天之景貺均被邇遐喜交神人慶浹夷夏凡執事豆籩之末或觀光輿𨽻之間足為至榮可以無恨而况臣猥以屏退尚叨記存温詔在門外庭有位固願聞舜韶而率舞瞻堯日以傾心而遲暮之餘衰疲且乆筋力已消于疾病纔冀盡年踈野乆放于田閭不足為禮當千載之接統自滯周南奉半夜之受釐莫趨宣室無階䇿勵惟劇飛馳謝太皇太后表稽留君命敢求免于刑誅恵養老臣不使勞其筋力仰睿私之從欲撫衰志以知榮伏惟太皇太后陛下厚德無疆至仁在上神孫臨祭知保宥之聖功多士充庭見肅雍之盛德恩及草木喜同天人臣幸以餘齡獲逢盛典雖籩豆駿奔之事徒有心哉而禮樂大備之時為後死者豈其偶爾尚足矜榮代范相讓官表不俟駕行既已馳驅而至疇若予采復膺考慎之求在明主圖舊之意則深于愚臣陳力之義則過伏以二聖求治歴年于兹忠厚之澤足以傳之無窮仁孝之誠固已格于上帝守此成憲底于太平加以左右輔弼之臣盡極老臣俊乂之選何圖次輔之虚位乃復召臣于守藩兹蓋伏遇皇帝陛下廣度兼收至明洞照察其疲駑之不逮出于悃愊之無他意其先之教忠恐或老而更事責以來效用之不疑上副眷求敢愛竭盡而臣伏自深念固非飾辭形骸已衰心力随耗雖輔相重任不欲舎其舊而新圖然衰疾交攻豈期老将至而耄及雖至仁之曲被顧公議之謂何豈無巖穴待招之賢朝廷委質之彦與之圖國足以格天而臣已試之效可知将老之誠彌切不能就列辭敢避于再三因是得人功猶期于萬一謝宣賜厯日表在昔哲王德暨鳥獸魚鼈肆時治古厯象日月星辰既推歩以授人時又協正以觀候度惟盛朝之稽古蓋列聖之在民伏惟皇帝陛下聰明憲天仁厚愛物順帝之則既先後而不違使民以時無困窮之失所顧兹寒暑之節實惟衣食之原以臣職在承流恩叨頒朔敢不推風化之有本躬勸農耕顧畎畆之無知孰原帝力謝欽恤刑表歲舉舊章雖謹有司之職詔頒列郡實皆天子之恩恭以聖人之于物蓋本好生哲王之用刑初非獲巳方天時之炎燠憫囹圄之係纍渙發德音䘏及民隐伏惟皇帝陛下哀矜庶獄明慎用刑内修百度以肅權綱外推至仁以恵黎庶下念狴牢桎梏之苦必使飲食沐浴以時君恩及斯民命何有臣職當賦政責在承流雖未能禆聖代之措刑必使無訟而竊慕古人之為獄自以不寃謝明堂赦書表伏以宗祀于明堂既盡寅恭之志大賚于四海徧覃在宥之仁凡出照臨悉周恵澤恭惟皇帝陛下堯仁若日舜孝格天法度修明既聿追于先烈號令寛厚已深結于民心肆明大享于合宫是謂嚴親之盛節禮成有慶既賚予于善人德及無疆将陳常于時夏興哀多罪囹圄渙然一空頒錫六師忠勇為之十倍丕冒出日罔不嚮風洪惟盛朝集此熈事臣職司牧養責在承宣敢不撫陛下可封之民鎮以無事布陛下維新之恵期在措刑黄州謝到任表准告罷管勾明道宫落職添差監黄州酒税礬務者臣已于今年三月到任管勾訖㐲以矜其多病禄之仙聖之祠誅其積愆斥之管榷之任雷霆既震螻蟻曷逃罪大責輕感深涕隕伏念臣粗親翰墨篤好文詞曽未窺其藩牆妄見稱於流軰漫䝉寵禄頗躐等夷乆讎中秘之逸書與記漢家之故事入侍帷幄曽未歲時而疾病侵凌精神疲耗一辭螭陛兩換虎符蔑聞報政之能徒幸養疴之便投閒置散于分為宜號寒啼饑其窮已甚方大明于淑慝固無逭于誅夷惟是齊安近在淮右雖薄加于黜削乃猶即夫便安非大明之燭幽顧微生之何恃兹蓋伏遇皇帝陛下至仁􅄎及盛德好生謂刑以止邪用之初非獲已而罪非極惡議之必傅惟輕遂致夙愆猶逃大戮臣敢不改心思過擇地圖新駑馬已疲乆息鏘鸞之望秋葵未隕常傾向日之心茍一介之有施終九死而無悔黄州安置謝表准告責授房州别駕黄州安置臣已于九月初三日到黄州公參訖率情而動蓋縁不學之愚議罪惟輕上頼好生之德伏念臣僻迂陋學庸𤨏散材頃守汝隂實名長吏不能明義以自立乃敢狥私而致哀迹渉背公事非攷古果不逃于正論猶竊逭于嚴誅尚畀散官更居善地兹蓋伏遇皇帝陛下聰明洞照博厚有容論罪必原其情用法每加之恕故令螻螘少緩雷霆臣敢不祗服上仁深思往咎禔身以敬學禮必明從多士以立朝莫諧素願問老農而學稼誓畢餘生辭免起居舎人状竊以言動之職最近清光儒學之臣以為榮選臣孤貧晩進駑散薄材擢自選人寘之太學復天禄石渠之職首預選掄紬金匱玉版之書兩領著作功能蔑有屏退所甘加以冐昧史官頗糜歲月論次故事徒事簡編何有賢勞遽叨奨擢浸階華近入侍禁嚴内循弱質之易摇實懼多言之可畏敢傾誠懇祈止誤恩免速顛隮更累樂育任起居舎人乞郡状右臣准尚書省劄子以臣乞知潁陜徐潤州一次奉聖㫖不允所乞者臣伏以君父之命當即奉承尚敢煩言罪當萬死臣秉筆史館入侍禁嚴漸階寵榮固願冐昧然親近清光而衰瘵敗其支體論次舊聞而疾苦耗其心精常懼尸官安能稱職義當自列敢避重誅伏念臣自患風痺今已五年雖粗支持而去年冬末因患瘡疹毒氣流注支節脚膝痛痺甚則屈弱乗騎拜伏動憂顛仆力加調養或可完安失今不治必成沉痼聖君在上仁愛兼容臣下得以言情卑賤亦思從欲伏乞除臣知潁陜徐潤州一次庻得少就優便専意藥物民社可以竭力俸廩足以紓貧猶冀疲駑復備鞭䇿册文皇太后諡册文維年月日孝子嗣皇帝臣某再拜稽首言曰竊惟詩人推本周文王之功德曰文王初載天作之合自古帝王之興必有聖母以助内治以施隂教表裏協濟王功以隆而能同享太平之福嗚呼非天眷命于有邦其何以臻此惟我烈考聰明睿聖緝熈五聖之遺緒興起萬世之長利惟我聖母應期挺生粤自潜邸作配宸極肅正中闈敦睦九族法度形于燕閒恩恵逮于微眇俾我烈考之德孚于朝廷丕冐海隅惟末小子㓜被撫育顧復之恩長受教誨勸導之益延入翼室用端命于上天方圖内承東朝之訓外竭四海之養而否德薄祐天降罰于我家亟奪我聖母煢煢在疚日月于邁有司稽古将節恵以易名惟小子曷足以仰窺淵懿敢祗述所知以詔後世大行皇太后徽柔肅雍恭儉慈愛實我咸平相臣丈簡之曽孫惟時文簡輔我真祖勤勞在官垂裕乃後是産淑哲與聖俱興志在女工婦道已茂正位乎内三十餘年夙夜儆戒靡有違德慈聖宣仁兩姑並尊承顔二宫孝恭烝烝元符之末國統弗嗣相臣異心大計杌隉中外震懼寒心拱手惟聖母稽謀神祗憲章典禮力授眇躬大統以定惟平日退托潛德弗耀而任大投艱克有餘裕片言析理凶狡震服所謂坤至柔而動也剛雷聲而淵黙者歟惟宗社有奉神人有依實自我聖母祗率故事恭請同政至於再三勉與聴斷蕩宥多辟滛滯昭蘓决去䝉蔽人材咸叙華夏蠻貊戴白垂髫聞風歡呼喜氣横流休功羙利申固景命亦惟我聖母而乃夙夜兢兢克自抑畏視事不臨于便坐私諱不及于外庭不敢自同先后而復逺鑒前古期以泰陵袝廟退處房闥既又慊懼亟降璽書曽未及期已復明辟友愛二弟恩䘏篤至而憂其挾貴諸外不許宫室器服無所增廢不為浮麗可喜之觀嗚呼為天下之母而躬賢哲難能之節當太平盛世而謹古今易忽之戒可謂明哲絶德鮮儷矣卜宅爰從因山既藏是用咨于卿士受命祖宗惟道大不可形以名言德厚不可盡以稱謂謹稽四諡之法畧舉衆善之端以慰臣民以示子孫謹遣攝太尉具官臣某奉玉册玉寳上尊諡曰欽聖憲肅皇后恭惟神靈在天休聞在下光于宗社表于有宋億載萬世與國無極嗚呼哀哉謹言柯山集巻三十一
