body:
  text: 柯山集卷二宋張耒撰賦超然臺賦原注蘇子瞻守密作臺于囿名以超然命諸公賦之豫在東海子瞻令貢父來命有序或有疑于超然曰古之所謂至樂者安能自名其所以然耶今夫鳥之能飛獸之能馳與夫人之耳目手足視聼動作自外而觀之者豈不足為大樂乎然鳥獸與人未嘗自以為樂也古之有道者其樂亦然又安能自名其所以然耶彼方自以為超然而樂之則是其心未免夫有纍也客應之曰吾豈以子之言非耶吾方有所較而後知超然者之賢也豫視世之賤丈夫方奔走勞役守塵壤握垢穢嗜之而不知厭而超然者方逺引絶去芥視萬物視世之所樂不動其其心則可不謂賢耶今夫世之冨人日玩其金玉而樂之是未能富也忘其所有而安之是真能富矣夫惟有之是以貴其能忘之使其無有則將何所忘耶子以為將忘超然為真超然則其初必有樂乎超然而後忘可能也子以為樂夫世之樂者乎然則子亦安知夫名超然者果非能至樂者也賦曰登髙臺之岌峩兮曠四顧而無窮環羣山于左右兮瞰大海于其東棄塵壤之喧卑兮揖天半之清風身飄颻而欲舉兮招飛鵠與翔鴻莽丘原之茫茫兮弔韓侯之武功提千乘之冨強兮慿百勝而稱雄忽千年而何有兮哀墟廟之榛蓬有物必歸于盡兮吾知此臺之何恃惟廢興之相召兮要以必毁而後止彼變化之無窮兮嗟其偶存之幾何聊徼樂于吾世兮又安知夫其他或有疑夫超然者兮豈其知道而未純曰彼天下之至樂兮又安能自名其所以然惟樂而不知所以樂兮此其所以為樂之全彼超然而獨得兮是猶存物我于其間客有復之者曰子知至樂之無名兮是未知世之所可惡世方奔走于物外兮蓋或至死而不顧眇如醯雞之舞甕兮又似乎青蠅之集汙衆皆旁視而笑兮彼獨守而不能去較此樂于超然兮謂孰賢而孰愚何善惡之足較兮固天淵之異區道不可以直至兮終冥合乎自然子又安知夫名超然者果不能造至樂之淵乎鳴蛙賦有序豫寓山陽學舍夏大雨屋四隅成塘聚蛙以千計聲鳴不絶夜為不能寐客有獻豫以殺蛙之術曰投豫藥一丸蛙無遺類矣童子將用之豫曰不可復為賦示之夏雨初至積潦過尺有蛙百千更跳互出幸此新霽夜月清溢我勞其休歸偃于室于時蛙鳴若嘯若啼若訴若歌若懼而悲若喜而語若怒而詬若噦而嘔若咽而嗽瘖者之呼吃者之鬬或急或緩或清或濁若羌絲野鼓雜亂無節兮又似夫蠻歌獠語詭怪之迭作也爾其困于泥潦失其所處而悲又若夫旱熯既久得其所處而樂也爰有童子持燭來謁曰蛙羣夜鳴君寢其聒考之周官灑灰驅蛤君其教之豫得盡殺豫語童子爾無是酷爾樂而歌而哀則哭哭則悲嗟樂有聲曲聚語羣爭引吭而呼一日之間不寧須臾蛙不汝嫌汝奚蛙誅萬物一府誰好孰惡爾奚自私已厚蛙薄參通彼已樂我自然弭爾怒心置燭而眠夜半張子援枕而吁顧謂童子記吾言歟前言未究請卒吾説物各有時夫誰敢遏爾觀夫春露初靄朝華始敷文羽清喙飛鳴自如若奏琴筝而和笙竽清耳悅心聽者為娛及夫陽春既徂炎火將極惡草蕃遮淫潦瀦積蛙于此時生養蕃息跳梁號呼意氣橫逸子如之何時不可逆時乎時乎美惡皆然當其盛時誰得而遷及其雪霜既降木實草衰飛蠅聚蚊孽無所施于是此蛙斂吻收足尫然土中一聲不出黨散巢披不可終日盛不可常興衰迭乘子姑忍之奚以殺為哉齋居賦仲夏之月隂氣始至陽既盛而初剝隂浸亨而用事水伏畏涸火燎方熾其于人也心實過炎而腎受其弊惟人之生受命在子推卦曰坎于行為水微陽所潛元氣之始故火甚烈則正氣或因而衰則水受害者君子之所深畏于是屏事燕息滌慮齋居既靜事以無刑又逺眺而髙居却紛華而弗陳與淡泊乎為徒絶嗜室欲愛精嗇神聲色不御滋味弗親沖然與和俱遊湛兮以道合真故能體強志寧愈樂夀考逺去疾癘保此難老嗚呼茍能推此以盡道攻此以察物則豈惟齋戒以御時宜其顛沛而勿失且夫氷炭相乘利害交至隕真盜和豈獨隂沴道心惟微易失難常困于侵陵有如微陽則洗心滫慮以却外垢虛中保和以全天君故能涉至變而而不濡更萬變而常存蓋將窮年以齊居豈特養生而善身乎蜘蛛賦魚遊假淵鳥棲求木而我所宅獨取諸腹巢于牆屋人不豫取朝蠅暮蚊食人所惡彼殘物以養而無益于世雖名人兮斯蟲是愧得友賦原注答子雍豫趨世之僻迂獨孑孑而無朋信所樂以直前嘗媒仇而賈憎惟物態之多艱撫危心而自驚甘默默以退藏包薄技而無成何吾迹之不常旅成周之故京眷吾逰之悠逺耿誰語兮吾情惟夫子之好修昔固聞乎德聲獨顧我而忘勤握未暖而心傾發鍵鑰而不疑奏金石之鏗鍠內端肅而粹溫外炳煥而清明嗟我鄙而子竒謂欲合而莫能援古義而見交愧此意之何勝既兩盡而莫疑亦交規而共評驅昔悶之無餘撫新樂而生矜豈目前之歡愈實未得乎平生惟清洛之名都窺園沼之清澄語寒堂之夜燭醉春圃之朝英徴逸事于古初亦窮微而造精投明珠之的厯報美璧之煌熒惟此樂之無窮使我愛日而兢兢雖所厯之萬殊願勿疾兮兹誠懷知賦嗟豫生之苦艱涉世故而多違坌羣嘲而衆侮獨孑孑其從誰嗟若人之好修外洵直而中竒挈豫手而指津謂豫車之不迷遵常度以夷行正六轡而安馳嗟終日而無禽曰固然而曷疑惟言動之合符若方圓于矩規振髙言于皇極流餘麗于竒辭沃道德以相酬心厭滿而忘飢愛日月而畏别卒悠逺而多懷跂豫望兮莫瞻將駕言其從之何出門之多艱頓我馬以嗟咨山叢叢而造天車欲進而畏摧臨江湖以浮舟蛟龍鬱其揚鬐路幽迥而莫通心鬱塞而增悲贈瓊瑶以致情恐所托之吾欺惟至技之難投或舉世而莫知倘一遇而見明蓋至樂之無儷彼取舍之迷方或骨肉而相遺茍我心之不察雖親愛而何恃故烈士之報知已或殺身而不辭豈以生而易名誠內激而忘私風蕭蕭以戒秋蟬嘒嘒而鳴悲白露圑兮夕涼庭木颯其先衰羈我馬于東周蓋三嵗其于兹老駸駸而來逼心鬱鬱而不夷顧所樂之莫從託宵寐兮庶幾酌尊酒以忘憂寫我心兮陳詩遣幽賦居孑孑以無與兮出莫知其所之獨端居以終日兮耿默默以長思古之人不可得而見兮存者滅略之遺辭顧一世之異情兮豫誰者其從之惟我生之拙迂兮嗟所慕之名竒挹亷清之遺風兮曰吾其進難而退易百驅不加于跬步兮却轡疾返而莫追踐斯言之不欺兮庶吾心之無愧日月忽其遷流兮老忽忽而既來惟所蹈之日迷兮撫前心而自非欲改故而圗新兮從靈龜而問疑兆改橫而上從兮史為豫而告辭橫為窒而善處兮上從直逹其無巇豈外拘而中泰兮或者既塞而將遂保爾守而無變兮神明于汝其遺之相利害而為術兮彼鄉人其猶耻美靈龜之告􅣟兮得我心之所止彼躚躚其焉往聊安安以自恃歲冉冉以將老兮草木颯其變衰玄蟬號乎髙桞兮溢菡蓞于清池宵蟲悲鳴以相語兮朔雨振迅而南窺嗟吾客于東周兮周天星之三移寫我憂以命駕兮慿髙明以逺視覽平田以茫泱兮瞰清洛之東駛山重復而南積兮萬嶺矗矗以鱗次微雲霮䨴以忽布兮孤翼滅沒而髙逝熊耳髙髙而西峙兮女几奮湧而南危束平川于兩間兮散佃漁于平地雞犬密其相聞兮溝塍布而如棊牛羊間以就牧兮烏鳥號呼以羣嬉登故國之餘墟兮望遺宫之頽基傷者來世而無窮兮樂者昔人其既止惟逹觀其超忽兮等廢興于一視考物變以自樂兮遺餘情于酒醴大人無即而非樂兮淺夫係物以自治彼方窘我以局促兮我則顧步而廣肆制憂樂于在彼兮夫何貴乎明智忘吾憂以洋洋兮將以語夫君子哀伯牙賦伯牙鼓琴後世無知我哀伯牙似智而愚天地之間四方萬里知爾琴者一人而已鍾子既死其一又亡欲彈無聽泣涕浪浪已奏已聞欲語不可逼塞滿懷無所傾寫抑揚黃華巷歌里曲入邑娛邑入國悅國回視伯牙靣有矜色夫操至伎者必不和衆人之耳而媚衆耳者又善工之深恥違衆者常孑孑其無與而冒恥者乃身安而獲利則亦安知夫至藝之非禍而庸工之非祉也嗟夫將為至巧者必無顧于終身之無與則至巧之于人不祥之上器操不祥之器終身而不知則伯牙者乃後世之深戒石菖蒲賦有序歲十月氷霜大寒吾庭之植物無不悴者爰有瓦缶貯水斗許間以小石有草鬱然俯窺其根與石相結絡其生意暢遂顔色茂好若夏雨解籜之竹春田時澤之苖問其名曰是為石菖蒲也考諸本草則所謂養性上藥仙聖之已試者也因賦之云歲寒風霜水落石潔大木百圍僵仆摧折有草于此寸根九節曽是莫傷菶然茂悅若處廣深隱奧密而不知户牖之外平地尺雪也將糜而餌之私其益于我躬則不幾于奪也曷若致之吾前儀之以自修兮庶乎比德之琚玦也病暑賦皇昌運之元祀兮豫出守乎清潁之區背國門而南騖兮弭楫乎太昊之墟方炎夏之隆赫兮閔時澤之不濡魃乘時而行虐兮盜威烈乎暘烏駕畢方而驂熒惑兮回祿為其前驅燼所及于一燎兮何有瓦石與璠璵豐隆致其微隂兮飛亷蕩覆而無餘野曈曈而揚塵兮何蕭艾之芬敷應龍矯首于下澤兮僅自免于稿枯烏呀咮而忘飛兮獸逃穴而深居嗟人胡獨不能兮無乃欲息而被驅昔蘄山之秋筠兮因氷卷而玉舒效功能于么麼兮曽何足以寧吾軀飽風而為蜩兮又欲泳水而為魚出寒泉于深井兮竭筋力于轆轤不計腹之所受兮尚問山藭麴麥之有無亂曰隂陽循環靡窮極兮時至而變有常則兮融液金鐵爍山石兮謹視其報在朔易兮玄隂大冬氷雪積兮無畏其機備其極兮補完裘褐戒紡績兮保我歲寒以終吉兮喜晴賦積雨初止萬境聲乾星漢昭回夜客尚寒晨起載欣朝暉在門起往從之清明肅然蚓安其穴蝸不遺涎還開通于滯濕失沮洳之墊昏列缺弭鞭豐隆偃麾羲和緩轡而安行背扶桑而經天街顧大田之多荒乃愀然而興哀聊雷霆之一嬉遽下土而罹災詔龍螭使伏蟠息憤怒之喧隤曰豫悔禍于斯人勞苦雨師以一杯惠我農師豈不休哉南山賦原注寄張嘉甫南山巖巖兮其下有人佩玉而握珠刻意魯叟之古經不習世儒之臆書我頃見之于宛丘貌秀晢而眉疏别去忽兮幾時靣蒼瘠而垂鬚愛德器之老成資巧琢于璠璵問所與之為誰亦黃稿之仙癯禁八馬之超騖同芻豆于羣駑時慷慨而長鳴恥賤工之附輿我行世之多艱三年困兮江湖幸天恩之放還過都梁兮躊躇奉兩月之周旋越長淮之馳驅屢飲我于山間出翩躚之兩姝舟師告豫以當行具檣楫于斯須歲方春而寒驕犯氷雪于野墟雲漫漫兮垂天風飄飄兮切膚稚牟翳于宿莽妍桞秀于羣枯泛羽觴之清冷聊覽物以為娛思佳人兮天未望莫見兮愁豫秋風賦張子夕坐於堂之南軒有風颯然來自西方感乎人心異於尋常初披偃乎草木亦泛動乎軒忩張子曰是風也所以成歲而佐陽者乎時也朱火就謝七月始涼既導迎于肅殺又介紹于雪霜其中人也萬竅灑然汗澤為乾纎絺魯縞不勝其單其加物也未敗其形先傷其情未隕其生先奪其英使之嗒然萎者見于顔色黎然稿者動于聲鳴吾嘗中夜而聼之浙瀝颼飅羣動百蟲怨泣悲吟感人忡忡者秋之聲且起而望之清明髙潔者秋之容于是庶草效實九榖獻功既獮于野又嘗于宗感天時之不留念歲律之將窮張子曰吾何為乎戒裘褐以備嚴冬而已南征賦原注贈張嘉甫豫文窮而莫諱兮顧四方其何適毋寧征于江右兮毛土膏其可食抱朝暮之勝氣兮西山吾以為宅風豫帆于晝日兮豫朝發于赤壁摽玉壘之下流兮逝蓬飛于一息迅沮漳而橫入兮滙揚瀾于左蠡嬣吾目而無恨兮濤猛獸以噬獰霽光風于木末兮俟餘波猶未肯平迷失道而問津兮案此下脫三字御于朱明就漁父而陳詞兮豫非湘纍之獨醒父告豫以不治兮南樵舍而自成破隴畝而溢流兮石險狠而當道豈舟人之肅洽兮艇觸撥而欲倒繫豫車于桑本兮豫猶可以徒行夷豫竈使不得炊兮豫猶可以乞鄰曰厚土之瀰漫兮豫騷騷無以為家雖斯人之可懷兮鳥猶長鳴以歎嗟廣蒲田之所播植兮歲有秋而登場既狼戾而竭鄰兮已獨賦乎廩倉饌上方之玉盤兮上曰飽斯人之德歲協洽而蘄兮味柔嘉豫未得食染豫指于鼎兮豈不同此臭味使持節于十郡兮民樂得此父母顧豫懷之倉卒兮謂一寒之何故雖解衣推食兮曰此小惠汝弗德我我九世之良醫兮藥神膏而可以破汝腸賦九言而九頓首兮度百世而足用閲一世之風波兮曰餘皇吾以為歸宿碧雲賦蹇臨髙而延矚悵天邊之碧雲𬗟不知豫何思情坌至兮繽紛懷幽蘭之令姿方揚靈乎上春顧來者之非其人使暴露乎埃塵我有旨酒與子殷勤終濶莫致實勞我神白日西馳去故就新發采舒光念當及晨三酌賦出公門而偃私酌旨酒于良辰緬再酌而三釂恍如對乎佳賓畏局促之傷懷聊流暢乎心神懲荒湎乎無算悠然合乎禮文蕩志文史晤言詩書世醉不足我醒有餘頤妙物表韜精道樞冥會獨應誰知我娛人日飲酒賦嵗後七日其名曰人愛此嘉名酌酒歡欣豈木行之始和生庶彚而施仁又曰人者三才之中將中和之肇布易嚴殺之餘冬也乃命婦子班坐行觴酌已相祝夀考無疆有否必泰無窮不通請觀庭下之枯折霜霰消而敷榮羽蟲感陽而羣嬉况乎雲間之飛鴻于是三酌既醉喜有所得安局促而不歎悟倚伏之無極吳故城賦亂吾舟兮大江夕余濟兮樊口登武昌之故墟弔西門之衰桞出東郊而南眺訪遺城之培塿嗟頽墻之迤靡半己平乎耕耨雜溪澗而沮洳稻冉冉而將秀曰是吳王之故宫兮昔孫仲謀之所有當弊漢之委地羣凶聚而啄剖偉紫髯之永圖獨穴據乎江右豈無意于雍洛易虛夸為善守觀其作都于武昌夫何險陋而即安是為大江之上流兮于備敵焉不繁顧諸將之凡才豈袁曹之敢班欲身當中原之一靣兮事便時利一葦濟乎濤瀾當是之時兩觀萬雉縹闕應門內擁燕趙之美外屯貔貅之軍笙磬鐘鼓之喧闐旗斾車馬之繽紛固已包蒙川澤震耀山原安知夫千載之後陵谷易位夫何遺珠與棄玉顧此遺墟之將圯于是與客休于祠宫披樵蘇之微路嗟牛羊之入室固牲酒之不具與客愀然三歎而去豫近讀曹植諸小賦雖不能縝密工緻悅可人意而文氣疏俊風致髙逺有漢賦餘韻是可矜尚也因擬之云柯山集卷二
