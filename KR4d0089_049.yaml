body:
  text: 柯山集卷四十九宋張耒撰墓志銘龎安常墓志銘吾嘗謂醫之在天下其資民生之用蓋與榖帛等竊怪世之工其道者何少也自三代以來至今以醫名世者多矣其為論説方術大備矣又嘗怪夫世之醫者皆忽而不學大扺從里閭俗師其治病苟不殺人衆已指為良醫矣使孝子慈孫不能無恨於疾苦之際者以此也可不悲哉豫少多病世之醫往往與之遊率按前人成説而用之未有心得而能原其所以説者也蓋醫之為道推本天地陰陽經紀寒暑日星考驗國土山川而人身外則骨節脈絡腧穴內則臟腑焦鬲井谷其出入會通之變甚多且微非夫致至精之察不惑之知不足以盡之而世醫不以術易衣食者鮮矣何暇及此哉宜工之者寡而古學之廢也意必有聰明微妙之君子憫茲學之不振悼生人之疾癘獨治其道修其術而莫或知之者焉紹聖丁丑豫得罪謫官齊安而得蘄水龎君焉其于醫殆所謂聰明微妙者也君諱安時字安常蘄州蘄水人其在孕時頗有異及兒時讀書雋頴絶人一經目輒終身不忘鄉黨奇之其父諱之慶號高醫年老且病君問醫于父父授以脈訣君曰是不足為也獨取黃帝扁鵲之脈書治之未久已能通其説時出新意辨詰不可屈父大驚君時未冠也已而病聾君曰天使我隱于醫歟乃益讀靈樞太素甲乙諸祕書凡經傳百家之涉其道者靡不貫通時時為人治病有奇功率十愈八九而君性愷悌明豁好施而亷于是有輿疾自千里踵門求治者君為闢第舍居之親視饘粥藥物既愈而後遣之如是常數十百人不絶也其不可為者必實告之亦不復為治活人無數病家持金帛來謝不盡取也戊寅之春豫見君于蘄水山中深衣幅巾延客坐堂上視其貌偉然聽其議博而不繁妙而易曉告豫曰世所謂醫書豫皆見之惟扁鵲之言深矣蓋所謂難經者也扁鵲寓術于其書而言之不詳意者使後人自求之歟豫之術蓋出于此以之視淺深決死生若合符節且察脈之要莫急于人迎寸口是二脈隂陽相應如兩引繩隂陽均則繩之大小等凡平人之脈人迎大于春夏寸口大于秋冬何謂人迎喉旁取之內經所謂别于陽者也越人不盡取諸穴之脈但取手太隂之行度魚際後一寸九分以配隂陽之數而得關格之脈然不先求候手引繩之義則脈尺寸隂陽關格之所起寸四陪于尺則上魚際而為溢故言溢者寸倍尺極矣溢之美一名外關一名內格一名隂乘之脈曰外關者自關以上外脈也隂拒陽而出故曰外格隂生于寸動于尺今自關以上溢于魚際而關以後伏行是為隂壯乘陽而陽竭陽竭則死脈有是者死矣此所謂寸四倍于人迎為關隂之脈者也關以後脈當取一寸而沈過者謂尺中倍于寸口至三倍則八寸而為覆故言覆者尺倍寸極矣覆之脈一名曰內關一名曰外格一名曰陽乘之脈曰內關者自關以下內脈也外格者陽拒隂而內入也陽生于尺動于寸今自關以下覆入赤澤而關以前脈伏行則為陽亢乘隂而隂竭隂竭亦死脈有是者死矣此所謂人迎四倍于寸口為格陽之脈者也經曰人迎與寸口皆盛過四倍則為關格關格之脈羸不能極天地之精氣而死所謂關格者覆溢是也雖然獨覆獨溢則補瀉以生之尺部一盛瀉足少陽補足厥隂二盛瀉足太隂補足少隂三盛瀉足明陽補足太隂皆一瀉而一補之四盛則三陽極導之以針當盡取少陽大陽陽明之穴脈靜者取三陽于足脈數者取于手瀉陽二當補于隂一至寸而反之脈有九候者寓浮中沉于寸關尺也且越人不取十二經諸穴直以二經配合于手太隂行度自尺至寸一寸九分之位復分三部部中有浮中沉以配天地人也又曰中風木傷寒金濕水熱火溫病起于濕濕則土病土病而諸臟受害其本生于金木水火四臟之變也陽浮隂虛為風溫陽數隂實為溫毒陽濡隂急為濕溫隂陽俱盛為溫瘧其治之也風溫取足厥隂木手少隂火溫毒敷取少陽火傷寒取足太隂金手少隂火溫濕取足少隂水鄉人皆謂我能與傷寒語我察傷寒與四溫之變辨其疑似而不可亂也故定隂陽于喉手配覆溢于尺寸寓九候于浮沉分四溫于傷寒此皆扁鵲略開其端而豫參以內經諸書考究而得其説審而用之順而治之病不得逃焉君為豫言者尚多獨著其大者又曰豫欲以其説告後世故著難經解數萬言觀草木之性與五臟之宜秩其職位官其寒熱班其奇偶以療百疾著主對集一卷古今異宜方術脫遺備傷寒之變補仲景傷寒論藥有後出古所未知今不能辨嘗試有功不可遺也作本草補遺一卷吁其備矣豫問以華陀之事君曰術若是非人所能為也其史之妄乎某嘗病風掉數年餘苦未盡瘳君切脈曰臟病傳所勝君之疾肝傳于脾脾氣欲轉運而肝制之也去木邪行土氣而後愈因授豫以方少焉疾有間又曰一方不可瘳當增損之以應疾時時致方與藥之難得者察君于豫盡心焉見君之嵗是冬而有痼疾作明年春而劇門人請自視脈君笑曰豫察之審矣且出入息亦脈也豫胃氣以絶死矣因盡屏藥餌忽焉韻語數句授其壻魏淵蓋超然達者語也後數日與客坐語而卒年五十八時二月初六也君性喜讀書聞人有異書購之若飢渴書工日夜傳録君寒暑疾病未嘗置卷其藏書至萬餘卷然皆以考醫方之事晚好佛學蓋有得焉以是年閏九月二十七日葬于蘄水龍門鄉佛圖村君曾祖諱慥祖諱震及父皆不仕娶陳氏生二男子曰瓘曰琪皆篤孝修飾二孫曰仲容叔達三女已嫁魏淵郭迪陳翔其壻也各舉進士君臨終以書遺豫若託以銘其墓者嗟夫豫名微位卑又方得罪于時何足以為君重然君嘗有德于豫且其孫必以見囑不得辭也既銘其藏又著所嘗治而愈人所傳道者更刻于碑隂且以為法銘曰生民之病堯舜是醫惟周與孔世之良師遘癘于身扁鵲善治惟民與身同一矩規猗歟龎君有見于兹獨顯以方用不大施孰疾于衷孰毒于肢有來求豫徑取無遺飲酒著書終身遨嬉欲知其仁弔者埀洟即化而安不爽厥知有考其書銘以昭之歐陽伯和墓志銘君歐陽氏諱發字伯和廬陵人太子少師文忠公諱修之長子也為人純實不欺內外如一淡薄無嗜好而篤志好禮刻苦于學安定胡瑗掌太學號大儒以法度檢束士其徒少能從之是時文忠公已貴君年十有五師事瑗恂恂惟謹又盡能傳授古樂鍾律之説既長益學問不治科舉文詞獨探古始立論議自書契以來至今君臣世系制度文物旁至天文地理無所不學其學不務為抄掠應目前必刮剖根本見終始論次使族分部列放之必得得之必可用也嗚呼其志亦大矣然其與人不苟合論事是是非非遇權貴不少屈下要必申其意用是亦不肯輕試其所有而人亦罕能知君者而君之死也今眉山蘇公子瞻哭之以為君得文忠之學漢伯喈晉茂先之徒也初以文忠公恩補將作監主簿三遷為大理寺丞賜進士出身勾當箔埸遷光祿寺丞賜五品服勾當京西排岸司又遷殿中丞官制改為奉議郎監粳米中第七界俄權少府監丞遷承議郎某年月日卒享年四十有六積勳至輕車都尉君為殿中丞時曹太后崩詔定皇曾孫服制禮官陳公襄疑未決方赴臨名君問其制君從容為言事在杜佑通典甚詳襄即奏用之是時方下司天監討論古占書是否同異折中為天文書久未就而襄方總監事即薦君刋修君為推考是非取舍比次書成詔藏太史局襄因奏言舊渾儀壞不可用而後所造新儀考之又不合願付君詳定詔從之本朝自至道中用韓顯符渾儀其後司天官周琮于淵加黃道熙寧中舊器壞詔沈公括更造括以其意增損之器成數年未能定與浮漏景表不應君較三家考古注又自因事立制先為定儀奏之神宗召君問曰浮漏以玉筒下水者當堅久也君對曰玉不如銅沈括長用玉今下水比初加速矣上以為然遂以君法鑄新儀漏表集其説號法要其後有附括議者訟于朝詔再定卒行君説訟者亦服焉君治官無大小不苟簡所創立後人不能更其著書有古今系譜圖國朝二府年表年號録其未成者尚數十篇夫人吳氏故丞相正憲公充之女封夀安縣君男一人曰憲滑州韋城縣主簿女七人其四人皆蚤卒一嫁權武安軍節度判官蘇京次嫁承務郎王景文亦卒次尚幼孫一人延世曾祖諱某贈金紫光祿大夫太師中書令兼尚書令曾祖妣李氏封吳國太夫人祖諱某贈金紫光祿大夫太師中書令兼尚書令追封鄭國公祖妣鄭氏封韓國太夫人初文忠公以觀文殿學士太子少師致仕纍贈太師追封兖國公妣薛氏纍封安康郡太夫人元祐四年十二月甲子葬君鄭州新鄭縣旌賢鄉劉村文忠公之兆而憲來求銘銘曰嗚呼伯和父學不欺其志而不以為利非不售之畏而不知之愧豈與世為懟其將有所恥云誰之似惟文忠之子商屯田墓志銘公諱瑶字某淄川人曾祖重進祖文俊皆不仕父餘政贈大理寺丞君登景祐元年進士第為萊蕪單父縣尉臨沂縣令知下邳縣簽書平定軍判官事以尚書屯田員外郎知襄邑縣卒年五十至和二年正月二十七日也階至承事郎勳為騎都尉君少博學為文詞豪健貌魁傑嚴整不可犯而平居樂易長者也單父多盜君以䇿鉤獵梟絞且盡盜怨毒入骨罷官還鄉次大澤中夕有叟密來語曰林中有惡少年十數操利兵而伏期今日必殺單父尉是君非耶君從者懼欲亡去公執弓矢徐出有大木去百步許望之中有空馬公謂其人曰我為若射彼空者再發皆中之林中惡少年大懼爭先遁其治下邳決訟多辨諭勸説之不盡臨以法民始鬬怒中忽喜悟相與請平者常十七八老猾吏旁瞪視不得刺手父老戒子弟曰若忍犯此令乎富韓公守青州聞其治狀數委公決難事始君為包孝肅公知韓忠獻公器公見必訪以世務而公無所苟合貴人終不肯出氣力引挈之其胸中不少槩見而死矣先妻劉夫人繼室王夫人封壽昌縣君三男子皆已卒一孫求之舉進士女二人曾孫一人尚幼公之從子太學博士倚以元佑八年十月日將葬公淄川萬年之源以二夫人祔而博士又以公之爵里行事告于著作郎張某曰子史官也凡世有善而無傳則子有罪某不敢辭乃為詩使刻石墓中曰天下平治士無功名才否一區之死無聲或宏其聲而中乃枵窽實靡計孰昧孰昭有淄商公甚畜不施時棄其苴則已光輝彼不人逢位下固宜嗇不使年造物則奚劉承制墓志銘君劉氏諱充字安道開封人娶宗室女補右班殿直四遷為內殿崇班騎都尉致仕今上即位以恩遷內殿承制年五十元祐二年二月某日以疾卒嘗監許田太康二縣酒稅用舉者監真州船埸待制李肅之守慶州辟公隨行又勾當安肅軍𣙜埸用舉為霸州船魚巡檢徐州兵馬都監其在霸州卒有謀叛者發有日一州無知者君獨以察得密白守驗實斬之微君幾擾間罷官居京師官府有煩使時時猶奏遣君至輒辦用此能自達于名卿大官故其居官多薦之者其為人勤敏當官不避事頗知書矜持自喜有足賢者也曾祖某某官贈某官祖某某官贈某官考某某官贈某官夫人鄧州觀察使從贄女二子俟左班殿直傑舉進士葬開封府某縣某鄉之原實某年月日銘曰佐則有稱既憊而休不瑕孔修以息兹邱吳大夫墓志銘公吳氏諱某字德仁龍圖閣學士贈太尉諱遵路之子也太尉為時名臣公少以父任補太廟齋郎年四十六以虞部員外郎知郴州罷官歸京師即上書請致仕方是時上自執政大臣下至搢紳士大夫凡知公者相與出力挽留之不聼蓋始聞而驚已而皆歎服以為不可及相率賦詩飲餞于都門公既謝仕歸蘄春有薄田僅給伏臘公臨溪築室種花釀酒家事付子弟一不問賔客有至者不問賢愚貴賤與之飲酒必盡醉公或醉卧花間客去亦不問也客有臧否人物公不酬一語促左右行酒客不得卒語人皆愛其樂易而敬其高凡見公者皆欣然忘其鄙吝也嘗有貴客過公而飲公酒酣而歌以樂器扣其頭為節客亦不以為忤其放誕乃如是平生視財物如糞土未皆與人較多寡太尉薨時其妹壻輒以家錢數百千貸人其人不能償公哀之曰是人有母聞之將重其憂乃召其人諭之焚其券嘗有客為公治田事二十年謝去見公欲計之公取前後文書示之乃未嘗發封盜夜入其家公覺之不問且取其被公顧謂盜曰室中惟所欲大寒幸舍吾被凡見公外者徒知其真率曠逹至究觀古今治亂成敗人物之賢愚臧否其中了然甚察也其積官自太廟齋郎至朝奉大夫勳至護軍賜至三品服厯官自監西京竹木務簽書淮南判官廳事事監真州𣙜貨物通判池州黃州乃知郴州其治官止于忠信仁厚故所在有稱哲宗朝有薦公者詔落致仕赴闕而公堅卧不起卒年八十四崇寧三年四月十七日也初公感疾即閉閣謝藥物至屬纊不亂或言公少遇異人服其藥故夀而康寧亦其潛德美行不究其位故享其報如此公娶張氏繼李氏封德清縣君三男子曰禧早卒曰升曰奕皆舉進士四女徐暨張之儀徐閭胥彥博其壻也是嵗七月某日葬公蘄春縣永福鄉新安里芙蓉山以李夫人祔焉曾祖諱文大理司直祖諱敘尚書職方員外郎祕閣校理贈尚書右丞升匍匐乞銘于譙郡張某某熟公之名迹且愛慕之無窮則銘之也實宜銘曰吳公出延陵以國為氏而始居京師者自司直君老于蘄今其子孫遂家蘄春嗚呼德仁夢幻斯世蘧廬其身寓百年于一醉兮不以萬物易吾之真人何足以知之抱所有以滅泯殆古所謂得道逍遙御風騎氣之人歟柯山集卷四十九
