body:
  text: 柯山集巻五十宋張耒撰墓誌銘李參軍墓誌銘公諱處道字深之吾先君子之友也自言系出唐太宗皇帝五代時有諱澄者嘗為梁使閩遂居晉福之連江故今為福唐人公性剛特耿介不羣少孤貧自力學問記覽淹博工于文辭某少時猶及見其賦篇其文贍麗雄放屬比精切一時望士皆慕與之遊名聲絶軰行矣五舉于鄉中治平四年進士第初調陳州南頓尉更成州同谷處州縉雲泉州徳化令建州浦城丞南䧺州始興令最後為興國軍録事參軍以卒令同谷時公與轉運使厚善知州孫京不法欲因公自託公不可京怒所以捃公萬方卒無所得然猶以公坐免縉雲有女子徐自號菩薩家有井詭言能治病趙淸獻守杭亦信之嘗求其水由此羣無頼為倡議聲動數州所居成市公怒捕徐杖之塞其井初清獻聞之大驚無幾何徐氏生子遂皆服福建轉運使賈青繫福州衙前數軰劾其盗督以贜必欲論死獄成不引伏公令徳化以獄屬公公緩其獄竟靑去部卒出之始公知其寃欲直之既而思曰直之青怒必以獄他付誰不畏青者則此數人無類矣姑緩之而覬其去卒如公計焉浦城民有自稱徐偃王之神頗動衆公捕械繫之民初不懼猶陳説鬼怪一邑惑之公以寘于法始興嶺外小邑前令多以富歸公罷無南中一物束書而還始興人至今道之其在興國公已老且倦遊矣猶力治曹事無所苟數年反重囚得免死者甚衆罷官而子援為鄂州武昌尉迎養公于官卒年七十五公性純孝信厚不逮事其親每忌日則涕泣感慕戚見于色撫兄弟之孤過巳子平居雖與僕妾語必誠必信既老且病猶不廢書時時與賔客飲酒賦酒其詩句甚工然多悲壯感慨聞者哀之有文集十巻藏于家先娶林氏繼室龔氏先二年卒三男子據抗援據蚤卒抗援皆有文行援舉進士中第矣三女嫁趙僎何頡陳任五孫其二男也以某年某月某日𦵏公武昌樊山之原舉二夫人祔焉曾祖郁故贈虞部員外郎祖汾故贈工部員外郎父餘慶故贈屯田郎中始公與其兄載之皆友某之先人相好也某嘗從公于姑蘓之學官故公之子姪往往獲交焉諸孤以銘屬我宜也銘曰堯理之後氏李子唐宗赫赫自成紀惟澄胄出貞觀帝使閩不歸連江沚猗歟深之文有斐内懐剛方志孔偉六遷州縣臨輙靡力抗豺虎傲爪齒讞疑伸枉脱垂死械神鞭佛破訛詭彼民于我父母視我有甚富見無幾豈其愛之莫吾以樊山之藏非其里後望武昌自公始王夫人墓誌銘夫人王氏曾祖沔事太宗真宗為執政號名臣祖睦尚書司勲員外郎父乙尚書庫部員外郎庫部主簿于咸平時夫人年十六丞相晏元憲聞其賢為子虞部君娶之夫人家中微起嬪相門能以禮自持接上下有則堂無姑夫人宰家事内外無不允者元憲嘗曰吾無憂矣夫人寛裕而好禮簡儉而樂施夫族有負市易錢百萬者夫人為出所有償之次子方提孩其伯父以為已子奏得官後伯父失官子未官夫人曰吾子可教取補牒還之以虞部斤朝封春安縣君又以長子恩改封崇徳縣太君而元憲薨時仁宗臨奠面賜冠帔生三子長某朝散郎次藻先夫人卒季銍左班殿直監黄州酒税樂善好學敏于為吏職從予遊甚善也方夫人疾革銍嘗封股肉以進三女長嫁某次嫁某孫男十一王氏舊為霸州文安人自司勲始居開封之咸平今為咸平人以某年某月𦵏潁昌陽翟舊學鄉合于虞部之墓銍求銘于予銘曰隱而聞于顯微而立于貴吾何為哉終始吾義有子而孝歸從其良儀爾山川徳音不忘福昌縣君杜氏墓誌銘某先君之執友曰長沙李公諱竦與先君生同年其應舉得官遊宦四方禍福淹速多相似也某為兒童時兩侍先君遇公于京師其出入逰處必相與偕其議論談笑率常自旦至夕繼之以夜其僕役至憊言不能支而兩公未嘗倦某時竊聴之則其是非好惡十嘗同八九已而别去則兩家之書問必以時至葢李公之與人其傾倒笑言若無不可而于節義廉恥之際其彊禦甚嚴且固也先公前公且十年殁而公晩稍被任使屢使諸部卒以無所附離不大振顯也元符二年某得罪謫官黄州而李公之子廷老寓書状以其母杜夫人之行來求銘其墓葢後公之卒又十餘年矣嗚呼先君同時之人盡矣昔之兒曹皆已班白矣而某又得罪聖世幽憂無聊不得齒于平人其閲人之盛衰存亾未嘗不動心悲懐不能自已其尚忍聞其不幸而銘其墓哉雖然不可已也姑次序其状夫人洪州人天章閣待制諱杞之女天章在仁宗時號有風力名臣夫人生貴家自㓜嚴飭好禮不妄笑語天章公為擇對乆之廼以歸李公而姑朱夫人老且病又素剛人少能中其意而夫人在旁輙歡公之弟妹未婚姻者夫人出所有為成之無所愛也李公素貧不治生事夫人為均節其有無以濟由此李公之仕宦得以直已行義而不累于私以李公登朝恩封某縣君既寡居乃歸心于佛奉其教讀其書若有得焉紹聖五年十二月二十八日終于道州司法參軍楚老之官舍年七十曾祖某某官祖某某官二男子長廷老衡州衡陽令次楚老四女嫁太博學士虞蕢福建轉運判官檀宗臣大理正張近衡陽縣令關沅孫男女十有六以元符二年十月合𦵏夫人于荆門軍長林縣白陽鄉李公之墓銘曰惟婦之徳順以荘既荘而和順以方夫人蹈此有耿光而享不豊後其昌李夫人墓誌銘故大理寺丞王君諱毖之夫人李氏真定人也司空贈尚書令韓國公諡文正諱昉之曾孫金部員外郎贈禮部尚書諱宗諒之孫工部郎中天章閣待制贈太尉諱邁昭之子也夫人年十有八歸大理君性純孝敏静其事舅姑能先意集事飲食衣服非經其手不以薦而舅姑亦曰非新婦之所為吾食不甘服不安也宗黨相教以為法夫人之舅與其從弟同時拜天章閣待制從弟家治黄金帶為燕服夫人顧舅家貧不可得悉其匳中物易金作帶藏之待制出守陜州盛服燕客夫人出帶使大理君獻之而家人初不知與其夫處如賔客骨肉有不至必面規切之退則更譽其善故聞者信而不怨大理君通判䕫州卒于官一男始生夫人獨䕶其喪還京師道峽中舟敗舟人捨舟而逃夫人正色叱之命取柩挈兒以免然家無長男子道逺從者慢夫人輙能言之官府鞭罰之以寡婦行艱危數千里無敗事而内外始知其才非獨辦婦人常職而已也既寡居杜門雖父母家有時留之宿不可曰吾非間吾親顧年少子㓜理可畏也子長躬教篤之慈而不驕于以有立今丞相范公之配英國夫人大理君之妹也英國㓜時得危疾久未平夫人晝夜調䕶有恩意英國嵗時躬省勞之良厚以相府恩錫夫人命服元祐四年夫人年七十矣得疾不肯御藥物家人固勸之夫人曰吾無不足者又獲託死于英國求生何待也左右趣為我沐浴更衣遂卒五月二十四日也一男曰約宣徳郎四女長嫁隰州録事參軍劉損次嫁奉議郎權通判火山軍葛繁次蚤卒次嫁殿中丞鍾離景圭前卒是嵗六月七日合𦵏夫人于開封府開封縣大邊村之原大理君之墓譙郡張某曰嘗讀太史公書見其為滑稽日者作傳而不著烈女孔子叙詩首關雎著后妃之徳夫女徳王化之本也豈小補哉顧隠没不稱而賢賤士末術于勸善未至也惟夫人之徳之才其于死生之際葢知之矣此士大夫之所難而可以無傳乎于其𦵏也而銘之曰有夭其葉既葉既實既囏既佚而以始卒諏良窽言殯夫子穴是謂大畢張夫人墓誌銘中散楊公諱希元夫人張氏亳州譙縣人贈禮部尚書諱成之曾孫禮部侍郎諱傳之孫贈太常博士諱彭之女也夫人秀美恵和治女工精工絶人内外宗族無與比蚤孤母燕夫人篤愛之曰有男子如吾女者乃以歸之媒妁日走門燕夫人輙揮之曰吾女非若軰偶時中散公與夫人之叔為寮來請㛰燕夫人素聞中散公賢又竊奇其状貌為有福禄者曰是足以當吾女矣遂歸中散公夫人既歸楊氏其宗族敬愛之如一夫人仁愛慈淑出自天性柔聲怡色無絲毫忤人意其于妬忌生不知有也年尚少能淡世慮齋戒奉浮屠不治婦女玩好年三十六嵗感疾少間召其家人婢妾環坐酌酒飲之勸撫之如他時皆喜曰吾夫人疾且起俄而正衣起坐家人驚問之已卒矣後二十七年當元祐三年而中散公卒諸孤迎夫人柩于京師是嵗九月丁夘合𦵏鄭州管城縣懐恩鄉神崧里先塋之次始以中散公登朝恩封夀昌縣君追封清河郡君子四人彥真彦齡皆宣徳郎彦臣慈州吉鄉縣令彦章絳州太平縣尉五女長嫁左班殿直李祐次嫁左藏副使曹譜次嫁朝奉郎程復次嫁大名府魏縣主簿王需次嫁河南府登封縣尉李昂孫八人長逵次邁皆太廟齋郎餘尚㓜夫人于某為從姑故諸孤屬之銘銘曰擇所宜從初艱其歸既逢其良身先之萎匪謀不臧天實戾之於穆夫人令徳婉娩物皆怛終獨裕其返惟昔弱子衣冠頎頎逾二十年以喪而歸鮮原靡靡從于君子有蕃其承視此松梓王仲儒墓誌銘河南王雯者齒少篤于自修好學而能文予聞之而未見也紹聖四年予以罪戻謫官齊安一日有客墨衰造門視其謁雯也見予則泣而言曰先君與子舊矣雯不幸既孤將𦵏而無詞以刻先君之墓敢以是屬諸子某曰予嘗見朝奉君于京師其深者某之陋所不敢知而其粗與夫衆所譽者竊聞之矣不曰篤躬好學而廉儉者歟敏于為吏愛民狥公直巳不撓于權者歟然其人厚于實而薄于名豐内而亷外世之君子未必知之予嘗辱聞焉則屬銘于我固宜謹取其爵里行事叙之曰君曽祖諱恪西頭供奉官祖諱淮越州諸暨主簿贈太常博士考諱起尚書屯田員外郎秘閣校理贈左中大夫君初補太廟齋郎調陜府湖城縣尉又為澠池安邑二縣主簿河中府猗氏縣令改宣徳郎監解州鹽池兼知縣覃恩遷通直郎賜五品服知孟州温縣遷奉議郎加武騎尉管勾京北排岸司遷承議郎加雲騎尉監京米倉遷朝奉郎知徳州加飛騎尉紹聖三年五月二十六日卒于官享年五十以某月某日雯奉君之喪𦵏于河南府某縣某鄉某原以夫人楊氏李氏祔焉銘曰君諱仲儒時中其字世河南人河清其里以蔭筮仕湖城是尉湖廢官罷留君一嵗實惟相絳從湖民志其在安邑涌水于野邑人走祠君鞭而罷後令猗氏有愛其民既去十年見之如親實其耆老以謂子孫民居侵逵使者議毁君舒其苛一道是頼安邑賈鹽民富悍豪君教之學奬禮其髦孝秀聿興鄙悖滋消西民餫師履產輸泉君力弛之鰥寡用安令温治盗曰姑安之勿浚其姦吏逸民嬉盗悔而耕厥壌大滋邑豪坐獄重賄而逸君以奇購唾手則獲君之去温其民涕留耆老百千聲言于朝惟河内温邑聫部異河内有請假君决事後守徳州河溢而騖羈民流殍所活萬數伍長悍驕其将笞之長以衆逃斥将之疵君謂長叛立寘于罪貸將不問境為無事一時持權争欲用君勉之比周君為不聞云何不淑五十而僨君凡三娶皆有婦道粤初氏楊其父曰慥繼李父周學士集賢今夫人陳姻黨稱焉劉時張又楊克中壻其三子惟徳之同君三男子惟雯在耳進士登科甚飭而藝陶牙之原鬰乎松楸乘者下之君子之丘呉天常墓誌銘公諱天常字希全河南府洛陽人惟呉氏之先與周同姓至越入呉子孫散居四方以國為氏公自祖考始占籍河南之洛陽公少貧不治生產以氣節自許力學問河南大府號多士而公自少已知名里中而舅建寧軍節度使王正倫深器之以正倫死事恩為郊社齋郎調濮陽縣主簿又調舒州司法參軍郡大猾章氏數犯法繫獄其勢能得于有司公論正其罪流之一郡畏伏遷泗州盱眙縣令守笞病人死公當覆驗而前驗官言死者不病公將直之守以利㗖公欲得如前驗公謝守曰我受公恩固善如死者恨何卒直之守為得罪知洪州奉新縣奉新號難治訟者或先以釘貫其足以脅有司公畫巨釘于市令之曰釘必如此則受訟乃稍變俗知彭州永昌縣轉運使范公純仁深知公是時方變差科為免役錢公原究蜀役法利害講之至精後以書見王荆公荆公召公議于司農寺時欲舉江西役法行于蜀公曰蜀不足于地江西不足于民利害異宜恐不可行主者是公議乆之公所陳浸忤遂罷歸審官院調簽書鎮南軍節度判官丁母憂服除以便親調蘄州蘄口鎮都大監轄俄丁父憂服除通判無為軍公諷軍守興庠序勉士以學部有礬池官專利民多冐禁公為立法公私便之而犯者鮮改通判鼎州以朝命按知誠州周世隆帥司部使者皆欲致世隆于罪公言世隆習蠻事且未嘗有罪論執甚堅卒免世隆人以為難辰州有軍事以公攝守公之官見屬縣吏部夫千餘挽木山間公曰方春役民妨農耕悉罷之公至郡蠻酋繫獄者公諭以朝廷徳意盡遣之皆感泣而去公因言自誠州抵融州道新通請每三十里建一佛寺擇僧知蠻情者居之諸蠻信佛平時可使入蠻與之習熟有警可用以間諜而佛舍可因以儲糧其利邊甚大朝廷許之後為諌官言不當廢誠州為軍公言頃蠻所以數叛者葢雖輸欵而未嘗去巢穴一失撫循則亂稍内徙則定矣雖不致州尚可安事廢州乎是時方議役法有訪公者公陳三事謂州縣之役莫重于衙前今雖易雇為差衙前數之多寡與役之優重請守熙寧元豊之舊毋輙改又言鄉差于官類不知書計勢必雇人代者必要厚價請官為立直又言縣所積免役錢請皆納州或輸旁郡户部皆奏行之用薦者除知宿州時荆門新復軍擇守乃以公為知軍宰相召公諭以擇才之意軍久廢百事圮毁公至為興起弊敗必使完好可持久不為苟且計人至今頌之俄知沅州其去荆門人為立祠嵗時父老率子弟拜之公既習知蠻情其治沅務安静嚴守備撫溪獠久之奏請出廵邊防軍行有告帳下謀變者公獨保其不然罪告者卒如公言又檄諸縣寨使察游民與蠻交易為嚮𨗳者捕之俄復知辰州公去沅如去荆門而辰之吏民與蠻酋皆相賀曰我公復來矣蠻相約無犯邊郡為無警辰民春夏多疫公飭醫工親視藥物人頼以全甚衆乃立學校勸以讀書人皆服從風俗為變朝廷既知公有功南邊將用之矣以病求告卜居蘄州金沙溪上家藏書萬巻有以自樂泰然也公喜讀書于書無所不觀自少至老未嘗一日廢巻至其間居好之尤篤有詩集三巻奏議三巻紹聖四年八月六日以疾卒預治終事至屬纊精爽不亂享年六十有一公曽祖諱延慶祖諱澤皆不仕考諱英以公登朝恩授大理評事累贈朝議大夫三男子長忱太廟齋郎仲惇未官季悟假承務郎皆以進士知名三女長嫁萬載縣令黄公孺次嫁進士胡世南季嫁寜州録事參軍譚康世公自濮陽縣主簿積官至朝奉大夫積勲至柱國公為人厚重寛博逹于為吏官無大小所臨必有績當其有所建立必得所欲而後已或以利害怵之不顧也其仕宦多往來南邊故深知溪洞諸蠻所以治亂有所措置後不能易然考其大體本于安静寛簡不為苛擾而頗立隄防明條教期無亂而巳不徼有功也君子韙之公少嘗從丁寳臣學寳臣異其才薦于歐陽文忠文忠稱焉既仕則不苟取知于人而一時賢公卿咸知之獨呉正憲知之尤深而公自重不輕就人故雖知之不絶出力而公才見于世者如此而已也其孤将以元符元年八月二十有一日𦵏公于蘄春縣安平鄉黎企里啓先夫人之兆而合焉夫人程氏有賢行封文安縣君前公二年卒云銘曰其直非以為訐其和非以為悦也獨盡力于為吏無劇易必逹也其至民以為賜其去民以為奪也既或知之矣乃揜而不發也進嗇而退果而後知公之節也安平之丘公藏惟初尚語後人洛陽之呉也潘奉議墓誌銘齊安有君子曰潘昌言其學也正其言也文其家居篤于孝悌其為吏清介刻苦而為政本于惠下愛民至大吏勢力能寒熱人者必與之較義理一毫不為屈其為人務内而簡外信已而不求人知而人之知者必皆誠心愧服焉嗚呼君子哉葢紹聖丁丑嵗某得罪謫官于齊安自幸得從君遊既至而君病矣無幾何而卒實元符元年十月某日也齊安之君子皆相弔己而又曰潘君之墓宜有銘矣咸以銘事屬某某既素高君之義用不復辭走其家哭之求其世家歴官行事于其子大臨而次敘之曰潘氏在唐為滎陽人當僖宗時有名季荀者仕為太僕卿官于福州避亂因家焉季荀之弟曰季翺為太子司議郎季翺後二世生吉甫事呉越入朝終國子博士累贈工部侍郎侍郎生衢為屯田郎中屯田嘗官于黄遂居之屯田生處士革隱徳不仕君諱鯁字昌言處士長子也生而儁警絶人為兒時賦詩巳有奇語閩有周希孟者博學篤行之士也君從之學希孟以為盡已之道君居鄉里以經教授聚徒常百餘人後進皆師尊之登元豊已未進士第初調蘄水縣尉遷和州防禦推官知江州瑞昌縣監楚州都鹽倉遷吉州軍事推官改宣徳郎監漢陽軍酒税遂以奉議郎致仕卒年六十三蘄水民有以花為獻者君一嗅而還之曰受賜多矣其亷潔類是江州賦屬縣鬻建茶太守問君瑞昌嵗可售若干公曰四斤耳守驚詰其説君曰縣小民貧米鹽猶不足而暇及茶乎獨縣僚四人人一斤可矣守悟以故諸縣皆得無多售而旁郡有賣千斤者後七年君以事過瑞昌有兩民拜馬前其一曰異時君為縣我訟得直其一曰異時君刑我當罪我心服是以偕來君之為吏得民舉如是也元祐赦民負官錢無姦者悉免之吉州通判攝守事乃悉下負者于獄將鞫其姦君曰赦欲寛之而君故獄之耶執不可民乃得免龍泉令捕得私酒三十家將上府君謂令曰是法皆當徒龍泉小邑一日徒三十人君為令安乎令乃頗減出之嗚呼其歴官微而見于行事者寡矣然其修身治人立心操術亦可槩見矣向使之得富貴立朝廷據位操柄以行其義逹其道其不貪利苟得如還蘄水之花其忤上愛下如鬻瑞昌之茶民甘其罰如瑞昌之拜者則雖古之君子無以加分寸于此矣有集三十巻曰春秋斷義者十二巻講義者十五巻易要義者三巻致仕時家無一金骨肉衣食僅給而君蕭然病卧一榻口不及俗事時與其子清言而已娶何氏有賢行男二人長大臨次某皆力學有文一女嫁進士羅啓宗四孫其一男也曰戇以某年某月某日𦵏某縣某原銘曰白璧芳蘭包以九襲長于外者千萬而一莫為出之卒殞無施嗚呼昌言不幸類兹致美在裏不耀于肌豈人是謀謂天實知黄岡之原松栢其猗我相後人將穫其菑柯山集巻五十
