body:
  text: 柯山集巻十三宋張耒撰七言古詩某寒熱伏枕已数日忽聞車騎明當接頓睡中得韻語数句上呈四丈龍圖兼記至日之飲山羊巻酥如切玉翦毛胡羊花作肉燭前醉客淋漓時山泉更煮如珠粟深泥三尺歸不記日到牀前初睡足爾來七日戰寒熱朝飯齋糜不盈掬客來但辦君且去卧聴涓涓雪消屋因山事嚴京兆出十驛人人如在目駝裘便面行野時晴郊巳動陳根緑贈晁十七應之風骨世絶倫濯濯芳柳當青春瓊瑶冰雪照一坐我恐子是神仙人十年聲名望不見一日邂逅情相親安仁白璧絶瑕玷宗之玉樹無埃塵襟清胷明遇事敏西河舊政傳諸民縣門髙開吏束手訟至立决如有神别君還家恍如失咫尺莫見徒為隣㑹期殘春再携手滿引大釂無辭頻聴客話澶淵事憶昔兵來動河朔渡河飲馬吹邊角澶淵城下冰載車邊風蕭蕭千里餘城上黄旂坐真主夜遣六丁張猛弩雷驚電發一矢飛横射渠魁貫車柱旃裘無蹤大漠空歸來封禪告成功自是乾坤扶聖主可能功業葢萊公和晁應之憫農南風吹麥麥穂好飢兒道上扶其老皇天雨露自有時爾恨秋成常不早南山壯兒市兵弩百金裝劍黄金縷夜為盜賊朝受刑甘心不悔知何数為盜操戈足衣食力田竟嵗猶無穫飢寒刑戮死則同攘奪猶能緩朝夕老農悲嗟淚沾臆幾見良田有荆棘壯夫為盜羸老耕市人珠玉田家得吏兵操戈恐不鋭由來殺人傷正氣人間萬事莽悠悠我歌此詩聞者愁止酒贈郡守楊瓌寳止酒正似塞決河厚積薪芻傅砂礫堅牢不使見蟻漏一線纔通便奔激莫輕弱箭不穿縞轉眼巳驚牛弩射我今止酒用此法目前逾月無涓滴情鍾我輩獨痛制慧通則流那可測懲羮端是合吹虀用玉無疑初諫漆脾乾胃燥生未省黄姥無聊怨岑寂不憂羣飲惱姫翁但畏獨醒嘲楚客茫然自惻還自笑一身心口相仇敵何妨二䜿即奔忙不廢三嬰更滋澤平生杯杓不掛眼一飲便須論斗石低心伏老慎勿癡此身何啻千金值送畢公叔奉詔赴陜西畢子談鋒不可摧㨗若急電飛霆雷老僧宿學不敢較左右戈㦸縱横排文如翻河注浩𣺌學有要㑹窮根荄眼看青雲不着腳決去得邑窮山隈漢家封疆際四海琛賮萬里連翩來西河故地獨何事禮樂舊俗遭狼豺包藏隠忍非一日獸子未可仁心懐英雄天子命世主撫劍震怒風雷迴馬如屯雲士如虎萬車載甲如崔嵬豈惟俘斬復境土誓剖巢穴窮卵胎除書命子參漕府國有大事須羣才男兒功業在勤苦莫惜沙塞衝塵埃禦戎舊策子所習胷臆請為將軍開封侯報國在今日贈行滿舉黄金杯九月十二日入南山憇一民舎冒雨炙衣久之石棱如刀不容步上挽垂藤下無路風寒雨滑徒旅愁捨馬杖藜泥沒屦躋攀顚墜不容髪目眩心寒驚反顧亦知垂堂有遺戒身仰微官欲誰愬蕭蕭茅屋映絶壁門外汩汩清泉注解衣就火不能煖旋拾山薪伐溪樹山翁生未食醯醢脱粟寒蔬度朝暮人間平地固不少何用﨑嶇守磨秋聲四起山靄夕壊屋疎籬睡無處披裘結束相勸歸過盡重雲下山去八盜挾弓持矛八人者暮出永寜循白馬袁村飲酒呼主翁主翁倉皇問以弓朝飯南山民獻彘主人贈刀其姓李道逄兩夫捕鷹隼脅之以威使從巳晩投民居迫之饋坐有三夫願從事其徒新故十有三驅使兩夫前探伺諜知小水無徼巡彎弓長呼蒼市門傳聲市人恣誘脅擾擾坐致幾千人一盜登牀坐而視四盜執兵環以衛八夫露刄入民居歛聚金珠致之帥搜羅抉剔凡八户滛汙婦女纍其主烹羊致酒來紛紛錢幣滿前隨賜與一盜揚聲集市人我憐市人常苦貧居民積財尚餘羨恣爾攫取舍無嗔市人聴令喜且舞肩負嚢擔誰復数須㬰散去閭里空犬逝雞逃無敢語八盜連謀詔其五為我鳴金南取路人聞金聲謂盜南八盜西馳下山去長吏飛書呵有司坐欲捕獲如吾期洛陽大牓如匹帛一百萬錢賞能獲一朝兩卒扣吾門自言有密人不聞我知小鼠羣偷地二盜今居洛之涘立呼吏兵給戈弩期以朝擒夜馳去可憐鼠子不知逃猶復持矛起相拒一士揮刀身首離復取傍盜如携兒八夫獲二亡其六盡取黨人付諸獄淮隂阻雨檣竿日日春風轉𣺌𣺌孤舟数家縣朝來雨暗隔淮村白浪巻沙吹斷岸渡頭楊柳濕青青橋下涓涓野水生滿尺白魚初受釣斷行歸雁故能鳴平生行止任遲速篷底欠伸朝睡足從來江海有前約老去塵埃無可欲曉天暖日生波光桃杏家家半出墻春日春波好相待短帆輕艣可須忙蕭朝散恵石本韓幹馬圖馬亡後足世人怪韓生畫馬身苦肥幹寜忍不畫驥骨當時廐馬君未知開元太平國無事戰馬巻甲飽不騎玉關槖駝通萬里長安第宅連諸姨笙歌錦繡遍一國六龍長閒空食粟霜甜秋草沙苑逰日暖春波渭川浴脽圓腰穏目生光細尾豐膺毛帖肉珠鞍玉鐙驕不行豈有塵埃侵四足韓生丹青冩天廐磊落萬龍無一瘦豈知車下骨如牆飢食草根刺傷口君家古圖纔半身千里騰驤巳有神迴身側顧不無意剪㚇絡頭嗟失真君不見太宗戰馬拳腹毛身騎此馬縳羣豪龍虎精神金鼔氣豈有閑地供脂膏至今畫圖快胷臆想見虬鬚親破賊那知但愛廐中肥漁陽筋腳蹄如石神駒入水随烟雲蜀山石路無行人六驥悲鳴足流血騎騾遺事一酸辛次韻君復七兄見贈老知山林等朝市扁舟誰能問行止長淮十日浪吹沙春風正攪驪龍睡幽人軟語破永日衝泥携手林間寺坐中知兄病當巳眉宇氤氲有佳氣華池神酒不用醒人生和暢自忘形扶持隂徳鬼神在洗除世縁煩惱輕東來自慚雙鬂改相逢獨覺兩眼明論詩尚愛淡生活學道久歎閒名聲嗟我塵埃費昏旦補刖自憐聞道晚還丹欲問僕僕仙原注謂陸先生僕僕古仙人也一菴更伴騰騰睡原注謂圓明騰驣古禪宿春隂夜薄月朦朧劇談燭盡樽亦空他日重逢龎處士可能猶與世人同原注兄斷愛屏欲專意禪悦故比應公離泗州有作舸艤大艑來何州翩翩五兩在船頭淮邊落㠶汴口宿橋下連檣南與北南來北去何時停春水春風相送迎沙岸飛鷗舊相見短亭楊柳不無情清歌一曲主人酒主人壽客客舉手明日酒醒船鼔鳴沙邊破堠不知名行人十里一囘首雲邊猶有塔亭亭汴上觀迎送有感居人憐客千里來掃堂為客致酒杯夜闌再拜客辭去尊前美人不成舞陽關八疊倒玉船銷魂此地自年年船頭旂竿船尾柂南遊江海北長安長亭出城十餘里柳邊人家飯遊子少年此地幾經過白頭相逄可柰何奉先寺荒凉城南奉先寺後宫美人棺葬此角楼相望髙起墳草間栢下多石人秩卑焚骨不作塜青石浮屠當丘壠家家墳上作享亭朱門相向無人聲樹頭土梟作人語月黒風悲鬼摇樹宮中養女作子孫年年犢車來作主廢后陵園官道側家破無人掃陵域官家嵗給半千錢街頭買餅作寒食送程徳儒赴江西程侯治楚我獨知去時民作嬰兒啼歸來明光見天子還把一節來江西年來屡下寛大詔赤子未免寒與飢恩如憂病政如藥知病無藥何由治朝廷法度寄吏手付授得所乃合宜事如黒白初易睹敢以容悦相䝉欺此行委寄意不淺列城数十受指揮任官輕外最弊法省閣無補真何為遥知敏手多暇日不廢樽爼環蛾眉從君多乞歙州紙嵗晏天禄供吟詩送杜君章守齊州平生杜公賢弟兄北州人物家法稱兒童服膺今見面温潤圭璧清霜冰胷中詩書不見試鬂髪欲白論邦刑用違所長衆不可公猶談笑氣甚平人才之難萬冀一一士其重九鼎輕典籖不廢吟擁鼻所歎虗席何人登臨蕃千騎亦不惡聊以餘力蘇疲氓霜清水落魚潑刺萬甕沸響新醪傾東秦山河太守貴長安歌舞新曲成正須晝夜快作樂舎人促公歸治行送劉季孫赴浙東將軍好書如卻縠文史隨船三萬軸吟詩坐嘯士賈勇不學虎頭飛食肉念昔先君得佳句歸見兒童詫珠玉乖離存沒偶不死十年遇公拜還哭堂堂山西忠勇後凛凛典刑在眉目總戎南下聊復爾將帥于今要頗牧戈船水犀士扼虎三江太湖浪翻屋丈夫為將亦不惡寂寞揚雄老天禄寒夜擁爐有懐淮上長安暮冬雪如山堅冰錯落于其間八荒一雲同慘淡北海怒迴江海翻老人此時不復出閉户燃薪守蓬蓽忽憶去年淮上舟有客致酒頗豪逸三更堂下霜折木坐上美人鳴寳瑟人生有情亦可憐明眸皓齒如眼前主人金章作塵土烟飛星散江南天知非蘧公時一歎讀書梅叟並蕭然百年萬事費排遣軟語須問東家禪同魯直无咎逰啟聖西方金仙千嵗身天上伐木役天人閻浮檀光照世界作此無量勝妙因九龍寳地赤精宅湧出宫殿壓風輪化人南來為守䕶震動六種走鬼神錦幪老人常住世燕坐説法無冬春故人蕭公作塵土白蓮花葉光如新妙道無邉世眼窄真心遍通人智貧可憐端居弊宇宙幾見疑惑談偽真簷牙森森鐡鳳啄殿顔耽耽金獸蹲官冷何妨近香火時容絶勝洗埃塵送邵郎中守同州君不見漢家左輔百萬户里胥夜驚厭桴鼔爾來荆棘露沾衣只有山河閲今古卲侯風流華省郎三千慿熊兩開府不須閉閣决田訟多屑石餅羞魚俎東南文章舊人物莫媿蓴羮便酪乳仍煩細閲白沙龍驌驦一骨今何所王都尉恵詩求和逾年不報王屡來索而王許酒未送因次其韻以督之酸寒杜陵老痛飲遺身世雲安小縣麴米春遥知美味無多子猶令此老氣如虎傲兀幾以醉為異爭知侯家美酒如江湖金鐺犀杓與之俱玉壺曉傾春水决銀槽夜滴秋雨疎生人文章足賔客許致麴生來坐側三杯脱㡌我家風渇如旱田占雨虹冷官如瓶君未見腹惟貯水水生面鳴鞭走送煩騶轡坐對朝寒北風起未欲煩公大作燕老夫自斟看深淺架蒲萄蒲萄盤屈如修蛇春來蟄起紓横斜延之升架鱗甲動舊枿粲粲生光華盤堆馬乳未敢望殷勤灌溉意非他要聴暑雨鳴大葉牕間致榻圍青紗年來幽淡亦有趣自值花草占萌牙奔波𤣥徳老不遂正爾種菜豈不佳猶嫌尚遣兒輩覺方食失匕徒驚嗟叙十五日事五更聞鐘自驚起坐守殘燈具冠履昏昏睡眼正團花獨愛當庭月如水強驅睡味誰不仁漠漠黑甜留兩􅗃忽驚左掖漲風埃已起上閤鏘環佩平明原廟焕金碧飢投散幕走寒餌紛紛僕僕酸兩脛肉食當然賤何事走馬回家百不問掃榻伸腰真有味起來炊熟日亭午槐葉新成庭覆翠翻書弄翰老自笑飽食安眠計難遂古來髙士不入城肯聴鷄鳴踏朝市淮隂太寧山主崇岳逮與予諸父逰今年七十餘耳目聰明筋力強壯奉戒精苦禪誦不輟聞予自黄歸欣然空所居而相延日與之語或寂然相對終日使人之意消也因賦此詩我來之初季春月門外李花如積雪杜門燕坐度長夏庭樹秋風忽騒屑西馳大火不復燎急雨凄風爭應節紫貂暴日知有待畫扇依墻將怨别蒸雲積潦漸收拾惡木煩蕪稍摧折不知此事誰主張躍馬奔車忽回轍嗟予行世蹈坎塪僅免豺狼膏齒舌三年閉户餓江島脱粟無餘衣百結近者皇天忽悔禍雨施雲行咸澡雪復官還職遍海内爭脱囚冠鳴佩玦老夫龍鍾衆人後一舸循江信沿涉風波厯盡見故鄉親友相逄驚白髪道人巳老見我喜靜掃髙堂容憇歇佛龕日近得香火僧飯時容供粗糲讀書小技漫勤苦安禪大觀無分别久便閑放輕禄利巳脱憂危傲縲紲天時進退古不忒人事興衰今屡閲酒濃村店足斟酌魚美長淮恣哺啜從今萬事付天工致安民庶看䕫契聞子瞻嶺外歸贈邠老今晨風日何佳哉南極老人度嶺來此翁身如白玉樹已過千百大火聚望天留之付真主世間毒烈計巳悞柯山潘子應鼔舞與子異時從杖屦次韻蘇公武昌西山靈均不醉楚人醅秋蘭靡蕪堂下栽九江仙人棄家去呉市不知身姓梅東坡先生送二子一丘便欲藏崔嵬脱遺簪笏玩杖屦招揖魚鳥營池䑓西山寂寥舊風月百年石樽埋古埃洗樽致酒招浪士荒墳空餘黄土堆但傳言語古味在一勺𤣥酒藏山罍鄧公歎息為摩撫重刻文字蒼崖隈五年見盡江上客兩屐踏遍空山苔謝公富貴知不免醉眼來為蒼生開長虹一吐誰得掩六翮故在何人摧横翔相與顧鴻雁寳劍再合張與雷山猿澗鳥汝勿怨天遣兩公聊一來豈如屈賈終不遇詩賦長遣後人哀宿譙東逆旅夜聞歌白公琵琶行元和才子悲流落一聴琵琶謂天樂青衫裛涙作長歌誰取篇章和宫角譙東夜久行人稀卧聞此歌歌者誰歌侣舊時人不見舉頭欲聴涙雙垂畫堂青瑣春無事幾聴此歌還幾醉東風桃李作黄埃寳篋塵昏譜間字一聲一聴一情傷未老應知幾斷腸展轉曲終燈燼落荒城寒月夜飛霜趙徳麟有詩言過萬夀縣得玉芝乃以供一醉之味按道書凡芝皆神仙上藥無乃輕用之乎王孫憔悴食無肉天遣枯腸出雙玉荒園夜飲供一醉仙物無乃遭輕辱王孫髙名滿天下剸膾龍蛟刀几熟眼髙不為小物變采掇僅同葵薤屬憐君十年清潁客年少未甘窺藥録再逢靈藥慎勿輕不死問君安可獨東園堂中宴坐不妄出堂外青春去如失小園十步緑如雲一時桃李事巳畢猶有荼蘼数朶在未覺塵沙汙玉質金沙格俗終可憐膩白嬌紅如欲滴老夫睡起聴山禽竹間林外紛嘲嘖筍生漸愜子猷願梅熟未邀朱老喫翻書只作隨睡具傾壺屡進忘憂物今春風雨稍依節上田麥穂過数尺但知洗眼看世塗莫厭終身守蓬蓽送翟公巽赴中書舍人韓筋桞骨世不聞翟公筆力回千鈞十年聲名滿四海淮陽邂逅雙朱輪老翁空踈亦何有察公于我意甚真髙談亹亹雲漢上一掃闒茸如灰塵夜光明月不計数坐使衰弊生精神恨無金玉相報答還家三嘆嗟我貧青燈論文夜未分曉聞門外送使君問君舍此去安徃紫皇詔歸侍玉宸鋒鋩發硎㫁犀象好為明主裁絲綸論思獻納乃其職况公之意常在民追還三代舊風采主以事實致此文聖君賢相有美意筆端與物為陽春波稜乃自波陵國來葢西域蔬也甚能解麫毒予頗嗜之因考夲草為作此篇誰從西域移佳蔬遍植中原葵莧俱清霜嚴雪凍不死寒氣愈盛方芳敷貫金鋭箭脱秋竹剪羅巧帶飄華裾中含金氣抱勁利穿滌炎熱清煩紆老人食貧貪得得大釡日煮和甘膄飯炊香白煮餅滑一飽盡缽無贏餘空厨蕭條烟火冷可但食客歌無魚男兒五鼎食固美當念就鑊還愁吁北鄰賣餅兒每五鼔未旦即遶街呼賣雖大寒烈風不廢而時略不少差也因為作詩且有所警示秬秸城頭月落霜如雪楼頭五更聲欲絶捧盤出户歌一聲市樓東西人未行北風吹衣射我餅不憂衣單憂餅冷業無髙卑志當堅男兒有求安得閒寄余五十五憶昨戊午寄東都人事紛紛相見疏補官洛陽我西走君理舟楫歸江湖往來相失頃刻爾坐使一别三年餘他鄉滿眼非故舊南北耿耿無音書福昌古邦廢已久莽莽榛棘藏麕鼯空宫蕭條唐舊路古堞斷續韓遺墟商頑餘民俗未冺習尚兇獷羞為儒髙堂塵埃坐無客雖復強接非歡愉嗟君尚復記憶我兩得書札何勤劬最後新詩意不淺知君過我山陽居人間翩翩輕薄子交友暫爾久則渝歡欣憂患心不易我視一世無君如念昔登科各年少君中第一名傳呼春風朝逰踏廣陌夜雨縱飲傾金壺當時意氣今在否十年我困官庭趨君宜騰達上寥廓何乃失足遭﨑嶇人生難必但如此付委造物隨所驅得之幾何失未損七尺可貴惟吾軀洛川春風來巳久桃李次苐爭芬敷登臨想君不可見夢逐流水遊東呉東呉舊逰我所樂飲有美酒烹有魚何當相逢兩披豁擺落萬累無嗟吁柯山集巻十三
