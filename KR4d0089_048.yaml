body:
  text: 柯山集巻四十八宋張耒撰祝文祭社文某受命于朝來守此土宣上之徳以保有民社惟神之功百世通祀幸得以時躬薦牲幣徼福于民莅事之始敢敬致告惟神鍳之祭稷文惟神之功立我蒸民有邰之君實興周室萬世通祀光配無極某受命天子來長斯民嵗時奉祭牲幣有秩莅事之始敢告有常神其鍳之永錫斯土祭文宣王文惟吾聖師生于此又嘗仕于此葢自衛而刪詩定樂既没而𦵏皆在此也教之在魯深矣某受朝命來守此土意遺風逸禮必有在民願與諸生究觀而講明之莅事之始敢不致告非以為禮庻用致䖍敬亭廣惠王求雨文四首嗟乎吾民其困久矣去嵗積雨大江横流兩圩既隳一境受弊補復亡㪚實在今年死生存亡間不容髪而自春及夏時澤未滋芃芃四郊稲且不植吏術莫救必神之求神食斯民忍視其疾惟王威靈功徳烜赫在民指揮蛟龍震作雲雨一瞬之力豈或難之山川之神能出雲氣見變怪以司雨暘之權以佐民衣食之用則是有職于民者故朝廷隆以爵號表以廟貎有司嵗時奉祀不絶自四月至今以旱禱于王者于是三矣今事巳益急雖瀆神有罪而不敢避也惟王俯而聼之油然而雲沛然而澤以除民之病以紓吏之責于王之神謦欬之力有職于民冝不愛惜也宣之為州被山帯江民耕于高無灌溉之利而仰澤于天故閲月不雨則以旱告今兹季夏之初時雨大至諸山之田既植且茂比日乏雨積水且竭亦嘗雨矣然方雨而止又不遍也是以民心惶惶憂在嵗事吏無以為術但知有謁于神而巳夫囷廩之有將入手而取之稊稗之食將下咽而奪之矣抑又神之所不忍也南方之民以稲為命而稲非水不植神所知也今兹四月且盡而原田稿乾待水種稻而雨不降澗溪之流亦復淺涸民情惶惶如失火之待水寒疾之待汗也失今不種則一嵗且無食其饑餓死亡流轉于溝壑可立而待則其憂懼危廹之情葢可知矣乃兹月甲申嘗率僚屬有禱於神神如答之翌日而雨然施澤未渥雲日巳霽豈神未念民之病姑以塞其意而已耶審如是其繼有請雖十百其未止也神雖欲罪其瀆而降之罸亦末如之何矣今事巳甚廹敢盡布之惟立興風雨一雨三尺其于農事乃克有濟某亦有不腆之牲酒以報神之徳惟王速圖之廣惠王祈晴文請雨未幾又復謁晴在人宜怒况神之靈沃野茫茫嵗將有秋誰為之孽雨滛不收失望垂成吁嗟憫憂不敢避瀆冐昧有求神或哀之疾尚可瘳靈濟王求雨文三首惟王昔以功徳受國爵命衮服南靣抗儀王者可謂盛矣數州之民奔走奉祀以時不懈積有年矣受國爵命則如有位于朝食民奉祀則如受禄于國然則其可不察民之利病與之同憂樂哉今民之大憂王亦知之矣乃自春末至今時雨不降仲夏而稲不得種一方之民拱手而待饑饉甚可哀也而王之威靈光烈烜赫甚著其于蛟龍以致雲雨且無所難夫為所不難以解民之大憂以是致禱當在所答今旱已甚非沛然大雨則于農事猶無所補也若夫苟施㣲澤姑以塞其意而曰吾嘗雨矣則非某之所敢知也水旱有數尚憂堯湯聖無如何矧此一方人治其陽數之所拘神造數者可得巻舒戊戌有請逮今未至神之威靈胡難其易旱野童童麈生溝澮神其鍳之賜以滂沛自夏徂秋謁雨于王者數矣豈惟厭之而不答將怒其瀆而降之罸也某則謂之不然求者以不隐為情施者以不倦為仁譬之君親求則謁之何瀆之嫌為之君親者視其所求可則與之何倦于數用是輙有請于王而不疑惟王威徳烜赫臨此一方吏民奉事嵗時不懈則其有請尤在所答也靈濟王祈晴文徹救旱之奠曽未逾旬陳止雨之辭則巳在廟不修人事惟神之求㒺忌威靈其瀆巳甚罪不能脱誠或可通今兹多稼既成敗于將穫積水且溢决則不支始幸倉廩之將盈俄憂父子之不保盛徳未竟大恩宜終夫呼而為風雲吸而為開霽于神無費庻禱必從景徳寺祈晴文伏以雨既若時嵗將大熟而陰霖不止水潦將増大懼堤防之圯隳偃瀦之墊溺欲除民病惟頼佛乗伏望消伏陰魔開通慧日㧞幽沉為明達變苦惱為歡謡衆生之疾既除能仁之願亦滿祭天齊仁聖帝并城隍祈雨文比以旱故禱于一二神幸時雨之沛施免斯民于饑饉而誠薄未格報至不時豈媚于神者有未至耶抑在兹境者或不舉也今旱既甚矣民亦殆哉莫知所為惟有致禱謹遣僚屬徧詣祠宫於赫有神時賜甘沛惟民與吏皆獲即安牲酒馨香將以為報廣惠王謝雨文二首禱旱壬寅雨既隨至匪亟匪徐澤此厚地旱野千里稲如雲浮農人笑歌以樂易憂哀此困窮神徳之厚躬羞菲薄吏則何有我聞仁者施不責償鍳其誠悃臨此一觴一嵗薦禱我顔則羞神乃哀之輙與所求問我農夫我田既臧無有高卑均為豐穰父子相保鰥寡有依守臣何功神則與之牲酒瘠酸報㣲施豐惟誠與潔庻以薦衷靈濟王謝雨文二首間者有禱實以亢陽神答其誠翌日沛滂風駕雲旗飛澤淋浪應龍翔嬉妖魃奔忙靄靄中原萬畦齊秧父老相慶豐年有祥牲酒㣲薄愧升廟堂抑神之仁豈責報償頃以旱故遣吏致祈其慢宜罸神顧聽之獵獵風雲來自東南協風横流妖魃奔潜溝澮畢通高卑具沾活此一方老稚舞歌守臣冐功幸此時和牲酒不腆匪以報徳光揚威靈傳示無極祭魯㳟王文惟王託體聖父奄宅龜䝉龍旂旄鉞天子之容文物焜煌照臨東國十有八年榮寵之極臨終上書以禮自克千載讀書猶懐感惻兹惟舊封爰有廟食荒榛喬木薦享寂寂時有農父來祈黍稷坎坎擊鼓刲豚布席雨暘疾癘求無不獲愛人之心千古不息某具舟檝將寄潁尾漂洎五年未知攸止吾道非耶乃底于是悠悠天道惑之久矣再拜祠下神鍳其志行旅之薦不及酒胾祭聖帝文貶逐積年窮無所愬而聖上哀其不辜復畀之民社而來守此邦也則亦惟是旱乾水溢之不時將以請于帝帝之仁民冝無或難莅事之始敢以告姑以致䖍禮則已畧惟帝鍳之祭文祭成都李龍圖文嗚呼公擇其中退然如不勝衣而能為人所不能為在熈寧初政有大議柄臣持之一壓以勢公奮力争與相抵刺厥聲凜然卒擯于外流落十年天子思之歸卿太常君子之喜於穆聖后緝熈于學公侍講讀以開以覺正位地官幹邦盈虚持國風憲匪激匪紓嗚呼公擇孝友烝烝禄富族親妻孥無贏死不能喪圖書在籯施于朋友孔燕豈弟曠無累心清有遺味公去朝廷大斾高牙孰云來歸哭引䘮車旦夜死生不足歎嗟善人存亡實繫邦家叙哀一觴其飲之耶代范樞宻祭司馬温公文嗚呼天祚有邦畀之元龜篤生我公為世父師夷齊之清淵騫之徳子産之惠叔向之直人擅其一足以成名公兼衆徳乾乾不寧九流百家金匱石室鈎索沉隐裁其失得根柢治亂經綸皇極作為文章有書秩秩𤣥圭大裘望之肅然冬暘夏氷赴者争先仁英兩朝鍠鍠厥聲國有正人折姦于萌荏染者木求直于繩我公盡規君心則寧烈烈神考體貎有徳公獻其可巗巗翼翼言有未用不敢受爵深衣幅巾歸休于洛公則休矣四方顒顒君子野人洎于他邦聞者懐歸于父于兄天施不齊或怨寒暑公獨何施四海一譽元豐末年國有大事穆穆文母宥我神嗣爰立作相媚于神人我公在廷其重萬鈞士賀于朝民歌于㕓農慶于野兵休于邊燠爾慓寒養其饑孱無瘠于饑無禾于田培其本根枝葉則茂豈曰我作憲章惟舊於赫聖考左右上帝休公於家實遺聖子巻耳思賢夙夜周京不惑不疑成此太平公之去來人之戚嬉人之戚嬉帝之從違豈人事耶天實為之純仁不才辱公知深人之相知貴相知心惟公我知洞達表裏采其所長謂或可使申結義好邱山不移匪我則然公實取之泚泚清洛獨樂之園嘉華春敷脩竹夏寒清酌翛然我招我從琅琅嘉言有銘在躬朝偶乏人備位樞機入與國論獲親風規六七年間為益不貲私祈白首從公以歸憂勞傷生公既遘疾庻幾有瘳卒相王室國祠既誓公以喪聞我心之悲不獲至門入哭于室公既大歛終天之情不一見靣人生有死如旦夜耳曽子將歿知免而喜公身既修公志既畢既壽令終無有其失有如公者古今萬一任重道逺税駕兹日庻幾念此以紓我悲猶有鬼神實聞我詞祭劉貢父文嗚呼子之强學博敏超絶一世肇自載籍孔墨百代太史所録俚閭野記延及荒外陰陽鬼神細大萬殊一載以身下至律令老吏所疑故事舊章在廷不知有問于子歸如得師直貫旁穿水決矢飛一時書林衆俊並馳滿堂賢豪視子麈揮逸足竒毛不受絏羈擯守列郡吏民畏思治盜寃句不事誅斬他嚴見欺子愛不犯中斥于南人憂子怡歸來白首晩職訓詞子之來歸亦既疾病惟其精明猶足以永誰云如子竟止斯耶國失君子善人之嗟方其盛時弛不得張亦既有遭而蠱其强誰與子仇敗子百方雖然今日竟何有亡惟我與君同年進士申以婚媾兼恩與義平生談笑樽席燕喜其當鑒耶臨此酒胾祭夏侍禁文惟靈胄出豪貴服膺禮義恪守官次志于詩書云何不淑奄至大故命有修短夫復何言日吉時良安以即路奠觴為决巳矣嗚呼尚饗祭蘓端明郡君文嗚呼人生萬殊之死同科其間疾徐相去唯阿作嬪大賢克冝厥家婦也有兹萬一則多顯允夫人簡儉純明相其君子險夷屢更穆穆愉愉何易何艱能俾君子即居而安象服委蛇亦既輝光云何不淑乃折于强蘇公執喪盡禮致哀曰予徳思匪媾之懐某等受學師門義等族戚矢詞殯前侑此酒食祭李深之文嗚呼昔我先人剛介峭峙行于天下得友無幾遇公兄弟則無間言惟屯田君則實同年公時尚少多病癯然江淮之間相與周旋耒之兄弟應舉姑蘓朝夕誦習託公學廬公晩得官拜公宛邱後二十年遇公𤓰洲相從武昌亦既謝仕杖屨逍遥旁有令子何圖末疾百治不完歿不得歸即邱于焚幽宫之刻委于不肖文不稱事矧能有耀身在罪籍動有縶維無窮之别不獲往辭寓誠薄奠尚釂一巵祭秦少㳺文嗚呼少㳺淮海之英自其少時文章有聲脱畧等軰論交老成衆譽歸之誰敢改評聿來秘書亦既飛鳴脱身亟去事變隨生嗚呼官不過正字年不登下壽間關憂患横得罵詬竄身瘴海卒仆荒陋君孤奉喪歸𦵏廣陵拜我于黄尚有典刑㑹𦵏撫孤我窮不能具此菲薄聊致我誠隻雞斗酒懐想平昔嗟我少㳺尚肯來食祭晁无咎文惟我與公交遊之義外雖朋逰情實兄弟公生癸巳我長一嵗平生宦學何一非是念初相遇盱眙送旅一見如舊綢繆笑語契濶積年俱職太學並試玉堂同升館閣讀書飲酒兩各壯年意氣豪盛自以無前公之文章瑰琦卓犖割裂綿繡揮磨矛槊石渠天禄典籍之委過目輙誦不復再視我守丹陽公鎮于齊行世之艱坎壈自兹建中之初同官于都相對歎息蒼鬢斑鬚我出汝陰公守于蒲我負重譴責居江湖知公金山藝圃葺廬最後聞公乘太守車往刺于淮慶未及書嗚呼哀哉九月之庚寅聞訃于陳驚呼號天煩寃靡伸年且六十非夭之恨所甚痛者殱此善人公素强健無戾于身何恙之速一仆不振嗚呼哀哉平生膠漆永隔存亡弔不撫棺窆不哭墳事也多違不敢愛勤聊陳菲薄侑此一樽尚想平生見我歡忻至悲薫心言不能文柯山集巻四十八
