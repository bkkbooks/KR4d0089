body:
  text: 柯山集卷二十二宋張耒撰七言絶句懷竟陵蓮花景湖門外有汀洲灼灼紅蓮照碧流公子不歸時節晚雨枝風葉卧清秋懷陸羽井寒泉背石老松根禪室幽人古像存長恨千年無屈宋楚招難與此遺魂冬日懷竟陵管氏梅橋四首旅居澤國小園林千里相望嵗暮心想見竟陵殘雪裏新梅㸃雪橘垂金小小園林㸃㸃梅如今綽約為誰開只應清夜新霜裏依舊橫斜倒影來他日華陵跡已陳嘉辰懷舊一銷魂小園幽徑誰相念應有新梅覔故人原注復州竟陵郡有五華山故亦云華陵堂下幽芳自可人北風一為屏埃塵上元簮珥玲瓏玉却曳青霞霜女裙厄臺寺三首諸佛蒼然照殿楹圎光明滿自然燈千年遺事無人問館後高眼久屬僧峨嵋前約已成空風雨蕭蕭送暮鐘何用忘機來問話不如松下謁癡龍世味嗟豫淡莫加更將詩句寄煙霞自憐落筆無好字不及揚州王謝家過蘄澤雄吞六國弱秦强壯士逡巡野水傍耕叟不知鴻鵠志笑觀宫室忤陳王崇化寺三首樓殿沉沉鎖夜煙秋燈一㸃佛龕前梧桐葉上三更雨亦有愁人獨自眠白髮荆州嘆滯淫吳衣重杵洛城砧遣愁莫上髙樓望只有秋來晝日隂零落宫墻官樹秋行人東去路悠悠祗應樓下邯鄲路亦有離人對此愁偶成漫學文章弊性靈屠龍藝就誤平生翩翩仕路新冠蓋何用揚雄强作經贈趙簿景平二首明道新墳草已春遺風猶得見門人定知魯國衣冠異盡戴林宗折角巾紛紛俗物久堪憎愛子蕭蕭眉宇清莫嘆青衫掩事業白頭卿相死無名自遣四首是非得失一區區蚊蚋啾啾共一壺不學退之求羽翼惟憑一夢到華胥誰云造化本無情利害乘除理甚平莫逐衆情生愠喜君看三四孰虧盈誰云至理宗無相大道由來萬法兼且以聲音為佛事曉敲清磬誦華嚴浮世榮枯理易觀不勞重取朽龜鑽直應桃李繁華日便把荆榛寂寞看立秋二首西風嫋嫋木颼颼身在江湖北岸州自古楚人詞最好為君重賦竟陵秋對酒聊同楚人醉哦詩惟聼越吟聲洞庭北岸孤城下落月西風聽曉鶯晚步靈夀寺後二首秋城草樹欲黃昏微徑新晴菜甲新便好灌園從老圃此懷原是漢隂人逄秋種菊尚殷勤隙地侵尋欲過鄰便好採花供服餌形容已似澤邊人感秋三絶秋思鄉愁兩苦辛每臨西北望秋雲此生更老情終在誰為寄聲千里人楚天未白轉星河樓角先吹出塞歌長愧侵牀五更月殷勤無計謝姮娥髙林敗葉已颼颼更有寒莎翠已收若道神仙脫情纍如何獨唱感庭秋局中聽雨秋庭聼雨斷人聲凉入衣裾秋意生臨水登山送歸語憐君解有許多情夜思萬聲沉寂漏丁東金井欄干上暗空半夜西風人未覺秋聲先報草根蟲晨起二首楚鄉秋早倦炎蒸長恨梧桐不可憑爽氣忽隨風雨至曉堂無寐獨神驚中宵爽氣入衾裯簷雨浪浪曉未收三伏炎歊掃除盡待教明月放清秋近中秋姮娥藥熟桂華新滿貯清光待出雲徐御氷輪行碧落世間多少感秋人章華長恨章華亦陋夫周秦僅可勝登徒誰知南楚仍窮巷骨像何妨自應圖秋晚日轉秋庭樹影斜風來粉蝶勝悲笳祗應宋玉秋來夢常在墻東阿子家遷居對雨有感楚鄉風物淡悠悠獨掩閒門客滯留盡日無言對秋雨相敲蕉葉各吟秋竟陵僦舍仍有小園景物頗佳荒涼臺閣追隨事懶慢江河放逐臣應是主人憐寂寞僦居仍有小園春題西園酴醾風霜老枿蹙龍蛇中有青春白玉葩要使根深生意遂不妨秋雨卧泥沙西軒出架薔薇秀晚枝雨餘屋角理蛛絲可憐一曲秋風地萬思千情鬬入詩九月十日菊花爛開蕭條秋圃風飛葉却有黃花照眼明已過重陽慵采擷自嫌亦作世人情讀除目有感禍福茫茫不可猜可能慿勢即無灾相君西闥揮毫日豈料方還此地來效吳融詠情依依漠漠復紛紛觸處相隨過曉昏知是妄緣除不盡更教風月助吟魂竟陵酒官舍北有數步草嵗寒霜落猶鬱然也豫為障其風霜暮冬尚自如一日大火焚舍無遺復往尋草不復有矣為愛墻隅芳草色故遮霜霰待新春火燒雨洗尋無處祗有東風吹舊塵臘日步西園三畝寒園春欲回淺池低樹忽飄梅楚鄉萬里霜雲盡歸雁行行斜日來夏日七首兩架酴醿側覆簷夏條交映漸多添春歸花落君無恨一架清隂恰滿簾野水彎環夏木森清蟬晚噪碧雲深扁舟兩槳誰家子萬里江湖此日心蘄簟紗厨與夏宜法曹腰腹大何為重雲到地翻盆雨却是幽人穩睡時千蛙鳴噪汙池水萬蟻奔馳一腐蟲得喪世間能幾許冥𡨕髙處有飛鴻凉風一掃宿雲輕隱隱收雷不復驚試决小池疏積潦誰教蛙吻頓無聲風轉翻翻梧葉驚入簷白雨打窗鳴應將清絶酬無睡穩聽空階半夜聲女几山前官舍清繞堂鳴澗夜泠泠塵埃别後何由見簷雨三更起坐聽晝臥口占三首康濟朝饑進湯餅誰何午睡屬新茶讀書隱几聊復爾謝客扄門豈不佳甘風逺集聞朝嘒怨月深棲有夜鳴凉牖踈明稀老翠雨畦幽獨立新清學道窮年要有得强顔干世欲何求病栽薏苡無勞謗濕要鞠藭不待搜贈無咎欺馬街泥未肯乾重城含霧曉漫漫誰令萬屋淋漓雪猶作長安半夜寒晚春四首楊栁藏鴉筍作竿曉風吹雨作輕寒清隂一片收春去留得薔薇數㸃殷薔薇倒架筍過鄰夢澤茫茫欲晚春緑暗紅稀君莫嘆滿枝梅杏欲嘗新洗雨吹風送晚春盡收紅紫布青雲眼前消長諳已久清坐不妨長閉門荒畦零亂滿蕪菁春事收功欲老成鵲噪鳩鳴莫無賴曉枝千囀有雛鶯懷金陵三首此君堂後青蒼玉别後何曽寄一聲想見秦淮月堂下西風吹浪拍堤平璧月瓊枝不復論秦淮半已掠荒榛清溪天水相澄映便是臨春閣上魂曽作金陵爛漫逰北歸塵土變衣裘芰荷聲裏孤舟雨卧入江南第一州水閣二首積雨荒池水欲平軒窗長夏有餘清公餘一枕滄浪夢卧聽風荷受雨聲池水亭亭如有光曉風清露㸃新糚翠帷自障非遊女多謝經營白鷺郎出京寄無咎二首不許多聞長樂鐘打包旦遇又匆匆長安城裏誰相識只有周南太史公老去相看情益親河梁分手欲沾巾祗應誦得離騷賦長作行吟去國人讀史二首區區姦智終何補不悟身猶弄伎兒蛇斷楚郊秦未覺鬼謀曹社夢先知嬴秦餘祚已蛇分車府凶髙尚畏人安有區區猶指鹿從來菽麥不曽分韓信祠有序史稱信之族誅豫嘗疑之其謂陳豨曰王至上必自將豫從中起夫使高帝將精兵于外而信欲詐驅徒奴烏合之衆于京師雖太公穰苴不能以成事此猶炮烋于猛虎之穴虎歸則無事矣信謀無遺䇿豈肯為計若是之疏哉况蕭相國在長安信獨不畏之耶此殆以髙帝出征以信失職畏其亂于內亦若彭越使人告之而傅致其詞如此耳不然信不忘漂母一飯之恩信遇髙帝恩亦厚矣一旦背之豈人情哉千金一飯恩猶報南面稱孤豈遽忘何待陳侯乃中起不思蕭相在咸陽題淮隂侯廟有序吕太后勸髙祖誅彭越使舍人告其反而越固未嘗反也特以為名耳髙祖將兵居外而太后在長安太子仁弱不知兵而韓信方失職在京師吕畏其乘時為亂而不可制使人誣告其反詐召而誅之耳方是時蕭相國居中而信欲以烏合不教之兵欲從中起以圖帝業使雖甚愚必知其無成以信之雄才謀無遺䇿肯出此哉太史公記陳豨反事言豨居代多致賔客周昌畏其不軌而奏召之不至豨因自疑而其後通曼丘臣王黃遂反此司馬遷所謂邪人進說遂陷不義者也遷載豨反事未嘗一言及信吁此遷欲見誅信之寃也雲夢何須僞出逰遭讒猶得故鄉侯平生蕭相真知已何事還同女子謀原注何不為信辨其枉也偃王城逃戰彭城似去邠興王可即廢為臣中原多少堪憂事勞苦君王八馬奔挂劍臺上國歸來嵗月深悲嗟脫劍挂高林欲知不負徐君意便是當年讓國心古意樓上珠簾拂疏網却勻愁黛對凌波也知新舊爭多少敢話機頭織素多道彭澤姓陶令尹今何在空補陳編歸去來安得春江作春酒百年長與子銜杯栁永豐坊裏舊腰支曽見青青初種時看盡道邊離别恨爭教風絮不狂飛題宣州後堂壁四首過雨山亭暑氣微老人猶未試生衣滿園閒緑無人到春日南風燕子飛我欲留春情不淺青春别我苦無情敬亭山下紅千樹日日南風緑滿城翠樹隂隂晚雨回江山清潤絶纎埃軍厨煮酒香初熟更釣溪魚斫鱠來流落天涯一病身簿書叢裏費精神殷勤照水窺華髮黃鳥聲中又一春宋景平命賦隔窗花影午睡簾櫳春日長半消金鴨水沉香隔窗花影時來去疑有東鄰覘宋郎晚春初夏八首隂隂夏景變餘春清曉園林未有塵日日東風欺弱桞鵝黃吹盡作青雲少室山前日日風望嵩樓下水溶溶卷將春色歸何處盡在車前榆莢中吹盡成蹊桃李塵兔葵燕麥一番新只應解籜抽青玉霜節稜稜尚可人古栁參天鳴啄木青蕪覆地下鳴鳩白頭懶作留春計睡起移時獨倚樓睡足髙簷春日斜碾聲初破小龍茶樓邊緑樹飛紅盡春色墻隂老薺花青春已屬明年事晝漏初知夏景長日日南風筍成竹殘紅雖有不成妝春歸草木漫青紅半委塵埃半逐風誰似長楸百餘尺髙張錦繡照青空酴醿壓架不勝繁洗雨吹風更可憐姑射仙人本仙骨百花凋盡獨嬋娟梅花十首月落嚴霜自理妝北風工為發清香曉英數㸃辭人去幽獨無人為斷腸幽恨清愁幾萬端故將巧笑破霜寒落英收拾供騷客秋菊從來不足餐姑射仙姿不畏寒謝家風格鄙鉛丹誰知檀蕚香鬚裏已有調羔一㸃酸林外啼禽自往還風前詩客倚闌干小園門鎖黃昏月耿耿幽姿伴歲寒玉粟勻圓官樣黃領巾借與十分香衝寒不為生春物自要晨霜為洗妝清寒池館靜無塵嵗嵗相逢似故人任遣墻頭疑是雪欲教園木早知春脉脉無言亦有期雪中狂殺羽林兒可憐多少幽竒事却是東風總不知任教雪壓色終勝却要風嚴香更聞江雨細時青子熟聞名猶救渴將軍數㸃深藏碧玉枝翠峯十二擁瑶姬憑君說與凡桃李徹骨清寒爭解肥三畝荒園草棘荒可堪終夜北風狂瑶環瑜珥誰將去嘖嘖幽禽啄蕊黃絶句二首萱草開時燕引雛石盆雨滿長菖蒲但令甕有賢人酒何用門迎長者車門前山樹插雲青雨足山前稻水平桑柘半空蠶事了緑隂深處囀殘鶯柯山集卷二十二
