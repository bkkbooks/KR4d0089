body:
  text: 柯山集巻七宋張耒撰五言古詩三月小園花已謝獨芍藥盛開靄靄春日晩寂寂新隂繁千紅與萬紫盛極一時闌西堂晩芍藥百萼乘露鮮紅妝諸美人錦繡富春妍東風時過之舞態低昻翻折贈懐溱洧感之為三歎題焦山焦山如伏龜萬古浸碧浪舉頭北顧海尾負金刹壯我聞城東樓秀色日相向松杉數毛髪人物見下上欲携浮丘公據殻恣潜漾仙風如見引金闕或可訪春日雜興四首桃李用事辰鮮明奪雲綺繁華一朝去黙黙慙杞梓時徂鷹化鳩地遷橘為枳獨有羡門生後天猶不死昔我逰京室交通五陵間主客各英妙袍馬相追攀千金具飲啜百金顧吹弹纓弁羅廣席當頭舞交竿鮮妝耀渌酒錦纈生風瀾燈燭暗夜艾士女紛相班歡娛易徂歇轉盻如飛翰亹亹負孤願離離銜永歎山鳥窺茗飲簷花笑蔬餐棄捐勿重陳事定須葢棺客從逺方來遺我昭華管吹之幻人心異境生虛􅑆磝磝青嶂横決決春流滿馬蹄交狹斜車轂錯平坦士女競芳辰禽魚䕃修笴依微認涕笑凌況見纎短停吹歘冺㓕耽耽復空館靈物信所直顧恨知音罕潭潭故邑井猗猗上宫蘭不食自清渫莫服更幽閒志士恥窮極巻迹甘饑寒佳辰邈良覿觸物懸悲端八途𦕈回逺經嵗曠音翰豈不慕裘馬詭得非所安蝉冕多怵廹繩樞尠憂患枉尋竟何補方枘誠獨難出長夏門原注初望龍門出郭心已清青山忽相對㳺人傍流水俯仰秀色内誰張蒼玉屏中斷神斧快清伊㵼其間銀漢曵天𣲖參差樓觀出杳靄林麓䆳巖聲答逺響水影弄空翠同逰得君子原注同榮教授興與烟霞㑹選勝雖自兹高懐已塵外飯昭果寺飄然乘興逰殽酒笑俗具僧居致野飯草草亦有趣山僧慣迎客煮茗新泉注岩花得春遲晩秀見紅素蕭蕭野市井人物自來去溪光送孤舟石色照素樹題名掃髙壁嵗月記所遇書罷迹已陳出門猶反顧渡伊水雙崕若爭妍秀色日相射逰人誇水東揮榜渡清瀉潺潺溪邉風五月自瀟洒中流望南北河漢自天下嗟予水鄉客塵土困蹈藉江湖久懐歸無地税征駕臨流動長想照影久悲咤滄洲倘有歸功業付髙謝白公祠斯人不可見千古懐清風猶想鸞鳳姿翛然山水中空祠遺像儼過者為肅恭同時富貴人冺㓕知何窮公惜得所遇慨然屡輸忠一傷巧舌刀冺黙類瘖聾出處竟無禍巻舒詎知蹤被獲空歎麟不制方為龍上皇龕升危躡石梯巳覺毛骨異𤣥龕剖山腹六月霜雪至佛臺磨青瑶紺滑不留水巍巍數天人蒼玉刻冠佩老僧拂髙崕上有昔人字國都已蕭瑟山澤隠遺事西軒俯空闊書夜納蒼翠卜築莫後時林中有餘地石樓清溪若奔虬八鎻束其頸犇騰去莫脱擺掣姿驍猛嘈嘈戰風霆萬鼓助其勁聲驅石崕動氣抱晴日冷我來怯初登注視久乃定悠悠山川濶寸目羅萬景平生林野趣踈放謝鞭警㑹期山月出一嘯清夜永上方足躡青玉磴躋攀不知勞回頭瞰木抄始覺所厯髙孤鳥去滅沒奔溪深怒號白日當畫梁青雲送微颷坐久神慮平微凉清骨毛但警塵垢容俯仰近赤霄古壁有遺字昔人嗟寂寥南風不知暑古木常蕭蕭三龕萬穴列巖壁三龕獨雄夸封山鑿其骨開像儼且呀悲哉輕人功不計嵗月賖像成竟何補國破荒蓬麻悠悠清伊水去去縈山斜晚渚栖暝鷗夕波戰餘霞陵谷良未遷古今如轉車應有千年鶴歸顧如咨嗟晩飯寳應晩風吹古栢落照明空山深行得寳刹崕嶺相回環人逺草木邃境幽魚鳥閒道人掃華堂延我具晩餐齋庖野菊美石井新泉寒既飽陟上方浮香出林端平生麋鹿志强學伏車轅塵懐造勝絶欲去猶三歎廣化遇雨浮雲蔽髙峯臺殿延晚色風聲轉谷豪雨脚射山白東樓瞰虚明龍甲排松栢蕭森異人境坐視動神魄撞鐘寺門掩晩霽尚殘滳相携下山去塵静馬無跡歸來解鞍歇新月如破璧但恐桃花源回舟已青壁寄子瞻舍人二首皎皎連城璧實惟天地珍足傷曽不售寳氣終氤氲山川媚餘秀星斗攬竒氛終然不可掩三浴祓埃塵天王齋戒受嚴庭具九賓貯之黄金臺籍以九龍茵事稱忘禮厚人誰駭其新車輪走四方爭覩快一陳無瑕故易傷歛輝志乃神紛紛名利塲向背不知醜翟公書其門客態自如舊勢去競詆沮有餘丐升斗髙賢少畦畛小子多狀候退之呼字生房相肆琴叟事竒出意表欲辯不及口神明勞忠孝福禄日方厚防微無早計求福常恐後贈楊念三道孚黄鶴樓前月清輝千里寒娟娟過江北送子别長安長安百萬家車馬無時閒中天聳觀闕四海㑹衣冠憐爾薜蘿子豪華駭新觀蕭蕭囊中句饑坐奏清弹漫郎久不惬逸思生風翰寄聲武昌魚欲從傖父餐曉赴秘書省有感桃李欲開時長安春正好晴空倚閶闔朝日散馳道雲收龍蛇榜爛爛金碧曉清都不容塵虎士守洒掃家無當關警襟袂免顛倒何慙驅欵段吾事不須早儒生近卜祝本自異時好聖朝尚文雅詔使窺鴻寳平生一盃酒江海送吾老静喧非人事不得守懐抱跳梁千造物乃取鏌鎁誚委懐隨所遭千葉纔一笑贈无咎以既見君子云胡不喜為韻八首平生懐想人握手良未易接君同舍歡此事非此世十年淮海夢一笑相逄地投分白首期願言何有既賢愚譬觀形美醜不自見醫肱待三折劍鐡要百鍊磨君古青銅汰簡寄明辨一智出千愚食芹敢忘獻文風還正始磊落有諸君長者進後生亦使我有聞譬如狸與虎偶使並稱文終然不可及困我力空勤文衰東京後特起得韓子支撑誹笑中久乃化而靡籍湜既洒掃後生始歸市垂君拯溺手請效我一指詩壇李杜後黄子擅竒勲平生執覊靮開府與参軍舉詩秉筆徒吟哦謾云云安知握竒律一字有風雲觸有羸其角進有䟦其胡膏車秣吾馬白日在修途雖乏亡何杯頗多未見書力學致事功良田本深鋤黄子少年時風流勝春桞中年一鉢飯萬事寒木朽室有僧對談房無妾持帚此道人人事誰令予獨不南山縳虎師肯顧世書字揚眉哦楚喉鼎畔倒侯喜詩聲一蒼蠅下到霹靂耳庸庸老尋常物外有竒偉昨夜月中一睡殊有秋色覺書所見戲呈道孚幽人息遥夜四聴市聲寂月華清可掬天色紺欲滳候蟲先知秋微響出隂壁精熒髙露濕㫁續殘河白興懐我自出抱器方待擇感時當有作陋巷奏金石予方問農圃朝市嗟掃迹先寒戒裘褐嵗暮養老客東園荒園何所有落葉與衰叢含芳未肯吐惟有木芙蓉黄菊如佳人綠萼包金茸併隨重陽酒娯此憔悴翁次韻淵明飲酒詩有序鄙性嗜酒親友所知也紹聖丙子得官明道寓居宛丘職閒無事終日杜門人知其好飲也或饋之酒不問寒暑日輒數酌飲雖不多而樂則有餘因讀淵明飲酒詩竊愛其詞文而慕其放逹因次其韻嗟余與淵明神交于千載之上豈敢論詩哉直好飲者庻幾耳得詩十一首我欲常飲酒俗事苦奪之飲酒不得醉何如未飲時顛倒衆譏笑佳處正在茲念此雖杜門濁醪日常持出門惮應接俗士不多情對酒輒拜辭好禮以求名嗟嗟名幾何曷足善爾生共處一泡中倐忽風濤驚好飲信無補不飲亦何成我久喜文詞思與鴻鵠飛老來覺非是念昔正可悲買金鑄杜康百拜誓歸依晉陶與康伯九原吾與歸涉世苦不諳多病身早衰惟有尊中酒不與我心違處樂非縱情處静非避喧豪夸與枯槁彼各據一偏悠然獨樂處在我不在山羲皇迹已逺三酌呼可還一罇每獨睡不待賓客言所嗜人不得一物百非是猶有尊中酒道勝無敢毁彼哉譏謗者誑口而信耳當憂十八隔罰此繆語綺自庇無一椽道人分半宅屋西羅古殯寒草無人跡纍纍長與少豈復待年百鴉飛朝樹踈蟲弔宵月白平生或不飲至此方知惜曹参漢賢相椽吏亦豪英四海付醇酒乃真知物情亡秦餘毒烈一冼百壺傾和氣薰醉人金革乃不鳴卑卑談治道陋矣洛陽生種樹東簷下雨來發幽姿微陽動九地光彩變新枝榮衰一以異枯槁易神竒消息天使然人工徒爾為杜門沽酒飲髙懸吾馬羈里有好事者我往罇輒開我亦為之盡每往亦開懐尚慮數見厭動作旬月乖今晨起苦晩獨坐見烏棲冬温雪作雨里巷苦多泥且復閉門坐開巻理多諧誰知無言中獨往不自迷得意復終日弭車不復回弱嵗慕世名中年頗探道世間無非苦病死與生老相尋無窮已遞代作榮槁竒哉竺乾書百遍讀愈好汙泥雖云濁本不害吾寳酒雖破浄律吾事在律表昔嘗罹厄疾一卧輒踰時念無所歸咎乃誓與酒辭那知偶不死持杯復飲兹既飲輒為盡快哉復何疑神暢病自失此説信不欺藥石傷天和此方吾笑之與潘仲達二首東風沛甘雨百物一時好江南桃李盡紅紫到百草道傍負擔子寒食歸祭禱念我淮上丘三年不躬掃淮陽牡丹花盛不數京洛姚黄一枝開衆艷氣如削亭亭風塵表獨立朝萬萼誰知臨老眼更復美葵藿莎雞金風透殘伏玉樹先秋凉喓喓草間蟲感時振衣裳楚客思萬里夜吟怨藜牀勞勞終夕語共此簷月光孤輪曵獨蠒折管韻哀傷辛苦豳父兄無衣畏風霜宦逰宦逰吾漫爾未慕致身早秋來憶山苦遥夜夢顛倒鳴蟲待誰聽落葉煩我掃誰復省勞人吾生常草草次韻秦覯琬琰非世珍昔以羊皮換嗟君復何求衆棄乃所玩十年少逰兄閉口受客難二毛纔一第俗子猶憤惋人間異巧拙善琢貴顔汗婵娟守重閨倚市爭倩盼君胡寳滯貨屡辱訪衰煗譬猶卧仆塗更侑觥與散球然瑚璉質磨琢争璀璨遲君三年鳴更用驚我慢阿几小兒名阿几眉目頗踈明日來書案傍學我讀書聲男兒事業多何必學讀書自古竒男子往往羞為儒阿几笑謂爺薄雲無密雨㸔爺饑寒姿兒豈合貴富翁家破箧中惟有書與史教兒不讀書更欲作何事宿虹縣驛長隄隘舟車上下無暫歇煎熬古驛門聒聒爭𤨏屑東南淮浙富輸餽日填􅍋楚風習喧卑吳舌動嘲唽平生耽静意投閙劇含噦况兹道路勤强食慰饑渴年來嵩洛興久與泉石結終當卜吾廬雲山對華髪有感三首一春苦多風桃李見無幾良逰時已失忽忽三月尾中間亦何有徒自亂心耳所嗟違所娯坐費良日晷堂北千葉桃微本混榛枳居然未之省一日燦相視零丁不忍摘攀玩聊自慰乃知物雖微未易即踈棄從今至零落猶足伴尊胾仍煩芊綿草藉我花前醉昨日鴉作巢今者鴉哺兒念知三月䦨春物行已稀晩風颯不收殘紅怨餘姿回風起輕寒擁爐火重吹燈明夜齊静目澁臨書遲病齒不飲酒持盃勸妻兒豈無兒女心惆悵桃李蹊彼昏安目前丈夫方有思古今不殊途掩巻獨長想炎爐與死灰相去如反掌彼昬誠不知一醉富莫量那知道旁殍曾是厭盃盎一金短販兒豈暇議得喪但憐反覆間觀者為惆悵聖賢蹈大方不茍目前妄寄身愛憎間得失真一餉食菜大雨困淋漓小雨傷霡霂哀哉南畝人日夜塗手足入倉無一粒敢望祈報福餘功歸老圃畦莱青滿目長官卻野饋性命赦雞鶩何須問清白薦徳芻一束歸來輟食嘆每悔釡炊玉青衫尚如此何况膏梁腹願君少自寛謀逺須食肉王子開朝散早年以疾病謝事還江隂求詩為别三首濟物昔所務捨耕還自非駸駸老將至忽忽意多違門有王夫子柴車謝事歸令人三歎息羞澁向塵衣田園何日到水國洗秋寒興來出飲酒興罷歸杜門漫郎逰已倦老眼亂丹鉛扁舟肯載我共㸔雪濤翻避禄免危疾棄鉛得黄金鬚眉藹如漆便覺老難侵江湖足幽遯市卒或可尋莫思芙蓉子丹田亂君心暮春奉女兄弟集宴堂晨暉麗花桞流水灔池塘暮春漸暄燠華構肅朝涼使君簿領睱亦復陳壺觴班坐豈異人骨肉皆歡康遥山出逺翠逺水明斜陽歡言不期醉淡泊味何長窺園吾老懶讀書得閒嘗窺園愛此千樹雪髙低不勝繁衝風掠之去頗已隨沙塵感之可奈何我豈土木人畏病不飲酒已慚嵇阮真淡泊非衆嗜自娯難及賓獨逰還獨吟魚鳥與我親悠哉山林趣媿此簮纓身馬巨濟董役魏王墳作詩寄之城北牛脾山千丘壓其麓事皆有司辦聖世數厚族園林迫復土百役興甚速煩我别駕公侵星次空谷郵亭舊客去原注二刷錢官皆去閒日睡頗足聞鶯有佳興徙倚近喬木櫻笋味鼎來管絃調漸熟期歸酌燒酒及此未炎燠出伏後風雨頓凉有感三首秋風振秋曉萬境一凄清幽草蟲響息髙葉露華凝戢翼烏尚宿引吭雞屡鳴淹留度華嵗悵然難為情三伏如湯釡熏煮理亦足西風半夜雨牕戸一清肅那能惜摇落共喜過炎燠老人亦晨起稍進杯中醁殘暑扇中盡新凉枕上歸微雲起平逺空碧上朝曦稍感夏衣薄漸傷髙葉稀來鴻飛集喜卒嵗稻梁肥太寧庭栢微風起清籟烈日交翠隂䕃兹金仙居樓殿鬰沈沈永日燕雀下有時鐘梵音誰能悟斯道來此契無心睱日步西園感物輒為詩得七篇酴醿欲知此園古請視􅙐醿蒼孫枝已輪囷走蔓龍蛇長春風一吹嘘灼灼發竒光仙妹不可挹順風飲其香秋圃秋圃寂無有蕭條殘菊枝老蛩依日呌暗蝶傍人飛鎻澁門開少莎長人到稀舊逰渾記得到處即如歸菊叢下根盤秋泥上葉披宿雨惟餘黄金蕋秀色日夜吐寕須薦九日但惜嵗云暮吾將屑落英持泛蘭臯露芙蓉清霜厲嚴殺松栢氣不振芙蓉乃微木晚艶獨嬌春穠粹覺蘭疲芬敷知菊貧欲攀無所贈聊復插吾巾橘竒林藴貞粹健葉圓青鮮中有碧瑶實正味百果先貢包登堯爼頌徳列騷篇李衡空庸材徒列木奴千斑竹重瞳陟方時二妃葢老人安肯泣路傍洒淚留叢筠頗疑葛陂化㸃㸃留斑鱗慎勿脱水去入世多埃塵種蔬貧舍無旨蓄種圃治寒蔬縱横數席間灌溉亦勤劬積雨有新甲時摘付中厨何勞樊遲學當問漢隂夫所居堂後北籬下獲二蛇一小色赤長二尺許一大色黒長七尺圍四五寸尾可貫百錢盡放之二物穴我居嵗月亦已老一朝雙擒獲蜿蜿出幽草安行免噬齧敢望吐珠報已月不殺蛇昔賢有遺告小雨效韋體午景蔽浮雲芳林散清雨虛忩度遥吹稍覺青葉舉殘蔬知夏餘隕葉兆秋序幽獨無往來烹茶誰晤語柯山集巻七
