body:
  text: 柯山集卷三宋張耒撰古樂府歌詞君家誠易知曲君家誠易知易知獨難忘西風墻頭吹葉黄蟲絲當户理秋光翠屏碧簟生朝凉牀頭蟋蟀見焚香鮫綃纈雙鳯凰上元緑鬢遮耳璫來車去馬官道旁碧雲傳情何處郎相望玉樹啼寒螿于湖曲有序蕪湖令寄示温庭筠湖隂曲其序乃云晉王敦反屯于湖隂帝微行至其營敦夢日遶之覺而追不及故樂府有湖隂曲按晉地志有于湖而無湖隂本記云敦屯于湖又曰帝至于湖隂察營壘而去頃予逰蕪湖問父老湖隂所在皆莫之知也然則帝至于湖當斷爲句乃作于湖曲以遺之使正其是非云武昌雲旗蔽天赤夜築于湖鋒洗鏑巴滇騄駿風作蹄去如㓕沒來不嘶日圍萬里纒孤壁兵氣如霜已潜釋蛇矛賤士識天顔玉帳髯奴落妖魄君不見銅駝陌上塵沙起鐡騎春來飲瀍水浮江天馬是龍兒蹙踏揚州開帝里王氣高懸五百秋弄兵老濞空白頭石城戰骨卧秋草更欲君王分上流襄陽曲西津折葦鳴䇿䇿蟾蜍光入芙蓉白山頭不雨賈船稀日日門前江水窄將欲烜赫招行人旋起丹樓照長陌銀屏深蔽玉笙閒自擘新橙飲北客倐離暫合心未果淚瑩雙眸爲誰墮寄衣曲秋風西來入庭樹攀條正念征人苦空忩自織不敢任鳴機愁寂如鳴艣練成欲裁新絲香抱持含愁叔姑堂别來不見衣覺窄試比小郎身更長江南曲江蒲芽白江水緑江頭花開自幽淑人家晨炊欲熟時旋去網魚惟所欲徃來送租只用船未省泥沙曽汙足有錢買酒醉隣畔終日數口常在目不學長安貴公卿每念離心寄朱轂朝逰巖廊暮海島譴人未歸身自到怨曲二首白首南朝女愁聼異域歌収兵頡利國飲馬胡盧河毳布腥羶久穹廬歳月多雕窠城上宿吹笛淚滂沱祖席駐征橈開帆復信潮隔筵桃葉泣吹管杏花飄船去鷗飛閣人歸鹿上橋别離惆悵淚江鷺宿紅蕉壽陽歌壽陽樓前淮水碧壽陽羙女如脂白李郎青鬢照青衫曽在花前作狂客伯勞睡重花枝晩時許蜻蜓一偷眼歡娯雖少恨已多纎手紅箋揮翠管淮陽歸來春已暮夜夜夢魂淮上去欲歌舊曲只添愁畫得雙蛾不能語有客南來從壽春衆人笑問動精神自從桞别章臺後攀折風光知幾人巳伴春衫辭側㡌不怕嬌啼隨意笑嗟君耿耿獨相思須信多情是年少勞歌暑天三月元無雨雲頭不合惟飛土深堂無人午睡餘欲動身先汗如雨忽憐長街負重民筋骸長彀十石弩半衲遮背是生涯以力受金飽兒女人家牛馬繫高木惟恐牛軀犯炎酷天工作民良久艱誰知不如牛馬福春雨謡晩雲欲著樹中夜一犂雨老農呼子孫力作莫辭苦風吹潤土如炊香烹雞為黍餉南岡我知聖人在明堂元年巳是豐年祥少年行三首騂弓鵲角蒼雕羽金錯旂竿畫貔虎長驅直踏老上庭手拔干將斬狂豎歸來觧甲見天子金印懸腰封萬戸自爲大漢上將軍高揖羣公佐明主人生豈合長貧賤師事黄公曽習戰英雄天子伐匈奴初拜將軍二十餘黄塵晝飛羽如挿身射單于碎弓甲從來書生輕武夫坐遣揮毫寫勲業少年賣珠登主門主家千金惜一身緑韝請罪見天子尚得君王呼主人鬬雞走馬長安道豪傑驅來奉談笑漢庭碌碌公與侯畏禍憂誅先白頭謫官黄州至南頓驛同李從聖叔姪小飲共飯何草草客來從逺道傾壺得殘酒聊以開懐抱年將半百両髩華謫官憔悴來天涯神理可馮吾道在不應長遣路人嗟代贈洞房飛香作春霧仙人勸酒香中語明眸第二紫雲娘鸎學歌聲桞如舞蹙眉長歌澧有蘭銀鈎請君春草篇繁絃高張燭燒夜玉壺未盡参在天春泥雪消淮上路東風浪頭驚客艣惱公舊事幾夢魂過眼相逢一風雨黄流清洛上天漢吳山洞庭藏水府謾題詩句寄歸舟江口風狂那得渡代嘲過作抛人去非真我獨知如何立不定却有獨來時牧牛兒牧牛兒逺陂牧逺陂牧牛芳草緑兒怒掉鞭牛不觸澗邊古桞南風清麥深蔽日野田平烏犍礪角逐春行老㹀卧噍饑不鳴犢兒跳梁沒草去隔林應母時一聲老翁念兒自携餉出門先上岡頭望日斜風雨濕蓑衣拍手唱歌尋伴歸逺村放牧風日薄近村牧牛泥水惡珠璣燕趙兒不知兒生但知牛背樂贈人三首次韵道卿未必蝤蠐如素領故應新月學蛾眉引成密約因言笑試得真情是别離罇酒且傾寒琥珀淚妝更㸔薄臙脂北城月落烏啼後便是孤舟腸斷時醉裏紛紛散别筵醒來客枕一燈前黄茅野岸三更月春水長亭十里船一㸃淚憑誰寄與十年香在恨依然空疑忩外梅花發珠箔青樓若箇邊可是相逢意便深爲郎巧笑不須金門前一尺春風髻忩外三更夜雨衾别燕從教燈見淚夜忩惟有月知心東西芳草渾相似欲望高城何處尋採蓮子菡蓞香蓮十頃陂小姑貪戲採蓮池晩來弄水船頭濕更脱新裙裹鴨兒倚聲製曲三首有序予自童時即好作文字每于他文雖不能工然猶能措詞至于倚聲製曲力欲爲之不能出一語傳稱禆諶謀于國則否謀于野則獲杜南陽以謂性質之蔽夫詩曲類也善爲詩不能製曲豈謀野蔽耶爲賦三首春絲惹恨鬢雲垂媚態愁容半在眉早是思深難語别可堪肌瘦不勝衣眼前有恨景尤速門外無情車載脂自笑不如天上月尊前猶有見郎時不恨因縁不恨天强持牙板向罇前陽關一曲動山月别淚千行盈酒船薄命有情今已矣傍人無意亦凄然願君學取梁間燕秋去春來到妾邊山未高兮水不深此情此意薄千金今朝酒伴雙垂淚明夜燈前獨擁衾玉筯異時空見跡塵犀千里亦通心桃源路絶無人到應許劉郎再訪尋劉壯輿是是堂歌并序子劉子構堂于官舎名之曰是是而求子爲詩予復之曰夫物生之所必有而其爲物彼是相次而不能定夫一者天下之是非也雖聖人出無如之何昔楚人有莊周者多言而善辯患夫彼是之無窮而物論之不齊也而託之于天籟其言曰吹萬不同而使其自已也周之爲此言自以爲至矣而周固自未離夫萬之一也而曷足以爲是非之定哉雖然如周者亦略税駕矣劉子乃構堂揭牓而獨以是是非非自任吾將見子吻敝氣殚而言語之戰未已也嘗試爲子歌堂中之樂而息子之勞庻幾隱几而嗒然者乎歌曰讀堂中之書兮以致子之眠飲堂中之酒兮以休子之言是非雜然于子之耳兮付庭中之嘆蚓與夫木上之鳴蝉庻幾飬生而保和兮窮子之年獨處愁高髙花飛驚愁顔珠簾晝鎻春風閒少年金鞍照秦地玉巵雙覆塵埃間花間蝴蝶雙飛舞感觸深心心更苦昨夜隂雲數尺許連宵變作西忩雨逺别離逺别離明當入蜀去酒酣日落客心驚起與僕夫先議路引車在庭牛在槽桐枝嫋嫋秋風豪别情惆悵氣不下酒觴飜汚麒麟袍緩緩清歌慰幽獨不惜更長更燒燭贈君髪上古搔頭莫易此心如此玉平生每笑花飛片東家吹落西家怨但得歸時似别時相知何必長相見行路難人生動與衣食關百年役役誰爲閒四時睡足鞍馬上去嵗錢塘今長安車愁羊腸夜險折船畏人鮓晨驚湍九州一身恨自惜使我顔色常鮮歡天地一氣成萬象融即是江結是山再願洪罏瀉融結萬世更無行路難白紵詞二首效鮑照摇輕裾曵長䄂爲楚舞千萬壽新詞白紵聲按舊朔風捲地來峥嶸燕雁避霜饑不鳴高堂酒多華燈明囬纎腰出素手髻墮鬢傾釵欲澑爲君歌舞君飲酒歳云暮矣七澤空湯湯漢沔天北風玉壺之酒樂未終七夕歌人間一葉梧桐飄蓐收行秋囬斗杓神官召集役靈鵲直渡銀河雲作橋河東羙人天帝子機杼年年勞玉指織成雲霧紫星衣辛苦無歡容不理帝憐獨居無與娱河西嫁與牽牛夫自從嫁得廢織絍緑鬢雲鬟朝暮梳貪歡不歸天帝怒謫歸却理來時路但令一歳一相見七月七日橋邊渡别長㑹少知奈何却悔從來歡愛多怱怱萬事説不盡燭龍已駕隨羲和河邊靈官催曉發令嚴不管輕離别空將淚作雨滂沱淚痕有盡愁無歇我言織女君莫歎天地無窮㑹相見猶勝姮娥不嫁人夜夜孤眠廣寒殿琉璃瓶歌贈晁二火維荒茫地軸傾下有積水潜鯤鯨鰲身飜瀾山爲崩金烏下啄獰龍騰狂鬚奇鬛萬族朋巨神日月雙手擎夸娥愁思烏戢翎老魚戰死風雨腥長彗下掃千里驚淺洲一席塊爲城蠻兒夷女竒弁纓大舶映天日百程怒帆吼風戰飛鵬舟中之人怪眉睛獸肌鳥舌髻翹撑萬金明珠絡如繩白衣夜明非縞繒以有易無百貨傾空中開槖光出楹非石非玉色紺青昆吾寳鐡雕春氷表裏洞徹中虛明宛然而深是爲瓶補陀真人一銖衣攀膝燕坐花雨飛兠羅寳手親挈携楊枝取露救渴饑海師跪請顙有胝畨禺寳市無光輝流傳人間入吾手包以百襲吳緜厚擇人而歸今子授爛然光輝子文章清明無垢君肺腸比君之徳君勿忘與君同升白玉堂九江千嵗龜歌贈无咎靈龜千年口不食以背負牀飲其息吾家兩龜豈徒不食亦不息夀與萬古無終極濟南晁君博物天地通夜窺牛斗頗似晉司空指我兩龜有名字大龜為九江小龜號千歳老龍洞庭怒蕩覆堯九州原注謂半山老人禹咄嗟水平流原注謂迂叟九江無波拍天浮中有大靈背如丘南風吹楚澤蓮葉清欲秀有物中作巢一寸立介胄霞衣仙人鬢如霜飲以南極之光芒丹顱老客不相見飛渡東海巢案巢一本作朝扶桑邇來蟠桃枝有子大如缶浮㳺輕于鳥案此句一本作我身輕若蓬江海一回首青珊瑚柱碧瑶宫水仙焚香吹作風朝戯蓮葉西暮逰蓮花東秋風蓮子熟歸去清江國小千歲大九江我久不見之向君案前雙我謂晁君二物有似我與子國有守龜吾子是燦然天下之寳噐黄金之縢紫瑶匱天王端冕史再拜一逆二從定大事我身百無用頗似千歳潜深淵不願人間貯金藉玉享富貴但願寄身江上一葉之秋蓮萬物才不才用舍不任天寄聲問晁君然不然大雪歌老農占田得吉卜一夜北風雪漫屋屋壓欲折君勿悲隴頭新麥一尺泥泥深麥牢風莫吹明年作餅大如箕野人食飽官事少莫畏瑟縮寒侵肌高堂晨興何所為門無馬跡人更稀珠樓玉閣互飛動坐見貧屋生光輝無功及物慚受禄豐穰幸賴天與之棄糧遺粒待雞犬吾羔何得長烹藜孫彦古畫風雨山水詩山深巗高石壁青白日忽變天晦㝠黒風驅雲走不停驚電疾雨來如傾山前雨㸃大如手山下水湧危槎横崩崕古樹老有靈吼怒直與風雲爭枝披葉偃鬬不怯萬竅却欲藏雷霆鞭驢疾驅者誰子石路嶮澀驢凌兢目迷心懾愈不及來憇樹下如寒蠅蒼茫直與鬼神接恍惚不保龍蛇驚平居此樂忽入眼孫家古圖纔可辨奈何一幅一尺餘欲奪天地之竒變我心愛之良有以昔苦山行親遇此一生兩足不下堂輸爾朱家貴公子歲暮歌北風巻雪送暮冬重雲如山爭塞空百年老樹吼欲折塌翼不見南飛鴻堂下幽姿亦可悦㸃綴小樹花玲瓏老人重裘不能煖永夜惟守深爐紅啾啾寒雀飛不起饑啄凍土藏枯叢青春欲囘水官怒摧拉未使陽和通天時平分各司一興廢誰得專其雄杜門觧轡聊有待行㸔馬脚春泥融光山謡艤舟淮南望新息天遣清淮限南北﨑嶇細路入光山野色蒼凉秋日白八月穫稻田無水蚱蜢羣飛稻乾死危橋絶澗聞水聲喧喧汲水爭瓶罌昏昏落日銜逺山鳥啼車轍未得閒縣公吳生我世舊為我烹羊酤斗酒燈前醉飽紛就眠五更開門星滿天長年他鄉心惘然逺途辛勤難具言用劉夢得三題春向晩斜日在高樓幽花愁脉脉輕絮去悠悠冉冉三更雨蕭蕭通夜愁春巳暮把酒送春歸花落鳴禽散草長逰客稀去年堂上燕故故傍人飛春竟去白髮感生平流水去不斷夕陽猶有情舊時桃李月悄悄向人明柯山集巻三
